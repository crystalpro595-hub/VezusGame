<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ваучеры</title>

  <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
  <link rel="dns-prefetch" href="https://i.postimg.cc">
  <link rel="preload" as="image" href="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#eaf1ff;
      --muted:rgba(234,241,255,.72);

      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);

      --glass: rgba(12, 14, 20, .74);
      --glass2: rgba(14, 16, 24, .92);
      --stroke: rgba(255,255,255,.08);

      --shadow: 0 18px 42px rgba(0,0,0,.48);
      --shadowSoft: 0 12px 28px rgba(0,0,0,.34);

      --accent1:#3b82f6;
      --accent2:#2563eb;

      --bad:#fecaca;

      --tg1:#2AABEE;
      --tg2:#229ED9;
    }

    *{
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      height:100%;
      margin:0;
      overflow:hidden;
      color:var(--text);
      background:#020617;
    }

    body{
      background-image:url("https://i.postimg.cc/fbJT34yY/076E519D-F095-4957-88BF-5591DEB82533.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(900px 600px at 30% 10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(700px 520px at 80% 20%, rgba(59,130,246,.10), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,.40), rgba(0,0,0,.68));
      pointer-events:none;
      z-index:0;
    }

    .app{
      position:relative;
      height:100%;
      overflow:auto;
      padding: calc(12px + var(--safe-top)) 16px calc(28px + var(--safe-bottom)) 16px;
      z-index:1;
      overscroll-behavior: contain;
    }

    .content{
      margin-top:6px;
      display:flex;
      flex-direction:column;
      gap:14px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
      align-items:center;
      position:relative;
      z-index:1;
    }

    /* ===== Top bar WITHOUT рамки-контейнера ===== */
    .top-row{
      width:100%;
      display:grid;
      grid-template-columns:42px minmax(0,1fr) 54px;
      align-items:center;
      gap:8px;

      position:sticky;
      top:4px;
      z-index:30;

      /* убрали рамку/фон/тень */
      padding:0;
      background:transparent;
      border:none;
      border-radius:0;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .back-btn-square{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--stroke);
      cursor:pointer;
      background:var(--glass);
      box-shadow: var(--shadowSoft), inset 0 1px 0 rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding:0;
      overflow:hidden;
      transition: transform .15s ease, background .15s ease;
    }
    .back-btn-square:active{ transform:scale(.98); }

    .back-svg{
      width:20px;
      height:20px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .balance-mini{
      width:100%;
      min-width:0;
      height:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:6px 7px 6px 12px;
      position:relative;
      overflow:hidden;
      background:var(--glass);
      border:1px solid var(--stroke);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .balance-mini::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        radial-gradient(220px 70px at 0% 0%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(220px 70px at 100% 100%, rgba(59,130,246,.12), transparent 55%);
      pointer-events:none;
    }

    .bal-title{
      position:relative;
      z-index:1;
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
      color: rgba(234,241,255,.92);
      white-space:nowrap;
    }

    .bal-amount{
      position:relative;
      z-index:1;
      height:28px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      padding:0 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      color: rgba(234,241,255,.98);
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
      transition: transform .15s ease;
      min-width:88px;
    }
    .bal-amount:active{ transform: scale(.99); }

    .hero-logo{
      width:54px;
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      box-shadow:none;
      padding:0;
      cursor:pointer;
      margin-right:-2px;
      transition: transform .15s ease;
    }
    .hero-logo:active{ transform:scale(.98); }
    .hero-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.25));
    }

    /* ===== Header ===== */
    .page-head{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding: 4px 2px 0 2px;
    }

    .page-title{
      margin:0;
      font-size:24px;
      font-weight:900;
      letter-spacing:.3px;
      text-shadow:0 16px 28px rgba(0,0,0,.60);
      line-height:1.05;
    }

    .page-sub{
      margin:0;
      font-size:13px;
      font-weight:800;
      color: var(--muted);
      line-height:1.25;
    }

    /* ===== Card ===== */
    .card{
      width:100%;
      border-radius:26px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(12, 14, 20, .84);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 22px 62px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;

      transform: translateY(10px);
      opacity:0;
      animation: cardIn .55s cubic-bezier(.2,.9,.2,1) forwards;
    }

    @keyframes cardIn{
      to{ transform:translateY(0); opacity:1; }
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(420px 160px at 0% 0%, rgba(255,255,255,.05), transparent 60%),
        radial-gradient(360px 140px at 100% 100%, rgba(59,130,246,.12), transparent 60%);
      pointer-events:none;
    }
    .card > *{ position:relative; z-index:1; }

    .field{ display:flex; flex-direction:column; gap:8px; }
    .input-wrap{ position:relative; width:100%; }

    .input-ico{
      position:absolute;
      left:14px;
      top:50%;
      transform: translateY(-50%);
      width:18px;
      height:18px;
      display:grid;
      place-items:center;
      opacity:.9;
      pointer-events:none;
    }
    .input-ico svg{
      width:18px;height:18px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .input{
      width:100%;
      height:52px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      color: rgba(234,241,255,.96);
      padding:0 14px 0 44px;
      outline:none;
      font-size:15px;
      font-weight:900;
      letter-spacing:.35px;
      text-transform:uppercase;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      transition: box-shadow .2s ease, border-color .2s ease;
    }

    .input:focus{
      border-color: rgba(59,130,246,.55);
      box-shadow:
        0 18px 42px rgba(0,0,0,.22),
        0 0 0 3px rgba(59,130,246,.18);
    }

    .input::placeholder{
      color: rgba(234,241,255,.42);
      text-transform:none;
      letter-spacing:0;
      font-weight:800;
    }

    .error{
      display:none;
      font-size:12px;
      font-weight:900;
      color: var(--bad);
      padding-left:2px;
    }
    .error.show{ display:block; }

    .activate-btn{
      height:52px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      font-size:14px;
      font-weight:900;
      color:#fff;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      box-shadow:
        0 18px 36px rgba(37,99,235,.30),
        0 0 18px rgba(59,130,246,.14);
      position:relative;
      overflow:hidden;
      transition: transform .15s ease, box-shadow .2s ease, opacity .2s ease;
    }

    .activate-btn::after{
      content:"";
      position:absolute;
      top:-40%;
      left:-30%;
      width:40%;
      height:180%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.26), transparent);
      transform: rotate(20deg);
      opacity:.35;
      animation: shine 2.8s ease-in-out infinite;
    }
    @keyframes shine{
      0%{ transform: translateX(-180%) rotate(20deg); }
      55%{ transform: translateX(220%) rotate(20deg); }
      100%{ transform: translateX(220%) rotate(20deg); }
    }

    .activate-btn:hover{
      box-shadow:
        0 22px 40px rgba(37,99,235,.34),
        0 0 22px rgba(59,130,246,.16);
      transform: translateY(-1px);
    }
    .activate-btn:active{ transform: scale(.99); }

    .activate-btn:disabled{
      opacity:.65;
      cursor:not-allowed;
      transform:none;
      box-shadow: 0 14px 26px rgba(0,0,0,.22);
    }
    .activate-btn:disabled::after{ display:none; }

    /* ===== Stats ===== */
    .voucher-stats{
      width:100%;
      border-radius:18px;
      padding:12px 14px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      min-height:52px;
    }

    .voucher-stats-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .stat-ico{
      width:38px;
      height:38px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.09);
      box-shadow: 0 12px 24px rgba(0,0,0,.22);
      flex:0 0 auto;
    }

    .stat-ico svg{
      width:18px;height:18px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.95;
    }

    .voucher-stats .label{
      color: rgba(234,241,255,.72);
      font-weight:800;
      font-size:12px;
      line-height:1.1;
    }

    .voucher-stats .value{
      font-size:13px;
      font-weight:900;
      color: rgba(234,241,255,.98);
      padding:8px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.09);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      min-width:52px;
      text-align:center;
    }

    /* ===== Help accordion ===== */
    .help-box{
      width:100%;
      border-radius:18px;
      overflow:hidden;
      background: rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);
    }

    .help-toggle{
      width:100%;
      border:none;
      background:transparent;
      color: rgba(234,241,255,.96);
      cursor:pointer;
      padding:14px;
      font-size:13px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      text-align:left;
    }

    .help-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .help-ico{
      width:36px;
      height:36px;
      border-radius:14px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: 0 12px 24px rgba(0,0,0,.18);
      flex:0 0 auto;
    }

    .help-ico svg{
      width:18px;height:18px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.95;
    }

    .help-arrow{
      width:18px;
      height:18px;
      transition: transform .25s ease;
      flex:0 0 auto;
      opacity:.9;
    }

    .help-arrow svg{
      width:100%;
      height:100%;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.4;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .help-box.open .help-arrow{ transform: rotate(180deg); }

    .help-content{
      max-height:0;
      overflow:hidden;
      transition: max-height .30s ease, padding .30s ease, opacity .22s ease;
      opacity:0;
      padding:0 14px;
      font-size:12px;
      line-height:1.55;
      font-weight:800;
      color: rgba(234,241,255,.72);
    }

    .help-box.open .help-content{
      max-height:140px;
      padding:0 14px 14px 14px;
      opacity:1;
    }

    /* ===== Toast ===== */
    .toast{
      position: fixed;
      left:50%;
      bottom: calc(18px + var(--safe-bottom));
      transform: translateX(-50%) translateY(14px);
      background: rgba(14,16,24,.92);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 22px 60px rgba(0,0,0,.55);
      color: rgba(234,241,255,.95);
      border-radius:18px;
      padding:12px 14px;
      width: min(520px, calc(100% - 32px));
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease, transform .22s ease;
      z-index:300;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight:900;
      font-size:13px;
    }

    .toast.show{
      opacity:1;
      transform: translateX(-50%) translateY(0);
    }

    .toast .ok{
      border:none;
      cursor:pointer;
      border-radius:14px;
      height:34px;
      padding:0 12px;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      color: rgba(234,241,255,.95);
      font-weight:900;
      transition: transform .15s ease;
    }
    .toast .ok:active{ transform: scale(.99); }

    /* ===== Channel overlay ===== */
    .channel-overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.72);
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease;
      z-index:260;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .channel-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .channel-card{
      width:min(440px, 100%);
      border-radius:24px;
      overflow:hidden;
      background: rgba(14,16,24,.94);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 34px 90px rgba(0,0,0,.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position:relative;
      transform: translateY(12px) scale(.98);
      opacity:.95;
      transition: transform .22s ease, opacity .22s ease;
    }

    .channel-overlay.show .channel-card{
      transform: translateY(0) scale(1);
      opacity:1;
    }

    .channel-head{
      padding:16px 16px 10px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    .channel-title{
      font-weight:900;
      letter-spacing:.25px;
      font-size:14px;
      color: rgba(234,241,255,.95);
    }

    .channel-x{
      width:38px;
      height:38px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: rgba(234,241,255,.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow: 0 12px 28px rgba(0,0,0,.32);
      transition: transform .15s ease;
    }
    .channel-x:active{ transform: scale(.98); }

    .channel-body{
      padding:14px 16px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .channel-text{
      margin:0;
      font-size:13px;
      line-height:1.35;
      color: rgba(234,241,255,.84);
    }

    .tg-btn{
      border:none;
      cursor:pointer;
      width:100%;
      height:50px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background: linear-gradient(180deg, var(--tg1), var(--tg2));
      box-shadow:
        0 18px 40px rgba(34,158,217,.28),
        inset 0 1px 0 rgba(255,255,255,.14);
      color:#fff;
      font-weight:900;
      letter-spacing:.2px;
      font-size:14px;
    }
    .tg-btn:active{ transform: scale(.99); }

    .tg-ico{
      width:22px;
      height:22px;
      display:block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.18));
    }

    @media (max-width:360px){
      .top-row{ grid-template-columns:40px minmax(0,1fr) 46px; gap:6px; }
      .back-btn-square{ width:40px; height:40px; border-radius:13px; }
      .balance-mini{ height:40px; }
      .bal-amount{ height:26px; font-size:12px; min-width:70px; }
      .hero-logo{ width:46px; height:46px; margin-right:0; }
      .page-title{ font-size:22px; }
      .input{ height:50px; }
      .activate-btn{ height:50px; }
      .card{ border-radius:24px; padding:14px; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; animation:none !important; }
      .card{ opacity:1 !important; transform:none !important; }
      .activate-btn::after{ display:none !important; }
      .channel-overlay.show .channel-card{ transform:none !important; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="content">

      <div class="top-row">
        <button class="back-btn-square" id="backBtn" aria-label="Назад" title="На главную">
          <svg class="back-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
            <path d="M9 12h10"></path>
          </svg>
        </button>

        <div class="balance-mini" aria-label="Баланс">
          <span class="bal-title">Баланс</span>
          <button class="bal-amount" id="balanceChip" aria-label="Открыть кошелёк">
            <span id="balanceValue">0 VC</span>
          </button>
        </div>

        <button class="hero-logo" id="brandLogoBtn" aria-label="Telegram канал Vezus" title="Telegram канал">
          <img
            src="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png"
            alt="Vezus"
            loading="eager"
            decoding="async"
          >
        </button>
      </div>

      <div class="page-head">
        <h1 class="page-title">Ваучеры</h1>
        <p class="page-sub">Активируй код и получи бонус на баланс.</p>
      </div>

      <div class="card">
        <!-- ✅ убрали блок "Введите ваучер" сверху ввода -->

        <div class="field">
          <div class="input-wrap">
            <span class="input-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v1a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-1a2 2 0 0 0 0-4V8z"></path>
                <path d="M9 12h.01"></path>
                <path d="M15 12h.01"></path>
              </svg>
            </span>
            <input
              id="voucherInput"
              class="input"
              type="text"
              placeholder="Введите ваучер"
              maxlength="40"
              autocomplete="off"
            >
          </div>
          <div class="error" id="voucherError">Введите ваучер</div>
        </div>

        <button class="activate-btn" id="activateBtn">Активировать</button>

        <div class="voucher-stats">
          <div class="voucher-stats-left">
            <div class="stat-ico" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M8 21h8"></path>
                <path d="M12 17v4"></path>
                <path d="M7 4h10v3a5 5 0 0 1-10 0V4z"></path>
                <path d="M5 7a3 3 0 0 0 3 3"></path>
                <path d="M19 7a3 3 0 0 1-3 3"></path>
              </svg>
            </div>
            <div class="label">Активировано вами</div>
          </div>
          <div class="value" id="voucherCount">...</div>
        </div>

        <div class="help-box" id="helpBox">
          <button class="help-toggle" id="helpToggle" type="button">
            <span class="help-left">
              <span class="help-ico" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 18h.01"></path>
                  <path d="M9.5 9a2.5 2.5 0 1 1 3.6 2.2c-.7.35-1.1.8-1.1 1.8v.5"></path>
                  <circle cx="12" cy="12" r="9"></circle>
                </svg>
              </span>
              <span>Где взять ваучер?</span>
            </span>
            <span class="help-arrow" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M6 9l6 6 6-6"></path>
              </svg>
            </span>
          </button>
          <div class="help-content" id="helpContent">
            Следите за постами в нашем Telegram канале — там появляются новые ваучеры.
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ✅ Уведомление “Перейти в ТГк” -->
  <div class="channel-overlay" id="channelOverlay" aria-hidden="true">
    <div class="channel-card" role="dialog" aria-modal="true" aria-label="Telegram канал">
      <div class="channel-head">
        <div class="channel-title">Перейти в Telegram канал</div>
        <button class="channel-x" id="channelClose" aria-label="Закрыть">✕</button>
      </div>

      <div class="channel-body">
        <p class="channel-text">
          Нажми кнопку ниже — откроется наш Telegram канал:
          <b>@vezuspubg</b>
        </p>

        <button class="tg-btn" id="goChannel" aria-label="Перейти в Telegram канал">
          <svg class="tg-ico" viewBox="0 0 240 240" aria-hidden="true">
            <path fill="#fff" d="M120 0C53.7 0 0 53.7 0 120s53.7 120 120 120 120-53.7 120-120S186.3 0 120 0zm58.7 82.3l-19.7 92.8c-1.5 6.6-5.4 8.2-10.9 5.1l-30.2-22.3-14.6 14c-1.6 1.6-3 3-6.1 3l2.2-31.6 57.5-52c2.5-2.2-.5-3.4-3.9-1.2l-71 44.7-30.6-9.6c-6.6-2.1-6.7-6.6 1.4-9.7l119.6-46.1c5.5-2 10.3 1.3 8.8 9.9z"/>
          </svg>
          Перейти в Telegram канал
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" aria-live="polite">
    <span id="toastText">—</span>
    <button class="ok" id="toastOk">Ок</button>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const VERIFY_URL = "https://lazrfierfbhwlduqlvws.functions.supabase.co/verify-telegram";
    const REDEEM_URL = "https://lazrfierfbhwlduqlvws.functions.supabase.co/redeem-voucher";
    const STATS_URL  = "https://lazrfierfbhwlduqlvws.functions.supabase.co/get-voucher-stats";

    const TG_CHANNEL_URL = "https://t.me/vezuspubg";

    const $ = (id) => document.getElementById(id);
    let isRedeeming = false;

    function formatVc(value){
      const num = Number(value ?? 0);
      if (!Number.isFinite(num)) return "0 VC";
      return Number.isInteger(num) ? `${num} VC` : `${num.toFixed(2)} VC`;
    }

    function loadCachedProfile(){
      try{
        const raw = localStorage.getItem("tg_profile");
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function setBalanceUI(value){
      $("balanceValue").textContent = formatVc(value);
    }

    function applyProfile(profile){
      if (!profile) return;
      localStorage.setItem("tg_profile", JSON.stringify(profile));
      setBalanceUI(profile.balance);
    }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const json = await res.json().catch(() => ({}));

      if (!res.ok || !json.ok) {
        throw new Error(json.error || json.details || `Ошибка ${res.status}`);
      }

      return json;
    }

    function getTelegramInitData(){
      if (!window.Telegram || !window.Telegram.WebApp) {
        throw new Error("Открой страницу внутри Telegram Mini App");
      }

      try{
        Telegram.WebApp.ready();
        if (typeof Telegram.WebApp.expand === "function") Telegram.WebApp.expand();
      } catch(e){}

      const initData = Telegram.WebApp.initData;
      if (!initData) throw new Error("Нет initData");
      return initData;
    }

    function openTelegramLinkSafe(url){
      if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.openTelegramLink === "function") {
        window.Telegram.WebApp.openTelegramLink(url);
        return;
      }
      window.open(url, "_blank", "noopener");
    }

    const toast = $("toast");
    const toastText = $("toastText");
    const toastOk = $("toastOk");
    let toastTimer = null;

    function showToast(text){
      toastText.textContent = text;
      toast.classList.add("show");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 3200);
    }

    toastOk.addEventListener("click", () => toast.classList.remove("show"));

    async function refreshProfile(){
      const cached = loadCachedProfile();
      if (cached) applyProfile(cached);
      else setBalanceUI(0);

      try{
        const initData = getTelegramInitData();
        const json = await postJson(VERIFY_URL, { initData });
        if (json.profile) applyProfile(json.profile);
      } catch(err){
        console.error("Profile load error:", err);
      }
    }

    async function loadVoucherStats(){
      $("voucherCount").textContent = "...";
      try{
        const initData = getTelegramInitData();
        const json = await postJson(STATS_URL, { initData });
        $("voucherCount").textContent = String(json.activated_count ?? 0);
      } catch(err){
        console.error("Stats error:", err);
        $("voucherCount").textContent = "0";
      }
    }

    const voucherInput = $("voucherInput");
    const voucherError = $("voucherError");
    const activateBtn = $("activateBtn");

    function setRedeemLoading(loading){
      isRedeeming = loading;
      activateBtn.disabled = loading;
      voucherInput.disabled = loading;
      activateBtn.textContent = loading ? "Активация..." : "Активировать";
    }

    async function redeemVoucher(){
      if (isRedeeming) return;

      const code = voucherInput.value.trim().toUpperCase();
      if (!code) {
        voucherError.classList.add("show");
        voucherInput.focus();
        return;
      }

      voucherError.classList.remove("show");
      setRedeemLoading(true);

      try{
        const initData = getTelegramInitData();
        const json = await postJson(REDEEM_URL, { initData, code });

        if (typeof json.current_balance !== "undefined") {
          setBalanceUI(json.current_balance);
          const cached = loadCachedProfile() || {};
          cached.balance = Number(json.current_balance) || 0;
          localStorage.setItem("tg_profile", JSON.stringify(cached));
        }

        voucherInput.value = "";
        await loadVoucherStats();
        showToast(`Начислено ${formatVc(json.reward_vc)}`);
      } catch(err){
        console.error("Redeem error:", err);
        showToast(err.message || "Не удалось активировать ваучер");
      } finally {
        setRedeemLoading(false);
      }
    }

    activateBtn.addEventListener("click", redeemVoucher);

    voucherInput.addEventListener("input", () => {
      voucherError.classList.remove("show");
      voucherInput.value = voucherInput.value.toUpperCase();
    });

    voucherInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") redeemVoucher();
    });

    $("balanceChip").addEventListener("click", () => {
      window.location.href = "wallet.html";
    });

    $("backBtn").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    const helpBox = $("helpBox");
    const helpToggle = $("helpToggle");
    helpToggle.addEventListener("click", () => helpBox.classList.toggle("open"));

    // ===== Channel overlay logic =====
    const channelOverlay = $("channelOverlay");
    const channelClose = $("channelClose");
    const goChannel = $("goChannel");
    const brandLogoBtn = $("brandLogoBtn");

    function lockBody(lock){
      document.body.style.overflow = lock ? "hidden" : "";
    }

    function openChannel(){
      channelOverlay.classList.add("show");
      channelOverlay.setAttribute("aria-hidden", "false");
      lockBody(true);
    }

    function closeChannel(){
      channelOverlay.classList.remove("show");
      channelOverlay.setAttribute("aria-hidden", "true");
      lockBody(false);
    }

    brandLogoBtn.addEventListener("click", openChannel);
    channelClose.addEventListener("click", closeChannel);

    channelOverlay.addEventListener("click", (e) => {
      if (e.target === channelOverlay) closeChannel();
    });

    goChannel.addEventListener("click", () => openTelegramLinkSafe(TG_CHANNEL_URL));

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeChannel();
    });

    window.addEventListener("load", async () => {
      await refreshProfile();
      await loadVoucherStats();
    });
  </script>
</body>
</html>
