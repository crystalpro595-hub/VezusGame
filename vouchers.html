<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Активация ваучера</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --bg:#111216;
      --field:#17191f;
      --stroke:rgba(255,255,255,.10);
      --text:#ffffff;
      --muted:rgba(255,255,255,.42);
      --violet:#9d4dff;
      --violet-2:#c45cff;
      --disabled:#2a2430;
      --red:#ff6c8e;
      --green:#72f39b;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{
      min-height:100vh;
      padding:calc(30px + env(safe-area-inset-top)) 18px calc(24px + env(safe-area-inset-bottom));
      color:var(--text);
      font-family:"Montserrat",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }

    button,
    input{
      font:inherit;
    }

    .page{
      width:100%;
      max-width:430px;
      margin:0 auto;
    }

    h1{
      margin:0 0 22px;
      color:#fff;
      font-size:24px;
      line-height:1.14;
      font-weight:900;
      letter-spacing:-.035em;
      display:inline-flex;
      align-items:center;
      gap:9px;
    }

    .title-icon{
      width:25px;
      height:25px;
      flex:0 0 auto;
      color:rgba(255,255,255,.88);
      fill:none;
      stroke:currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .voucher-input{
      width:100%;
      height:54px;
      border:1px solid var(--stroke);
      border-radius:14px;
      outline:none;
      padding:0 15px;
      color:#fff;
      background:var(--field);
      font-size:16px !important;
      font-weight:650;
      transition:border-color .16s ease, background .16s ease;
    }

    .voucher-input:focus{
      border-color:rgba(157,77,255,.52);
      background:#1b1e25;
    }

    .voucher-input::placeholder{
      color:var(--muted);
      font-size:14px;
      font-weight:600;
    }

    .activate-btn{
      width:auto;
      min-width:166px;
      height:44px;
      margin-top:12px;
      padding:0 20px;
      border:0;
      border-radius:12px;
      color:#fff;
      background:var(--disabled);
      opacity:.48;
      font-size:13px;
      font-weight:900;
      cursor:not-allowed;
      transition:opacity .16s ease, transform .12s ease, background .16s ease;
    }

    .activate-btn.is-active:not(:disabled){
      cursor:pointer;
      opacity:1;
      background:linear-gradient(135deg, var(--violet), var(--violet-2));
    }

    .activate-btn.is-active:not(:disabled):active{
      transform:scale(.975);
    }

    .message{
      min-height:16px;
      margin:7px 2px 0;
      color:rgba(255,255,255,.62);
      font-size:12px;
      font-weight:750;
      line-height:1.35;
    }

    .message.success{color:var(--green);}
    .message.error{color:var(--red);}
    .message.loading{color:rgba(255,255,255,.70);}


    .voucher-help{
      margin-top:16px;
      width:100%;
      border:0;
      padding:0;
      background:transparent;
      color:rgba(255,255,255,.62);
      font-family:inherit;
      font-size:12px;
      font-weight:800;
      text-align:left;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      gap:7px;
      touch-action:manipulation;
    }

    .voucher-help svg{
      width:15px;
      height:15px;
      fill:none;
      stroke:currentColor;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
      transition:transform .22s ease;
    }

    .voucher-help.active svg{
      transform:rotate(180deg);
    }

    .voucher-help-content{
      max-height:0;
      overflow:hidden;
      opacity:0;
      transform:translateY(-5px);
      transition:max-height .30s ease, opacity .22s ease, transform .22s ease, margin-top .22s ease;
      color:rgba(255,255,255,.48);
      font-size:12px;
      font-weight:650;
      line-height:1.48;
    }

    .voucher-help-content.active{
      max-height:130px;
      margin-top:9px;
      opacity:1;
      transform:translateY(0);
    }

    @media (max-width:370px){
      body{padding-left:15px;padding-right:15px;}
      h1{font-size:22px;}
      .activate-btn{min-width:154px;}
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>
      <span>Активация ваучера</span>
      <svg class="title-icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7z"/>
        <path d="M9 9h.01"/>
        <path d="M15 15h.01"/>
        <path d="M15 9l-6 6"/>
      </svg>
    </h1>

    <input class="voucher-input" id="voucherInput" type="text" placeholder="Код" autocomplete="off" inputmode="text" />
    <p class="message" id="voucherMessage"></p>

    <button class="activate-btn" id="voucherActivate" type="button" disabled>Активировать</button>

    <button class="voucher-help" id="voucherHelpToggle" type="button" aria-expanded="false">
      <span>Где найти ваучер?</span>
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <div class="voucher-help-content" id="voucherHelpContent">
      Ваучеры можно найти в нашем Telegram-канале. Следите за новостями, акциями и розыгрышами — иногда коды появляются в публикациях или выдаются победителям розыгрышей.
    </div>

  </main>

  <script>
    (function(){
      const SUPABASE_URL = 'https://xcsjedwhqcrwdzmuahjl.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2plZHdocWNyd2R6bXVhaGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzk0ODYsImV4cCI6MjA5Mzg1NTQ4Nn0.M2ksKeWwDt0BQxgjxpGhLKLMNP_ve1dcZvQ0Ix88Ock';
      const VOUCHER_URL = SUPABASE_URL + '/functions/v1/voucher';

      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      try{
        tg && tg.ready && tg.ready();
        tg && tg.expand && tg.expand();
      }catch(error){}

      const voucherInput = document.getElementById('voucherInput');
      const voucherActivate = document.getElementById('voucherActivate');
      const voucherMessage = document.getElementById('voucherMessage');
      const voucherHelpToggle = document.getElementById('voucherHelpToggle');
      const voucherHelpContent = document.getElementById('voucherHelpContent');
      let isLoading = false;

      function getInitData(){
        try{
          if(tg && typeof tg.initData === 'string' && tg.initData) return tg.initData;
        }catch(error){}

        try{
          const sessionValue = sessionStorage.getItem('vezus_init_data');
          if(sessionValue) return sessionValue;
        }catch(error){}

        try{
          const localValue = localStorage.getItem('vezus_init_data_backup') || localStorage.getItem('vezus_init_data');
          if(localValue) return localValue;
        }catch(error){}

        try{
          if(window.parent && window.parent !== window && window.parent.Telegram && window.parent.Telegram.WebApp && window.parent.Telegram.WebApp.initData){
            return window.parent.Telegram.WebApp.initData;
          }
        }catch(error){}

        return '';
      }

      function saveInitData(){
        const initData = getInitData();
        if(!initData) return '';
        try{ sessionStorage.setItem('vezus_init_data', initData); }catch(error){}
        try{ localStorage.setItem('vezus_init_data_backup', initData); }catch(error){}
        return initData;
      }

      function showMessage(text, type){
        voucherMessage.textContent = text || '';
        voucherMessage.classList.remove('success', 'error', 'loading');
        if(type) voucherMessage.classList.add(type);
      }

      function normalizeErrorMessage(message){
        const text = String(message || '').toLowerCase();

        if(
          text.includes('ваучер не найден') ||
          text.includes('voucher not found') ||
          text.includes('not found') ||
          text.includes('invalid voucher') ||
          text.includes('invalid code')
        ){
          return 'Неверный ваучер';
        }

        if(text.includes('telegram initdata') || text.includes('initdata')){
          return 'Откройте страницу внутри Telegram Mini App';
        }

        if(text.includes('already') || text.includes('уже активировали')){
          return 'Вы уже активировали этот ваучер';
        }

        if(text.includes('лимит') || text.includes('max') || text.includes('исчерпан')){
          return 'Лимит активаций ваучера исчерпан';
        }

        if(text.includes('expired') || text.includes('истёк') || text.includes('истек')){
          return 'Срок действия ваучера истёк';
        }

        if(text.includes('inactive') || text.includes('неактивен')){
          return 'Ваучер неактивен';
        }

        return message || 'Ошибка активации ваучера';
      }

      function setLoading(value){
        isLoading = value;
        voucherInput.disabled = value;
        updateButtonState();
      }

      function updateButtonState(){
        const hasCode = String(voucherInput.value || '').trim().length > 0;
        voucherActivate.disabled = !hasCode || isLoading;
        voucherActivate.classList.toggle('is-active', hasCode && !isLoading);
        voucherActivate.textContent = isLoading ? 'Активация...' : 'Активировать';
      }

      async function activateVoucher(){
        const code = String(voucherInput.value || '').trim().toUpperCase();
        if(!code || isLoading) return;

        const initData = saveInitData();
        if(!initData){
          showMessage('Не удалось получить Telegram initData. Откройте страницу внутри Telegram Mini App.', 'error');
          return;
        }

        setLoading(true);
        showMessage('', '');

        try{
          const response = await fetch(VOUCHER_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
              'apikey': SUPABASE_ANON_KEY
            },
            body: JSON.stringify({
              action: 'activate',
              initData: initData,
              code: code
            })
          });

          const data = await response.json().catch(function(){ return {}; });
          if(!response.ok || data.error || data.ok === false){
            throw new Error(data.error || 'Не удалось активировать ваучер');
          }

          voucherInput.value = '';
          updateButtonState();

          const amount = Number(data.amount || 0);
          const balance = Number(data.balance || 0);
          const amountText = amount > 0 ? ' +' + Math.floor(amount).toLocaleString('ru-RU') + ' ₽' : '';
          showMessage((data.message || 'Ваучер активирован') + amountText, 'success');

          try{
            window.parent && window.parent.postMessage({
              type: 'vezus_voucher_activated',
              code: data.code || code,
              amount: amount,
              balance: balance
            }, '*');
            window.parent && window.parent.postMessage({
              type: 'vezus_balance_refresh',
              balance: balance
            }, '*');
          }catch(error){}
        }catch(error){
          showMessage(normalizeErrorMessage(error && error.message ? error.message : 'Ошибка активации ваучера'), 'error');
        }finally{
          setLoading(false);
        }
      }

      voucherInput.addEventListener('input', function(){
        voucherInput.value = String(voucherInput.value || '').toUpperCase();
        showMessage('', '');
        updateButtonState();
      });

      voucherInput.addEventListener('keydown', function(event){
        if(event.key === 'Enter') activateVoucher();
      });

      voucherActivate.addEventListener('click', activateVoucher);

      voucherHelpToggle.addEventListener('click', function(){
        const isOpen = voucherHelpContent.classList.toggle('active');
        voucherHelpToggle.classList.toggle('active', isOpen);
        voucherHelpToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      });

      saveInitData();
      updateButtonState();
    })();
  </script>
</body>
</html>
