<!DOCTYPE html>
<html lang="ru" class="mines-loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vezus Mines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
:root {
  --bg: #07000d;
  --text: #ffffff;
  --muted: rgba(255, 255, 255, .62);
  --panel: rgba(28, 15, 52, .92);
  --panel-2: rgba(20, 10, 38, .96);
  --line: rgba(205, 182, 255, .16);
  --cell: #241445;
  --cell-open: #4b258b;
  --purple-1: #5f37b2;
  --purple-2: #3d1c7c;
  --purple-3: #261047;
  --radius: 16px;
  --game-width: min(390px, calc(100vw - 16px));
  --board-width: min(352px, calc(100vw - 28px));
  --panel-width: min(360px, calc(100vw - 18px));
  --top-space: max(86px, calc(env(safe-area-inset-top) + 76px));
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  width: 100%;
  min-height: 100%;
  overflow-x: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

body {
  overscroll-behavior: none;
}

button,
input {
  font: inherit;
}

button {
  border: 0;
  color: inherit;
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
}

button:disabled,
input:disabled {
  cursor: default;
}

.game {
  position: relative;
  width: 100%;
  min-height: 100dvh;
  overflow-x: hidden;
  overflow-y: auto;
  background:
    radial-gradient(circle at 50% -8%, rgba(176, 84, 255, .30), transparent 34%),
    radial-gradient(circle at 88% 18%, rgba(104, 17, 169, .30), transparent 32%),
    radial-gradient(circle at 50% 104%, rgba(180, 44, 255, .22), transparent 42%),
    linear-gradient(180deg, #090012 0%, #170024 52%, #07000d 100%);
  -webkit-overflow-scrolling: touch;
  transition: opacity .52s ease, transform .52s cubic-bezier(.18, .84, .24, 1);
}

.game::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 18% 16%, rgba(180, 44, 255, .14), transparent 24%),
    radial-gradient(circle at 78% 22%, rgba(157, 77, 255, .10), transparent 20%);
}

html.mines-loading .game {
  opacity: 0;
  transform: translate3d(0, 12px, 0) scale(.992);
  pointer-events: none;
}

html.mines-ready .game {
  opacity: 1;
  transform: translate3d(0, 0, 0) scale(1);
}

.mines-preloader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 28%, rgba(157,77,255,.26), transparent 34%),
        radial-gradient(circle at 18% 78%, rgba(217,70,239,.14), transparent 30%),
        linear-gradient(180deg, #160029 0%, #080013 55%, #020006 100%);
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .42s ease, visibility .42s ease;
    }

    .mines-preloader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .mines-preloader-inner {
      width: min(76vw, 310px);
      display: grid;
      justify-items: center;
      position: relative;
      transform: translateY(-8px);
      animation: minesPreloaderIn .42s cubic-bezier(.18,.84,.24,1) both;
    }

    .mines-title {
      color: #fff;
      font-size: 38px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: .09em;
      text-shadow:
        0 0 14px rgba(157,77,255,.34),
        0 10px 28px rgba(0,0,0,.42);
      animation: minesTitlePulse 1.45s ease-in-out infinite;
    }

    .mines-loader-line {
      width: min(210px, 68vw);
      height: 5px;
      margin-top: 20px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .mines-loader-line span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transform-origin: left center;
      transform: scaleX(0);
      background: linear-gradient(90deg, #8d4dff 0%, #d946ef 48%, #ffd66e 100%);
      animation: minesLineLoad 2.05s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .mines-sparks {
      position: absolute;
      inset: -38px 0 auto;
      height: 92px;
      pointer-events: none;
    }

    .mines-sparks i {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: #ffd66e;
      opacity: 0;
      transform: translate3d(0,0,0) scale(.7);
      animation: minesSparkFloat 1.35s ease-in-out infinite;
    }

    .mines-sparks i:nth-child(1) { left: 18%; top: 34px; animation-delay: .05s; }
    .mines-sparks i:nth-child(2) { left: 34%; top: 7px; width:4px; height:4px; animation-delay: .34s; background:#f5d8ff; }
    .mines-sparks i:nth-child(3) { right: 24%; top: 18px; animation-delay: .18s; }
    .mines-sparks i:nth-child(4) { right: 14%; top: 52px; width:4px; height:4px; animation-delay: .52s; background:#d946ef; }
    .mines-sparks i:nth-child(5) { left: 50%; top: 46px; width:3px; height:3px; animation-delay: .78s; background:#fff; }

    @keyframes minesPreloaderIn {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: translateY(-8px) scale(1); }
    }

    @keyframes minesLineLoad {
      0% { transform: scaleX(0); }
      72% { transform: scaleX(.86); }
      100% { transform: scaleX(1); }
    }

    @keyframes minesTitlePulse {
      0%, 100% { transform: scale(1); opacity: .94; }
      50% { transform: scale(1.025); opacity: 1; }
    }

    @keyframes minesSparkFloat {
      0%, 100% { opacity: 0; transform: translate3d(0, 6px, 0) scale(.72); }
      38% { opacity: .95; transform: translate3d(0, 0, 0) scale(1); }
      72% { opacity: .25; transform: translate3d(0, -8px, 0) scale(.86); }
    }

    @media (max-width: 390px) {
      .mines-title { font-size: 34px; }
      .mines-loader-line { width: 190px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .mines-preloader,
      .mines-preloader-inner,
      .mines-title,
      .mines-loader-line span,
      .mines-sparks i {
        animation-duration: .18s !important;
        transition-duration: .18s !important;
      }
    }

    .mines-preloader {
      background:
        linear-gradient(120deg, #030303 0%, #111111 28%, #262626 48%, #0b0b0b 68%, #020202 100%) !important;
      background-size: 240% 240% !important;
      animation: minesDarkFlow 3.2s ease-in-out infinite !important;
    }

    .mines-preloader::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 32%, rgba(255,255,255,.055), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,.030), transparent 48%, rgba(0,0,0,.20));
      opacity: .9;
    }

    .mines-preloader-inner {
      position: relative !important;
      z-index: 2 !important;
      width: min(74vw, 300px) !important;
      transform: translateY(-4px) !important;
      animation: minesCleanIn .36s ease both !important;
    }

    .mines-sparks {
      display: none !important;
    }

    .mines-title {
      color: #ffffff !important;
      font-size: 40px !important;
      line-height: 1 !important;
      font-weight: 950 !important;
      letter-spacing: .02em !important;
      text-transform: none !important;
      text-shadow: 0 10px 26px rgba(0,0,0,.52) !important;
      animation: none !important;
    }

    .mines-loader-line {
      width: min(220px, 68vw) !important;
      height: 4px !important;
      margin-top: 20px !important;
      border-radius: 999px !important;
      overflow: hidden !important;
      background: rgba(255,255,255,.105) !important;
      box-shadow: none !important;
    }

    .mines-loader-line span {
      height: 100% !important;
      border-radius: inherit !important;
      background: linear-gradient(90deg, #5f2cff 0%, #9d4dff 45%, #d946ef 100%) !important;
      animation: minesCleanLine 2.05s cubic-bezier(.16,.84,.24,1) forwards !important;
      box-shadow: 0 0 14px rgba(157,77,255,.28) !important;
    }

    @keyframes minesDarkFlow {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes minesCleanIn {
      from {
        opacity: 0;
        transform: translateY(8px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateY(-4px) scale(1);
      }
    }

    @keyframes minesCleanLine {
      0% {
        transform: scaleX(0);
      }
      72% {
        transform: scaleX(.84);
      }
      100% {
        transform: scaleX(1);
      }
    }

    @media (max-width:390px) {
      .mines-title {
        font-size: 36px !important;
      }

      .mines-loader-line {
        width: 200px !important;
      }
    }

    .mines-preloader {
      position: fixed !important;
      inset: 0 !important;
      overflow: hidden !important;
      background:
        linear-gradient(180deg, #040404 0%, #111111 38%, #1b1b1b 62%, #070707 100%) !important;
      animation: none !important;
      isolation: isolate !important;
    }

    .mines-preloader::before,
    .mines-preloader::after {
      content: "" !important;
      position: absolute !important;
      width: 420px !important;
      height: 420px !important;
      border-radius: 46% 54% 58% 42% / 42% 46% 54% 58% !important;
      filter: blur(44px) !important;
      opacity: .34 !important;
      will-change: transform, border-radius !important;
      pointer-events: none !important;
      z-index: 0 !important;
    }

    .mines-preloader::before {
      left: -110px !important;
      top: -70px !important;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.08), rgba(82,82,82,.28) 42%, rgba(22,22,22,.04) 76%) !important;
      animation: lavaBlobOne 6.4s ease-in-out infinite alternate !important;
    }

    .mines-preloader::after {
      right: -120px !important;
      bottom: -90px !important;
      width: 470px !important;
      height: 470px !important;
      background: radial-gradient(circle at 55% 45%, rgba(255,255,255,.06), rgba(96,96,96,.24) 40%, rgba(18,18,18,.03) 76%) !important;
      animation: lavaBlobTwo 7.2s ease-in-out infinite alternate !important;
    }

    .mines-preloader-inner {
      position: relative !important;
      z-index: 2 !important;
      width: min(74vw, 300px) !important;
      transform: translateY(-4px) !important;
      animation: minesCleanIn .36s ease both !important;
    }

    .mines-preloader-inner::before,
    .mines-preloader-inner::after {
      content: "" !important;
      position: absolute !important;
      border-radius: 50% !important;
      filter: blur(34px) !important;
      opacity: .18 !important;
      pointer-events: none !important;
      z-index: -1 !important;
    }

    .mines-preloader-inner::before {
      width: 220px !important;
      height: 220px !important;
      left: -80px !important;
      top: -90px !important;
      background: rgba(88, 88, 88, .22) !important;
      animation: lavaBlobThree 5.8s ease-in-out infinite alternate !important;
    }

    .mines-preloader-inner::after {
      width: 180px !important;
      height: 180px !important;
      right: -70px !important;
      bottom: -80px !important;
      background: rgba(60, 60, 60, .20) !important;
      animation: lavaBlobFour 6.6s ease-in-out infinite alternate !important;
    }

    .mines-sparks {
      display: none !important;
    }

    .mines-title {
      color: #ffffff !important;
      font-size: 40px !important;
      line-height: 1 !important;
      font-weight: 950 !important;
      letter-spacing: .02em !important;
      text-transform: none !important;
      text-shadow: 0 10px 26px rgba(0,0,0,.52) !important;
      animation: none !important;
    }

    .mines-loader-line {
      width: min(220px, 68vw) !important;
      height: 4px !important;
      margin-top: 20px !important;
      border-radius: 999px !important;
      overflow: hidden !important;
      background: rgba(255,255,255,.10) !important;
      box-shadow: none !important;
    }

    .mines-loader-line span {
      height: 100% !important;
      border-radius: inherit !important;
      background: linear-gradient(90deg, #5f2cff 0%, #9d4dff 45%, #d946ef 100%) !important;
      animation: minesCleanLine 2.05s cubic-bezier(.16,.84,.24,1) forwards !important;
      box-shadow: 0 0 14px rgba(157,77,255,.28) !important;
    }

    @keyframes lavaBlobOne {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        border-radius: 46% 54% 58% 42% / 42% 46% 54% 58%;
      }
      100% {
        transform: translate3d(90px, 70px, 0) scale(1.18);
        border-radius: 58% 42% 47% 53% / 55% 40% 60% 45%;
      }
    }

    @keyframes lavaBlobTwo {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        border-radius: 52% 48% 44% 56% / 46% 58% 42% 54%;
      }
      100% {
        transform: translate3d(-95px, -85px, 0) scale(1.16);
        border-radius: 42% 58% 55% 45% / 60% 44% 56% 40%;
      }
    }

    @keyframes lavaBlobThree {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        border-radius: 50%;
      }
      100% {
        transform: translate3d(36px, 18px, 0) scale(1.14);
        border-radius: 44% 56% 52% 48% / 58% 42% 54% 46%;
      }
    }

    @keyframes lavaBlobFour {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
        border-radius: 50%;
      }
      100% {
        transform: translate3d(-28px, -24px, 0) scale(1.12);
        border-radius: 57% 43% 46% 54% / 41% 59% 49% 51%;
      }
    }

    @media (max-width:390px) {
      .mines-title {
        font-size: 36px !important;
      }

      .mines-loader-line {
        width: 200px !important;
      }

      .mines-preloader::before,
      .mines-preloader::after {
        filter: blur(38px) !important;
      }
    }

    .mines-title {
      display: none !important;
    }

    .mines-preloader-logo {
      width: 154px !important;
      max-width: 54vw !important;
      height: auto !important;
      display: block !important;
      object-fit: contain !important;
      transform-origin: center bottom !important;
      animation: minesLogoJump 1.18s ease-in-out infinite !important;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.48)) !important;
      user-select: none !important;
      -webkit-user-select: none !important;
      pointer-events: none !important;
    }

    .mines-loader-line {
      margin-top: 22px !important;
    }

    @keyframes minesLogoJump {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      42% {
        transform: translateY(-8px) scale(1.025);
      }
      64% {
        transform: translateY(0) scale(.995);
      }
    }

    @media (max-width:390px) {
      .mines-preloader-logo {
        width: 138px !important;
        max-width: 56vw !important;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .mines-preloader-logo {
        animation-duration: .18s !important;
      }
    }

.topbar,
.top-stats {
  position: fixed;
  z-index: 20;
}

.topbar {
  top: max(12px, calc(env(safe-area-inset-top) + 8px));
  left: 14px;
}

.balance {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 14px;
  line-height: 1;
  font-weight: 650;
  letter-spacing: -.03em;
  text-shadow: 0 0 10px rgba(255, 255, 255, .12);
}

.wallet {
  width: 16px;
  height: 16px;
  color: currentColor;
}

.wallet path,
.wallet circle {
  fill: currentColor;
}

.top-stats {
  top: max(8px, calc(env(safe-area-inset-top) + 4px));
  right: 10px;
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: flex-end;
}

.top-stat-card {
  min-width: 92px;
  min-height: 36px;
  padding: 6px 8px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: linear-gradient(180deg, rgba(44, 24, 76, .94), rgba(26, 12, 46, .96));
  box-shadow: 0 6px 16px rgba(0, 0, 0, .18);
  display: flex;
  align-items: center;
  gap: 8px;
}

.top-stat-image {
  width: 18px;
  height: 18px;
  object-fit: contain;
  flex: 0 0 auto;
}

.top-stat-text {
  display: grid;
  gap: 3px;
  line-height: 1;
}

.top-stat-text span {
  font-size: 9px;
  font-weight: 700;
  color: rgba(255, 255, 255, .54);
}

.top-stat-text strong {
  font-size: 13px;
  font-weight: 850;
  letter-spacing: -.03em;
}

.content {
  position: relative;
  z-index: 1;
  width: var(--game-width);
  margin: 0 auto;
  padding: var(--top-space) 0 calc(14px + env(safe-area-inset-bottom));
}

.board-wrap,
.multiplier-wrap {
  width: var(--board-width);
  max-width: var(--board-width);
  margin-right: auto;
  margin-left: auto;
}

.board {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 7px;
}

.cell {
  position: relative;
  display: grid;
  place-items: center;
  aspect-ratio: 1.24 / 1;
  overflow: hidden;
  border: 1px solid rgba(203, 170, 255, .34);
  border-radius: 8px;
  background: var(--cell);
  color: #fff;
  transform: translateZ(0);
  backface-visibility: hidden;
  contain: paint;
  transition: transform .24s cubic-bezier(.18, .84, .24, 1), opacity .22s ease, background-color .22s ease;
}

.cell:active {
  transform: scale(.96);
}

.cell.server-waiting::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255, 255, 255, .08);
  animation: waitingPulse .72s ease-in-out infinite;
}

.cell.safe-open,
.cell.bomb-open {
  animation: cellReveal .34s cubic-bezier(.18, .84, .24, 1) both;
  animation-delay: var(--reveal-delay, 0ms);
}

.cell.safe-open {
  border-color: rgba(255, 228, 156, .42);
  background: linear-gradient(180deg, #f7dc84 0%, #d8a73b 46%, #a96f19 100%);
}

.cell.bomb-open {
  border-color: rgba(255, 87, 105, .30);
  background: linear-gradient(180deg, #8f1827 0%, #5d0c17 52%, #27030a 100%);
}

.cell.loss-reveal {
  opacity: .88;
}

.cell.bomb-hit {
  z-index: 3;
  animation-name: bombHit;
}

.cell-inner-icon {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: none;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.cell.safe-open .safe-icon-wrap,
.cell.bomb-open .bomb-icon-wrap {
  display: flex;
}

.cell-safe-image,
.cell-bomb-image {
  width: 31px;
  height: 31px;
  object-fit: contain;
}

.cell-bomb-image {
  width: 32px;
  height: 32px;
}

.bomb-explosion-layer {
  position: absolute;
  inset: -35%;
  z-index: 4;
  display: none;
  pointer-events: none;
}

.cell.bomb-hit .bomb-explosion-layer {
  display: block;
}

.boom-ring,
.boom-core,
.bomb-explosion-layer i {
  position: absolute;
  left: 50%;
  top: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.boom-ring {
  width: 36%;
  height: 36%;
  border: 2px solid rgba(255, 213, 129, .85);
  animation: boomRing .46s ease-out both;
}

.boom-core {
  width: 26%;
  height: 26%;
  background: rgba(255, 97, 105, .8);
  animation: boomCore .46s ease-out both;
}

.bomb-explosion-layer i {
  width: 6px;
  height: 6px;
  background: rgba(255, 220, 120, .9);
  animation: boomSpark .46s ease-out both;
}

.bomb-explosion-layer i:nth-child(3) { --x: -34px; --y: -24px; }
.bomb-explosion-layer i:nth-child(4) { --x: 30px; --y: -22px; }
.bomb-explosion-layer i:nth-child(5) { --x: 38px; --y: 18px; }
.bomb-explosion-layer i:nth-child(6) { --x: -28px; --y: 24px; }
.bomb-explosion-layer i:nth-child(7) { --x: 0; --y: -38px; }
.bomb-explosion-layer i:nth-child(8) { --x: 0; --y: 36px; }

.multiplier-wrap {
  margin-top: 7px;
}

.multiplier-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  overflow-y: hidden;
  padding-bottom: 3px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}

.multiplier-row::-webkit-scrollbar {
  display: none;
}

.multiplier-chip {
  flex: 0 0 55px;
  min-height: 44px;
  border-radius: 10px;
  background: linear-gradient(180deg, rgba(46, 28, 82, .98), rgba(27, 15, 52, .99));
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .035);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;

  <script>

    const MINES_API_URL = 'https://xcsjedwhqcrwdzmuahjl.supabase.co/functions/v1/mines';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2plZHdocWNyd2R6bXVhaGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzk0ODYsImV4cCI6MjA5Mzg1NTQ4Nn0.M2ksKeWwDt0BQxgjxpGhLKLMNP_ve1dcZvQ0Ix88Ock';

    const boardEl = document.getElementById('board');
    const multiplierRowEl = document.getElementById('multiplierRow');

    const tg = window.Telegram?.WebApp || null;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.BackButton.onClick(() => {
        window.location.href = 'index.html';
      });

    const mineOptions = [2, 3, 5, 7];
    let MIN_BET_CLIENT = 8;

    let selectedMines = 3;

    let openedCount = 0;
    let multipliers = [];
    let currentPayout = 0;
    let boardCellsCache = [];
    let currentBalance = 0;
    let mineIndexes = new Set();
    let openedIndexes = new Set();
    let isRequesting = false;

    function formatRub(value) {
      return Math.floor(Number(value || 0)) + ' ₽';
    }

    function normalizeError(error) {
      const message = String(error?.message || error || '').trim();
      const lower = message.toLowerCase();

      if (!initData) return 'Откройте игру через Telegram';
      if (lower.includes('недостаточно')) return 'Недостаточно средств';
      if (lower.includes('минимальная ставка')) return message;
      if (lower.includes('максимальная ставка')) return message;
      if (lower.includes('активный раунд')) return message;
      if (lower.includes('временно недоступна')) return 'Игра временно недоступна';
      if (lower.includes('пользователь')) return 'Пользователь не найден';
      if (lower.includes('telegram')) return 'Ошибка авторизации Telegram';
      if (lower.includes('failed to fetch') || lower.includes('network')) return 'Ошибка соединения';

      return message || 'Ошибка игры';
    }

    async function callMinesApi(payload) {
      const res = await fetch(MINES_API_URL, {
        method: 'POST',
        headers: new Headers({
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        }),
        body: JSON.stringify(payload),
      });

      let data = null;
      try {
        data = await res.json();
      } catch (_) {
        data = null;
      }

      if (!res.ok || !data?.ok) {
        throw new Error(data?.error || 'Ошибка игры');
      }

      return data;
    }

    function updateSettings(settings) {
      if (!settings) return;
      if (settings.min_bet) MIN_BET_CLIENT = Math.max(1, Math.floor(Number(settings.min_bet || MIN_BET_CLIENT)));

      amount = Math.max(MIN_BET_CLIENT, Math.min(MAX_BET_CLIENT, amount));
      updateAmount();
    }

    }

    function showGameToast(type, title, message) {
      const layer = document.getElementById('toastLayer');
      if (!layer) return;

      const icons = {
        win: '<img src="images/Starmines.png" alt="">',
        loss: '<img src="images/Bombmines.png" alt="">',
        error: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 8v5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M12 16.8h.01" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/><path d="M10.2 4.4 2.9 17.2A2.2 2.2 0 0 0 4.8 20.5h14.4a2.2 2.2 0 0 0 1.9-3.3L13.8 4.4a2.1 2.1 0 0 0-3.6 0Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>'
      };

      layer.innerHTML = '';

      const toast = document.createElement('div');
      toast.className = 'game-toast ' + type;
      toast.innerHTML =
        '<div class="toast-icon">' + (icons[type] || icons.error) + '</div>' +
        '<div class="toast-content">' +
          '<div class="toast-title">' + title + '</div>' +
          '<div class="toast-text">' + message + '</div>' +
        '</div>';

      layer.appendChild(toast);
      setTimeout(() => toast.remove(), 2400);
    }

    function setRequesting(value) {
      isRequesting = value;
      playBtn.classList.toggle('server-waiting', value);
      document.querySelector('.game')?.classList.toggle('server-disabled', value);
    }

    function setSettingsLocked(locked) {
      const controls = [
        document.getElementById('plusBtn'),
        document.getElementById('minusBtn'),
        document.getElementById('halfBtn'),
        document.getElementById('doubleBtn'),
        amountDisplayEl,
        ...document.querySelectorAll('.mine-btn')
      ].filter(Boolean);

      controls.forEach((control) => {
        control.disabled = locked;
        control.setAttribute('aria-disabled', locked ? 'true' : 'false');
      });

      document.querySelector('.bet-wrap')?.classList.toggle('controls-locked', locked);
      document.querySelector('.bombs-wrap')?.classList.toggle('controls-locked', locked);
    }

    function triggerLossAnimation() {
      const game = document.querySelector('.game');
      if (!game) return;
      game.classList.remove('loss-effect');
      void game.offsetWidth;
      game.classList.add('loss-effect');
      setTimeout(() => game.classList.remove('loss-effect'), 680);
    }

    function updateTopCounters() {
      const totalCells = 25;
      const safeTotal = Math.max(0, totalCells - selectedMines);
      const safeRemaining = Math.max(0, safeTotal - openedCount);
      const safeEl = document.getElementById('safeCount');
      const bombEl = document.getElementById('bombCount');
      if (safeEl) safeEl.textContent = String(safeRemaining);
      if (bombEl) bombEl.textContent = String(selectedMines);
    }

    function getCurrentMultiplier() {
      if (!openedCount) return 1;
      return multipliers[Math.max(0, Math.min(openedCount - 1, multipliers.length - 1))] || 1;
    }

    function updatePlayButton() {
      const strong = playBtn.querySelector('strong');
      if (!strong) return;

      if (!started) {
        playBtn.classList.remove('is-playing');
        strong.textContent = 'Играть';
        playSubTextEl.textContent = 'Раунд не начат';
        return;
      }

      playBtn.classList.add('is-playing');
      strong.textContent = 'Вывести';
      playSubTextEl.textContent = formatRub(currentPayout || amount);
    }

    function clampAmount(value) {
      const normalized = Math.floor(Number(value || 0));
      return Math.max(MIN_BET_CLIENT, Math.min(MAX_BET_CLIENT, normalized));
    }

    function readAmountInput() {
      const raw = String(amountDisplayEl?.value || amountDisplayEl?.textContent || '').replace(/[^0-9]/g, '');
      const parsed = parseInt(raw, 10);
      return Number.isFinite(parsed) ? parsed : amount;
    }

    function updateAmount() {
      amount = clampAmount(amount);
      if ('value' in amountDisplayEl) amountDisplayEl.value = formatRub(amount);
      else amountDisplayEl.textContent = formatRub(amount);
    }

    function flashAmountLimit() {
      if (!amountDisplayEl) return;
      amountDisplayEl.classList.remove('limit-flash');
      void amountDisplayEl.offsetWidth;
      amountDisplayEl.classList.add('limit-flash');
    }

    function setAmountSafe(nextValue) {
      const before = Number(nextValue || 0);
      const clamped = clampAmount(before);
      amount = clamped;
      updateAmount();

      if (before !== clamped) {
        flashAmountLimit();
        if (before < MIN_BET_CLIENT) showGameToast('error', 'Минимальная ставка', 'Минимум ' + formatRub(MIN_BET_CLIENT));
        else if (before > MAX_BET_CLIENT) showGameToast('error', 'Максимальная ставка', 'Максимум ' + formatRub(MAX_BET_CLIENT));
      }
    }

    function calculateMultipliers(mines) {
      const tables = {
        2: [1.02,1.11,1.22,1.34,1.48,1.64,1.84,2.07,2.35,2.68,3.09,3.61,4.27,5.12,6.26,7.83,10.07,13.42,18.80,28.20,47.00,94.00,282.00],
        3: [1.06,1.22,1.40,1.62,1.89,2.23,2.64,3.17,3.86,4.75,5.93,7.55,9.82,13.10,18.01,25.73,38.60,61.77,108.10,216.20,540.50,2162.00],
        5: [1.17,1.48,1.89,2.45,3.22,4.29,5.82,8.07,11.43,16.63,24.94,38.80,63.05,108.10,198.18,396.36,891.82,2378.20,8323.70,49942.20],
        7: [1.30,1.84,2.64,3.88,5.82,8.96,14.19,23.23,39.49,70.21,131.66,263.32,570.52,1369.26,3765.48,12551.61,56482.25,451858.00]
      };
      return tables[mines] ? [...tables[mines]] : [];
    }

    function scrollMultiplierToCurrent() {
      if (!started || openedCount <= 0) return;
      const activeItems = multiplierRowEl.querySelectorAll('.multiplier-chip.active');
      const target = activeItems[activeItems.length - 1];
      if (!target) return;
      requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' }));
    }

    function renderMultipliers() {
      multipliers = calculateMultipliers(selectedMines);
      multiplierRowEl.innerHTML = '';
      multipliers.forEach((value, index) => {
        const chip = document.createElement('div');
        const isReached = started && index < openedCount;
        chip.className = 'multiplier-chip' + (isReached ? ' active' : '');
        chip.innerHTML = '<strong><svg class="chip-star" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.4L14.9 8.55L21.6 9.42L16.7 14.05L17.95 20.7L12 17.35L6.05 20.7L7.3 14.05L2.4 9.42L9.1 8.55L12 2.4Z"></path></svg>' + (index + 1) + '</strong><span>x' + value.toFixed(2) + '</span>';
        if (isReached) chip.style.animationDelay = (index * 35) + 'ms';
        multiplierRowEl.appendChild(chip);
      });
      scrollMultiplierToCurrent();
    }

    function renderMineOptions() {
      mineGridEl.innerHTML = '';
      mineOptions.forEach((count) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'mine-btn' + (count === selectedMines ? ' active' : '');
        btn.textContent = count;
        btn.addEventListener('click', () => {
          if (started || isRequesting) return;
          selectedMines = count;
          renderMineOptions();
          renderMultipliers();
          updateTopCounters();
          resetBoard(false);
        });
        mineGridEl.appendChild(btn);
      });
    }

    function setPlayText() {
      updatePlayButton();
    }

    function buildBoard() {
      boardEl.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.setAttribute('aria-label', 'Поле мины');
        btn.dataset.index = String(i);
        btn.innerHTML = `
          <div class="cell-inner-icon safe-icon-wrap"><img class="cell-safe-image" src="images/Starmines.png" alt="" aria-hidden="true" /></div>
          <div class="cell-inner-icon bomb-icon-wrap"><img class="cell-bomb-image" src="images/Bombmines.png" alt="" aria-hidden="true" /></div>
        `;
        const explosion = document.createElement('div');
        explosion.className = 'bomb-explosion-layer';
        explosion.innerHTML = '<span class="boom-ring"></span><span class="boom-core"></span><i></i><i></i><i></i><i></i><i></i><i></i>';
        btn.appendChild(explosion);
        btn.addEventListener('click', () => handleCellClick(btn));
        boardEl.appendChild(btn);
      }
      boardCellsCache = [...document.querySelectorAll('.cell')];
    }

    function clearCellAnimationVars() {
      const cells = boardCellsCache.length ? boardCellsCache : [...document.querySelectorAll('.cell')];
      cells.forEach((cell) => cell.style.removeProperty('--reveal-delay'));
    }

    function resetBoard(keepStarted = false) {
      openedCount = 0;
      currentPayout = 0;
      currentRoundId = keepStarted ? currentRoundId : null;
      mineIndexes = keepStarted ? mineIndexes : new Set();
      openedIndexes = new Set();
      (boardCellsCache.length ? boardCellsCache : document.querySelectorAll('.cell')).forEach((cell) => {
        cell.classList.remove('safe-open', 'bomb-open', 'locked', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
      });
      clearCellAnimationVars();
      if (!keepStarted) started = false;
      if (!keepStarted) setSettingsLocked(false);
      renderMultipliers();
      updateTopCounters();
      setPlayText();
    }

    function revealAllForCashoutPreview() {
      const game = document.querySelector('.game');
      const cells = boardCellsCache.length ? boardCellsCache : [...document.querySelectorAll('.cell')];
      const revealedMines = new Set(mineIndexes);
      const anchorIndex = openedIndexes.size ? [...openedIndexes][openedIndexes.size - 1] : 12;
      game?.classList.add('cashout-preview');
      requestAnimationFrame(() => {
        cells.forEach((cell) => {
          const index = Number(cell.dataset.index || -1);
          const row = Math.floor(index / 5);
          const col = index % 5;
          const anchorRow = Math.floor(anchorIndex / 5);
          const anchorCol = anchorIndex % 5;
          const distance = Math.abs(row - anchorRow) + Math.abs(col - anchorCol);
          const delay = Math.min(260, distance * 34);
          cell.style.setProperty('--reveal-delay', delay + 'ms');
          cell.classList.remove('safe-open', 'bomb-open', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
          if (revealedMines.has(index)) cell.classList.add('bomb-open', 'open');
          else cell.classList.add('safe-open', 'open');
        });
      });
    }

    function finishCashoutPreviewReset(delay = 2200) {
      setRequesting(true);
      setSettingsLocked(true);
      setTimeout(() => {
        document.querySelector('.game')?.classList.remove('cashout-preview');
        setRequesting(false);
        resetBoard(false);
      }, delay);
    }

    function revealAllAfterMine(hitCell) {
      triggerLossAnimation();
      showGameToast('loss', 'Проигрыш', 'Вы попали на мину');
      const cells = boardCellsCache.length ? boardCellsCache : [...document.querySelectorAll('.cell')];
      const revealedMines = new Set(mineIndexes);
      requestAnimationFrame(() => {
        const hitIndex = Number(hitCell?.dataset?.index || -1);
        cells.forEach((cell) => {
          const index = Number(cell.dataset.index || -1);
          const row = Math.floor(index / 5);
          const col = index % 5;
          const distanceFromHit = hitIndex >= 0 ? Math.abs(row - Math.floor(hitIndex / 5)) + Math.abs(col - (hitIndex % 5)) : row + col;
          const delay = Math.min(260, distanceFromHit * 42);
          cell.style.setProperty('--reveal-delay', delay + 'ms');
          cell.classList.remove('safe-open', 'bomb-open', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
          if (revealedMines.has(index)) cell.classList.add('bomb-open', 'open');
          else cell.classList.add('safe-open', 'open');
          if (cell === hitCell) {
            cell.style.setProperty('--reveal-delay', '0ms');
            cell.classList.add('bomb-hit');
          } else {
            cell.classList.add('loss-reveal');
          }
        });
      });
      started = false;
      openedCount = 0;
      currentPayout = 0;
      currentRoundId = null;
      openedIndexes = new Set();
      setSettingsLocked(false);
      renderMultipliers();
      updateTopCounters();
      setPlayText();
      requestAnimationFrame(() => multiplierRowEl.scrollTo({ left: 0, behavior: 'smooth' }));
    }

    function finishFullClearRound(winAmount, balanceAfter, mineCells) {
      mineIndexes = new Set((mineCells || []).map(Number));
      showGameToast('win', 'Максимальный выигрыш', 'Вы забрали ' + formatRub(winAmount));
      started = false;
      currentPayout = winAmount;
      currentRoundId = null;
      updateBalance(balanceAfter);
      setPlayText();
      revealAllForCashoutPreview();
      finishCashoutPreviewReset(2200);
    }

    async function startRound() {
      if (isRequesting) return;
      setAmountSafe(readAmountInput());

      if (!initData) {
        showGameToast('error', 'Ошибка', 'Откройте игру через Telegram');
        return;
      }

      setRequesting(true);
      try {
        const data = await callMinesApi({ action: 'start', initData, bet: amount, mines_count: selectedMines });
        updateSettings(data.settings);
        currentRoundId = data.round_id;
        started = true;
        openedCount = 0;
        currentPayout = amount;
        mineIndexes = new Set();
        openedIndexes = new Set();
        updateBalance(data.balance);
        setSettingsLocked(true);
        (boardCellsCache.length ? boardCellsCache : document.querySelectorAll('.cell')).forEach((cell) => {
          cell.classList.remove('safe-open', 'bomb-open', 'locked', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
        });
        clearCellAnimationVars();
        renderMultipliers();
        updateTopCounters();
        setPlayText();
        showGameToast('win', 'Раунд начат', 'Выберите безопасное поле');
      } catch (error) {
        showGameToast('error', 'Ошибка', normalizeError(error));
        if (String(error?.message || '').toLowerCase().includes('активный раунд')) loadGameState();
      } finally {
        setRequesting(false);
      }
    }

    async function handleCellClick(cell) {
      if (!started || isRequesting || !currentRoundId) return;
      if (cell.classList.contains('safe-open') || cell.classList.contains('bomb-open')) return;

      const index = Number(cell.dataset.index || -1);
      if (!Number.isInteger(index) || index < 0 || index > 24) return;
      if (openedIndexes.has(index)) return;

      cell.classList.add('server-waiting');
      setRequesting(true);

      try {
        const data = await callMinesApi({ action: 'open', initData, round_id: currentRoundId, cell_index: index });
        cell.classList.remove('server-waiting');

        if (data.result === 'bomb') {
          mineIndexes = new Set((data.mine_cells || [index]).map(Number));
          updateBalance(data.balance);
          revealAllAfterMine(cell);
          return;
        }

        openedIndexes.add(index);
        cell.classList.remove('bomb-open');
        cell.classList.add('safe-open', 'open');
        openedCount = Math.floor(Number(data.step || openedIndexes.size));
        currentPayout = Math.floor(Number(data.payout || amount * getCurrentMultiplier()));
        renderMultipliers();
        updateTopCounters();
        setPlayText();

        if (data.full_clear) {
          finishFullClearRound(currentPayout, data.balance, data.mine_cells || []);
        }
      } catch (error) {
        cell.classList.remove('server-waiting');
        showGameToast('error', 'Ошибка', normalizeError(error));
      } finally {
        setRequesting(false);
      }
    }

    async function cashoutRound() {
      if (!started || !currentRoundId || isRequesting) return;
      setRequesting(true);
      try {
        const data = await callMinesApi({ action: 'cashout', initData, round_id: currentRoundId });
        mineIndexes = new Set((data.mine_cells || []).map(Number));
        const payout = Math.floor(Number(data.payout || currentPayout || amount));
        showGameToast('win', 'Выигрыш', 'Вы вывели ' + formatRub(payout));
        updateBalance(data.balance);
        started = false;
        currentPayout = payout;
        currentRoundId = null;
        updatePlayButton();
        revealAllForCashoutPreview();
        finishCashoutPreviewReset(2200);
      } catch (error) {
        showGameToast('error', 'Ошибка', normalizeError(error));
        setRequesting(false);
      }
    }

    function restoreActiveRound(round) {
      if (!round) return false;
      selectedMines = Number(round.mines_count || selectedMines);
      amount = Number(round.bet_amount || amount);
      currentRoundId = round.round_id;
      started = true;
      openedIndexes = new Set((round.opened_cells || []).map(Number));
      openedCount = Number(round.opened_count || openedIndexes.size || 0);
      currentPayout = Number(round.current_payout || amount);
      updateAmount();
      renderMineOptions();
      renderMultipliers();
      updateTopCounters();
      setSettingsLocked(true);
      setPlayText();
      (boardCellsCache.length ? boardCellsCache : document.querySelectorAll('.cell')).forEach((cell) => {
        const index = Number(cell.dataset.index || -1);
        cell.classList.remove('safe-open', 'bomb-open', 'locked', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
        if (openedIndexes.has(index)) cell.classList.add('safe-open', 'open');
      });
      return true;
    }

    async function loadGameState() {
      if (!initData) {
        updateBalance(0);
        showGameToast('error', 'Ошибка', 'Откройте игру через Telegram');
        return;
      }

      try {
        const data = await callMinesApi({ action: 'state', initData });
        updateSettings(data.settings);
        updateBalance(data.balance);
        if (data.settings && !data.settings.is_active) {
          showGameToast('error', 'Ошибка', 'Игра временно недоступна');
        }
        if (!restoreActiveRound(data.active_round)) {
          resetBoard(false);
        }
      } catch (error) {
        showGameToast('error', 'Ошибка', normalizeError(error));
      }
    }

    amountDisplayEl.addEventListener('focus', () => {
      if (started || isRequesting) { amountDisplayEl.blur(); return; }
      amountDisplayEl.value = String(Math.floor(amount));
      requestAnimationFrame(() => amountDisplayEl.select());
    });

    amountDisplayEl.addEventListener('input', () => {
      if (started || isRequesting) return;
      const raw = amountDisplayEl.value.replace(/[^0-9]/g, '');
      amountDisplayEl.value = raw;
      if (raw) amount = Math.min(MAX_BET_CLIENT, Math.max(0, Math.floor(Number(raw))));
    });

    amountDisplayEl.addEventListener('blur', () => {
      if (started || isRequesting) return;
      setAmountSafe(readAmountInput());
    });

    amountDisplayEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') amountDisplayEl.blur();
    });

    document.getElementById('plusBtn').addEventListener('click', () => { if (!started && !isRequesting) setAmountSafe(readAmountInput() + 1); });
    document.getElementById('minusBtn').addEventListener('click', () => { if (!started && !isRequesting) setAmountSafe(readAmountInput() - 1); });
    document.getElementById('halfBtn').addEventListener('click', () => { if (!started && !isRequesting) setAmountSafe(readAmountInput() / 2); });
    document.getElementById('doubleBtn').addEventListener('click', () => { if (!started && !isRequesting) setAmountSafe(readAmountInput() * 2); });

    playBtn.addEventListener('click', () => {
      if (isRequesting) return;
      if (!started) startRound();
      else cashoutRound();
    });

    updateAmount();
    buildBoard();
    renderMineOptions();
    renderMultipliers();
    updateTopCounters();
    setSettingsLocked(false);
    setPlayText();
    requestAnimationFrame(() => loadGameState());
  </script>

  <script>
    (function () {
      const root = document.documentElement;
      const hideMinesPreloader = () => {
        const preloader = document.getElementById('minesPreloader');

        setTimeout(() => {
          root.classList.add('mines-ready');
          root.classList.remove('mines-loading');

          if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(() => {
              preloader.remove();
            }, 520);
          }
        }, 2200);
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', hideMinesPreloader, { once: true });
      } else {
        hideMinesPreloader();
      }
    })();
  </script>
</body>
</html>
