<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vezus Mines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07050d;
      --text: #ffffff;
      --line: rgba(171, 124, 255, 0.16);
      --shadow: 0 10px 30px rgba(0,0,0,0.28);
      --radius: 22px;
      --accent: #b84dff;
      --accent-2: #7d36ff;
      --safe-glow: rgba(193, 105, 255, 0.42);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow-x: hidden;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 179, 42, 0.16), transparent 27%),
        radial-gradient(circle at 50% 100%, rgba(141, 42, 255, 0.20), transparent 42%),
        linear-gradient(180deg, #08050f 0%, #160020 52%, #0b0811 100%);
    }

    .game {
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
    }

    .game::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(160, 44, 255, 0.16), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.05), transparent 18%);
      pointer-events: none;
      z-index: 0;
    }

    .exit-game-btn {
      position: fixed;
      top: max(92px, calc(env(safe-area-inset-top) + 82px));
      left: 16px;
      z-index: 24;
      width: 34px;
      height: 34px;
      border: 0;
      background: transparent;
      display: grid;
      place-items: center;
      color: #ffffff;
      text-decoration: none;
      cursor: pointer;
      filter: drop-shadow(0 0 7px rgba(255,255,255,0.22));
    }

    .exit-game-btn svg {
      width: 29px;
      height: 29px;
      display: block;
      overflow: visible;
    }

    .exit-game-btn path { stroke: #ffffff; }

    .topbar {
      position: fixed;
      top: max(140px, calc(env(safe-area-inset-top) + 130px));
      left: 18px;
      right: 18px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .balance {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 14px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.12);
    }

    .wallet {
      width: 16px;
      height: 16px;
      color: #fff;
    }

    .wallet path,
    .wallet circle { fill: currentColor !important; }

    .content {
      position: relative;
      z-index: 1;
      width: min(100%, 760px);
      margin: 0 auto;
      padding: max(210px, calc(env(safe-area-inset-top) + 200px)) 14px calc(24px + env(safe-area-inset-bottom));
    }

    .board-wrap,
    .multiplier-wrap,
    .bet-wrap,
    .bombs-wrap {
      width: 100%;
      background: linear-gradient(180deg, rgba(42, 20, 78, 0.92), rgba(28, 12, 54, 0.9));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .board-wrap { padding: 16px; }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .cell {
      position: relative;
      aspect-ratio: 1 / 1;
      border: 1px solid rgba(182, 138, 255, 0.14);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(54, 35, 97, 0.95), rgba(38, 24, 74, 0.96));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.025),
        0 6px 18px rgba(0,0,0,0.18);
      display: grid;
      place-items: center;
      color: rgba(255,255,255,0.18);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-align: center;
      line-height: 1.05;
      user-select: none;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
    }

    .cell span {
      display: inline-block;
      width: 80%;
      opacity: .58;
    }

    .cell:active { transform: scale(0.97); }

    .cell.open {
      border-color: rgba(215, 150, 255, 0.46);
      background: linear-gradient(180deg, rgba(121, 74, 255, 0.92), rgba(77, 40, 178, 0.94));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.055),
        0 0 18px var(--safe-glow),
        0 8px 22px rgba(0,0,0,0.24);
      color: rgba(255,255,255,0.94);
    }

    .cell.open span {
      opacity: 1;
      text-shadow: 0 0 10px rgba(255,255,255,0.18);
    }

    .multiplier-wrap {
      margin-top: 12px;
      padding: 10px;
    }

    .multiplier-row {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .multiplier-chip {
      min-height: 64px;
      border-radius: 14px;
      border: 1px solid rgba(179, 135, 255, 0.12);
      background: linear-gradient(180deg, rgba(47, 27, 86, 0.95), rgba(32, 17, 61, 0.98));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: rgba(255,255,255,0.54);
      transition: all .18s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .multiplier-chip strong {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
    }

    .multiplier-chip span {
      font-size: 11px;
      font-weight: 700;
    }

    .multiplier-chip.active {
      border-color: rgba(225, 171, 255, 0.34);
      background: linear-gradient(180deg, rgba(129, 79, 255, 0.94), rgba(89, 42, 204, 0.96));
      box-shadow: 0 0 18px rgba(177, 88, 255, 0.3);
      transform: translateY(-1px);
    }

    .multiplier-chip.active strong,
    .multiplier-chip.active span {
      color: #fff;
    }

    .bet-wrap,
    .bombs-wrap {
      margin-top: 14px;
      padding: 16px;
    }

    .bet-layout {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
      align-items: stretch;
    }

    .amount-box,
    .play-box {
      border-radius: 18px;
      border: 1px solid rgba(180, 136, 255, 0.12);
      background: linear-gradient(180deg, rgba(50, 29, 92, 0.95), rgba(31, 18, 58, 0.98));
      padding: 14px;
    }

    .amount-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .amount-display {
      min-height: 74px;
      border-radius: 14px;
      padding: 0 16px;
      border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.035);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .stepper {
      display: grid;
      gap: 8px;
    }

    .mini-btn,
    .quick-btn,
    .mine-btn,
    .play-btn {
      border: 0;
      cursor: pointer;
      color: #fff;
      font-family: inherit;
      transition: transform .16s ease, filter .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .mini-btn:active,
    .quick-btn:active,
    .mine-btn:active,
    .play-btn:active { transform: scale(0.97); }

    .mini-btn {
      width: 46px;
      height: 33px;
      border-radius: 11px;
      font-size: 24px;
      font-weight: 700;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.85);
    }

    .quick-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .quick-btn,
    .mine-btn {
      min-height: 42px;
      border-radius: 13px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .play-box {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .play-caption {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      margin-bottom: 10px;
      text-align: center;
    }

    .play-btn {
      min-height: 126px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(128, 72, 255, 0.95), rgba(83, 39, 200, 0.98));
      box-shadow: 0 10px 24px rgba(92, 36, 237, 0.26);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .play-btn strong {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .play-btn span {
      font-size: 14px;
      font-weight: 700;
      opacity: 0.92;
    }

    .section-title {
      font-size: 17px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      margin-bottom: 14px;
      letter-spacing: -0.03em;
    }

    .mine-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .mine-btn.active {
      background: linear-gradient(180deg, rgba(136, 80, 255, 0.95), rgba(86, 40, 207, 0.98));
      color: #fff;
      box-shadow: 0 0 18px rgba(170, 96, 255, 0.24);
    }

    .status-note {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.35;
      color: rgba(255,255,255,0.52);
      text-align: center;
    }

    @media (max-width: 370px) {
      .exit-game-btn {
        top: max(82px, calc(env(safe-area-inset-top) + 72px));
        left: 14px;
        width: 32px;
        height: 32px;
      }

      .exit-game-btn svg {
        width: 27px;
        height: 27px;
      }

      .topbar {
        top: max(126px, calc(env(safe-area-inset-top) + 116px));
        left: 14px;
        right: 14px;
      }

      .content {
        padding: max(196px, calc(env(safe-area-inset-top) + 186px)) 10px calc(18px + env(safe-area-inset-bottom));
      }

      .board-wrap,
      .multiplier-wrap,
      .bet-wrap,
      .bombs-wrap { padding-left: 12px; padding-right: 12px; }

      .multiplier-row { gap: 6px; }
      .multiplier-chip { min-height: 60px; }
      .multiplier-chip strong { font-size: 12px; }
      .multiplier-chip span { font-size: 10px; }
    }

    @media (max-width: 640px) {
      .bet-layout { grid-template-columns: 1fr; }

      .play-btn { min-height: 86px; }

      .mine-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  
    /* FINAL MINES LAYOUT v2: поле меньше, панели плотнее как на фото */
    .content {
      width: min(100%, 720px) !important;
      padding-top: max(210px, calc(env(safe-area-inset-top) + 200px)) !important;
      padding-left: 8px !important;
      padding-right: 8px !important;
    }

    .board-wrap {
      width: min(100%, 674px) !important;
      margin: 0 auto !important;
      padding: 0 14px !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    .board {
      gap: 7px !important;
    }

    .cell {
      border-radius: 8px !important;
      background: linear-gradient(180deg, rgba(48, 31, 83, 0.96), rgba(36, 23, 68, 0.98)) !important;
      border: 1px solid rgba(160, 92, 255, 0.16) !important;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.025),
        0 4px 10px rgba(0,0,0,0.18) !important;
      color: rgba(255,255,255,0.15) !important;
      font-size: 10px !important;
    }

    .cell.open {
      color: #fff !important;
      background: linear-gradient(180deg, rgba(127, 76, 255, 0.94), rgba(82, 43, 195, 0.96)) !important;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.055),
        0 0 14px rgba(177, 88, 255, 0.28) !important;
    }

    .multiplier-wrap {
      width: min(100%, 674px) !important;
      margin: 10px auto 0 !important;
      padding: 0 14px !important;
      border: 0 !important;
      background: transparent !important;
      box-shadow: none !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }

    .multiplier-row {
      display: flex !important;
      gap: 7px !important;
      overflow-x: auto !important;
      overflow-y: hidden !important;
      scrollbar-width: none !important;
      padding-bottom: 2px !important;
    }

    .multiplier-row::-webkit-scrollbar {
      display: none !important;
    }

    .multiplier-chip {
      flex: 0 0 102px !important;
      min-height: 64px !important;
      border-radius: 14px !important;
      background: linear-gradient(180deg, rgba(45, 25, 82, 0.94), rgba(32, 16, 60, 0.98)) !important;
      border: 1px solid rgba(164, 99, 255, 0.12) !important;
    }

    .bet-wrap {
      width: min(100%, 674px) !important;
      margin: 12px auto 0 !important;
      padding: 16px !important;
      border-radius: 18px !important;

      border: 1px solid rgba(166, 77, 255, 0.20) !important;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28) !important;
    }

    .bet-layout {
      grid-template-columns: 1.08fr .92fr !important;
      gap: 16px !important;
    }

    .amount-box,
    .play-box {
      padding: 0 !important;

    }

    .amount-display {
      min-height: 72px !important;
      border-radius: 13px !important;
      background: linear-gradient(180deg, rgba(48, 36, 76, 0.94), rgba(39, 29, 65, 0.96)) !important;

    }

    .mini-btn {
      width: 42px !important;
      height: 32px !important;

      background: rgba(255,255,255,0.055) !important;
    }

    .quick-btn {
      min-height: 42px !important;
      border-radius: 12px !important;
      background: rgba(255,255,255,0.045) !important;
    }

    .play-caption {
      display: none !important;
    }

    .play-btn {
      min-height: 122px !important;
      border-radius: 16px !important;
      background: linear-gradient(180deg, rgba(124, 62, 255, 0.88), rgba(67, 33, 155, 0.94)) !important;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 0 20px rgba(124, 62, 255, 0.12) !important;
    }

    .play-btn strong {
      font-size: 24px !important;
    }

    .play-btn span {
      font-size: 13px !important;
      opacity: 0.62 !important;
    }

    .bombs-wrap {
      width: min(100%, 674px) !important;
      margin: 10px auto 0 !important;
      padding: 18px 16px !important;
      border-radius: 18px !important;
      background: linear-gradient(180deg, rgba(35, 20, 63, 0.94), rgba(25, 13, 47, 0.96)) !important;
      border: 1px solid rgba(166, 77, 255, 0.18) !important;

    }

    .section-title {
      margin-bottom: 14px !important;

    }

    .mine-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 8px !important;
      padding: 0 !important;
      border-radius: 18px !important;
      background: rgba(255,255,255,0.035) !important;

    }

    .mine-btn {
      min-height: 46px !important;
      border-radius: 0 !important;
      border: 0 !important;
      background: transparent !important;
      color: rgba(255,255,255,0.36) !important;
      font-size: 18px !important;
    }

    .mine-btn.active {
      background: rgba(255,255,255,0.055) !important;
      color: rgba(255,255,255,0.82) !important;
      box-shadow: none !important;
    }

    .status-note {
      display: none !important;
    }

    @media (max-width: 640px) {
      .content {
        width: 100% !important;
        padding-top: max(210px, calc(env(safe-area-inset-top) + 200px)) !important;
      }

      .board-wrap {
        padding: 0 14px !important;
      }

      .board {

      }

      .cell {

      }

      }

      }

      }

    @media (max-width: 390px) {

      }

      }

      .multiplier-wrap {

      }

      }

      }

      }

      }

      }

    /* FINAL MINES PHOTO PATCH v3:
       поле выше, клетки прямоугольнее, панели компактнее */

      padding-top: max(172px, calc(env(safe-area-inset-top) + 162px)) !important;

    .cell span {

    .cell.open {

      color: #fff !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),

    }

    }

    .multiplier-chip {
      flex: 0 0 78px !important;
      min-height: 48px !important;
      border-radius: 11px !important;
      border: 1px solid rgba(153, 95, 255, 0.15) !important;

      top: 50%;

      height: 4px !important;

      animation-delay: calc(var(--reveal-delay) + 20ms) !important;

        <div class="section-title">Количество мин</div>
        <div class="mine-grid" id="mineGrid"></div>
        <div class="status-note">После запуска раунда выбирайте клетки — снизу будут подсвечиваться множители с каждым успешным выбором.</div>
      </div>
    </section>
    <div id="toastLayer" class="toast-layer" aria-live="polite"></div>
  </main>

  <script>
    /*
      Vezus Mines — локальная версия без БД, Supabase и серверных запросов.
      Вся оригинальная HTML/CSS-визуальная часть сохранена.
    */

    const boardEl = document.getElementById('board');
    const multiplierRowEl = document.getElementById('multiplierRow');
    const mineGridEl = document.getElementById('mineGrid');
    const amountDisplayEl = document.getElementById('amountDisplay');
    const playBtn = document.getElementById('playBtn');
    const playSubTextEl = document.getElementById('playSubText');

    const mineOptions = [2, 3, 5, 7];
    const MIN_BET_CLIENT = 10;
    const MAX_BET_CLIENT = 10000;
    const START_BALANCE = 1000;

    let selectedMines = 3;
    let amount = 20;
    let started = false;
    let openedCount = 0;
    let multipliers = [];
    let currentPayout = 0;
    let boardCellsCache = [];
    let currentBalance = START_BALANCE;
    let mineIndexes = new Set();
    let openedIndexes = new Set();
    let isRequesting = false;

    function formatRub(value) {
      return Math.floor(Number(value || 0)) + ' ₽';
    }

    function updateBalance(value) {
      currentBalance = Math.floor(Number(value || 0));
      const el = document.getElementById('balance');
      if (el) el.textContent = formatRub(currentBalance);
    }

    function getBalanceValue() {
      return Math.floor(Number(currentBalance || 0));
    }

    function showGameToast(type, title, message) {
      const layer = document.getElementById('toastLayer');
      if (!layer) return;

      const icons = {
        win: '<img src="images/Starmines.png" alt="">',
        loss: '<img src="images/Bombmines.png" alt="">',
        error: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 8v5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M12 16.8h.01" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"/><path d="M10.2 4.4 2.9 17.2A2.2 2.2 0 0 0 4.8 20.5h14.4a2.2 2.2 0 0 0 1.9-3.3L13.8 4.4a2.1 2.1 0 0 0-3.6 0Z" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/></svg>'
      };

      layer.innerHTML = '';

      const toast = document.createElement('div');
      toast.className = 'game-toast ' + type;
      toast.innerHTML =
        '<div class="toast-icon">' + (icons[type] || icons.error) + '</div>' +
        '<div class="toast-content">' +
          '<div class="toast-title">' + title + '</div>' +
          '<div class="toast-text">' + message + '</div>' +
        '</div>';

      layer.appendChild(toast);

      setTimeout(() => {
        toast.remove();
      }, 2400);
    }

    function setRequesting(value) {
      isRequesting = value;
      playBtn.classList.toggle('server-waiting', value);
      document.querySelector('.game')?.classList.toggle('server-disabled', value);
    }

    function setSettingsLocked(locked) {
      const controls = [
        document.getElementById('plusBtn'),
        document.getElementById('minusBtn'),
        document.getElementById('halfBtn'),
        document.getElementById('doubleBtn'),
        ...document.querySelectorAll('.mine-btn')
      ].filter(Boolean);

      controls.forEach((control) => {
        control.disabled = locked;
        control.setAttribute('aria-disabled', locked ? 'true' : 'false');
      });

      document.querySelector('.bet-wrap')?.classList.toggle('controls-locked', locked);
      document.querySelector('.bombs-wrap')?.classList.toggle('controls-locked', locked);
    }

    function triggerLossAnimation() {
      const game = document.querySelector('.game');
      if (!game) return;

      game.classList.remove('loss-effect');
      void game.offsetWidth;
      game.classList.add('loss-effect');

      setTimeout(() => {
        game.classList.remove('loss-effect');
      }, 680);
    }

    function updateTopCounters() {
      const totalCells = 25;
      const safeTotal = Math.max(0, totalCells - selectedMines);
      const safeRemaining = Math.max(0, safeTotal - openedCount);
      const safeEl = document.getElementById('safeCount');
      const bombEl = document.getElementById('bombCount');

      if (safeEl) safeEl.textContent = String(safeRemaining);
      if (bombEl) bombEl.textContent = String(selectedMines);
    }

    function getCurrentMultiplier() {
      if (!openedCount) return 1;
      return multipliers[Math.max(0, Math.min(openedCount - 1, multipliers.length - 1))] || 1;
    }

    function updatePlayButton() {
      const strong = playBtn.querySelector('strong');
      if (!strong) return;

      if (!started) {
        playBtn.classList.remove('is-playing');
        strong.textContent = 'Играть';
        playSubTextEl.textContent = 'Раунд не начат';
        return;
      }

      playBtn.classList.add('is-playing');
      strong.textContent = 'Вывести';
      playSubTextEl.textContent = formatRub(currentPayout || amount);
    }

    function clampAmount(value) {
      const normalized = Math.floor(Number(value || 0));
      return Math.max(MIN_BET_CLIENT, Math.min(MAX_BET_CLIENT, normalized));
    }

    function updateAmount() {
      amount = clampAmount(amount);
      amountDisplayEl.textContent = formatRub(amount);
    }

    function flashAmountLimit() {
      if (!amountDisplayEl) return;
      amountDisplayEl.classList.remove('limit-flash');
      void amountDisplayEl.offsetWidth;
      amountDisplayEl.classList.add('limit-flash');
    }

    function setAmountSafe(nextValue) {
      const before = Number(nextValue || 0);
      const clamped = clampAmount(before);
      amount = clamped;
  
    // FIX: не даём странице уезжать вниз/вверх свайпом.
    document.addEventListener('touchmove', (event) => {
      if (event.target.closest('.multiplier-row')) return;
      event.preventDefault();
    }, { passive: false });

    window.addEventListener('scroll', () => {
      window.scrollTo(0, 0);
    }, { passive: true });

    updateAmount();

      if (before !== clamped) {
        flashAmountLimit();

        if (before < MIN_BET_CLIENT) {
          showGameToast('error', 'Минимальная ставка', 'Минимум ' + formatRub(MIN_BET_CLIENT));
        } else if (before > MAX_BET_CLIENT) {
          showGameToast('error', 'Максимальная ставка', 'Максимум ' + formatRub(MAX_BET_CLIENT));
        }
      }
    }

    function calculateMultipliers(mines) {
      const tables = {
        2: [
          1.02, 1.11, 1.22, 1.34, 1.48, 1.64, 1.84, 2.07, 2.35, 2.68, 3.09,
          3.61, 4.27, 5.12, 6.26, 7.83, 10.07, 13.42, 18.80, 28.20, 47.00, 94.00, 282.00
        ],
        3: [
          1.06, 1.22, 1.40, 1.62, 1.89, 2.23, 2.64, 3.17, 3.86, 4.75, 5.93,
          7.55, 9.82, 13.10, 18.01, 25.73, 38.60, 61.77, 108.10, 216.20, 540.50, 2162.00
        ],
        5: [
          1.17, 1.48, 1.89, 2.45, 3.22, 4.29, 5.82, 8.07, 11.43, 16.63,
          24.94, 38.80, 63.05, 108.10, 198.18, 396.36, 891.82, 2378.20, 8323.70, 49942.20
        ],
        7: [
          1.30, 1.84, 2.64, 3.88, 5.82, 8.96, 14.19, 23.23, 39.49,
          70.21, 131.66, 263.32, 570.52, 1369.26, 3765.48, 12551.61, 56482.25, 451858.00
        ]
      };

      return tables[mines] ? [...tables[mines]] : [];
    }

    function scrollMultiplierToCurrent() {
      if (!started || openedCount <= 0) return;

      const activeItems = multiplierRowEl.querySelectorAll('.multiplier-chip.active');
      const target = activeItems[activeItems.length - 1];

      if (!target) return;

      requestAnimationFrame(() => {
        target.scrollIntoView({
          behavior: 'smooth',
          inline: 'center',
          block: 'nearest'
        });
      });
    }

    function renderMultipliers() {
      multipliers = calculateMultipliers(selectedMines);
      multiplierRowEl.innerHTML = '';

      multipliers.forEach((value, index) => {
        const chip = document.createElement('div');
        const isReached = started && index < openedCount;
        chip.className = 'multiplier-chip' + (isReached ? ' active' : '');
        chip.innerHTML =
          '<strong><svg class="chip-star" viewBox="0 0 24 24" aria-hidden="true">' +
          '<path d="M12 2.4L14.9 8.55L21.6 9.42L16.7 14.05L17.95 20.7L12 17.35L6.05 20.7L7.3 14.05L2.4 9.42L9.1 8.55L12 2.4Z"></path>' +
          '</svg>' + (index + 1) + '</strong>' +
          '<span>x' + value.toFixed(2) + '</span>';

        if (isReached) {
          chip.style.animationDelay = (index * 35) + 'ms';
        }

        multiplierRowEl.appendChild(chip);
      });

      scrollMultiplierToCurrent();
    }

    function renderMineOptions() {
      mineGridEl.innerHTML = '';

      mineOptions.forEach((count) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'mine-btn' + (count === selectedMines ? ' active' : '');
        btn.textContent = count;

        btn.addEventListener('click', () => {
          if (started || isRequesting) return;

          selectedMines = count;
          renderMineOptions();
          renderMultipliers();
          updateTopCounters();
          resetBoard(false);
        });

        mineGridEl.appendChild(btn);
      });
    }

    function setPlayText() {
      updatePlayButton();
    }

    function buildBoard() {
      boardEl.innerHTML = '';

      for (let i = 0; i < 25; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.setAttribute('aria-label', 'Поле мины');
        btn.dataset.index = String(i);
        btn.innerHTML = `
          <div class="cell-inner-icon safe-icon-wrap">
            <img class="cell-safe-image" src="images/Starmines.png" alt="" aria-hidden="true" />
          </div>
          <div class="cell-inner-icon bomb-icon-wrap">
            <img class="cell-bomb-image" src="images/Bombmines.png" alt="" aria-hidden="true" />
          </div>
        `;

        const explosion = document.createElement('div');
        explosion.className = 'bomb-explosion-layer';
        explosion.innerHTML = '<span class="boom-ring"></span><span class="boom-core"></span><i></i><i></i><i></i><i></i><i></i><i></i>';
        btn.appendChild(explosion);

        btn.addEventListener('click', () => handleCellClick(btn));
        boardEl.appendChild(btn);
      }

      boardCellsCache = [...document.querySelectorAll('.cell')];
    }

    function resetBoard(keepStarted = false) {
      openedCount = 0;
      currentPayout = 0;
      mineIndexes = keepStarted ? mineIndexes : new Set();
      openedIndexes = new Set();

      (boardCellsCache.length ? boardCellsCache : document.querySelectorAll('.cell')).forEach((cell) => {
        cell.classList.remove('safe-open', 'bomb-open', 'locked', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
      });

      if (!keepStarted) started = false;
      if (!keepStarted) setSettingsLocked(false);

      renderMultipliers();
      updateTopCounters();
      setPlayText();
    }

    function createLocalMines() {
      const mines = new Set();

      while (mines.size < selectedMines) {
        mines.add(Math.floor(Math.random() * 25));
      }

      return mines;
    }

    function startRound() {
      if (isRequesting) return;

      if (amount < MIN_BET_CLIENT) {
        setAmountSafe(amount);
        showGameToast('error', 'Минимальная ставка', 'Минимум ' + formatRub(MIN_BET_CLIENT));
        return;
      }

      if (amount > MAX_BET_CLIENT) {
        setAmountSafe(amount);
        showGameToast('error', 'Максимальная ставка', 'Максимум ' + formatRub(MAX_BET_CLIENT));
        return;
      }

      if (getBalanceValue() < amount) {
        showGameToast('error', 'Недостаточно средств', 'Пополните баланс или уменьшите ставку');
        return;
      }

      currentBalance -= amount;
      updateBalance(currentBalance);

      started = true;
      openedCount = 0;
      currentPayout = amount;
      mineIndexes = createLocalMines();
      openedIndexes = new Set();

      setSettingsLocked(true);

      (boardCellsCache.length ? boardCellsCache : document.querySelectorAll('.cell')).forEach((cell) => {
        cell.classList.remove('safe-open', 'bomb-open', 'locked', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');
      });

      renderMultipliers();
      updateTopCounters();
      setPlayText();
      showGameToast('win', 'Раунд начат', 'Выберите безопасное поле');
    }

    function revealAllAfterMine(hitCell) {
      triggerLossAnimation();
      showGameToast('loss', 'Проигрыш', 'Вы попали на мину');

      const cells = boardCellsCache.length ? boardCellsCache : [...document.querySelectorAll('.cell')];
      const revealedMines = new Set(mineIndexes);

      requestAnimationFrame(() => {
        const hitIndex = Number(hitCell?.dataset?.index || -1);

        cells.forEach((cell) => {
          const index = Number(cell.dataset.index || -1);
          const row = Math.floor(index / 5);
          const col = index % 5;
          const distanceFromHit = hitIndex >= 0
            ? Math.abs(row - Math.floor(hitIndex / 5)) + Math.abs(col - (hitIndex % 5))
            : row + col;
          const delay = Math.min(260, distanceFromHit * 42);

          cell.style.setProperty('--reveal-delay', delay + 'ms');
          cell.classList.remove('safe-open', 'bomb-open', 'open', 'loss-reveal', 'bomb-hit', 'server-waiting');

          if (revealedMines.has(index)) {
            cell.classList.add('bomb-open', 'open');
          } else {
            cell.classList.add('safe-open', 'open');
          }

          if (cell === hitCell) {
            cell.style.setProperty('--reveal-delay', '0ms');
            cell.classList.add('bomb-hit');
          } else {
            cell.classList.add('loss-reveal');
          }
        });
      });

      started = false;
      openedCount = 0;
      currentPayout = 0;
      mineIndexes = new Set();
      openedIndexes = new Set();

      setSettingsLocked(false);
      renderMultipliers();
      updateTopCounters();
      setPlayText();

      requestAnimationFrame(() => {
        multiplierRowEl.scrollTo({
          left: 0,
          behavior: 'smooth'
        });
      });
    }

    function resetMultiplierStripSmooth() {
      const activeItems = [...multiplierRowEl.querySelectorAll('.multiplier-chip.active')];

      activeItems.forEach((item, index) => {
        setTimeout(() => {
          item.classList.add('resetting');
        }, index * 18);
      });

      setTimeout(() => {
        openedCount = 0;
        renderMultipliers();
        requestAnimationFrame(() => {
          multiplierRowEl.scrollTo({
            left: 0,
            behavior: 'smooth'
          });
        });
      }, 380);
    }

    function finishFullClearRound(winAmount) {
      showGameToast('win', 'Максимальный выигрыш', 'Вы забрали ' + formatRub(winAmount));

      started = false;
      currentPayout = winAmount;
      mineIndexes = new Set();
      openedIndexes = new Set();

      currentBalance += winAmount;
      updateBalance(currentBalance);

      setSettingsLocked(false);
      setPlayText();
      resetMultiplierStripSmooth();
    }

    function handleCellClick(cell) {
      if (!started || isRequesting) return;
      if (cell.classList.contains('safe-open') || cell.classList.contains('bomb-open')) return;

      const index = Number(cell.dataset.index || -1);
      if (!Number.isInteger(index) || index < 0 || index > 24) return;

      if (openedIndexes.has(index)) return;
      openedIndexes.add(index);

      if (mineIndexes.has(index)) {
        revealAllAfterMine(cell);
        return;
      }

      cell.classList.remove('bomb-open');
      cell.classList.add('safe-open', 'open');

      openedCount = openedIndexes.size;
      currentPayout = Math.floor(Number(amount * getCurrentMultiplier()));

      renderMultipliers();
      updateTopCounters();
      setPlayText();

      const safeTotal = 25 - selectedMines;
      if (openedCount >= safeTotal) {
        finishFullClearRound(currentPayout);
      }
    }

    function cashoutRound() {
      if (!started || isRequesting) return;

      if (openedCount <= 0) {
        currentBalance += amount;
        updateBalance(currentBalance);
        showGameToast('win', 'Ставка возвращена', 'Вы не открыли ни одного поля');
        resetBoard(false);
        return;
      }

      const payout = Math.floor(currentPayout || amount * getCurrentMultiplier());

      showGameToast('win', 'Выигрыш', 'Вы вывели ' + formatRub(payout));

      currentBalance += payout;
      updateBalance(currentBalance);
      resetBoard(false);
    }

    function loadGameState() {
      updateBalance(currentBalance);
    }

    document.getElementById('plusBtn').addEventListener('click', () => {
      if (started || isRequesting) return;
      setAmountSafe(amount + 10);
    });

    document.getElementById('minusBtn').addEventListener('click', () => {
      if (started || isRequesting) return;
      setAmountSafe(amount - 10);
    });

    document.getElementById('halfBtn').addEventListener('click', () => {
      if (started || isRequesting) return;
      setAmountSafe(amount / 2);
    });

    document.getElementById('doubleBtn').addEventListener('click', () => {
      if (started || isRequesting) return;
      setAmountSafe(amount * 2);
    });

    playBtn.addEventListener('click', () => {
      if (isRequesting) return;

      if (!started) {
        startRound();
        return;
      }

      cashoutRound();
    });

    updateAmount();
    buildBoard();
    renderMineOptions();
    renderMultipliers();
    updateTopCounters();
    setSettingsLocked(false);
    setPlayText();
    loadGameState();
  </script>


  <script>
    (function () {
      const hideMinesPreloader = () => {
        const preloader = document.getElementById('minesPreloader');
        if (!preloader) return;

        setTimeout(() => {
          preloader.classList.add('hidden');
          setTimeout(() => {
            preloader.remove();
          }, 520);
        }, 2200);
      };

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', hideMinesPreloader, { once: true });
      } else {
        hideMinesPreloader();
      }
    })();
  </script>

</body>
</html>
