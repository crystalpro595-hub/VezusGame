<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>История платежей Vezus</title>
  <!-- historyvezus_510_v1: embedded iframe version, localStorage only, no DB yet -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root{
      --text:#fff;
      --muted:rgba(255,255,255,.58);
      --soft:rgba(255,255,255,.07);
      --soft-2:rgba(255,255,255,.105);
      --stroke:rgba(255,255,255,.10);
      --violet:#8f98a3;
      --pink:#6f7782;
      --green:#65e88d;
      --red:#ff7aa8;
    }

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

    html,body{
      margin:0;
      min-height:100%;
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{
      min-height:100vh;
      font-family:"Montserrat",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 18% -10%, rgba(155, 164, 174, .18), transparent 34%),
        radial-gradient(circle at 104% 12%, rgba(100, 108, 118, .16), transparent 35%),
        radial-gradient(circle at 46% 112%, rgba(55, 60, 68, .30), transparent 44%),
        linear-gradient(180deg, #1c1e22 0%, #101215 48%, #050607 100%);
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      border-radius:50%;
      pointer-events:none;
      z-index:-1;
      filter:blur(18px);
    }

    body::before{
      width:260px;
      height:260px;
      top:90px;
      left:-120px;
      background:rgba(150,158,168,.14);
      opacity:.30;
    }

    body::after{
      width:320px;
      height:320px;
      right:-150px;
      bottom:120px;
      background:rgba(88,96,106,.18);
      opacity:.28;
      filter:blur(20px);
    }

    .page{
      width:min(100%, 620px);
      margin:0 auto;
      padding:
        calc(14px + env(safe-area-inset-top))
        16px
        calc(28px + env(safe-area-inset-bottom));
    }

    .title{
      margin:0 0 16px;
      font-size:23px;
      line-height:1.1;
      font-weight:900;
      letter-spacing:-.03em;
    }

    .filters{
      display:flex;
      gap:8px;
      overflow-x:auto;
      scrollbar-width:none;
      padding:0 0 16px;
      margin:0 -2px;
    }

    .filters::-webkit-scrollbar{display:none;}

    .filter-btn{
      flex:0 0 auto;
      min-height:38px;
      padding:0 14px;
      border:1px solid var(--stroke);
      border-radius:8px;
      color:rgba(255,255,255,.66);
      background:rgba(255,255,255,.052);
      font-family:inherit;
      font-size:12px;
      font-weight:850;
      cursor:pointer;
      transition:background .14s ease, color .14s ease, border-color .14s ease, transform .12s ease;
    }

    .filter-btn:active{transform:scale(.96);}

    .filter-btn.active{
      color:#fff;
      border-color:rgba(255,255,255,.20);
      background:linear-gradient(135deg, rgba(136,145,156,.30), rgba(255,255,255,.075));
    }

    .history-list{
      display:grid;
      gap:9px;
      padding-bottom:18px;
    }

    .history-empty{
      min-height:120px;
      display:grid;
      place-items:center;
      padding:22px;
      border-radius:12px;
      color:rgba(255,255,255,.46);
      font-size:13px;
      font-weight:800;
      text-align:center;
      background:rgba(255,255,255,.045);
      border:1px dashed rgba(255,255,255,.10);
    }

    .history-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      min-height:66px;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(135deg, rgba(255,255,255,.070), rgba(255,255,255,.022));
    }

    .history-left{
      min-width:0;
      display:flex;
      align-items:center;
      gap:10px;
    }

    .history-icon{
      width:40px;
      height:40px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:rgba(255,255,255,.060);
      border:1px solid rgba(255,255,255,.07);
    }

    .history-icon svg{
      width:21px;
      height:21px;
      fill:none;
      stroke:#fff;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .history-main{min-width:0;}

    .history-name{
      display:block;
      max-width:190px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      color:#fff;
      font-size:13px;
      font-weight:900;
    }

    .history-date{
      display:block;
      margin-top:3px;
      color:rgba(255,255,255,.45);
      font-size:10px;
      font-weight:750;
    }

    .history-right{
      flex:0 0 auto;
      text-align:right;
    }

    .history-amount{
      display:block;
      color:var(--green);
      font-size:13px;
      font-weight:950;
      white-space:nowrap;
    }

    .history-amount.minus{color:var(--red);}

    .history-status{
      display:block;
      margin-top:3px;
      color:rgba(255,255,255,.44);
      font-size:10px;
      font-weight:800;
    }

    .history-status.pending{
      display:inline-flex;
      align-items:center;
      justify-content:flex-end;
      gap:4px;
      color:rgba(255,255,255,.58);
    }

    .history-status.pending svg{
      width:12px;
      height:12px;
      fill:none;
      stroke:currentColor;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .history-status.cancelled{color:rgba(255,255,255,.48);}

    .history-cancel-btn{
      height:24px;
      min-height:24px;
      margin-top:5px;
      padding:0 8px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:6px;
      color:#fff;
      background:rgba(255,255,255,.07);
      font-family:inherit;
      font-size:9.5px;
      font-weight:850;
      cursor:pointer;
      touch-action:manipulation;
    }

    .history-cancel-btn:active{transform:scale(.96);}

    @media (max-width:390px){
      .page{padding-left:14px;padding-right:14px;padding-top:calc(12px + env(safe-area-inset-top));}
      .title{font-size:22px;margin-top:0;}
      .filter-btn{min-height:36px;padding:0 12px;font-size:11.5px;}
      .history-name{max-width:150px;}
    }

    @media (min-width:720px){
      .page{padding-left:22px;padding-right:22px;padding-top:calc(16px + env(safe-area-inset-top));}
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="title">История платежей</h1>

    <div class="filters" role="tablist" aria-label="Фильтр истории">
      <button class="filter-btn active" type="button" data-filter="all">Все</button>
      <button class="filter-btn" type="button" data-filter="deposit">Депозиты</button>
      <button class="filter-btn" type="button" data-filter="withdraw">Выводы</button>
      <button class="filter-btn" type="button" data-filter="voucher">Ваучеры</button>
    </div>

    <section class="history-list" id="historyList" aria-live="polite">
      <div class="history-empty">История пока пустая</div>
    </section>
  </main>

  <script>
    (function(){
      const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
      try{
        tg && tg.ready && tg.ready();
        tg && tg.expand && tg.expand();
      }catch(error){}

      const historyList = document.getElementById('historyList');
      const filterButtons = Array.from(document.querySelectorAll('[data-filter]'));

      function getSavedTelegramUser(){
        try{
          if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user) return tg.initDataUnsafe.user;
        }catch(error){}

        try{
          if(window.parent && window.parent !== window && window.parent.Telegram && window.parent.Telegram.WebApp && window.parent.Telegram.WebApp.initDataUnsafe && window.parent.Telegram.WebApp.initDataUnsafe.user){
            return window.parent.Telegram.WebApp.initDataUnsafe.user;
          }
        }catch(error){}

        try{
          const raw = sessionStorage.getItem('vezus_init_data') || localStorage.getItem('vezus_init_data_backup') || '';
          if(raw){
            const params = new URLSearchParams(raw);
            const userRaw = params.get('user');
            if(userRaw) return JSON.parse(userRaw);
          }
        }catch(error){}

        return null;
      }

      function getUserKey(){
        const user = getSavedTelegramUser();
        return user && user.id ? 'tg_' + user.id : 'local_user';
      }

      function getHistoryKey(){
        return 'vezus_history_' + getUserKey();
      }

      function getBalanceKey(){
        return 'vezus_balance_' + getUserKey();
      }

      function getHistoryItems(){
        try{
          const parsed = JSON.parse(localStorage.getItem(getHistoryKey()) || '[]');
          return Array.isArray(parsed) ? parsed : [];
        }catch(error){
          return [];
        }
      }

      function saveHistoryItems(items){
        try{ localStorage.setItem(getHistoryKey(), JSON.stringify(items)); }catch(error){}
      }

      function getBalance(){
        try{ return Math.max(0, Number(localStorage.getItem(getBalanceKey()) || '0') || 0); }catch(error){ return 0; }
      }

      function setBalance(value){
        try{ localStorage.setItem(getBalanceKey(), String(Math.max(0, Number(value) || 0))); }catch(error){}
      }

      function escapeHtml(value){
        return String(value ?? '').replace(/[&<>'"]/g, function(char){
          return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char];
        });
      }

      function formatDate(iso){
        try{
          return new Intl.DateTimeFormat('ru-RU', {
            day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
          }).format(new Date(iso));
        }catch(error){
          return '';
        }
      }

      function icon(type){
        if(type === 'deposit') return '<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>';
        if(type === 'withdraw') return '<svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>';
        return '<svg viewBox="0 0 24 24"><path d="M4 7h16v10H4z"/><path d="M8 7V5h8v2"/><path d="M7 17l10-10"/></svg>';
      }

      function renderHistory(filter){
        const items = getHistoryItems();
        const filtered = filter === 'all' ? items : items.filter(function(item){ return item.type === filter; });

        if(!filtered.length){
          historyList.innerHTML = '<div class="history-empty">История пока пустая</div>';
          return;
        }

        historyList.innerHTML = filtered.map(function(item){
          const type = item.type || 'voucher';
          const pending = item.status === 'В ожидании';
          const cancelled = item.status === 'Отмена';
          const minus = type === 'withdraw';
          const amount = Number(item.amount) || 0;
          const sign = pending ? '' : (minus ? '-' : '+');

          let statusHtml = '';
          if(pending){
            statusHtml = '<span class="history-status pending"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v5l3 2"/></svg>В ожидании</span>';
          }else if(cancelled){
            statusHtml = '<span class="history-status cancelled">Отмена</span>';
          }else{
            statusHtml = '<span class="history-status">' + escapeHtml(item.status || 'Выполнено') + '</span>';
          }

          const cancelButton = pending && type === 'withdraw'
            ? '<button class="history-cancel-btn" type="button" data-cancel-withdraw="' + escapeHtml(item.id) + '">Отменить</button>'
            : '';

          return '<article class="history-item">' +
            '<div class="history-left">' +
              '<span class="history-icon">' + icon(type) + '</span>' +
              '<span class="history-main">' +
                '<span class="history-name">' + escapeHtml(item.title || 'Операция') + '</span>' +
                '<span class="history-date">' + escapeHtml(formatDate(item.createdAt)) + '</span>' +
              '</span>' +
            '</div>' +
            '<div class="history-right">' +
              '<span class="history-amount ' + (minus && !pending ? 'minus' : '') + '">' + sign + amount + ' ₽</span>' +
              statusHtml +
              cancelButton +
            '</div>' +
          '</article>';
        }).join('');
      }

      filterButtons.forEach(function(button){
        button.addEventListener('click', function(){
          filterButtons.forEach(function(item){ item.classList.remove('active'); });
          button.classList.add('active');
          renderHistory(button.dataset.filter || 'all');
        });
      });

      document.addEventListener('click', function(event){
        const button = event.target.closest('[data-cancel-withdraw]');
        if(!button) return;

        const id = String(button.dataset.cancelWithdraw || '');
        let changed = false;
        const items = getHistoryItems().map(function(item){
          if(String(item.id) === id && item.type === 'withdraw' && item.status === 'В ожидании'){
            setBalance(getBalance() + (Number(item.amount) || 0));
            item.status = 'Отмена';
            item.title = item.title || 'Заявка на вывод';
            changed = true;
          }
          return item;
        });

        if(changed){
          saveHistoryItems(items);
          const active = document.querySelector('.filter-btn.active');
          renderHistory(active ? active.dataset.filter : 'all');
        }
      });

      window.addEventListener('message', function(event){
        try{
          if(event && event.data && event.data.type === 'vezus_refresh_history'){
            const active = document.querySelector('.filter-btn.active');
            renderHistory(active ? active.dataset.filter : 'all');
          }
        }catch(error){}
      });

      renderHistory('all');
    })();
  </script>
</body>
</html>
