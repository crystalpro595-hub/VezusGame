<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Кастомки</title>

  <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
  <link rel="dns-prefetch" href="https://i.postimg.cc">
  <link rel="preload" as="image" href="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#eaf1ff;
      --muted:rgba(234,241,255,.72);

      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);

      --glass: rgba(12, 14, 20, .74);
      --stroke: rgba(255,255,255,.08);

      --shadow: 0 18px 42px rgba(0,0,0,.48);
      --shadowSoft: 0 12px 28px rgba(0,0,0,.34);

      --accent1:#3b82f6;
      --accent2:#2563eb;

      --tg1:#2AABEE;
      --tg2:#229ED9;
    }

    *{
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      height:100%;
      margin:0;
      overflow:hidden;
      color:var(--text);
      background:#020617;
    }

    body{
      background-image:url("https://i.postimg.cc/fbJT34yY/076E519D-F095-4957-88BF-5591DEB82533.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(900px 600px at 30% 10%, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(700px 520px at 80% 20%, rgba(59,130,246,.10), transparent 60%),
        linear-gradient(180deg, rgba(0,0,0,.40), rgba(0,0,0,.68));
      pointer-events:none;
      z-index:0;
    }

    .app{
      position:relative;
      height:100%;
      overflow:auto;
      padding: calc(12px + var(--safe-top)) 16px calc(28px + var(--safe-bottom)) 16px;
      z-index:1;
      overscroll-behavior: contain;
    }

    .content{
      margin-top:6px;
      display:flex;
      flex-direction:column;
      gap:14px;
      max-width:520px;
      margin-left:auto;
      margin-right:auto;
      align-items:center;
      position:relative;
      z-index:1;
    }

    /* ===== Top bar (без общей рамки) ===== */
    .top-row{
      width:100%;
      display:grid;
      grid-template-columns:42px minmax(0,1fr) 54px;
      align-items:center;
      gap:8px;

      position:sticky;
      top:4px;
      z-index:30;

      padding:0;
      background:transparent;
      border:none;
      border-radius:0;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .back-btn-square{
      width:42px;
      height:42px;
      border-radius:14px;
      border:1px solid var(--stroke);
      cursor:pointer;
      background:var(--glass);
      box-shadow: var(--shadowSoft), inset 0 1px 0 rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding:0;
      overflow:hidden;
      transition: transform .15s ease;
    }
    .back-btn-square:active{ transform:scale(.98); }

    .back-svg{
      width:20px;
      height:20px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .balance-mini{
      width:100%;
      min-width:0;
      height:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:6px 7px 6px 12px;
      position:relative;
      overflow:hidden;
      background:var(--glass);
      border:1px solid var(--stroke);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .balance-mini::before{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        radial-gradient(220px 70px at 0% 0%, rgba(255,255,255,.06), transparent 55%),
        radial-gradient(220px 70px at 100% 100%, rgba(59,130,246,.12), transparent 55%);
      pointer-events:none;
    }

    .bal-title{
      position:relative;
      z-index:1;
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
      color: rgba(234,241,255,.92);
      white-space:nowrap;
    }

    .bal-amount{
      position:relative;
      z-index:1;
      height:28px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      padding:0 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      color: rgba(234,241,255,.98);
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
      transition: transform .15s ease;
      min-width:88px;
    }
    .bal-amount:active{ transform: scale(.99); }

    .hero-logo{
      width:54px;
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      box-shadow:none;
      padding:0;
      cursor:pointer;
      margin-right:-2px;
      transition: transform .15s ease;
    }
    .hero-logo:active{ transform:scale(.98); }
    .hero-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 10px 16px rgba(0,0,0,.25));
    }

    /* ===== Page head ===== */
    .page-head{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:6px;
      padding: 4px 2px 0 2px;
    }

    .page-title{
      margin:0;
      font-size:24px;
      font-weight:900;
      letter-spacing:.3px;
      text-shadow:0 16px 28px rgba(0,0,0,.60);
      line-height:1.05;
    }

    .page-sub{
      margin:0;
      font-size:13px;
      font-weight:800;
      color: var(--muted);
      line-height:1.25;
    }

    /* ===== Single custom card ===== */
    .custom-card{
      width:100%;
      border-radius:26px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(12, 14, 20, .84);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 22px 62px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position:relative;
      transform: translateY(10px);
      opacity:0;
      animation: cardIn .55s cubic-bezier(.2,.9,.2,1) forwards;
    }

    @keyframes cardIn{
      to{ transform:translateY(0); opacity:1; }
    }

    .custom-card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(420px 160px at 0% 0%, rgba(255,255,255,.05), transparent 60%),
        radial-gradient(360px 140px at 100% 100%, rgba(59,130,246,.12), transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    .poster{
      position:relative;
      width:100%;
      aspect-ratio: 16 / 9;
      overflow:hidden;
      background:
        radial-gradient(700px 260px at 20% 20%, rgba(59,130,246,.35), transparent 60%),
        radial-gradient(700px 260px at 80% 80%, rgba(255,255,255,.10), transparent 60%),
        rgba(255,255,255,.04);
      border-bottom:1px solid rgba(255,255,255,.07);
    }

    /* ✅ сюда поставишь свою картинку */
    .poster img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter: saturate(1.05) contrast(1.05);
    }

    .poster::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(0,0,0,.10), rgba(0,0,0,.55));
      pointer-events:none;
    }

    .card-body{
      position:relative;
      z-index:1;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .custom-title{
      margin:0;
      font-size:16px;
      font-weight:900;
      letter-spacing:.15px;
      line-height:1.15;
    }

    .custom-desc{
      margin:0;
      font-size:12.5px;
      font-weight:800;
      color: rgba(234,241,255,.75);
      line-height:1.35;
    }

    /* ===== Meta + Lobby side-by-side ===== */
    .info-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:10px;
      margin-top:2px;
    }

    @media (min-width: 430px){
      .info-grid{
        grid-template-columns: 1fr 1fr;
      }
    }

    .panel{
      border-radius:18px;
      padding:12px;
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.06);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height: 112px;
    }

    .panel-title{
      margin:0;
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
      color: rgba(234,241,255,.90);
      display:flex;
      align-items:center;
      gap:8px;
    }

    .panel-title svg{
      width:16px;height:16px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.95;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .meta-pill{
      height:28px;
      border-radius:999px;
      padding:0 10px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color: rgba(234,241,255,.92);
      font-size:12px;
      font-weight:900;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      white-space:nowrap;
    }

    .meta-pill svg{
      width:14px;height:14px;
      display:block;
      stroke: rgba(234,241,255,.92);
      fill:none;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.95;
    }

    .lobby-rows{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .lobby-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px 10px;
      border-radius:14px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .lobby-label{
      font-size:12px;
      font-weight:900;
      color: rgba(234,241,255,.78);
      white-space:nowrap;
    }

    .lobby-value{
      font-size:12px;
      font-weight:900;
      color: rgba(234,241,255,.96);
      background: rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.09);
      border-radius:999px;
      padding:6px 10px;
      white-space:nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
    }

    /* ===== Channel overlay ===== */
    .channel-overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.72);
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease;
      z-index:270;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .channel-overlay.show{
      opacity:1;
      pointer-events:auto;
    }
    .channel-card{
      width:min(440px, 100%);
      border-radius:24px;
      overflow:hidden;
      background: rgba(14,16,24,.94);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 34px 90px rgba(0,0,0,.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      position:relative;
      transform: translateY(12px) scale(.98);
      opacity:.95;
      transition: transform .22s ease, opacity .22s ease;
    }
    .channel-overlay.show .channel-card{
      transform: translateY(0) scale(1);
      opacity:1;
    }
    .channel-head{
      padding:16px 16px 10px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .channel-title{
      font-weight:900;
      letter-spacing:.25px;
      font-size:14px;
      color: rgba(234,241,255,.95);
    }
    .channel-x{
      width:38px;
      height:38px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.05);
      color: rgba(234,241,255,.92);
      cursor:pointer;
      display:grid;
      place-items:center;
      box-shadow: 0 12px 28px rgba(0,0,0,.32);
    }
    .channel-body{
      padding:14px 16px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .channel-text{
      margin:0;
      font-size:13px;
      line-height:1.35;
      color: rgba(234,241,255,.84);
    }
    .tg-btn{
      border:none;
      cursor:pointer;
      width:100%;
      height:50px;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background: linear-gradient(180deg, var(--tg1), var(--tg2));
      box-shadow:
        0 18px 40px rgba(34,158,217,.28),
        inset 0 1px 0 rgba(255,255,255,.14);
      color:#fff;
      font-weight:900;
      letter-spacing:.2px;
      font-size:14px;
    }
    .tg-btn:active{ transform: scale(.99); }
    .tg-ico{ width:22px; height:22px; display:block; }

    @media (max-width:360px){
      .top-row{ grid-template-columns:40px minmax(0,1fr) 46px; gap:6px; }
      .back-btn-square{ width:40px; height:40px; border-radius:13px; }
      .balance-mini{ height:40px; }
      .bal-amount{ height:26px; font-size:12px; min-width:70px; }
      .hero-logo{ width:46px; height:46px; margin-right:0; }
      .page-title{ font-size:22px; }
      .custom-title{ font-size:15px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="content">

      <div class="top-row">
        <button class="back-btn-square" id="backBtn" aria-label="Назад" title="На главную">
          <svg class="back-svg" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
            <path d="M9 12h10"></path>
          </svg>
        </button>

        <div class="balance-mini" aria-label="Баланс">
          <span class="bal-title">Баланс</span>
          <button class="bal-amount" id="balanceChip" aria-label="Открыть кошелёк">
            <span id="balanceValue">0 VC</span>
          </button>
        </div>

        <button class="hero-logo" id="brandLogoBtn" aria-label="Telegram канал Vezus" title="Telegram канал">
          <img
            src="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png"
            alt="Vezus"
            loading="eager"
            decoding="async"
          >
        </button>
      </div>

      <div class="page-head">
        <h1 class="page-title">Кастомка</h1>
        <p class="page-sub">Тут будет информация о наборе на кастомные игры/турниры.</p>
      </div>

      <div class="custom-card">
        <div class="poster">
          <!-- ✅ ВСТАВЬ СЮДА СВОЮ КАРТИНКУ -->
          <img id="customPoster" src="" alt="Постер кастомки">
        </div>

        <div class="card-body">
          <h3 class="custom-title" id="customTitle">Скоро!</h3>
          <p class="custom-desc" id="customDesc">Недоступно</p>

          <!-- ✅ Блоки: инфо + лобби -->
          <div class="info-grid">

            <div class="panel">
              <p class="panel-title">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M8 3v3"></path><path d="M16 3v3"></path>
                  <path d="M4 8h16"></path>
                  <rect x="4" y="6" width="16" height="15" rx="2"></rect>
                </svg>
                Информация
              </p>

              <div class="meta">
                <span class="meta-pill" id="metaDate">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 3v3"></path><path d="M16 3v3"></path>
                    <path d="M4 8h16"></path>
                    <rect x="4" y="6" width="16" height="15" rx="2"></rect>
                  </svg>
                  <span>Дата: —</span>
                </span>

                <span class="meta-pill" id="metaTime">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M12 7v6l4 2"></path>
                  </svg>
                  <span>Время: —</span>
                </span>

                <span class="meta-pill" id="metaPrize">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 21h8"></path>
                    <path d="M12 17v4"></path>
                    <path d="M7 4h10v3a5 5 0 0 1-10 0V4z"></path>
                    <path d="M5 7a3 3 0 0 0 3 3"></path>
                    <path d="M19 7a3 3 0 0 1-3 3"></path>
                  </svg>
                  <span>Приз: —</span>
                </span>

                <span class="meta-pill" id="metaMap">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M9 18l-6 3V6l6-3 6 3 6-3v15l-6 3-6-3z"></path>
                    <path d="M9 3v15"></path>
                    <path d="M15 6v15"></path>
                  </svg>
                  <span>Карта: —</span>
                </span>

                <span class="meta-pill" id="metaMode">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M16 18l6-6-6-6"></path>
                    <path d="M8 6l-6 6 6 6"></path>
                  </svg>
                  <span>Режим: —</span>
                </span>
              </div>
            </div>

            <div class="panel">
              <p class="panel-title">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 12h16"></path>
                  <path d="M7 9h.01"></path>
                  <path d="M7 15h.01"></path>
                  <path d="M11 9h9"></path>
                  <path d="M11 15h9"></path>
                </svg>
                Данные лобби
              </p>

              <div class="lobby-rows">
                <div class="lobby-row">
                  <span class="lobby-label">ID</span>
                  <span class="lobby-value" id="lobbyId">—</span>
                </div>

                <div class="lobby-row">
                  <span class="lobby-label">Пароль</span>
                  <span class="lobby-value" id="lobbyPass">—</span>
                </div>
              </div>
            </div>

          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- ✅ Уведомление “Перейти в ТГк” -->
  <div class="channel-overlay" id="channelOverlay" aria-hidden="true">
    <div class="channel-card" role="dialog" aria-modal="true" aria-label="Telegram канал">
      <div class="channel-head">
        <div class="channel-title">Перейти в Telegram канал</div>
        <button class="channel-x" id="channelClose" aria-label="Закрыть">✕</button>
      </div>

      <div class="channel-body">
        <p class="channel-text">
          Нажми кнопку ниже — откроется наш Telegram канал:
          <b>@vezuspubg</b>
        </p>

        <button class="tg-btn" id="goChannel" aria-label="Перейти в Telegram канал">
          <svg class="tg-ico" viewBox="0 0 240 240" aria-hidden="true">
            <path fill="#fff" d="M120 0C53.7 0 0 53.7 0 120s53.7 120 120 120 120-53.7 120-120S186.3 0 120 0zm58.7 82.3l-19.7 92.8c-1.5 6.6-5.4 8.2-10.9 5.1l-30.2-22.3-14.6 14c-1.6 1.6-3 3-6.1 3l2.2-31.6 57.5-52c2.5-2.2-.5-3.4-3.9-1.2l-71 44.7-30.6-9.6c-6.6-2.1-6.7-6.6 1.4-9.7l119.6-46.1c5.5-2 10.3 1.3 8.8 9.9z"/>
          </svg>
          Перейти в Telegram канал
        </button>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <script>
    const VERIFY_URL = "https://lazrfierfbhwlduqlvws.functions.supabase.co/verify-telegram";
    const TG_CHANNEL_URL = "https://t.me/vezuspubg";
    const $ = (id) => document.getElementById(id);

    function formatVc(value){
      const num = Number(value ?? 0);
      if (!Number.isFinite(num)) return "0 VC";
      return Number.isInteger(num) ? `${num} VC` : `${num.toFixed(2)} VC`;
    }

    function loadCachedProfile(){
      try{
        const raw = localStorage.getItem("tg_profile");
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function setBalanceUI(value){
      $("balanceValue").textContent = formatVc(value);
    }

    function applyProfile(profile){
      if (!profile) return;
      localStorage.setItem("tg_profile", JSON.stringify(profile));
      setBalanceUI(profile.balance);
    }

    async function postJson(url, payload){
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const json = await res.json().catch(() => ({}));
      if (!res.ok || !json.ok) throw new Error(json.error || json.details || `Ошибка ${res.status}`);
      return json;
    }

    function getTelegramInitData(){
      if (!window.Telegram || !window.Telegram.WebApp) throw new Error("Открой страницу внутри Telegram Mini App");
      try{
        Telegram.WebApp.ready();
        if (typeof Telegram.WebApp.expand === "function") Telegram.WebApp.expand();
      } catch(e){}
      const initData = Telegram.WebApp.initData;
      if (!initData) throw new Error("Нет initData");
      return initData;
    }

    function openTelegramLinkSafe(url){
      if (window.Telegram && window.Telegram.WebApp && typeof window.Telegram.WebApp.openTelegramLink === "function"){
        window.Telegram.WebApp.openTelegramLink(url);
        return;
      }
      window.open(url, "_blank", "noopener");
    }

    async function refreshProfile(){
      const cached = loadCachedProfile();
      if (cached) applyProfile(cached);
      else setBalanceUI(0);

      try{
        const initData = getTelegramInitData();
        const json = await postJson(VERIFY_URL, { initData });
        if (json.profile) applyProfile(json.profile);
      } catch(err){
        console.error("Profile load error:", err);
      }
    }

    // nav
    $("balanceChip").addEventListener("click", () => window.location.href = "wallet.html");
    $("backBtn").addEventListener("click", () => window.location.href = "index.html");

    // logo overlay
    const channelOverlay = $("channelOverlay");
    const channelClose = $("channelClose");
    const goChannel = $("goChannel");
    const brandLogoBtn = $("brandLogoBtn");

    function lockBody(lock){ document.body.style.overflow = lock ? "hidden" : ""; }

    function openChannel(){
      channelOverlay.classList.add("show");
      channelOverlay.setAttribute("aria-hidden", "false");
      lockBody(true);
    }
    function closeChannel(){
      channelOverlay.classList.remove("show");
      channelOverlay.setAttribute("aria-hidden", "true");
      lockBody(false);
    }

    brandLogoBtn.addEventListener("click", openChannel);
    channelClose.addEventListener("click", closeChannel);
    channelOverlay.addEventListener("click", (e) => { if (e.target === channelOverlay) closeChannel(); });
    goChannel.addEventListener("click", () => openTelegramLinkSafe(TG_CHANNEL_URL));

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && channelOverlay.classList.contains("show")) closeChannel();
    });

    window.addEventListener("load", async () => {
      const img = $("customPoster");
      if (!img.getAttribute("src")) img.style.display = "none";
      await refreshProfile();
    });
  </script>
</body>
</html>
