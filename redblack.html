<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Red & Black</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07050d;
      --stroke: rgba(166, 77, 255, 0.35);
      --history-height: 58px;
      --panel-side: 24px;
      --panel-width: 410px;
      --safe-bottom: env(safe-area-inset-bottom);
      --track-width: min(92vw, 470px);
      --tile-width: 92px;
      --tile-height: 58px;
      --tile-gap: 10px;
      --visible-height: 116px;
      --red-1: #ff6f82;
      --red-2: #ef3155;
      --red-3: #85172f;
      --black-1: #737888;
      --black-2: #2c303b;
      --black-3: #0d1017;
      --green-1: #89ff9e;
      --green-2: #20d66f;
      --green-3: #0a7f3e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background: var(--bg);
      color: #fff;
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    button,
    input {
      font: inherit;
      touch-action: manipulation;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .game {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 41, 88, 0.12), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(141, 42, 255, 0.18), transparent 42%),
        linear-gradient(180deg, #08050f 0%, #160020 52%, #0b0811 100%);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 20%, rgba(160, 44, 255, 0.14), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.05), transparent 18%);
    }

    .preloader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, #040404 0%, #111111 38%, #1b1b1b 62%, #070707 100%);
      color: #fff;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .42s ease, visibility .42s ease;
    }

    .preloader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .preloader::before,
    .preloader::after {
      content: "";
      position: absolute;
      z-index: 0;
      width: 420px;
      height: 420px;
      border-radius: 46% 54% 58% 42% / 42% 46% 54% 58%;
      filter: blur(44px);
      opacity: .34;
      pointer-events: none;
    }

    .preloader::before {
      left: -110px;
      top: -70px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.08), rgba(82,82,82,.28) 42%, rgba(22,22,22,.04) 76%);
      animation: lavaBlobOne 6.4s ease-in-out infinite alternate;
    }

    .preloader::after {
      right: -120px;
      bottom: -90px;
      width: 470px;
      height: 470px;
      background: radial-gradient(circle at 55% 45%, rgba(255,255,255,.06), rgba(96,96,96,.24) 40%, rgba(18,18,18,.03) 76%);
      animation: lavaBlobTwo 7.2s ease-in-out infinite alternate;
    }

    .preloader-inner {
      position: relative;
      z-index: 2;
      width: min(74vw, 300px);
      display: grid;
      justify-items: center;
      transform: translateY(-4px);
      animation: preloaderIn .36s ease both;
    }

    .preloader-logo {
      width: 154px;
      max-width: 54vw;
      height: auto;
      display: block;
      object-fit: contain;
      transform-origin: center bottom;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.48));
      animation: logoJump 1.18s ease-in-out infinite;
    }

    .loader-line {
      width: min(220px, 68vw);
      height: 4px;
      margin-top: 22px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
    }

    .loader-line span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, #5f2cff 0%, #9d4dff 45%, #d946ef 100%);
      box-shadow: 0 0 14px rgba(157,77,255,.28);
      animation: cleanLine 2.05s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 16px;
      z-index: 45;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .balance {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 12px;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 0 10px rgba(255,255,255,.08);
      pointer-events: auto;
    }

    .wallet {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    .wallet path,
    .wallet circle {
      fill: currentColor;
    }

    .reel-zone {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 50dvh;
      min-height: 320px;
      padding: 58px 16px 0;
      display: grid;
      align-items: center;
      justify-items: center;
    }

    .reel-shell {
      position: relative;
      width: var(--track-width);
      min-height: 176px;
      display: grid;
      place-items: center;
      padding-top: 14px;
    }

    .grid-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(80vw, 420px);
      height: min(54vw, 230px);
      transform: translate(-50%, -50%);
      opacity: .28;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.11) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black 38%, transparent 74%);
      -webkit-mask-image: radial-gradient(circle, black 38%, transparent 74%);
    }

    .reel-window {
      position: relative;
      width: 100%;
      height: var(--visible-height);
      overflow: hidden;
      isolation: isolate;
      contain: layout paint;
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid rgba(171, 103, 255, .38);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(39,29,58,.96), rgba(16,12,25,.99));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.05), inset 0 10px 20px rgba(255,255,255,.03), 0 18px 40px rgba(0,0,0,.44), 0 0 26px rgba(140,35,255,.16);
    }

    .reel-window::before,
    .reel-window::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 3;
      pointer-events: none;
    }

    .reel-window::before {
      left: 0;
      background: linear-gradient(90deg, rgba(17,12,27,.98), rgba(17,12,27,.58) 44%, rgba(17,12,27,0));
    }

    .reel-window::after {
      right: 0;
      background: linear-gradient(270deg, rgba(17,12,27,.98), rgba(17,12,27,.58) 44%, rgba(17,12,27,0));
    }

    .center-highlight {
      position: absolute;
      top: 10px;
      bottom: 10px;
      left: 50%;
      width: calc(var(--tile-width) + 16px);
      transform: translateX(-50%);
      z-index: 4;
      pointer-events: none;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06), 0 0 24px rgba(157,77,255,.16), 0 10px 18px rgba(0,0,0,.16);
    }

    .reel-track {
      position: absolute;
      left: 0;
      top: 50%;
      display: flex;
      gap: var(--tile-gap);
      align-items: center;
      transform: translate3d(0, -50%, 0);
      will-change: auto;
      contain: layout paint style;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .reel-window.is-spinning .reel-track,
    .reel-window.is-idle .reel-track {
      will-change: transform;
    }

    .tile {
      width: var(--tile-width);
      height: var(--tile-height);
      flex: 0 0 auto;
      border: 0;
      border-radius: 11px;
      box-shadow: inset 0 1px 2px rgba(255,255,255,.10), inset 0 -4px 8px rgba(0,0,0,.22), 0 7px 16px rgba(0,0,0,.18);
      transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      contain: layout paint style;
    }

    .tile.red {
      background: linear-gradient(180deg, var(--red-1) 0%, var(--red-2) 58%, var(--red-3) 100%);
    }

    .tile.black {
      background: linear-gradient(180deg, var(--black-1) 0%, var(--black-2) 58%, var(--black-3) 100%);
    }

    .tile.green {
      background: linear-gradient(180deg, var(--green-1) 0%, var(--green-2) 58%, var(--green-3) 100%);
    }

    .controls,
    .history-panel {
      position: fixed;
      left: var(--panel-side);
      right: var(--panel-side);
      width: min(calc(100% - (var(--panel-side) * 2)), var(--panel-width));
      margin: 0 auto;
    }

    .controls {
      bottom: calc(var(--history-height) + var(--safe-bottom) + 34px);
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .bet-panel,
    .history-panel {
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(34,27,52,.94), rgba(22,15,34,.94));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.44), 0 0 22px rgba(140,35,255,.14);
    }

    .bet-panel {
      min-height: 132px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 10px;
      border-radius: 17px;
    }

    .stake-side {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr 36px;
      gap: 8px;
    }

    .stake-box {
      position: relative;
      min-height: 68px;
      display: flex;
      align-items: center;
      padding: 10px 40px 10px 12px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(50,47,83,.98), rgba(43,39,70,.98));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.035);
    }

    .amount {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: clamp(21px, 5.6vw, 28px);
      font-weight: 700;
      letter-spacing: -0.06em;
    }

    .amount::placeholder {
      color: rgba(255,255,255,.45);
    }

    .pm {
      position: absolute;
      right: 9px;
      width: 28px;
      height: 25px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(61,51,91,.96), rgba(29,21,48,.96));
      color: #d3baff;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }

    .pm.plus {
      top: 7px;
    }

    .pm.minus {
      bottom: 7px;
    }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .quick {
      min-height: 36px;
      border: 1px solid rgba(255,255,255,.055);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(42,34,67,.96), rgba(29,23,47,.96));
      color: rgba(226,204,255,.90);
      font-size: 17px;
      line-height: 1;
      font-weight: 700;
    }

    .choice-side {
      min-width: 0;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
    }

    .choice {
      position: relative;
      isolation: isolate;
      width: 100%;
      min-height: 34px;
      padding: 8px 10px 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      overflow: hidden;
      border-radius: 12px;
      color: #fff;
      font-size: clamp(12px, 3.3vw, 15px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: .01em;
      text-shadow: 0 1px 8px rgba(0,0,0,.18);
      transform: translateZ(0);
      transition: transform .12s ease, filter .12s ease, opacity .12s ease, box-shadow .12s ease;
    }

    .choice::before {
      content: "";
      position: absolute;
      inset: 1px;
      z-index: -1;
      pointer-events: none;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0) 48%);
      opacity: .8;
    }

    .choice.red {
      border: 1px solid rgba(255,136,155,.96);
      background: linear-gradient(90deg, rgba(255,255,255,.18), transparent 32%), linear-gradient(180deg, #ff6f83, #ff2c54 58%, #8f1534);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.30), inset 0 -6px 10px rgba(113,14,41,.34), 0 0 18px rgba(255,82,118,.28);
    }

    .choice.black {
      border: 1px solid rgba(210,214,232,.24);
      background: linear-gradient(90deg, rgba(255,255,255,.08), transparent 30%), linear-gradient(180deg, #505363, #1b1d28 58%, #090a10);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.16), inset 0 -6px 10px rgba(0,0,0,.40), 0 0 16px rgba(206,214,246,.10);
    }

    .choice.green {
      border: 1px solid rgba(166,255,192,.96);
      background: linear-gradient(90deg, rgba(255,255,255,.20), transparent 28%), linear-gradient(180deg, #81ff9a, #19cd68 56%, #0a8440);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.30), inset 0 -6px 10px rgba(8,111,60,.34), 0 0 18px rgba(40,255,125,.24);
    }

    .choice small {
      display: block;
      margin-top: 3px;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(255,255,255,.15);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.10);
      font-size: 10px;
      opacity: .98;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .choice.selected {
      transform: scale(1.035) translateZ(0);
      filter: brightness(1.08) saturate(1.08);
      z-index: 2;
    }

    .choice.red.selected {
      border-color: rgba(255, 228, 234, .98);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.34), inset 0 -5px 10px rgba(113,14,41,.34), 0 0 0 2px rgba(255,70,106,.20), 0 0 24px rgba(255,70,106,.58);
    }

    .choice.black.selected {
      border-color: rgba(240,243,255,.88);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.20), inset 0 -5px 10px rgba(0,0,0,.42), 0 0 0 2px rgba(205,214,255,.13), 0 0 22px rgba(188,199,255,.34);
    }

    .choice.green.selected {
      border-color: rgba(226,255,234,.98);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.34), inset 0 -5px 10px rgba(8,111,60,.34), 0 0 0 2px rgba(55,255,130,.18), 0 0 24px rgba(55,255,130,.48);
    }

    .choice:active,
    .quick:active,
    .pm:active {
      transform: scale(.97);
      filter: brightness(.93);
    }

    .choice:disabled,
    .quick:disabled,
    .pm:disabled,
    .amount:disabled {
      cursor: default;
    }

    .history-panel {
      bottom: max(18px, calc(var(--safe-bottom) + 10px));
      z-index: 14;
      padding: 6px 8px;
      border-color: rgba(166,77,255,.18);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(27,21,41,.94), rgba(16,12,25,.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 12px 28px rgba(0,0,0,.30), 0 0 16px rgba(140,35,255,.10);
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .history-title {
      color: rgba(255,255,255,.82);
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .history-list {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 1px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .history-list::-webkit-scrollbar {
      display: none;
    }

    .history-empty {
      width: 100%;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px dashed rgba(255,255,255,.08);
      border-radius: 10px;
      color: rgba(255,255,255,.44);
      font-size: 10px;
      font-weight: 600;
      text-align: center;
    }

    .history-chip {
      min-width: 20px;
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
      display: block;
      border: 0;
      border-radius: 5px;
      font-size: 0;
      color: transparent;
      text-shadow: none;
      box-shadow: inset 0 1px 2px rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.20), 0 4px 9px rgba(0,0,0,.16);
    }

    .history-chip.red {
      background: linear-gradient(180deg, var(--red-1), var(--red-2) 58%, var(--red-3));
    }

    .history-chip.black {
      background: linear-gradient(180deg, var(--black-1), var(--black-2) 58%, var(--black-3));
    }

    .history-chip.green {
      background: linear-gradient(180deg, var(--green-1), var(--green-2) 58%, var(--green-3));
    }

    .history-chip.newest {
      animation: historyChipIn 420ms cubic-bezier(.18,.88,.25,1);
      transform-origin: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 220px;
      z-index: 40;
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 8px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(28,21,43,.96), rgba(14,10,24,.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 20px rgba(140,35,255,.16);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 10px) scale(.98);
      transition: opacity .20s ease, transform .20s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .toast-icon {
      width: 24px;
      height: 24px;
      min-width: 24px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: #fff;
    }

    .toast-icon svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .toast.win {
      border-color: rgba(38,255,120,.34);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 22px rgba(38,255,120,.22);
    }

    .toast.win .toast-icon {
      background: linear-gradient(180deg, #31ff86, #089e45);
      box-shadow: 0 0 14px rgba(38,255,120,.40);
    }

    .toast.lose {
      border-color: rgba(255,59,59,.34);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 22px rgba(255,59,59,.22);
    }

    .toast.lose .toast-icon {
      background: linear-gradient(180deg, #ff5a5a, #b80f23);
      box-shadow: 0 0 14px rgba(255,59,59,.40);
    }

    .toast.error .toast-icon,
    .toast.info .toast-icon {
      background: linear-gradient(180deg, #b35cff, #6a1fd0);
      box-shadow: 0 0 14px rgba(179,92,255,.34);
    }

    @keyframes logoJump {
      0%, 100% { transform: translateY(0) scale(1); }
      42% { transform: translateY(-8px) scale(1.025); }
      64% { transform: translateY(0) scale(.995); }
    }

    @keyframes cleanLine {
      0% { transform: scaleX(0); }
      72% { transform: scaleX(.84); }
      100% { transform: scaleX(1); }
    }

    @keyframes preloaderIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(-4px) scale(1); }
    }

    @keyframes lavaBlobOne {
      0% { transform: translate3d(0, 0, 0) scale(1); border-radius: 46% 54% 58% 42% / 42% 46% 54% 58%; }
      100% { transform: translate3d(90px, 70px, 0) scale(1.18); border-radius: 58% 42% 47% 53% / 55% 40% 60% 45%; }
    }

    @keyframes lavaBlobTwo {
      0% { transform: translate3d(0, 0, 0) scale(1); border-radius: 52% 48% 44% 56% / 46% 58% 42% 54%; }
      100% { transform: translate3d(-95px, -85px, 0) scale(1.16); border-radius: 42% 58% 55% 45% / 60% 44% 56% 40%; }
    }

    @keyframes historyChipIn {
      0% { opacity: 0; transform: translateY(-8px) scale(.82); }

<body>

          <path d="M16.5 10.9H39.4C42.68 10.9 45.35 13.57 45.35 16.85V17.7H17.1C13.92 17.7 12 15.92 12 15.92C12.78 12.98 14.38 10.9 16.5 10.9Z"/>

          <button class="choice black" data-choice="black" type="button">Чёрное<small>x2</small></button>
          <button class="choice green" data-choice="green" type="button">Зелёное<small>x14</small></button>

          <path d="M12 16.2H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5Z" stroke="currentColor" stroke-width="2"/>

  <script>
    const amountInput = document.getElementById('amount');
    const balanceEl = document.getElementById('balance');
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const controls = document.querySelector('.controls');
    const choiceButtons = [...document.querySelectorAll('.choice')];
    const reelWindow = document.getElementById('reelWindow');
    const reelTrack = document.getElementById('reelTrack');
    const plusBtn = document.getElementById('plusBtn');
    const minusBtn = document.getElementById('minusBtn');
    const halfBtn = document.getElementById('halfBtn');
    const doubleBtn = document.getElementById('doubleBtn');
    const stakeButtons = [plusBtn, minusBtn, halfBtn, doubleBtn];

    const PRELOADER_STARTED_AT = Date.now();
    const PRELOADER_MIN_MS = 2200;
    const RUB_FORMATTER = new Intl.NumberFormat('ru-RU', {
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    });
    const REDBLACK_API_URL = 'https://xcsjedwhqcrwdzmuahjl.supabase.co/functions/v1/redblack';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2plZHdocWNyd2R6bXVhaGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzk0ODYsImV4cCI6MjA5Mzg1NTQ4Nn0.M2ksKeWwDt0BQxgjxpGhLKLMNP_ve1dcZvQ0Ix88Ock';
    const tg = window.Telegram?.WebApp || null;

    try {
      tg?.ready?.();
      tg?.expand?.();
    } catch (_error) {}

    const REEL_SYMBOLS = ['red', 'black', 'red', 'black', 'red', 'black', 'green', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black'];
    const CHOICE_LABELS = { red: 'Красное', black: 'Чёрное', green: 'Зелёное' };
    let CHOICE_MULTIPLIERS = { red: 2, black: 2, green: 14 };

    let balance = 0;
    let minBet = 8;
    let maxBet = 10000;
    let isSpinning = false;
    let historyResults = [];
    let lastChoice = 'red';
    let currentTrackX = 0;
    let tileStep = 82;
    let currentCenteredIndex = 60;
    let pendingLayoutRefresh = false;
    let idleActive = false;
    let idleFrame = null;
    let idleStartTimer = null;
    let idleLastTime = 0;
    let idlePixelCarry = 0;

    function hidePreloader() {
      const preloader = document.getElementById('preloader');
      if (!preloader) return;
      const elapsed = Date.now() - PRELOADER_STARTED_AT;
      const wait = Math.max(0, PRELOADER_MIN_MS - elapsed);
      setTimeout(() => {
        preloader.classList.add('hidden');
        setTimeout(() => preloader.remove(), 360);
      }, wait);
    }

    function formatRub(value) {
      const number = Math.floor(Number(value || 0));
      return RUB_FORMATTER.format(number) + ' ₽';
    }

    function updateBalance(value = balance) {
      balance = Math.floor(Number(value || 0));
      balanceEl.textContent = formatRub(balance);
    }

    function getTelegramInitData() {
      return tg?.initData || '';
    }

    async function redblackApi(payload) {
      const initData = getTelegramInitData();

      if (!initData) {
        throw new Error('Откройте игру через Telegram');
      }

      const response = await fetch(REDBLACK_API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
          apikey: SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ ...payload, initData })
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok || data.ok === false || data.error) {
        throw new Error(data.error || 'Ошибка игры');
      }

      return data;
    }

    function formatMultiplier(value) {
      const numberValue = Number(value || 0);
      if (!Number.isFinite(numberValue)) return '0';
      return String(Math.round(numberValue * 100) / 100).replace(/\.00$/, '');
    }

    function normalizeHistoryResult(item) {
      const value = typeof item === 'string' ? item : item?.result;
      const result = String(value || '').trim().toLowerCase();
      return CHOICE_LABELS[result] ? result : null;
    }

    function applyServerState(data, withHistory = true) {
      if (!data || typeof data !== 'object') return;

      const serverBalance = Number(data.balance ?? data.balance_after);
      if (Number.isFinite(serverBalance)) updateBalance(serverBalance);

      const serverMinBet = Math.floor(Number(data.min_bet ?? minBet));
      const serverMaxBet = Math.floor(Number(data.max_bet ?? maxBet));

      if (Number.isFinite(serverMinBet) && serverMinBet > 0) minBet = serverMinBet;
      if (Number.isFinite(serverMaxBet) && serverMaxBet >= minBet) maxBet = serverMaxBet;

      const ordinaryMultiplier = Number(data.multiplier ?? CHOICE_MULTIPLIERS.red);
      if (Number.isFinite(ordinaryMultiplier) && ordinaryMultiplier > 1) {
        CHOICE_MULTIPLIERS.red = ordinaryMultiplier;
        CHOICE_MULTIPLIERS.black = ordinaryMultiplier;
      }
      CHOICE_MULTIPLIERS.green = 14;

      const redCoef = document.querySelector('.choice.red small');
      const blackCoef = document.querySelector('.choice.black small');
      const greenCoef = document.querySelector('.choice.green small');
      if (redCoef) redCoef.textContent = 'x' + formatMultiplier(CHOICE_MULTIPLIERS.red);
      if (blackCoef) blackCoef.textContent = 'x' + formatMultiplier(CHOICE_MULTIPLIERS.black);
      if (greenCoef) greenCoef.textContent = 'x14';

      if (withHistory && Array.isArray(data.history)) {
        historyResults = data.history.map(normalizeHistoryResult).filter(Boolean).slice(0, 10);
        renderHistory();
      }

      const currentAmount = getAmount();
      if (!currentAmount || currentAmount < minBet || currentAmount > maxBet) {
        setAmount(Math.min(maxBet, Math.max(minBet, currentAmount || minBet)), false);
      }
    }

    async function loadState(showError = false) {
      try {
        const data = await redblackApi({ action: 'state' });
        applyServerState(data, true);
      } catch (error) {
        if (showError) showToast(error.message || 'Ошибка загрузки баланса', 'error');
      }
    }

    function getAmount() {
      const raw = amountInput.value.replace(/[^0-9]/g, '');
      const num = parseInt(raw, 10);
      return Number.isFinite(num) ? Math.floor(num) : 0;
    }

    function setAmount(value, notifyLimit = true) {
      const numericValue = Number(value || 0);

      if (notifyLimit && numericValue < minBet) {
        showToast('Минимальная ставка 8 ₽', 'info');
      }

      if (notifyLimit && numericValue > maxBet) {
        showToast('Максимальная ставка 10 000 ₽', 'info');
      }

      const normalized = Math.floor(Math.min(maxBet, Math.max(minBet, numericValue)));
      amountInput.value = normalized + ' ₽';
      updatePossibleWin(lastChoice);
    }

    function updatePossibleWin(choice = lastChoice) {
      lastChoice = choice;
    }

    function selectChoice(choice) {
      choiceButtons.forEach((button) => {
        button.classList.toggle('selected', button.dataset.choice === choice);
      });
    }

    function flashRejectedChoice(choice, delay = 1300) {
      selectChoice(choice);
      clearTimeout(flashRejectedChoice.timer);
      flashRejectedChoice.timer = setTimeout(() => {
        selectChoice(null);
      }, delay);
    }

    function applyTrackTransform() {
      reelTrack.style.transform = `translate3d(${currentTrackX}px, -50%, 0)`;
    }

    function stopIdleMode() {
      if (idleStartTimer) {
        clearTimeout(idleStartTimer);
        idleStartTimer = null;
      }
      if (idleFrame) {
        cancelAnimationFrame(idleFrame);
        idleFrame = null;
      }
      idleActive = false;
      reelWindow.classList.remove('is-idle');
    }

    function idleTick(timestamp) {
      if (!idleActive || isSpinning) return;
      if (!idleLastTime) idleLastTime = timestamp;

      const delta = Math.min(34, timestamp - idleLastTime || 16);
      idleLastTime = timestamp;
      const speedPerMs = 0.03;
      const deltaX = delta * speedPerMs;

      currentTrackX -= deltaX;
      idlePixelCarry += deltaX;

      if (idlePixelCarry >= tileStep) {
        const steps = Math.floor(idlePixelCarry / tileStep);
        idlePixelCarry -= steps * tileStep;
        currentCenteredIndex += steps;
        ensureTrackCapacity(currentCenteredIndex + 120);
        recycleTrackIfNeeded();
      }

      applyTrackTransform();
      idleFrame = requestAnimationFrame(idleTick);
    }

    function startIdleMode() {
      if (idleActive || isSpinning) return;
      measureTrack();
      idleActive = true;
      idleLastTime = 0;
      idlePixelCarry = 0;
      reelWindow.classList.add('is-idle');
      idleFrame = requestAnimationFrame(idleTick);
    }

    function scheduleIdleMode(delay = 1400) {
      stopIdleMode();
      if (isSpinning) return;
      idleStartTimer = setTimeout(() => {
        idleStartTimer = null;
        startIdleMode();
      }, delay);
    }

    function updateHistoryPosition() {
      const historyHeight = historyPanel.offsetHeight;
      document.documentElement.style.setProperty('--history-height', historyHeight + 'px');
    }

    function placeToastAbovePanel() {
      const rect = controls.getBoundingClientRect();
      const bottom = window.innerHeight - rect.top + 10;
      toast.style.bottom = bottom + 'px';
    }

    function getToastIcon(type) {
      if (type === 'win') {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.6L9.3 16.8L19 7.2" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      if (type === 'lose') {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>';
      }
      return '<svg viewBox="0 0 24 24" fill="none"><path d="M12 8.2V12.6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M12 16.2H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5Z" stroke="currentColor" stroke-width="2"/></svg>';
    }

    function showToast(text, type = 'info') {
      toastText.textContent = text;
      toastIcon.innerHTML = getToastIcon(type);
      toast.className = 'toast ' + type;
      placeToastAbovePanel();
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function renderHistory() {
      if (!historyResults.length) {
        historyList.innerHTML = '<div class="history-empty">Пока ещё не было выпадений</div>';
      } else {
        historyList.innerHTML = historyResults.map((item, index) => `
          <div class="history-chip ${item}${index === 0 ? ' newest' : ''}" aria-label="${CHOICE_LABELS[item]}"></div>
        `).join('');
      }
      updateHistoryPosition();
      if (toast.classList.contains('show')) placeToastAbovePanel();
    }

    function addHistoryResult(result) {
      historyResults.unshift(result);
      historyResults = historyResults.slice(0, 10);
      renderHistory();
    }

    function setBusy(isBusy) {
      isSpinning = isBusy;
      choiceButtons.forEach((button) => {
        button.disabled = isBusy;
        button.style.opacity = isBusy
          ? (button.classList.contains('selected') ? '1' : '0.48')
          : '';
        button.style.pointerEvents = isBusy ? 'none' : '';
      });
      amountInput.disabled = isBusy;
      stakeButtons.forEach((button) => { button.disabled = isBusy; });
    }

    function createTileMarkup(type) {
      return `<div class="tile ${type}" data-type="${type}"></div>`;
    }

    function appendTrackRepeats(repeatCount = 20) {
      const fragment = [];
      for (let i = 0; i < repeatCount; i++) fragment.push(...REEL_SYMBOLS);
      reelTrack.insertAdjacentHTML('beforeend', fragment.map(createTileMarkup).join(''));
    }

    function measureTrack() {
      const firstTile = reelTrack.querySelector('.tile');
      if (!firstTile) return;
      const gap = parseFloat(getComputedStyle(reelTrack).gap) || 0;
      tileStep = firstTile.offsetWidth + gap;
    }

    function positionCurrentTile(animate = false) {
      const firstTile = reelTrack.querySelector('.tile');
      if (!firstTile) return;
      measureTrack();
      const centerX = reelWindow.clientWidth / 2;
      currentTrackX = centerX - (currentCenteredIndex * tileStep + firstTile.offsetWidth / 2);
      reelTrack.style.transition = animate ? 'transform 180ms ease' : 'none';
      applyTrackTransform();
    }

    function buildTrack() {
      reelTrack.innerHTML = '';
      appendTrackRepeats(14);
      currentCenteredIndex = 60;
      positionCurrentTile(false);
    }

    function ensureTrackCapacity(requiredIndex) {
      while (reelTrack.children.length <= requiredIndex + 60) {
        appendTrackRepeats(8);
      }
    }

    function recycleTrackIfNeeded() {
      const keepBefore = 60;
      if (currentCenteredIndex <= 120) return;

      const removeCount = currentCenteredIndex - keepBefore;
      reelTrack.style.transition = 'none';

      for (let i = 0; i < removeCount; i++) {
        reelTrack.firstElementChild?.remove();
      }

      currentCenteredIndex -= removeCount;
      currentTrackX += removeCount * tileStep;
      applyTrackTransform();
      ensureTrackCapacity(currentCenteredIndex + 120);
    }

    function findNextIndex(resultType) {
      const minIndex = currentCenteredIndex + 38 + Math.floor(Math.random() * 16);
      ensureTrackCapacity(minIndex + REEL_SYMBOLS.length * 3);
      const tiles = reelTrack.children;

      for (let i = minIndex; i < tiles.length; i++) {
        if (tiles[i].dataset.type === resultType) return i;
      }

      appendTrackRepeats(8);
      return findNextIndex(resultType);
    }

    function spinToResult(resultType, callback) {
      const tiles = reelTrack.children;
      if (!tiles.length) return;

      measureTrack();
      const tileWidth = tiles[0].offsetWidth;
      const targetIndex = findNextIndex(resultType);
      const centerX = reelWindow.clientWidth / 2;
      const targetX = centerX - (targetIndex * tileStep + tileWidth / 2);
      const overshootX = targetX - Math.max(12, tileWidth * 0.14);

      reelWindow.classList.add('is-spinning');
      reelTrack.style.transition = 'transform 5.45s cubic-bezier(.07,.78,.12,1)';
      reelTrack.style.transform = `translate3d(${overshootX}px, -50%, 0)`;

      setTimeout(() => {
        reelTrack.style.transition = 'transform 420ms cubic-bezier(.20,1,.32,1)';
        reelTrack.style.transform = `translate3d(${targetX}px, -50%, 0)`;
      }, 5470);

      currentCenteredIndex = targetIndex;
      currentTrackX = targetX;

      setTimeout(() => {
        reelWindow.classList.remove('is-spinning');
        callback();
      }, 5920);
    }

    async function settleRound(choice) {
      const bet = Math.floor(getAmount());
      if (bet < minBet) {
        showToast('Минимальная ставка ' + formatRub(minBet), 'error');
        flashRejectedChoice(choice);
        return;
      }
      if (bet > maxBet) {
        showToast('Максимальная ставка ' + formatRub(maxBet), 'error');
        flashRejectedChoice(choice);
        return;
      }
      if (bet > balance) {
        showToast('Недостаточно средств', 'error');
        flashRejectedChoice(choice);
        return;
      }

      stopIdleMode();
      setBusy(true);
      balance -= bet;
      updateBalance(balance);
      showToast('Ставка ' + formatRub(bet) + ' на ' + CHOICE_LABELS[choice], 'info');

      let data;
      try {
        data = await redblackApi({ action: 'play', choice, bet });
      } catch (error) {
        balance += bet;
        updateBalance(balance);
        showToast(error.message || 'Ошибка игры', 'error');
        flashRejectedChoice(choice);
        setTimeout(() => {
          setBusy(false);
          scheduleIdleMode(1200);
        }, 320);
        loadState(false);
        return;
      }

      applyServerState({ ...data, balance: undefined, balance_after: undefined }, false);

      const result = normalizeHistoryResult(data.result) || 'red';
      const isWin = data.is_win === true;
      const payout = Number(data.payout_amount || 0);
      const profit = Number(data.profit_amount || 0);

      spinToResult(result, () => {
        if (isWin) {
          showToast('Выигрыш ' + formatRub(payout) + ' • Чистыми +' + formatRub(Math.max(0, profit)), 'win');
        } else {
          showToast('Проигрыш • Списано ' + formatRub(bet), 'lose');
        }

        updateBalance(Number(data.balance_after ?? data.balance ?? balance));
        addHistoryResult(result);
        recycleTrackIfNeeded();

        if (pendingLayoutRefresh) {
          pendingLayoutRefresh = false;
          positionCurrentTile(false);
        }

        selectChoice(null);
        setTimeout(() => {
          setBusy(false);
          scheduleIdleMode(1200);
        }, 320);
      });
    }

    plusBtn.addEventListener('click', () => setAmount(getAmount() + 1));
    minusBtn.addEventListener('click', () => setAmount(getAmount() - 1));
    halfBtn.addEventListener('click', () => setAmount(getAmount() / 2));
    doubleBtn.addEventListener('click', () => setAmount(getAmount() * 2));

    amountInput.addEventListener('focus', () => { amountInput.value = String(Math.floor(getAmount())); });
    amountInput.addEventListener('input', () => updatePossibleWin(lastChoice));
    amountInput.addEventListener('blur', () => setAmount(getAmount()));

    choiceButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const choice = btn.dataset.choice;
        if (isSpinning) return;
        selectChoice(choice);
        updatePossibleWin(choice);
        settleRound(choice);
      });
    });

    window.addEventListener('resize', () => {
      updateHistoryPosition();
      placeToastAbovePanel();

      if (isSpinning) {
        pendingLayoutRefresh = true;
      } else {
        const wasIdle = idleActive;
        stopIdleMode();
        positionCurrentTile(false);
        if (wasIdle) scheduleIdleMode(300);
      }
    });

    const preventGesture = (event) => event.preventDefault();

    document.addEventListener('gesturestart', preventGesture, { passive: false });
    document.addEventListener('gesturechange', preventGesture, { passive: false });
    document.addEventListener('gestureend', preventGesture, { passive: false });
    document.addEventListener('dblclick', preventGesture, { passive: false });
    document.addEventListener('touchmove', (event) => {
      if (event.touches.length > 1 || !event.target.closest('input')) {
        event.preventDefault();
      }
    }, { passive: false });

    updateBalance(balance);
    setAmount(16, false);
    renderHistory();
    requestAnimationFrame(() => {
      buildTrack();
      updateHistoryPosition();
      placeToastAbovePanel();
      loadState(true).finally(() => {
        hidePreloader();
        scheduleIdleMode(1800);
      });
    });
  </script>
</body>
</html>
