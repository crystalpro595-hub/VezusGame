<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Red & Black</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07050d;
      --stroke: rgba(166, 77, 255, 0.35);
      --history-height: 58px;
      --panel-side: 24px;
      --panel-width: 410px;
      --safe-bottom: env(safe-area-inset-bottom);
      --track-width: min(92vw, 470px);
      --tile-size: 72px;
      --tile-gap: 10px;
      --visible-height: 116px;
      --red-1: #ff6767;
      --red-2: #ff2b52;
      --red-3: #911534;
      --black-1: #4f5060;
      --black-2: #1b1c27;
      --black-3: #0b0c12;
      --green-1: #85ff97;
      --green-2: #1fd76e;
      --green-3: #0a8440;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    button, input { font: inherit; }
    button { border: 0; cursor: pointer; }

    .game {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 41, 88, 0.12), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(141, 42, 255, 0.18), transparent 42%),
        linear-gradient(180deg, #08050f 0%, #160020 52%, #0b0811 100%);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 20%, rgba(160, 44, 255, 0.14), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.05), transparent 18%);
    }

    .preloader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, #040404 0%, #111111 38%, #1b1b1b 62%, #070707 100%);
      color: #fff;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .42s ease, visibility .42s ease;
    }

    .preloader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .preloader::before,
    .preloader::after {
      content: "";
      position: absolute;
      z-index: 0;
      width: 420px;
      height: 420px;
      border-radius: 46% 54% 58% 42% / 42% 46% 54% 58%;
      filter: blur(44px);
      opacity: .34;
      pointer-events: none;
      will-change: transform, border-radius;
    }

    .preloader::before {
      left: -110px;
      top: -70px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.08), rgba(82,82,82,.28) 42%, rgba(22,22,22,.04) 76%);
      animation: lavaBlobOne 6.4s ease-in-out infinite alternate;
    }

    .preloader::after {
      right: -120px;
      bottom: -90px;
      width: 470px;
      height: 470px;
      background: radial-gradient(circle at 55% 45%, rgba(255,255,255,.06), rgba(96,96,96,.24) 40%, rgba(18,18,18,.03) 76%);
      animation: lavaBlobTwo 7.2s ease-in-out infinite alternate;
    }

    .preloader-inner {
      position: relative;
      z-index: 2;
      width: min(74vw, 300px);
      display: grid;
      justify-items: center;
      transform: translateY(-4px);
      animation: preloaderIn .36s ease both;
    }

    .preloader-logo {
      width: 154px;
      max-width: 54vw;
      height: auto;
      display: block;
      object-fit: contain;
      transform-origin: center bottom;
      user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.48));
      animation: logoJump 1.18s ease-in-out infinite;
    }

    .loader-line {
      width: min(220px, 68vw);
      height: 4px;
      margin-top: 22px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
    }

    .loader-line span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, #5f2cff 0%, #9d4dff 45%, #d946ef 100%);
      box-shadow: 0 0 14px rgba(157,77,255,.28);
      animation: cleanLine 2.05s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 16px;
      z-index: 45;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .balance {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 12px;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 0 10px rgba(255,255,255,.08);
      pointer-events: auto;
    }

    .wallet {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    .wallet path,
    .wallet circle { fill: currentColor; }

    .reel-zone {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 50vh;
      min-height: 320px;
      padding: 58px 16px 0;
      display: grid;
      align-items: center;
      justify-items: center;
    }

    .reel-shell {
      position: relative;
      width: var(--track-width);
      min-height: 176px;
      display: grid;
      place-items: center;
    }

    .grid-glow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(80vw, 420px);
      height: min(54vw, 230px);
      transform: translate(-50%, -50%);
      opacity: .28;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.11) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black 38%, transparent 74%);
      -webkit-mask-image: radial-gradient(circle, black 38%, transparent 74%);
    }

    .result-badge {
      position: absolute;
      top: 4px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 112px;
      min-height: 34px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(29,22,44,.94), rgba(12,9,22,.98));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 12px 24px rgba(0,0,0,.28), 0 0 18px rgba(140,35,255,.12);
      color: rgba(255,255,255,.94);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    .result-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      box-shadow: 0 0 10px currentColor;
    }

    .result-dot.red { color: #ff4b67; background: currentColor; }
    .result-dot.black { color: #a9adbc; background: currentColor; }
    .result-dot.green { color: #3ff08b; background: currentColor; }

    .pointer {
      position: absolute;
      left: 50%;
      top: 38px;
      transform: translateX(-50%);
      z-index: 4;
      width: 34px;
      height: 24px;
      clip-path: polygon(50% 100%, 0 0, 100% 0);
      background: linear-gradient(180deg, #fff, #cfb6ff 68%, #8b53ff);
      filter: drop-shadow(0 4px 10px rgba(157,77,255,.36));
    }

    .reel-window {
      position: relative;
      width: 100%;
      height: var(--visible-height);
      overflow: hidden;
      border: 1px solid var(--stroke);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(34,27,52,.94), rgba(16,12,25,.98));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.44), 0 0 22px rgba(140,35,255,.14);
    }

    .reel-window::before,
    .reel-window::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 48px;
      z-index: 3;
      pointer-events: none;
    }

    .reel-window::before {
      left: 0;
      background: linear-gradient(90deg, rgba(17,12,27,.96), rgba(17,12,27,0));
    }

    .reel-window::after {
      right: 0;
      background: linear-gradient(270deg, rgba(17,12,27,.96), rgba(17,12,27,0));
    }

    .reel-window .center-highlight {
      position: absolute;
      top: 7px;
      bottom: 7px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(var(--tile-size) + 16px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.01));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 0 24px rgba(157,77,255,.10);
      pointer-events: none;
      z-index: 2;
    }

    .reel-track {
      position: absolute;
      left: 0;
      top: 50%;
      display: flex;
      gap: var(--tile-gap);
      align-items: center;
      transform: translate3d(0, -50%, 0);
      will-change: transform;
    }

    .tile {
      width: var(--tile-size);
      height: var(--tile-size);
      flex: 0 0 auto;
      position: relative;
      border-radius: 20px;
      display: grid;
      place-items: center;
      box-shadow: inset 0 2px 4px rgba(255,255,255,.18), inset 0 -6px 10px rgba(0,0,0,.25), 0 8px 18px rgba(0,0,0,.24);
      transform: translateZ(0);
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 15px;
      border: 2px dashed rgba(255,255,255,.18);
      opacity: .8;
    }

    .tile span {
      position: relative;
      z-index: 1;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -.03em;
      text-shadow: 0 3px 10px rgba(0,0,0,.28);
      color: #fff;
      user-select: none;
    }

    .tile.red {
      background: linear-gradient(135deg, var(--red-1), var(--red-2) 58%, var(--red-3));
      border: 1px solid rgba(255,135,156,.96);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.28), inset 0 -8px 12px rgba(93,7,33,.34), 0 0 18px rgba(255,63,104,.26), 0 12px 22px rgba(0,0,0,.22);
    }

    .tile.black {
      background: linear-gradient(135deg, var(--black-1), var(--black-2) 58%, var(--black-3));
      border: 1px solid rgba(210,214,232,.24);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.14), inset 0 -8px 12px rgba(0,0,0,.38), 0 0 18px rgba(212,220,255,.10), 0 12px 22px rgba(0,0,0,.26);
    }

    .tile.green {
      background: linear-gradient(135deg, var(--green-1), var(--green-2) 55%, var(--green-3));
      border: 1px solid rgba(165,255,189,.98);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.30), inset 0 -8px 12px rgba(6,91,48,.34), 0 0 18px rgba(39,255,128,.28), 0 12px 22px rgba(0,0,0,.22);
    }

    .flash {
      position: absolute;
      inset: -10%;
      border-radius: 28px;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .flash.win-red {
      background: radial-gradient(circle, rgba(255,88,115,.50), rgba(255,88,115,.18) 45%, transparent 72%);
      animation: resultFlash .72s ease-out;
    }

    .flash.win-black {
      background: radial-gradient(circle, rgba(183,191,221,.44), rgba(183,191,221,.14) 45%, transparent 72%);
      animation: resultFlash .72s ease-out;
    }

    .flash.win-green {
      background: radial-gradient(circle, rgba(67,255,142,.58), rgba(67,255,142,.20) 45%, transparent 72%);
      animation: resultFlash .82s ease-out;
    }

    .controls,
    .history-panel {
      position: fixed;
      left: var(--panel-side);
      right: var(--panel-side);
      width: min(calc(100% - (var(--panel-side) * 2)), var(--panel-width));
      margin: 0 auto;
    }

    .controls {
      bottom: calc(var(--history-height) + var(--safe-bottom) + 34px);
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .bet-panel,
    .history-panel {
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(34,27,52,.94), rgba(22,15,34,.94));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.44), 0 0 22px rgba(140,35,255,.14);
    }

    .profit-panel {
      min-height: 43px;
      padding: 7px 10px;
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 8px;
      align-items: center;
      border-radius: 14px;
    }

    .profit-item {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .profit-item span {
      color: #fff;
      font-size: 10px;
      line-height: 1;
      font-weight: 600;
      white-space: nowrap;
    }

    .profit-item strong {
      color: #fff;
      font-size: clamp(13px, 3.5vw, 16px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bet-panel {
      min-height: 132px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1.08fr .92fr;
      gap: 10px;
      border-radius: 17px;
    }

    .stake-side {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr 36px;
      gap: 8px;
    }

    .stake-box {
      position: relative;
      min-height: 68px;
      display: flex;
      align-items: center;
      padding: 10px 40px 10px 12px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(50,47,83,.98), rgba(43,39,70,.98));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.035);
    }

    .amount {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: clamp(20px, 5.4vw, 27px);
      font-weight: 700;
      letter-spacing: -0.06em;
    }

    .amount::placeholder { color: rgba(255,255,255,.45); }

    .pm {
      position: absolute;
      right: 9px;
      width: 28px;
      height: 25px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(61,51,91,.96), rgba(29,21,48,.96));
      color: #d3baff;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }

    .pm.plus { top: 7px; }
    .pm.minus { bottom: 7px; }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .quick {
      min-height: 36px;
      border: 1px solid rgba(255,255,255,.055);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(42,34,67,.96), rgba(29,23,47,.96));
      color: rgba(226,204,255,.90);
      font-size: 17px;
      line-height: 1;
      font-weight: 700;
    }

    .choice-side {
      min-width: 0;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 8px;
    }

    .choice {
      width: 100%;
      min-height: 32px;
      border-radius: 8px;
      color: #fff;
      font-size: clamp(12px, 3.3vw, 15px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: .01em;
      transform: translateZ(0);
      transition: transform .12s ease, filter .12s ease, opacity .12s ease;
      text-shadow: 0 1px 8px rgba(0,0,0,.18);
    }

    .choice.red {
      border: 1px solid rgba(255,136,155,.96);
      background: linear-gradient(90deg, rgba(255,255,255,.24), transparent 28%), linear-gradient(135deg, var(--red-1), var(--red-2) 60%, var(--red-3));
      box-shadow: inset 0 3px 5px rgba(255,255,255,.28), inset 0 -4px 8px rgba(113,14,41,.34), 0 0 16px rgba(255,82,118,.26);
    }

    .choice.black {
      border: 1px solid rgba(210,214,232,.22);
      background: linear-gradient(90deg, rgba(255,255,255,.10), transparent 30%), linear-gradient(135deg, #4d4f5f, #181922 58%, #090a10);
      box-shadow: inset 0 3px 5px rgba(255,255,255,.14), inset 0 -4px 8px rgba(0,0,0,.38), 0 0 14px rgba(206,214,246,.08);
    }

    .choice.green {
      border: 1px solid rgba(166,255,192,.96);
      background: linear-gradient(90deg, rgba(255,255,255,.26), transparent 28%), linear-gradient(135deg, var(--green-1), var(--green-2) 56%, var(--green-3));
      box-shadow: inset 0 3px 5px rgba(255,255,255,.28), inset 0 -4px 8px rgba(8,111,60,.34), 0 0 16px rgba(40,255,125,.22);
    }

    .choice small {
      display: block;
      margin-top: 2px;
      font-size: 10px;
      opacity: .95;
      font-weight: 800;
      letter-spacing: .02em;
    }

    .choice:active,
    .quick:active,
    .pm:active { transform: scale(.97); filter: brightness(.93); }

    .choice:disabled,
    .quick:disabled,
    .pm:disabled,
    .amount:disabled { cursor: default; }

    .history-panel {
      bottom: max(18px, calc(var(--safe-bottom) + 10px));
      z-index: 14;
      padding: 6px 8px;
      border-color: rgba(166,77,255,.18);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(27,21,41,.94), rgba(16,12,25,.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 12px 28px rgba(0,0,0,.30), 0 0 16px rgba(140,35,255,.10);
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .history-title {
      color: rgba(255,255,255,.82);
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .history-list {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 1px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .history-list::-webkit-scrollbar { display: none; }

    .history-empty {
      width: 100%;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px dashed rgba(255,255,255,.08);
      border-radius: 10px;
      color: rgba(255,255,255,.44);
      font-size: 10px;
      font-weight: 600;
      text-align: center;
    }

    .history-chip {
      min-width: 34px;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,.28);
      box-shadow: inset 0 2px 4px rgba(255,255,255,.20), inset 0 -5px 8px rgba(0,0,0,.24), 0 5px 10px rgba(0,0,0,.20);
    }

    .history-chip.red {
      background: linear-gradient(135deg, var(--red-1), var(--red-2) 58%, var(--red-3));
      border: 1px solid rgba(255,136,155,.96);
    }

    .history-chip.black {
      background: linear-gradient(135deg, var(--black-1), var(--black-2) 58%, var(--black-3));
      border: 1px solid rgba(210,214,232,.20);
    }

    .history-chip.green {
      background: linear-gradient(135deg, var(--green-1), var(--green-2) 55%, var(--green-3));
      border: 1px solid rgba(166,255,192,.96);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 220px;
      z-index: 40;
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 8px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(28,21,43,.96), rgba(14,10,24,.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 20px rgba(140,35,255,.16);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 10px) scale(.98);
      transition: opacity .20s ease, transform .20s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .toast-icon {
      width: 24px;
      height: 24px;
      min-width: 24px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: #fff;
    }

    .toast-icon svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .toast.win {
      border-color: rgba(38,255,120,.34);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 22px rgba(38,255,120,.22);
    }

    .toast.win .toast-icon {
      background: linear-gradient(180deg, #31ff86, #089e45);
      box-shadow: 0 0 14px rgba(38,255,120,.40);
    }

    .toast.lose {
      border-color: rgba(255,59,59,.34);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 22px rgba(255,59,59,.22);
    }

    .toast.lose .toast-icon {
      background: linear-gradient(180deg, #ff5a5a, #b80f23);
      box-shadow: 0 0 14px rgba(255,59,59,.40);
    }

    .toast.error .toast-icon,
    .toast.info .toast-icon {
      background: linear-gradient(180deg, #b35cff, #6a1fd0);
      box-shadow: 0 0 14px rgba(179,92,255,.34);
    }

    @keyframes logoJump {
      0%, 100% { transform: translateY(0) scale(1); }
      42% { transform: translateY(-8px) scale(1.025); }
      64% { transform: translateY(0) scale(.995); }
    }
    @keyframes cleanLine {
      0% { transform: scaleX(0); }
      72% { transform: scaleX(.84); }
      100% { transform: scaleX(1); }
    }
    @keyframes preloaderIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(-4px) scale(1); }
    }
    @keyframes lavaBlobOne {
      0% { transform: translate3d(0, 0, 0) scale(1); border-radius: 46% 54% 58% 42% / 42% 46% 54% 58%; }
      100% { transform: translate3d(90px, 70px, 0) scale(1.18); border-radius: 58% 42% 47% 53% / 55% 40% 60% 45%; }
    }
    @keyframes lavaBlobTwo {
      0% { transform: translate3d(0, 0, 0) scale(1); border-radius: 52% 48% 44% 56% / 46% 58% 42% 54%; }
      100% { transform: translate3d(-95px, -85px, 0) scale(1.16); border-radius: 42% 58% 55% 45% / 60% 44% 56% 40%; }
    }
    @keyframes resultFlash {
      0% { opacity: 0; transform: scale(.82); }
      20% { opacity: 1; transform: scale(1); }
      55% { opacity: .95; transform: scale(1.03); }
      100% { opacity: 0; transform: scale(1.08); }
    }

    @media (max-width: 480px) {
      :root {
        --panel-side: 20px;
        --panel-width: 390px;
        --track-width: min(92vw, 430px);
        --tile-size: 66px;
        --visible-height: 106px;
      }
      .topbar { left: 14px; }
      .balance { min-height: 36px; gap: 7px; font-size: 15px; }
      .wallet { width: 18px; height: 18px; }
      .pointer { top: 42px; width: 30px; height: 20px; }
    }

    @media (max-width: 390px) {
      :root {
        --panel-side: 16px;
        --tile-size: 60px;
        --tile-gap: 8px;
        --visible-height: 98px;
      }
      .reel-zone { height: 48vh; min-height: 292px; padding-top: 52px; }
      .preloader-logo { width: 138px; max-width: 56vw; }
      .loader-line { width: 200px; }
      .bet-panel { min-height: 126px; padding: 9px; grid-template-columns: 1.08fr .92fr; }
      .stake-box { min-height: 64px; }
      .choice { min-height: 31px; }
      .history-panel { bottom: max(14px, calc(var(--safe-bottom) + 8px)); padding: 6px 7px; }
    }

    @media (max-width: 340px), (max-height: 670px) {
      :root {
        --panel-side: 12px;
        --tile-size: 52px;
        --tile-gap: 8px;
        --visible-height: 88px;
      }
      .topbar { top: max(8px, env(safe-area-inset-top)); left: 12px; }
      .balance { min-height: 32px; padding: 0 8px; font-size: 14px; }
      .wallet { width: 16px; height: 16px; }
      .reel-zone { height: 43vh; min-height: 240px; padding-top: 48px; }
      .controls { bottom: calc(var(--history-height) + var(--safe-bottom) + 18px); gap: 5px; }
      .bet-panel { min-height: 114px; padding: 8px; gap: 8px; }
      .stake-side { grid-template-rows: 1fr 31px; gap: 6px; }
      .stake-box { min-height: 58px; padding: 8px 36px 8px 10px; }
      .pm { right: 8px; width: 25px; height: 22px; }
      .pm.plus { top: 6px; }
      .pm.minus { bottom: 6px; }
      .quick { min-height: 31px; font-size: 15px; }
      .choice { min-height: 29px; }
      .pointer { top: 36px; }
      .history-panel { bottom: max(10px, calc(var(--safe-bottom) + 6px)); }
    }

    @media (min-width: 700px) {
      :root {
        --panel-side: 24px;
        --panel-width: 410px;
        --track-width: 470px;
        --tile-size: 72px;
      }
    }



    /* Адаптация: маленькие экраны */
    @media (max-width: 390px) {
      :root {
        --panel-side: 13px;
        --panel-width: 370px;
        --track-width: min(94vw, 390px);
      }

      .reel-zone {
        height: 46dvh;
        min-height: 270px;
        padding: 48px 10px 0;
      }

      .reel-shell { min-height: 150px; }

      .bet-panel {
        min-height: 120px;
        padding: 8px;
        gap: 8px;
      }

      .amount { font-size: clamp(20px, 6vw, 23px); }
      .choice { padding: 6px 8px 5px; }
    }

    /* Адаптация: средние экраны */
    @media (min-width: 391px) and (max-width: 699px) {
      :root {
        --panel-side: 18px;
        --panel-width: 410px;
        --track-width: min(92vw, 460px);
        --tile-width: 88px;
        --tile-height: 56px;
        --visible-height: 110px;
      }

      .reel-zone {
        height: 49dvh;
        min-height: 310px;
        padding-top: 56px;
      }

      .amount { font-size: clamp(22px, 5.2vw, 26px); }
    }

    /* Адаптация: большие экраны и планшеты */
    @media (min-width: 700px) {
      :root {
        --panel-side: 24px;
        --panel-width: 440px;
        --track-width: 520px;
        --tile-width: 96px;
        --tile-height: 60px;
        --visible-height: 120px;
      }

      .reel-zone {
        height: 51dvh;
        min-height: 360px;
        padding-top: 64px;
      }

      .reel-shell { min-height: 190px; }

      .bet-panel {
        min-height: 138px;
        padding: 11px;
      }

      .amount { font-size: 27px; }
      .history-panel { padding: 7px 9px; }
    }

    /* Низкие экраны: интерфейс не накладывается */
    @media (max-height: 670px) {
      .reel-zone {
        height: 41dvh;
        min-height: 225px;
        padding-top: 42px;
      }

      .reel-shell { min-height: 132px; }

      .controls {
        bottom: calc(var(--history-height) + var(--safe-bottom) + 16px);
      }

      .bet-panel { min-height: 108px; }
      .amount { font-size: clamp(19px, 5vw, 22px); }
    }

    @media (min-height: 860px) {
      .reel-zone { height: 53dvh; }
    }



    /* Финальные правки ленты и истории */
    .result-badge,
    .flash,
    .profit-panel {
      display: none !important;
    }

    .tile {
      border: 0 !important;
      border-radius: 11px !important;
      box-shadow: inset 0 1px 2px rgba(255,255,255,.10), inset 0 -4px 8px rgba(0,0,0,.22), 0 7px 16px rgba(0,0,0,.18) !important;
      overflow: hidden !important;
    }

    .tile::before,
    .tile::after,
    .tile span {
      display: none !important;
    }

    .tile.red {
      background: linear-gradient(180deg, #ff6f82 0%, #ef3155 58%, #85172f 100%) !important;
    }

    .tile.black {
      background: linear-gradient(180deg, #737888 0%, #2c303b 58%, #0d1017 100%) !important;
    }

    .tile.green {
      background: linear-gradient(180deg, #89ff9e 0%, #20d66f 58%, #0a7f3e 100%) !important;
    }

    .history-chip {
      min-width: 20px !important;
      width: 20px !important;
      height: 20px !important;
      border-radius: 5px !important;
      display: block !important;
      border: 0 !important;
      font-size: 0 !important;
      color: transparent !important;
      text-shadow: none !important;
      box-shadow: inset 0 1px 2px rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.20), 0 4px 9px rgba(0,0,0,.16) !important;
    }

    .history-chip.red {
      background: linear-gradient(180deg, #ff6f82, #ef3155 58%, #85172f) !important;
    }

    .history-chip.black {
      background: linear-gradient(180deg, #737888, #2c303b 58%, #0d1017) !important;
    }

    .history-chip.green {
      background: linear-gradient(180deg, #89ff9e, #20d66f 58%, #0a7f3e) !important;
    }

    .amount {
      font-size: clamp(21px, 5.6vw, 28px) !important;
    }

    @media (max-width: 390px) {
      .amount { font-size: clamp(20px, 6vw, 23px) !important; }
    }

    @media (min-width: 391px) and (max-width: 699px) {
      .amount { font-size: clamp(22px, 5.2vw, 26px) !important; }
    }

    @media (min-width: 700px) {
      .amount { font-size: 27px !important; }
    }

    @media (max-height: 670px) {
      .amount { font-size: clamp(19px, 5vw, 22px) !important; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .18s !important;
        transition-duration: .18s !important;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <div id="preloader" class="preloader" aria-label="Загрузка игры">
      <div class="preloader-inner">
        <img class="preloader-logo" src="images/Logovezusgame.png" alt="Vezus Game" decoding="async">
        <div class="loader-line" aria-hidden="true"><span></span></div>
      </div>
    </div>

    <header class="topbar">
      <div class="balance" aria-label="Баланс">
        <svg class="wallet" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M12 17.6C12 13.96 14.96 11 18.6 11H42.5C47.05 11 50.75 14.7 50.75 19.25V20.8H43.6C36.86 20.8 31.4 26.26 31.4 33C31.4 39.74 36.86 45.2 43.6 45.2H50.75V46.75C50.75 51.3 47.05 55 42.5 55H18.6C14.96 55 12 52.04 12 48.4V17.6Z"/>
          <path d="M16.5 10.9H39.4C42.68 10.9 45.35 13.57 45.35 16.85V17.7H17.1C13.92 17.7 12 15.92 12 15.92C12.78 12.98 14.38 10.9 16.5 10.9Z"/>
          <path d="M39.8 24.65H52.5C55.12 24.65 57.25 26.78 57.25 29.4V36.6C57.25 39.22 55.12 41.35 52.5 41.35H39.8C35.2 41.35 31.5 37.62 31.5 33C31.5 28.38 35.2 24.65 39.8 24.65Z"/>
          <circle cx="43.2" cy="33" r="4.05" fill="#171225"/>
          <circle cx="43.2" cy="33" r="2.15" fill="#f5efff"/>
          <path d="M20 22H30" stroke="#fff" stroke-opacity="0.32" stroke-width="3" stroke-linecap="round" fill="none"/>
        </svg>
        <span id="balance">5 000 ₽</span>
      </div>
    </header>

    <section class="reel-zone" aria-label="Игровая лента">
      <div class="reel-shell">
        <div class="grid-glow"></div>
        <div class="pointer" aria-hidden="true"></div>
        <div class="reel-window" id="reelWindow">
          <div class="center-highlight" aria-hidden="true"></div>
          <div class="reel-track" id="reelTrack"></div>
        </div>
      </div>
    </section>

    <section class="history-panel" id="historyPanel" aria-label="История выпадений">
      <div class="history-head">
        <span class="history-title">История выпадений</span>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">Пока ещё не было выпадений</div>
      </div>
    </section>

    <section class="controls">

      <div class="bet-panel">
        <div class="stake-side">
          <div class="stake-box">
            <input class="amount" id="amount" value="16 ₽" inputmode="numeric" aria-label="Ставка" />
            <button class="pm plus" id="plusBtn" type="button">+</button>
            <button class="pm minus" id="minusBtn" type="button">−</button>
          </div>
          <div class="quick-row">
            <button class="quick" id="halfBtn" type="button">/2</button>
            <button class="quick" id="doubleBtn" type="button">x2</button>
          </div>
        </div>

        <div class="choice-side">
          <button class="choice red" data-choice="red" type="button">Красное<small>x2</small></button>
          <button class="choice black" data-choice="black" type="button">Чёрное<small>x2</small></button>
          <button class="choice green" data-choice="green" type="button">Зелёное<small>x14</small></button>
        </div>
      </div>
    </section>

    <div class="toast info" id="toast" aria-live="polite">
      <span class="toast-icon" id="toastIcon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 8.2V12.6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M12 16.2H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5Z" stroke="currentColor" stroke-width="2"/>
        </svg>
      </span>
      <span id="toastText">Выберите цвет</span>
    </div>
  </main>

  <script>
    const amountInput = document.getElementById('amount');
    const balanceEl = document.getElementById('balance');
    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const controls = document.querySelector('.controls');
    const choiceButtons = [...document.querySelectorAll('.choice')];
    const reelWindow = document.getElementById('reelWindow');
    const reelTrack = document.getElementById('reelTrack');

    const PRELOADER_STARTED_AT = Date.now();
    const PRELOADER_MIN_MS = 2200;

    const REEL_SYMBOLS = ['red', 'black', 'red', 'black', 'red', 'black', 'green', 'red', 'black', 'red', 'black', 'red', 'black', 'red', 'black'];
    const CHOICE_LABELS = { red: 'Красное', black: 'Чёрное', green: 'Зелёное' };
    const CHOICE_MULTIPLIERS = { red: 2, black: 2, green: 14 };

    let balance = 5000;
    let minBet = 8;
    let maxBet = 10000;
    let isSpinning = false;
    let historyResults = [];
    let lastChoice = 'red';
    let currentTrackX = 0;
    let tileStep = 82;
    let currentCenteredIndex = 60;
    let pendingLayoutRefresh = false;

    function hidePreloader() {
      const preloader = document.getElementById('preloader');
      if (!preloader) return;
      const elapsed = Date.now() - PRELOADER_STARTED_AT;
      const wait = Math.max(0, PRELOADER_MIN_MS - elapsed);
      setTimeout(() => {
        preloader.classList.add('hidden');
        setTimeout(() => preloader.remove(), 360);
      }, wait);
    }

    function formatRub(value) {
      const number = Math.floor(Number(value || 0));
      return new Intl.NumberFormat('ru-RU', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(number) + ' ₽';
    }

    function updateBalance(value = balance) {
      balance = Math.floor(Number(value || 0));
      balanceEl.textContent = formatRub(balance);
    }

    function getAmount() {
      const raw = amountInput.value.replace(/[^0-9]/g, '');
      const num = parseInt(raw, 10);
      return Number.isFinite(num) ? Math.floor(num) : 0;
    }

    function setAmount(value) {
      const normalized = Math.floor(Math.min(maxBet, Math.max(minBet, Number(value || 0))));
      amountInput.value = normalized + ' ₽';
      updatePossibleWin(lastChoice);
    }

    function updatePossibleWin(choice = lastChoice) {
      lastChoice = choice;
    }

    function updateHistoryPosition() {
      const historyHeight = historyPanel.offsetHeight;
      document.documentElement.style.setProperty('--history-height', historyHeight + 'px');
    }

    function placeToastAbovePanel() {
      const rect = controls.getBoundingClientRect();
      const bottom = window.innerHeight - rect.top + 10;
      toast.style.bottom = bottom + 'px';
    }

    function getToastIcon(type) {
      if (type === 'win') {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.6L9.3 16.8L19 7.2" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      }
      if (type === 'lose') {
        return '<svg viewBox="0 0 24 24" fill="none"><path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/></svg>';
      }
      return '<svg viewBox="0 0 24 24" fill="none"><path d="M12 8.2V12.6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/><path d="M12 16.2H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5Z" stroke="currentColor" stroke-width="2"/></svg>';
    }

    function showToast(text, type = 'info') {
      toastText.textContent = text;
      toastIcon.innerHTML = getToastIcon(type);
      toast.className = 'toast ' + type;
      placeToastAbovePanel();
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function renderHistory() {
      if (!historyResults.length) {
        historyList.innerHTML = '<div class="history-empty">Пока ещё не было выпадений</div>';
      } else {
        historyList.innerHTML = historyResults.map((item) => `
          <div class="history-chip ${item}" aria-label="${CHOICE_LABELS[item]}"></div>
        `).join('');
      }
      updateHistoryPosition();
      if (toast.classList.contains('show')) placeToastAbovePanel();
    }

    function addHistoryResult(result) {
      historyResults.unshift(result);
      historyResults = historyResults.slice(0, 10);
      renderHistory();
    }

    function setBusy(isBusy) {
      isSpinning = isBusy;
      choiceButtons.forEach((button) => {
        button.disabled = isBusy;
        button.style.opacity = isBusy ? '0.72' : '';
        button.style.pointerEvents = isBusy ? 'none' : '';
      });
      amountInput.disabled = isBusy;
      document.getElementById('plusBtn').disabled = isBusy;
      document.getElementById('minusBtn').disabled = isBusy;
      document.getElementById('halfBtn').disabled = isBusy;
      document.getElementById('doubleBtn').disabled = isBusy;
    }

    function weightedResult() {
      const roll = Math.random();
      if (roll < 0.47) return 'red';
      if (roll < 0.94) return 'black';
      return 'green';
    }

    function createTileMarkup(type) {
      return `<div class="tile ${type}" data-type="${type}"></div>`;
    }

    function appendTrackRepeats(repeatCount = 20) {
      const fragment = [];
      for (let i = 0; i < repeatCount; i++) fragment.push(...REEL_SYMBOLS);
      reelTrack.insertAdjacentHTML('beforeend', fragment.map(createTileMarkup).join(''));
    }

    function measureTrack() {
      const firstTile = reelTrack.querySelector('.tile');
      if (!firstTile) return;
      const gap = parseFloat(getComputedStyle(reelTrack).gap) || 0;
      tileStep = firstTile.offsetWidth + gap;
    }

    function positionCurrentTile(animate = false) {
      const firstTile = reelTrack.querySelector('.tile');
      if (!firstTile) return;
      measureTrack();
      const centerX = reelWindow.clientWidth / 2;
      currentTrackX = centerX - (currentCenteredIndex * tileStep + firstTile.offsetWidth / 2);
      reelTrack.style.transition = animate ? 'transform 180ms ease' : 'none';
      reelTrack.style.transform = `translate3d(${currentTrackX}px, -50%, 0)`;
    }

    function buildTrack() {
      reelTrack.innerHTML = '';
      appendTrackRepeats(40);
      currentCenteredIndex = 60;
      positionCurrentTile(false);
    }

    function ensureTrackCapacity(requiredIndex) {
      while (reelTrack.children.length <= requiredIndex + 60) {
        appendTrackRepeats(20);
      }
    }

    function findNextIndex(resultType) {
      const minIndex = currentCenteredIndex + 34 + Math.floor(Math.random() * 14);
      ensureTrackCapacity(minIndex + REEL_SYMBOLS.length * 3);
      const tiles = reelTrack.children;

      for (let i = minIndex; i < tiles.length; i++) {
        if (tiles[i].dataset.type === resultType) return i;
      }

      appendTrackRepeats(20);
      return findNextIndex(resultType);
    }

    function spinToResult(resultType, callback) {
      const tiles = reelTrack.children;
      if (!tiles.length) return;

      measureTrack();
      const tileWidth = tiles[0].offsetWidth;
      const targetIndex = findNextIndex(resultType);
      const centerX = reelWindow.clientWidth / 2;
      const targetX = centerX - (targetIndex * tileStep + tileWidth / 2);
      const overshootX = targetX - Math.max(12, tileWidth * 0.18);

      reelTrack.style.transition = 'transform 4.35s cubic-bezier(.06,.86,.12,1)';
      reelTrack.style.transform = `translate3d(${overshootX}px, -50%, 0)`;

      setTimeout(() => {
        reelTrack.style.transition = 'transform 340ms cubic-bezier(.22,1,.36,1)';
        reelTrack.style.transform = `translate3d(${targetX}px, -50%, 0)`;
      }, 4360);

      currentCenteredIndex = targetIndex;
      currentTrackX = targetX;

      setTimeout(callback, 4740);
    }

    function settleRound(choice) {
      const bet = Math.floor(getAmount());
      if (bet < minBet) {
        showToast('Минимум ' + formatRub(minBet), 'error');
        return;
      }
      if (bet > maxBet) {
        showToast('Максимум ' + formatRub(maxBet), 'error');
        return;
      }
      if (bet > balance) {
        showToast('Недостаточно средств', 'error');
        return;
      }

      const result = weightedResult();
      const isWin = result === choice;
      const payout = isWin ? bet * CHOICE_MULTIPLIERS[choice] : 0;
      const profit = Math.max(0, payout - bet);

      setBusy(true);
      showToast('Ставка на ' + CHOICE_LABELS[choice], 'info');

      spinToResult(result, () => {
        if (isWin) {
          balance = balance - bet + payout;
          showToast('Выигрыш ' + formatRub(payout) + ' • Чистыми +' + formatRub(profit), 'win');
        } else {
          balance = balance - bet;
          showToast('Списано ' + formatRub(bet) + ' • Проигрыш', 'lose');
        }

        updateBalance(balance);
        addHistoryResult(result);

        if (pendingLayoutRefresh) {
          pendingLayoutRefresh = false;
          positionCurrentTile(false);
        }

        setTimeout(() => setBusy(false), 320);
      });
    }

    document.getElementById('plusBtn').addEventListener('click', () => setAmount(getAmount() + 1));
    document.getElementById('minusBtn').addEventListener('click', () => setAmount(getAmount() - 1));
    document.getElementById('halfBtn').addEventListener('click', () => setAmount(getAmount() / 2));
    document.getElementById('doubleBtn').addEventListener('click', () => setAmount(getAmount() * 2));

    amountInput.addEventListener('focus', () => { amountInput.value = String(Math.floor(getAmount())); });
    amountInput.addEventListener('input', () => updatePossibleWin(lastChoice));
    amountInput.addEventListener('blur', () => setAmount(getAmount()));

    choiceButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const choice = btn.dataset.choice;
        updatePossibleWin(choice);
        if (isSpinning) return;
        settleRound(choice);
      });
    });

    window.addEventListener('resize', () => {
      updateHistoryPosition();
      placeToastAbovePanel();

      if (isSpinning) {
        pendingLayoutRefresh = true;
      } else {
        positionCurrentTile(false);
      }
    });

    updateBalance(balance);
    setAmount(16);
    renderHistory();
    requestAnimationFrame(() => {
      buildTrack();
      updateHistoryPosition();
      placeToastAbovePanel();
      hidePreloader();
    });
  </script>
</body>
</html>
