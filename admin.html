<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Vezus Admin</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #171a21;
      --panel-2: #1f232c;
      --panel-3: #252a35;
      --text: #f4f5f7;
      --muted: #9aa3b2;
      --muted-2: #687080;
      --line: #2e3440;
      --line-soft: #262b35;
      --green: #34d399;
      --green-bg: rgba(52, 211, 153, .12);
      --red: #fb7185;
      --red-bg: rgba(251, 113, 133, .12);
      --blue: #60a5fa;
      --blue-bg: rgba(96, 165, 250, .12);
      --orange: #fbbf24;
      --orange-bg: rgba(251, 191, 36, .12);
      --shadow: 0 20px 50px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    html { touch-action: manipulation; -webkit-text-size-adjust: 100%; }
    input, textarea, select { font-size: 16px; }

    html, body { margin: 0; min-height: 100%; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 0%, rgba(96,165,250,.12), transparent 28%),
        radial-gradient(circle at 90% 10%, rgba(52,211,153,.08), transparent 26%),
        var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    button, input { font: inherit; }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: calc(env(safe-area-inset-top) + 18px) 14px 32px;
    }

    .hidden { display: none !important; }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      background: linear-gradient(145deg, #2c323e, #161920);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .title { min-width: 0; }
    .title h1 { margin: 0; font-size: 21px; letter-spacing: -.02em; }
    .title p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(75, 85, 99, .75);
      border-radius: 15px;
      background: linear-gradient(180deg, #1c2028, #151820);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 10px 22px rgba(0,0,0,.18);
      transition: transform .12s ease, border-color .12s ease, background .12s ease, opacity .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:active { transform: scale(.96); }
    .icon-btn:disabled { opacity: .55; cursor: default; }

    .login-wrap {
      min-height: 86vh;
      display: grid;
      place-items: center;
    }

    .login-card {
      width: 100%;
      background: rgba(23,26,33,.94);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .login-card .logo { margin-bottom: 18px; }
    .login-card h1 { margin: 0 0 8px; font-size: 28px; }
    .login-card p { margin: 0 0 22px; color: var(--muted); line-height: 1.45; }

    .field { margin-bottom: 12px; }
    .label { display: block; color: var(--muted); font-size: 12px; margin: 0 0 7px; }

    .input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #11141a;
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .input:focus { border-color: #4b5563; background: #141821; }

    .primary {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 16px;
      background: #e5e7eb;
      color: #111827;
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .primary:disabled { opacity: .55; cursor: default; }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: linear-gradient(180deg, rgba(31,35,44,.96), rgba(20,23,30,.96));
      border: 1px solid rgba(75,85,99,.36);
      border-radius: 20px;
      padding: 14px;
      min-height: 96px;
    }

    .stat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }

    .stat-label { color: var(--muted); font-size: 12px; }
    .stat-value { font-size: 24px; font-weight: 850; letter-spacing: -.03em; }
    .stat-sub { color: var(--muted-2); font-size: 12px; margin-top: 3px; }

    .pill-icon {
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--panel-3);
      color: var(--muted);
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line-soft);
      background: rgba(23,26,33,.9);
      border-radius: 18px;
      margin: 14px 0;
      position: sticky;
      top: 8px;
      z-index: 20;
      backdrop-filter: blur(14px);
    }

    .tab {
      height: 42px;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: var(--muted);
      font-weight: 750;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .tab.active { background: var(--panel-3); color: var(--text); }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }

    .chip {
      height: 36px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      cursor: pointer;
    }
    .chip.active { background: #e5e7eb; color: #111827; border-color: #e5e7eb; }
    .chip:disabled { opacity: .6; }
    #refreshInlineBtn { border-color: rgba(96,165,250,.24); color: #bfdbfe; background: rgba(96,165,250,.09); }

    .search { margin-bottom: 12px; }

    .card {
      background: linear-gradient(180deg, rgba(28,32,40,.98), rgba(18,21,27,.98));
      border: 1px solid rgba(75,85,99,.34);
      border-radius: var(--radius);
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.16);
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .user-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      background: var(--panel-3);
      border: 1px solid var(--line);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    .user-name { font-size: 15px; font-weight: 850; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-meta { margin-top: 3px; color: var(--muted); font-size: 12px; }

    .amount { font-size: 20px; font-weight: 900; white-space: nowrap; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.pending { color: var(--orange); background: var(--orange-bg); }
    .badge.approved { color: var(--green); background: var(--green-bg); }
    .badge.declined, .badge.cancelled { color: var(--red); background: var(--red-bg); }
    .badge.deposit { color: var(--green); background: var(--green-bg); }
    .badge.withdraw { color: var(--blue); background: var(--blue-bg); }

    .grid-info {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .info {
      background: #11141a;
      border: 1px solid var(--line-soft);
      border-radius: 15px;
      padding: 10px;
      min-width: 0;
    }
    .info span { display: block; color: var(--muted-2); font-size: 11px; margin-bottom: 5px; }
    .info b { display: block; font-size: 13px; overflow-wrap: anywhere; }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-2);
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn.good { color: var(--green); background: var(--green-bg); border-color: rgba(52,211,153,.18); }
    .btn.bad { color: var(--red); background: var(--red-bg); border-color: rgba(251,113,133,.18); }
    .btn.small { min-height: 40px; font-size: 13px; }

    .balance-edit {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 8px;
      margin-top: 12px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      padding: 32px 20px;
      background: rgba(23,26,33,.5);
    }

    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(env(safe-area-inset-bottom) + 14px);
      max-width: 492px;
      margin: 0 auto;
      background: #e5e7eb;
      color: #111827;
      border-radius: 17px;
      padding: 13px 15px;
      font-weight: 800;
      box-shadow: var(--shadow);
      z-index: 100;
    }

    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    @media (max-width: 360px) {
      .stats { grid-template-columns: 1fr; }
      .grid-info { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      .balance-edit { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <div id="toast" class="toast hidden"></div>

  <script>
    // Блокировка pinch/double tap zoom внутри Telegram/WebView.
    document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, { passive: false });
    document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive: false });
    document.addEventListener('gestureend', function(e){ e.preventDefault(); }, { passive: false });
    let __lastTouchEnd = 0;
    document.addEventListener('touchend', function(e){
      const now = Date.now();
      if (now - __lastTouchEnd <= 300) e.preventDefault();
      __lastTouchEnd = now;
    }, { passive: false });
    document.addEventListener('wheel', function(e){ if (e.ctrlKey) e.preventDefault(); }, { passive: false });

    const SUPABASE_URL = 'https://xcsjedwhqcrwdzmuahjl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2plZHdocWNyd2R6bXVhaGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzk0ODYsImV4cCI6MjA5Mzg1NTQ4Nn0.M2ksKeWwDt0BQxgjxpGhLKLMNP_ve1dcZvQ0Ix88Ock';
    const ADMIN_URL = SUPABASE_URL + '/functions/v1/admin-wallet';
    const TOKEN_KEY = 'vezus_admin_token_v2';

    const $ = (id) => document.getElementById(id);
    const state = { token: localStorage.getItem(TOKEN_KEY) || '', transactions: [], users: [], filter: 'pending', tab: 'tx', loading: false };

    const icons = {
      check: '<svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>',
      x: '<svg viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>',
      user: '<svg viewBox="0 0 24 24"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>',
      plus: '<svg viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>',
      out: '<svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M5 21h14"/></svg>',
      edit: '<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>',
      refresh: '<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-9 9 9.8 9.8 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.8 9.8 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>'
    };

    function money(value) {
      return new Intl.NumberFormat('ru-RU').format(Math.floor(Number(value) || 0)) + ' ₽';
    }

    function dateText(value) {
      if (!value) return '—';
      return new Date(value).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function toast(message) {
      const el = $('toast');
      el.textContent = message;
      el.classList.remove('hidden');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => el.classList.add('hidden'), 2600);
    }

    async function api(payload) {
      const response = await fetch(ADMIN_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'apikey': SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || data.error) throw new Error(data.error || 'Ошибка сервера');
      return data;
    }

    async function login(password) {
      const data = await api({ action: 'login', password });
      state.token = data.token;
      localStorage.setItem(TOKEN_KEY, data.token);
      $('loginView').classList.add('hidden');
      $('adminView').classList.remove('hidden');
      await load(true);
    }

    async function load(silent) {
      if (!state.token) return;
      const refreshBtn = $('refreshBtn');
      const refreshInlineBtn = $('refreshInlineBtn');
      try {
        state.loading = true;
        if (refreshBtn) { refreshBtn.disabled = true; refreshBtn.innerHTML = '<span class="loader"></span>'; }
        if (refreshInlineBtn) { refreshInlineBtn.disabled = true; refreshInlineBtn.textContent = 'Обновляю...'; }
        const data = await api({ action: 'get', token: state.token });
        state.transactions = data.transactions || [];
        state.users = data.users || [];
        renderStats(data.stats || {});
        render();
        if (!silent) toast('Данные обновлены');
      } catch (error) {
        if (String(error.message).includes('token')) {
          logout();
        }
        toast(error.message);
      } finally {
        state.loading = false;
        if (refreshBtn) { refreshBtn.disabled = false; refreshBtn.innerHTML = icons.refresh; }
        if (refreshInlineBtn) { refreshInlineBtn.disabled = false; refreshInlineBtn.textContent = 'Обновить'; }
      }
    }

    async function doAction(action, extra) {
      try {
        toast('Выполняю...');
        const data = await api({ action, token: state.token, ...extra });
        state.transactions = data.transactions || [];
        state.users = data.users || [];
        renderStats(data.stats || {});
        render();
        toast('Готово');
      } catch (error) {
        toast(error.message);
      }
    }

    function logout() {
      state.token = '';
      localStorage.removeItem(TOKEN_KEY);
      $('adminView').classList.add('hidden');
      $('loginView').classList.remove('hidden');
    }

    function renderStats(stats) {
      $('statUsers').textContent = stats.users_total || 0;
      $('statBalance').textContent = money(stats.users_balance_total || 0);
      $('statPending').textContent = stats.pending || 0;
      $('statWithdraws').textContent = stats.pending_withdraws || 0;
    }

    function nameOf(user) {
      if (!user) return 'Пользователь';
      return [user.first_name, user.last_name].filter(Boolean).join(' ') || (user.username ? '@' + user.username : 'Пользователь');
    }

    function renderTx() {
      const list = $('txList');
      let items = state.transactions.slice();
      if (state.filter === 'pending') items = items.filter((x) => x.status === 'pending');
      if (state.filter === 'deposit') items = items.filter((x) => x.type === 'deposit');
      if (state.filter === 'withdraw') items = items.filter((x) => x.type === 'withdraw');

      if (!items.length) {
        list.innerHTML = '<div class="empty">Заявок нет</div>';
        return;
      }

      list.innerHTML = items.map((tx) => {
        const isDeposit = tx.type === 'deposit';
        const isPending = tx.status === 'pending';
        const user = tx.user || { telegram_id: tx.telegram_id };
        const avatar = user.photo_url ? `<img src="${user.photo_url}" alt="">` : icons.user;
        const details = isDeposit
          ? `<div class="info"><span>Отправитель</span><b>${escapeHtml(tx.sender_fio || '—')}</b></div><div class="info"><span>Метод</span><b>${escapeHtml(tx.method || '—')}</b></div>`
          : `<div class="info"><span>Получатель</span><b>${escapeHtml(tx.recipient_fio || '—')}</b></div><div class="info"><span>Банк</span><b>${escapeHtml(tx.recipient_bank || '—')}</b></div>`;
        const buttons = !isPending ? '' : isDeposit
          ? `<div class="actions"><button class="btn good" onclick="txAction('approve_deposit','${tx.id}')">${icons.check}Подтвердить</button><button class="btn bad" onclick="txAction('decline_deposit','${tx.id}')">${icons.x}Отклонить</button></div>`
          : `<div class="actions"><button class="btn good" onclick="txAction('approve_withdraw','${tx.id}')">${icons.check}Оплачен</button><button class="btn bad" onclick="txAction('decline_withdraw','${tx.id}')">${icons.x}Вернуть</button></div>`;

        return `<article class="card">
          <div class="card-head">
            <div class="user-line">
              <div class="avatar">${avatar}</div>
              <div style="min-width:0">
                <div class="user-name">${escapeHtml(nameOf(user))}</div>
                <div class="user-meta">ID ${tx.telegram_id || '—'} · ${dateText(tx.created_at)}</div>
              </div>
            </div>
            <div style="text-align:right"><div class="amount">${money(tx.amount)}</div><div class="badge ${tx.type}">${isDeposit ? icons.plus : icons.out}${isDeposit ? 'Пополнение' : 'Вывод'}</div></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap"><span class="badge ${tx.status}">${statusText(tx.status)}</span><span class="badge">Баланс: ${money(tx.current_balance || 0)}</span></div>
          <div class="grid-info">${details}<div class="info"><span>До</span><b>${money(tx.balance_before || 0)}</b></div><div class="info"><span>После</span><b>${money(tx.balance_after || 0)}</b></div></div>
          ${buttons}
        </article>`;
      }).join('');
    }

    function renderUsers() {
      const list = $('usersList');
      const q = ($('userSearch').value || '').trim().toLowerCase();
      let items = state.users.slice();
      if (q) {
        items = items.filter((u) => [u.telegram_id, u.username, u.first_name, u.last_name, u.balance].join(' ').toLowerCase().includes(q));
      }
      if (!items.length) {
        list.innerHTML = '<div class="empty">Пользователей нет</div>';
        return;
      }
      list.innerHTML = items.map((u) => {
        const avatar = u.photo_url ? `<img src="${u.photo_url}" alt="">` : icons.user;
        return `<article class="card">
          <div class="card-head">
            <div class="user-line">
              <div class="avatar">${avatar}</div>
              <div style="min-width:0">
                <div class="user-name">${escapeHtml(nameOf(u))}</div>
                <div class="user-meta">${u.username ? '@' + escapeHtml(u.username) + ' · ' : ''}ID ${u.telegram_id}</div>
              </div>
            </div>
            <div class="amount">${money(u.balance)}</div>
          </div>
          <div class="grid-info">
            <div class="info"><span>Создан</span><b>${dateText(u.created_at)}</b></div>
            <div class="info"><span>Язык</span><b>${escapeHtml(u.language_code || '—')}</b></div>
          </div>
          <div class="balance-edit">
            <input id="bal_${u.id}" class="input" inputmode="numeric" type="number" min="0" value="${Math.floor(Number(u.balance)||0)}" />
            <button class="btn small" onclick="setBalance('${u.id}')">${icons.edit}Сохранить</button>
          </div>
        </article>`;
      }).join('');
    }

    function render() {
      if (state.tab === 'tx') renderTx();
      else renderUsers();
    }

    function statusText(status) {
      return ({ pending: 'В ожидании', approved: 'Одобрено', declined: 'Отклонено', cancelled: 'Отменено' })[status] || status;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>'"]/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[ch]));
    }

    window.txAction = function(action, transactionId) {
      const text = action.includes('decline') ? 'Комментарий для отклонения' : 'Комментарий';
      const comment = prompt(text, '');
      if (comment === null) return;
      doAction(action, { transaction_id: transactionId, comment });
    };

    window.setBalance = function(userId) {
      const input = $('bal_' + userId);
      const balance = Number(input.value || 0);
      if (!Number.isFinite(balance) || balance < 0) return toast('Некорректный баланс');
      if (!confirm('Установить новый баланс: ' + money(balance) + '?')) return;
      doAction('set_balance', { user_id: userId, balance });
    };

    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span> Проверка';
      try { await login($('passwordInput').value); }
      catch (error) { toast(error.message); }
      finally { btn.disabled = false; btn.innerHTML = icons.check + 'Войти'; }
    });

    $('logoutBtn').addEventListener('click', logout);
    $('refreshBtn').addEventListener('click', () => load(false));
    $('refreshInlineBtn').addEventListener('click', () => load(false));
    $('tabTx').addEventListener('click', () => { state.tab = 'tx'; $('tabTx').classList.add('active'); $('tabUsers').classList.remove('active'); $('txView').classList.remove('hidden'); $('usersView').classList.add('hidden'); renderTx(); });
    $('tabUsers').addEventListener('click', () => { state.tab = 'users'; $('tabUsers').classList.add('active'); $('tabTx').classList.remove('active'); $('usersView').classList.remove('hidden'); $('txView').classList.add('hidden'); renderUsers(); });
    $('userSearch').addEventListener('input', renderUsers);

    document.querySelectorAll('.chip[data-filter]').forEach((chip) => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-filter]').forEach((x) => x.classList.remove('active'));
        chip.classList.add('active');
        state.filter = chip.dataset.filter;
        renderTx();
      });
    });

    if (state.token) {
      $('loginView').classList.add('hidden');
      $('adminView').classList.remove('hidden');
      load(true);
    }
  </script>
</body>
</html>
