<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CoinFlip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #07050d;
      --panel: rgba(29, 20, 46, 0.92);
      --panel-2: rgba(39, 29, 61, 0.88);
      --stroke: rgba(166, 77, 255, 0.35);
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --purple: #b42cff;
      --purple-2: #6811a9;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.55);
      --gold-1: #ffe66b;
      --gold-2: #eda100;
      --gold-3: #b87500;
      --silver-1: #eafaff;
      --silver-2: #b7dbe7;
      --silver-3: #82b5c6;
      --history-height: 58px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    button,
    input {
      font-family: inherit;
    }

    .game {
      width: 100%;
      min-height: 100dvh;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 179, 42, 0.16), transparent 27%),
        radial-gradient(circle at 50% 100%, rgba(141, 42, 255, 0.20), transparent 42%),
        linear-gradient(180deg, #08050f 0%, #160020 52%, #0b0811 100%);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 20%, rgba(160, 44, 255, 0.16), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.05), transparent 18%);
      pointer-events: none;
    }

    .topbar {
      position: fixed;
      top: max(18px, env(safe-area-inset-top));
      left: 18px;
      right: 18px;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .balance {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.12);
    }

    .top-logo {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      right: 16px;
      z-index: 21;
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.14));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }


    .wallet {
      width: 21px;
      height: 21px;
      color: #fff;
      filter: none;
    }

    .wallet path,
    .wallet circle {
      fill: currentColor !important;
    }

    .top-actions {
      display: none;
    }

    .sound {
      width: 68px;
      height: 36px;
      border: 1px solid rgba(183, 85, 255, 0.35);
      border-radius: 999px;
      background: rgba(34, 24, 52, 0.75);
      box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, 0.03),
        0 0 20px rgba(150, 47, 255, 0.20);
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding: 4px;
      cursor: pointer;
    }

    .sound-knob {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(180deg, rgba(54, 42, 82, 0.95), rgba(24, 19, 38, 0.95));
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.10);
      display: grid;
      place-items: center;
      color: white;
    }

    .gear-btn {
      width: 32px;
      height: 32px;
      border: 0;
      background: transparent;
      color: #fff;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.12));
      cursor: pointer;
    }

    .coin-zone {
      position: relative;
      width: 100%;
      height: 62vh;
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 44px;
    }

    .grid-glow {
      position: absolute;
      width: min(76vw, 360px);
      height: min(76vw, 360px);
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0.44;
      background-image:
        linear-gradient(rgba(255,255,255,0.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.11) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black 42%, transparent 72%);
      pointer-events: none;
    }

    .coin-wrap {
      position: relative;
      width: min(62vw, 310px);
      aspect-ratio: 1;
      perspective: 1000px;
      transform: translateY(-12px);
    }

    .coin-wrap::before {
      content: "";
      position: absolute;
      inset: -20%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 184, 28, 0.48), rgba(255, 184, 28, 0.13) 34%, transparent 66%);
      filter: blur(5px);
      animation: pulseGlow 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    .coin {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transform-style: preserve-3d;
      transition: transform 0.78s cubic-bezier(.15,.75,.15,1);
    }

    .coin-face {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 22px 55px rgba(0, 0, 0, 0.55);
    }

    .coin-face::before {
      content: "";
      position: absolute;
      inset: 6%;
      border-radius: 50%;
    }

    .coin-face::after {
      content: "★   ★   ★";
      position: absolute;
      top: 16%;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      letter-spacing: 8px;
      opacity: 0.52;
    }

    .coin-face.front {
      background:
        radial-gradient(circle at 34% 25%, rgba(255, 255, 255, 0.95) 0 5%, transparent 17%),
        radial-gradient(circle at 40% 34%, #fff1a0 0%, #ffc93b 34%, #d88a05 66%, #9c5700 100%);
      box-shadow:
        inset 0 10px 16px rgba(255, 255, 255, 0.42),
        inset 0 -18px 24px rgba(82, 38, 0, 0.38),
        0 22px 55px rgba(0, 0, 0, 0.55),
        0 0 44px rgba(255, 171, 0, 0.42);
    }

    .coin-face.front::before {
      border: 8px solid rgba(133, 74, 0, 0.38);
      box-shadow:
        inset 0 0 0 5px rgba(255, 246, 147, 0.42),
        0 0 0 5px rgba(255, 232, 96, 0.38),
        inset 0 15px 22px rgba(255, 255, 255, 0.18);
    }

    .coin-face.front::after {
      color: rgba(120, 69, 0, 0.50);
      text-shadow: 0 1px 0 rgba(255, 244, 130, 0.45);
    }

    .coin-face.back {
      transform: rotateY(180deg);
      background:
        radial-gradient(circle at 34% 25%, rgba(255, 255, 255, 0.95) 0 5%, transparent 17%),
        radial-gradient(circle at 40% 34%, #ffffff 0%, #d7e3ea 34%, #9fb4c0 66%, #718897 100%);
      box-shadow:
        inset 0 10px 16px rgba(255, 255, 255, 0.48),
        inset 0 -18px 24px rgba(55, 71, 81, 0.30),
        0 22px 55px rgba(0, 0, 0, 0.55),
        0 0 36px rgba(190, 225, 245, 0.26);
    }

    .coin-face.back::before {
      border: 8px solid rgba(91, 114, 127, 0.36);
      box-shadow:
        inset 0 0 0 5px rgba(255, 255, 255, 0.38),
        0 0 0 5px rgba(226, 243, 248, 0.30),
        inset 0 15px 22px rgba(255, 255, 255, 0.18);
    }

    .coin-face.back::after {
      color: rgba(78, 101, 116, 0.52);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.30);
    }

    .coin-art {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 22% 16% 20%;
    }

    .coin-side-name {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .coin-face.front .coin-side-name {
      color: rgba(104, 58, 0, 0.72);
    }

    .coin-face.back .coin-side-name {
      color: rgba(74, 95, 109, 0.78);
    }

    .brand-mark {
      font-family: "Great Vibes", cursive;
      font-size: clamp(32px, 7.6vw, 44px);
      line-height: 0.95;
      letter-spacing: 0.01em;
      text-align: center;
      text-shadow: 0 2px 10px rgba(255,255,255,0.14);
    }

    .coin-face.front .brand-mark {
      color: rgba(111, 64, 0, 0.82);
      filter: drop-shadow(0 1px 0 rgba(255, 235, 118, 0.30));
    }

    .coin-face.back .brand-mark {
      color: rgba(74, 95, 109, 0.85);
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.25));
    }

    .brand-sub {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      opacity: 0.5;
      transform: translateY(-2px);
    }

    .coin-face.front .brand-sub {
      color: rgba(111, 64, 0, 0.62);
    }

    .coin-face.back .brand-sub {
      color: rgba(74, 95, 109, 0.62);
    }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.78; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }

    .controls {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-width: 470px;
      margin: 0 auto;
    }

    .series-panel,
    .bet-panel {
      border: 1px solid var(--stroke);
      background:
        linear-gradient(180deg, rgba(34, 27, 52, 0.94), rgba(22, 15, 34, 0.94));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 18px 40px rgba(0,0,0,0.44),
        0 0 22px rgba(140, 35, 255, 0.14);
      border-radius: 18px;
    }

    .series-panel {
      min-height: 52px;
      padding: 7px 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 8px;
    }

    .multis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 5px;
      min-width: 0;
    }

    .multi {
      height: 39px;
      border-radius: 6px;
      border: 1px solid rgba(156, 78, 255, 0.28);
      background: linear-gradient(180deg, rgba(49, 38, 75, 0.96), rgba(25, 15, 41, 0.96));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.035),
        inset 0 -15px 22px rgba(0,0,0,0.20);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      overflow: hidden;
    }

    .q {
      width: 14px;
      height: 14px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 25%, #d7a7ff, #8a31d9 62%, #4f157c);
      color: white;
      font-size: 9px;
      font-weight: 900;
      box-shadow: 0 0 8px rgba(178, 70, 255, 0.38);
    }

    .multi span:last-child {
      font-size: clamp(12px, 3.4vw, 16px);
      line-height: 1;
      font-weight: 600;
      color: rgba(255,255,255,0.76);
      letter-spacing: -0.06em;
    }

    .series-right {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
    }

    .switch {
      width: 42px;
      height: 24px;
      border: 0;
      border-radius: 999px;
      background: linear-gradient(135deg, #8a1fff, #d02fff);
      box-shadow:
        0 0 18px rgba(192, 48, 255, 0.55),
        inset 0 2px 5px rgba(255,255,255,0.25),
        inset 0 -4px 8px rgba(0,0,0,0.24);
      position: relative;
      cursor: pointer;
    }

    .switch::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      top: 3px;
      right: 3px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 9px rgba(0,0,0,0.34);
      transition: 0.18s ease;
    }

    .switch.off {
      background: rgba(63, 51, 82, 0.86);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
    }

    .switch.off::after {
      right: 21px;
    }

    .bet-panel {
      padding: 8px;
      min-height: 108px;
      display: grid;
      grid-template-columns: 0.76fr 1.24fr;
      gap: 8px;
    }

    .stake-side {
      display: grid;
      grid-template-rows: 1fr 32px;
      gap: 6px;
      min-width: 0;
    }

    .stake-box {
      position: relative;
      min-height: 52px;
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(50, 47, 83, 0.98), rgba(43, 39, 70, 0.98));
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.035);
      display: flex;
      align-items: center;
      padding: 8px 36px 8px 10px;
    }

    .amount {
      width: 100%;
      background: transparent;
      border: 0;
      outline: none;
      color: #fff;
      font-size: clamp(17px, 4.8vw, 23px);
      font-weight: 700;
      letter-spacing: -0.06em;
    }

    .amount::placeholder {
      color: rgba(255,255,255,0.45);
    }

    .pm {
      position: absolute;
      right: 10px;
      width: 26px;
      height: 22px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(61, 51, 91, 0.96), rgba(29, 21, 48, 0.96));
      color: #d3baff;
      font-size: 19px;
      line-height: 1;
      font-weight: 700;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .pm.plus { top: 6px; }
    .pm.minus { bottom: 6px; }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .quick {
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(42, 34, 67, 0.96), rgba(29, 23, 47, 0.96));
      color: rgba(226, 204, 255, 0.90);
      font-size: 19px;
      line-height: 1;
      font-weight: 700;
      cursor: pointer;
    }

    .choice-side {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 7px;
    }

    .choice {
      min-height: 45px;
      border-radius: 5px;
      border: 0;
      font-size: clamp(18px, 4.7vw, 23px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #121015;
      cursor: pointer;
      transform: translateZ(0);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .choice:active,
    .quick:active,
    .pm:active,
    .sound:active,
    .gear-btn:active {
      transform: scale(0.97);
      filter: brightness(0.93);
    }

    .choice.gold {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.55), transparent 28%),
        linear-gradient(135deg, var(--gold-1), var(--gold-2) 62%, var(--gold-3));
      border: 1px solid rgba(255, 236, 120, 0.95);
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.42),
        inset 0 -4px 8px rgba(113, 64, 0, 0.32),
        0 0 16px rgba(255, 177, 0, 0.44);
    }

    .choice.silver {
      background:
        linear-gradient(90deg, rgba(255,255,255,0.72), transparent 33%),
        linear-gradient(135deg, var(--silver-1), var(--silver-2) 57%, var(--silver-3));
      border: 1px solid rgba(233, 250, 255, 0.96);
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,0.55),
        inset 0 -4px 9px rgba(58, 91, 107, 0.28),
        0 0 15px rgba(160, 230, 255, 0.36);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 220px;
      z-index: 40;
      transform: translate(-50%, 10px) scale(0.98);
      opacity: 0;
      pointer-events: none;
      min-height: 38px;
      padding: 7px 12px 7px 8px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.10);
      background: linear-gradient(180deg, rgba(28, 21, 43, 0.96), rgba(14, 10, 24, 0.96));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 12px 32px rgba(0,0,0,0.42),
        0 0 20px rgba(140, 35, 255, 0.16);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      color: #fff;
      transition: opacity 0.20s ease, transform 0.20s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .toast-icon {
      width: 24px;
      height: 24px;
      min-width: 24px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .toast-icon svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .toast.win {
      border-color: rgba(38, 255, 120, 0.34);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 12px 32px rgba(0,0,0,0.42),
        0 0 22px rgba(38, 255, 120, 0.22);
    }

    .toast.win .toast-icon {
      background: linear-gradient(180deg, #31ff86, #089e45);
      box-shadow: 0 0 14px rgba(38, 255, 120, 0.40);
    }

    .toast.lose {
      border-color: rgba(255, 59, 59, 0.34);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 12px 32px rgba(0,0,0,0.42),
        0 0 22px rgba(255, 59, 59, 0.22);
    }

    .toast.lose .toast-icon {
      background: linear-gradient(180deg, #ff5a5a, #b80f23);
      box-shadow: 0 0 14px rgba(255, 59, 59, 0.40);
    }

    .toast.error .toast-icon,
    .toast.info .toast-icon {
      background: linear-gradient(180deg, #b35cff, #6a1fd0);
      box-shadow: 0 0 14px rgba(179, 92, 255, 0.34);
    }


    /* Финальная подгонка под компактный вид */
    .choice-side {
      min-width: 0;
    }

    .choice {
      width: 100%;
      box-shadow-width: 1px;
    }



    /* Дополнительное уменьшение всех нижних кнопок и панелей */
    .controls {
      width: min(calc(100% - 32px), 470px);
    }

    .series-panel {
      min-height: 50px;
    }

    .multi {
      height: 38px;
    }

    .bet-panel {
      min-height: 104px;
    }

    .choice {
      min-height: 44px;
      border-radius: 5px;
    }

    .quick {
      min-height: 30px;
      border-radius: 6px;
    }

    .pm {
      right: 8px;
    }

    @media (max-width: 370px) {
      .topbar {
        left: 14px;
        right: 14px;
      }

      .balance {
        font-size: 16px;
        gap: 7px;
      }

      .wallet {
        width: 19px;
        height: 19px;
      }

      .top-actions {
      display: none;
        gap: 12px;
      }

      .sound {
        width: 60px;
        height: 34px;
      }

      .sound-knob {
        width: 26px;
        height: 26px;
      }

      .gear-btn {
        width: 30px;
        height: 30px;
      }

      .coin-zone {
        min-height: 370px;
      }

      .coin-wrap {
        width: min(59vw, 250px);
      }

      .series-panel {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .series-right {
        justify-content: flex-end;
      }

      .bet-panel {
        grid-template-columns: 0.78fr 1.22fr;
        gap: 8px;
        padding: 9px;
      }
    }


    /* Версия меньше: компактные кнопки и верхняя панель */
    .topbar {
      top: max(14px, env(safe-area-inset-top));
      left: 16px;
      right: 16px;
    }

    .balance {
      gap: 6px;
      font-size: 15px;
      font-weight: 700;
    }

    .wallet {
      width: 17px;
      height: 17px;
      color: #fff;
    }

    .top-actions {
      display: none;
      gap: 10px;
    }

    .sound {
      width: 52px;
      height: 28px;
      padding: 3px;
    }

    .sound-knob {
      width: 22px;
      height: 22px;
    }

    .sound-knob svg {
      width: 17px;
      height: 17px;
    }

    .gear-btn {
      width: 27px;
      height: 27px;
    }

    .controls {
      left: 20px;
      right: 20px;
      width: min(calc(100% - 40px), 440px);
      gap: 6px;
      bottom: max(8px, env(safe-area-inset-bottom));
    }

    .series-panel,
    .bet-panel {
      border-radius: 16px;
    }

  <script>
    const COINFLIP_API_URL = 'https://xcsjedwhqcrwdzmuahjl.supabase.co/functions/v1/coinflip';

    const amountInput = document.getElementById('amount');

    const toast = document.getElementById('toast');
    const toastIcon = document.getElementById('toastIcon');
    const toastText = document.getElementById('toastText');
    const controls = document.querySelector('.controls');
    const historyPanel = document.getElementById('historyPanel');
    const historyList = document.getElementById('historyList');
    const choiceButtons = [...document.querySelectorAll('.choice')];

    const tg = window.Telegram?.WebApp || null;
    const initData = tg?.initData || '';
    const PRELOADER_STARTED_AT = Date.now();
    const PRELOADER_MIN_MS = 2400;

    let balance = 0;
    let isSpinning = false;
    let currentRotation = 0;
    let historyResults = [];
    let winMultiplier = 1.88;
    let profitCoef = winMultiplier - 1;
    let minBet = 8;
    let maxBet = 10000;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.BackButton.show();
      tg.BackButton.onClick(() => {
        window.location.href = 'index.html';
      });
    }


    function hidePreloader() {
      const preloader = document.getElementById('preloader');
      if (!preloader) return;

      const elapsed = Date.now() - PRELOADER_STARTED_AT;
      const wait = Math.max(0, PRELOADER_MIN_MS - elapsed);

      setTimeout(() => {
        preloader.classList.add('hidden');
        setTimeout(() => {
          if (preloader?.parentNode) preloader.remove();
        }, 360);
      }, wait);
    }

    function setPreloaderText(text) {
      const el = document.getElementById('preloaderText');
      if (el) el.textContent = text;
    }

    function formatRub(value) {
      const number = Math.floor(Number(value || 0));
      return new Intl.NumberFormat('ru-RU', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(number) + ' ₽';
    }

    function updateBalance(value = balance) {
      balance = Number(value || 0);
      balanceEl.textContent = formatRub(balance);
    }

    function getAmount() {
      const raw = amountInput.value.replace(/[^0-9]/g, '');
      const num = parseInt(raw, 10);
      return Number.isFinite(num) ? Math.floor(num) : 0;
    }

    function updatePossibleWin() {
      const bet = getAmount();
      const possibleTotalWin = Math.max(0, bet * winMultiplier);
      profitCoefEl.textContent = 'x' + winMultiplier.toFixed(2);
      possibleWinEl.textContent = formatRub(possibleTotalWin);
    }

    function setAmount(value) {
      const normalized = Math.floor(Math.min(maxBet, Math.max(minBet, Number(value || 0))));
      amountInput.value = normalized + ' ₽';
      updatePossibleWin();
    }

    function setBusy(isBusy) {
      isSpinning = isBusy;
      choiceButtons.forEach((button) => {
        button.disabled = isBusy;
        button.style.opacity = isBusy ? '0.72' : '';
        button.style.pointerEvents = isBusy ? 'none' : '';
      });
      amountInput.disabled = isBusy;
      document.getElementById('plusBtn').disabled = isBusy;
      document.getElementById('minusBtn').disabled = isBusy;
      document.getElementById('halfBtn').disabled = isBusy;
      document.getElementById('doubleBtn').disabled = isBusy;
    }

    async function callCoinflipApi(payload) {
      const res = await fetch(COINFLIP_API_URL, {
        method: 'POST',
        headers: new Headers({
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
        }),
        body: JSON.stringify(payload),
      });

      let data = null;
      try {
        data = await res.json();
      } catch (_) {
        data = null;
      }

      if (!res.ok || !data?.ok) {
        throw new Error(data?.error || 'Ошибка игры');
      }

      return data;
    }

    function normalizeGameError(error) {
      const message = String(error?.message || error || '').trim();
      const lower = message.toLowerCase();

      if (!initData) return 'Откройте игру через Telegram';
      if (lower.includes('недостаточно')) return 'Недостаточно средств';
      if (lower.includes('минимальная ставка')) return message;
      if (lower.includes('максимальная ставка')) return message;
      if (lower.includes('временно недоступна')) return 'Игра временно недоступна';
      if (lower.includes('пользователь')) return 'Пользователь не найден';
      if (lower.includes('telegram')) return 'Ошибка авторизации Telegram';
      if (lower.includes('failed to fetch') || lower.includes('network')) return 'Ошибка соединения';

      return message || 'Ошибка игры';
    }

    async function loadGameState() {
      setPreloaderText('Подключаем баланс...');

      if (!initData) {
        updateBalance(0);
        updatePossibleWin();
        setPreloaderText('Откройте игру через Telegram');
        showToast('Откройте игру через Telegram', 'error');
        return;
      }

      try {
        const data = await callCoinflipApi({
          action: 'state',
          initData,
        });

        winMultiplier = Number(data.multiplier || 1.88);
        profitCoef = winMultiplier - 1;
        minBet = Number(data.min_bet || 8);
        maxBet = Number(data.max_bet || 10000);

        updateBalance(Number(data.balance || 0));
        setAmount(Math.max(minBet, getAmount() || minBet));
        updatePossibleWin();

        hidePreloader();

        if (!data.is_active) {
          showToast('Игра временно недоступна', 'error');
        }
      } catch (error) {
        const message = normalizeGameError(error);
        setPreloaderText(message);
        showToast(message, 'error');
      }
    }

    function getToastIcon(type) {
      if (type === 'win') {
        return `
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 12.6L9.3 16.8L19 7.2" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        `;
      }

      if (type === 'lose') {
        return `
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
          </svg>
        `;
      }

      return `
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 8.2V12.6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M12 16.2H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5Z" stroke="currentColor" stroke-width="2"/>
        </svg>
      `;
    }

    function updateHistoryPosition() {
      const historyHeight = historyPanel.offsetHeight;
      document.documentElement.style.setProperty('--history-height', historyHeight + 'px');
    }

    function placeToastAbovePanel() {
      const rect = controls.getBoundingClientRect();
      const bottom = window.innerHeight - rect.top + 10;
      toast.style.bottom = bottom + 'px';
    }

    function triggerWinBurst() {
      winBurst.innerHTML = '';
      const particles = 12;
      for (let i = 0; i < particles; i++) {
        const angle = (Math.PI * 2 * i) / particles;
        const distance = 52 + Math.random() * 28;
        const spark = document.createElement('span');
        spark.className = 'win-spark';
        spark.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        spark.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
        spark.style.setProperty('--rot', `${(angle * 180 / Math.PI) + 90}deg`);
        spark.style.setProperty('--size', `${6 + Math.random() * 5}px`);
        winBurst.appendChild(spark);
      }

      winBurst.classList.remove('active');
      void winBurst.offsetWidth;
      winBurst.classList.add('active');
      clearTimeout(triggerWinBurst.timer);
      triggerWinBurst.timer = setTimeout(() => {
        winBurst.classList.remove('active');
        winBurst.innerHTML = '';
      }, 760);
    }

    function getHistoryCoinMarkup(result) {
      const sideClass = result === 'Орёл' ? 'front' : 'back';
      const iconMarkup = result === 'Орёл'
        ? '<img class="coin-custom-image" src="images/CoinGold.webp" alt="Орёл" decoding="async">'
        : '<img class="coin-custom-image" src="images/CoinSilver.webp" alt="Решка" decoding="async">';
      return `
        <div class="history-item" aria-label="${result}">
          <div class="history-coin-box">
            <div class="coin-face ${sideClass}">
              <div class="coin-art">
                <div class="coin-emblem" aria-hidden="true">${iconMarkup}</div>
              </div>
            </div>
          </div>
          <span class="history-label">${result}</span>
        </div>
      `;
    }

    function renderHistory() {
      if (!historyResults.length) {
        historyList.innerHTML = '<div class="history-empty">Пока ещё не было выпадений</div>';
      } else {
        historyList.innerHTML = historyResults.map(getHistoryCoinMarkup).join('');
      }
      updateHistoryPosition();
      if (toast.classList.contains('show')) placeToastAbovePanel();
    }

    function addHistoryResult(result) {
      historyResults.unshift(result);
      historyResults = historyResults.slice(0, 8);
      renderHistory();
    }

    function showToast(text, type = 'info') {
      toastText.textContent = text;
      toastIcon.innerHTML = getToastIcon(type);
      toast.className = 'toast ' + type;
      placeToastAbovePanel();
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function animateCoinToResult(result, callback) {
      const currentBaseRotation = Math.floor(currentRotation / 360) * 360;
      currentRotation = currentBaseRotation + 1800 + (result === 'Решка' ? 180 : 0);
      coin.style.transform = `rotateY(${currentRotation}deg)`;
      setTimeout(callback, 780);
    }

    window.addEventListener('resize', () => {
      updateHistoryPosition();
      if (toast.classList.contains('show')) placeToastAbovePanel();
    });

    document.getElementById('plusBtn').addEventListener('click', () => {
      setAmount(getAmount() + 1);
    });

    document.getElementById('minusBtn').addEventListener('click', () => {
      setAmount(getAmount() - 1);
    });

    document.getElementById('halfBtn').addEventListener('click', () => {
      setAmount(getAmount() / 2);
    });

    document.getElementById('doubleBtn').addEventListener('click', () => {
      setAmount(getAmount() * 2);
    });

    amountInput.addEventListener('focus', () => {
      amountInput.value = String(Math.floor(getAmount()));
    });

    amountInput.addEventListener('input', updatePossibleWin);

    amountInput.addEventListener('blur', () => {
      setAmount(getAmount());
    });

    choiceButtons.forEach((btn) => {
      btn.addEventListener('click', async () => {
        if (isSpinning) return;

        const choice = btn.dataset.choice;
        const bet = Math.floor(getAmount());

        if (!initData) {
          showToast('Откройте игру через Telegram', 'error');
          return;
        }

        if (bet < minBet) {
          showToast('Минимум ' + formatRub(minBet), 'error');
          return;
        }

        if (bet > maxBet) {
          showToast('Максимум ' + formatRub(maxBet), 'error');
          return;
        }

        if (bet > balance) {
          showToast('Недостаточно средств', 'error');
          return;
        }

        setBusy(true);
        coinWrap.classList.remove('flash-win', 'flash-lose');

        try {
          const data = await callCoinflipApi({
            action: 'play',
            initData,
            choice,
            bet,
          });

          const result = data.result;
          const isWin = Boolean(data.is_win);
          const betAmount = Math.floor(Number(data.bet_amount || bet));
          const payout = Math.floor(Number(data.payout_amount || 0));
          const profit = Math.floor(Number(data.profit_amount || 0));

          animateCoinToResult(result, () => {
            addHistoryResult(result);

            if (isWin) {
              coinWrap.classList.add('flash-win');
              triggerWinBurst();
              showToast('Возврат ' + formatRub(betAmount) + ' + приз ' + formatRub(Math.max(0, profit)), 'win');
            } else {
              coinWrap.classList.add('flash-lose');
              showToast('Списано ' + formatRub(betAmount) + ' • Проигрыш', 'lose');
            }

            updateBalance(Math.floor(Number(data.balance_after || 0)));

            if (window.parent && window.parent !== window) {
              window.parent.postMessage({ type: 'VEZUS_BALANCE_UPDATED', balance: Math.floor(Number(data.balance_after || 0)) }, '*');
            }

            setTimeout(() => {
              coinWrap.classList.remove('flash-win', 'flash-lose');
              setBusy(false);
            }, 1000);
          });
        } catch (error) {
          showToast(normalizeGameError(error), 'error');
          setBusy(false);
        }
      });
    });

    renderHistory();
    requestAnimationFrame(() => {
      updateHistoryPosition();
      placeToastAbovePanel();
      loadGameState();
    });
  </script>
</body>
</html>
