<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>CoinFlip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07050d;
      --stroke: rgba(166, 77, 255, 0.35);
      --history-height: 58px;
      --panel-side: 24px;
      --panel-width: 410px;
      --coin-size: min(52vw, 248px);
      --safe-bottom: env(safe-area-inset-bottom);
      --gold-1: #ffe66b;
      --gold-2: #eda100;
      --gold-3: #b87500;
      --silver-1: #eafaff;
      --silver-2: #b7dbe7;
      --silver-3: #82b5c6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: #fff;
      font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .game {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 32%, rgba(255, 179, 42, 0.16), transparent 27%),
        radial-gradient(circle at 50% 100%, rgba(141, 42, 255, 0.20), transparent 42%),
        linear-gradient(180deg, #08050f 0%, #160020 52%, #0b0811 100%);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 18% 20%, rgba(160, 44, 255, 0.16), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.05), transparent 18%);
    }

    .preloader {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: grid;
      place-items: center;
      overflow: hidden;
      isolation: isolate;
      background: linear-gradient(180deg, #040404 0%, #111111 38%, #1b1b1b 62%, #070707 100%);
      color: #fff;
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity .42s ease, visibility .42s ease;
    }

    .preloader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .preloader::before,
    .preloader::after {
      content: "";
      position: absolute;
      z-index: 0;
      width: 420px;
      height: 420px;
      border-radius: 46% 54% 58% 42% / 42% 46% 54% 58%;
      filter: blur(44px);
      opacity: .34;
      pointer-events: none;
      will-change: transform, border-radius;
    }

    .preloader::before {
      left: -110px;
      top: -70px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.08), rgba(82,82,82,.28) 42%, rgba(22,22,22,.04) 76%);
      animation: coinflipLavaBlobOne 6.4s ease-in-out infinite alternate;
    }

    .preloader::after {
      right: -120px;
      bottom: -90px;
      width: 470px;
      height: 470px;
      background: radial-gradient(circle at 55% 45%, rgba(255,255,255,.06), rgba(96,96,96,.24) 40%, rgba(18,18,18,.03) 76%);
      animation: coinflipLavaBlobTwo 7.2s ease-in-out infinite alternate;
    }

    .coinflip-preloader-inner {
      position: relative;
      z-index: 2;
      width: min(74vw, 300px);
      display: grid;
      justify-items: center;
      transform: translateY(-4px);
      animation: coinflipPreloaderIn .36s ease both;
    }

    .coinflip-preloader-inner::before,
    .coinflip-preloader-inner::after {
      content: "";
      position: absolute;
      z-index: -1;
      border-radius: 50%;
      filter: blur(34px);
      opacity: .18;
      pointer-events: none;
    }

    .coinflip-preloader-inner::before {
      width: 220px;
      height: 220px;
      left: -80px;
      top: -90px;
      background: rgba(88, 88, 88, .22);
      animation: coinflipLavaBlobThree 5.8s ease-in-out infinite alternate;
    }

    .coinflip-preloader-inner::after {
      width: 180px;
      height: 180px;
      right: -70px;
      bottom: -80px;
      background: rgba(60, 60, 60, .20);
      animation: coinflipLavaBlobFour 6.6s ease-in-out infinite alternate;
    }

    .coinflip-preloader-logo {
      width: 154px;
      max-width: 54vw;
      height: auto;
      display: block;
      object-fit: contain;
      transform-origin: center bottom;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.48));
      animation: coinflipLogoJump 1.18s ease-in-out infinite;
    }

    .coinflip-loader-line {
      width: min(220px, 68vw);
      height: 4px;
      margin-top: 22px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
    }

    .coinflip-loader-line span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      transform: scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, #5f2cff 0%, #9d4dff 45%, #d946ef 100%);
      box-shadow: 0 0 14px rgba(157,77,255,.28);
      animation: coinflipCleanLine 2.05s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .topbar {
      position: fixed;
      top: max(12px, env(safe-area-inset-top));
      left: 16px;
      right: auto;
      z-index: 45;
      width: auto;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      pointer-events: none;
    }

    .balance {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 12px;
      color: #fff;
      font-size: 16px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 0 10px rgba(255,255,255,.08);
      pointer-events: auto;
    }

    .wallet {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    .wallet path,
    .wallet circle {
      fill: currentColor;
    }

    .coin-zone {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 49vh;
      min-height: 310px;
      padding: 32px 0 0;
      display: grid;
      grid-template: 1fr / 1fr;
      align-items: end;
      justify-items: center;
    }

    .grid-glow {
      position: relative;
      grid-area: 1 / 1;
      z-index: 0;
      align-self: end;
      justify-self: center;
      width: min(76vw, 360px);
      height: min(76vw, 360px);
      transform: translateY(20px);
      opacity: .32;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,.11) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.11) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle, black 42%, transparent 72%);
      -webkit-mask-image: radial-gradient(circle, black 42%, transparent 72%);
    }

    .coin-wrap {
      position: relative;
      grid-area: 1 / 1;
      z-index: 2;
      width: var(--coin-size);
      aspect-ratio: 1;
      align-self: end;
      justify-self: center;
      perspective: 1000px;
      transform: translateY(-8px);
      contain: layout style;
    }

    .coin-wrap::before {
      content: "";
      position: absolute;
      inset: -10%;
      z-index: 0;
      border-radius: 50%;
      opacity: .58;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255, 202, 65, .22), rgba(157, 77, 255, .08) 48%, transparent 72%);
      filter: blur(6px);
      animation: modernCoinGlow 3.2s ease-in-out infinite;
    }

    .coin-wrap::after {
      content: "";
      position: absolute;
      inset: -14%;
      z-index: 1;
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      filter: blur(8px);
      transform: scale(.88);
    }

    .coin-wrap.flash-win::after {
      background: radial-gradient(circle, rgba(86,255,162,.98) 0%, rgba(86,255,162,.78) 30%, rgba(86,255,162,.28) 54%, transparent 72%);
      box-shadow: 0 0 18px rgba(86,255,162,.78), 0 0 30px rgba(86,255,162,.38);
      animation: resultFlashSimple .6s ease-out;
    }

    .coin-wrap.flash-lose::after {
      background: radial-gradient(circle, rgba(255,86,86,.98) 0%, rgba(255,86,86,.80) 30%, rgba(255,86,86,.30) 54%, transparent 72%);
      box-shadow: 0 0 18px rgba(255,86,86,.80), 0 0 30px rgba(255,86,86,.40);
      animation: resultFlashSimple .6s ease-out;
    }

    .coin {
      position: absolute;
      inset: 0;
      z-index: 2;
      border-radius: 50%;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform .78s cubic-bezier(.15,.75,.15,1);
      will-change: transform;
    }

    .coin-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      border: 0;
      border-radius: 50%;
      background: transparent;
      box-shadow: none;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      will-change: transform;
    }

    .coin-face.front {
      transform: rotateY(0deg) translateZ(1px);
      -webkit-transform: rotateY(0deg) translateZ(1px);
    }

    .coin-face.back {
      transform: rotateY(180deg) translateZ(1px);
      -webkit-transform: rotateY(180deg) translateZ(1px);
    }

    .coin-art {
      width: 100%;
      height: 100%;
      padding: 0;
      display: grid;
      place-items: center;
      transform: translateZ(3px);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .coin-emblem {
      width: 100%;
      height: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      overflow: visible;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .coin-custom-image {
      width: 112%;
      height: 112%;
      max-width: none;
      max-height: none;
      display: block;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      transform: translateZ(4px);
      filter: drop-shadow(0 16px 22px rgba(0,0,0,.34));
    }

    .win-burst {
      position: absolute;
      inset: -18%;
      z-index: 1;
      pointer-events: none;
      opacity: 0;
    }

    .win-burst.active {
      opacity: 1;
    }

    .win-spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: var(--size, 8px);
      height: var(--size, 8px);
      margin-left: calc(var(--size, 8px) / -2);
      margin-top: calc(var(--size, 8px) / -2);
      border-radius: 999px;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.98) 0 22%, rgba(173,255,205,.95) 34%, rgba(53,255,129,.80) 60%, rgba(53,255,129,0) 100%);
      box-shadow: 0 0 12px rgba(53,255,129,.80), 0 0 22px rgba(255,220,95,.44);
      transform: translate(-50%, -50%) scale(.3);
      animation: sparkBurst .72s ease-out forwards;
    }

    .win-spark::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 15px;
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg));
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(82,255,156,0));
      box-shadow: 0 0 12px rgba(255,255,255,.40);
    }

    .controls,
    .history-panel {
      position: fixed;
      left: var(--panel-side);
      right: var(--panel-side);
      width: min(calc(100% - (var(--panel-side) * 2)), var(--panel-width));
      margin: 0 auto;
    }

    .controls {
      bottom: calc(var(--history-height) + var(--safe-bottom) + 34px);
      z-index: 15;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .profit-panel,
    .bet-panel,
    .history-panel {
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, rgba(34,27,52,.94), rgba(22,15,34,.94));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 18px 40px rgba(0,0,0,.44), 0 0 22px rgba(140,35,255,.14);
    }

    .profit-panel {
      min-height: 43px;
      padding: 7px 10px;
      display: grid;
      grid-template-columns: .9fr 1.1fr;
      gap: 8px;
      align-items: center;
      border-radius: 14px;
    }

    .profit-item {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .profit-item span {
      color: #fff;
      font-size: 10px;
      line-height: 1;
      font-weight: 600;
      white-space: nowrap;
    }

    .profit-item strong {
      color: #fff;
      font-size: clamp(13px, 3.5vw, 16px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bet-panel {
      min-height: 126px;
      padding: 10px;
      display: grid;
      grid-template-columns: 1.12fr .88fr;
      gap: 10px;
      border-radius: 17px;
    }

    .stake-side {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr 36px;
      gap: 8px;
    }

    .stake-box {
      position: relative;
      min-height: 68px;
      display: flex;
      align-items: center;
      padding: 10px 40px 10px 12px;
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(50,47,83,.98), rgba(43,39,70,.98));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.035);
    }

    .amount {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      letter-spacing: -0.06em;
    }

    .amount::placeholder {
      color: rgba(255,255,255,.45);
    }

    .pm {
      position: absolute;
      right: 9px;
      width: 28px;
      height: 25px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 6px;
      background: linear-gradient(180deg, rgba(61,51,91,.96), rgba(29,21,48,.96));
      color: #d3baff;
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
    }

    .pm.plus { top: 7px; }
    .pm.minus { bottom: 7px; }

    .quick-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .quick {
      min-height: 36px;
      border: 1px solid rgba(255,255,255,.055);
      border-radius: 7px;
      background: linear-gradient(180deg, rgba(42,34,67,.96), rgba(29,23,47,.96));
      color: rgba(226,204,255,.90);
      font-size: 17px;
      line-height: 1;
      font-weight: 700;
    }

    .choice-side {
      min-width: 0;
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }

    .choice {
      width: 100%;
      min-height: 50px;
      border-radius: 5px;
      color: #121015;
      font-size: clamp(13px, 3.4vw, 16px);
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0;
      transform: translateZ(0);
      transition: transform .12s ease, filter .12s ease;
    }

    .choice.gold {
      border: 1px solid rgba(255,236,120,.95);
      background: linear-gradient(90deg, rgba(255,255,255,.55), transparent 28%), linear-gradient(135deg, var(--gold-1), var(--gold-2) 62%, var(--gold-3));
      box-shadow: inset 0 3px 5px rgba(255,255,255,.42), inset 0 -4px 8px rgba(113,64,0,.32), 0 0 16px rgba(255,177,0,.44);
    }

    .choice.silver {
      border: 1px solid rgba(233,250,255,.96);
      background: linear-gradient(90deg, rgba(255,255,255,.72), transparent 33%), linear-gradient(135deg, var(--silver-1), var(--silver-2) 57%, var(--silver-3));
      box-shadow: inset 0 3px 5px rgba(255,255,255,.55), inset 0 -4px 9px rgba(58,91,107,.28), 0 0 15px rgba(160,230,255,.36);
    }

    .choice:active,
    .quick:active,
    .pm:active {
      transform: scale(.97);
      filter: brightness(.93);
    }

    .choice:disabled,
    .quick:disabled,
    .pm:disabled,
    .amount:disabled {
      cursor: default;
    }

    .history-panel {
      bottom: max(18px, calc(var(--safe-bottom) + 10px));
      z-index: 14;
      padding: 6px 8px;
      border-color: rgba(166,77,255,.18);
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(27,21,41,.94), rgba(16,12,25,.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 12px 28px rgba(0,0,0,.30), 0 0 16px rgba(140,35,255,.10);
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .history-title {
      color: rgba(255,255,255,.82);
      font-size: 10px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .history-list {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 1px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .history-list::-webkit-scrollbar {
      display: none;
    }

    .history-empty {
      width: 100%;
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      border: 1px dashed rgba(255,255,255,.08);
      border-radius: 10px;
      color: rgba(255,255,255,.44);
      font-size: 10px;
      font-weight: 600;
      text-align: center;
    }

    .history-item {
      min-width: 34px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .history-coin-box {
      position: relative;
      width: 32px;
      height: 32px;
      flex: 0 0 auto;
      border-radius: 50%;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.28));
    }

    .history-coin-box .coin-face.back {
      transform: none;
      -webkit-transform: none;
    }

    .history-coin-box .coin-art,
    .history-coin-box .coin-emblem {
      width: 100%;
      height: 100%;
      padding: 0;
      display: grid;
      place-items: center;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .history-coin-box .coin-custom-image {
      width: 112%;
      height: 112%;
      filter: drop-shadow(0 3px 5px rgba(0,0,0,.22));
    }

    .history-label {
      display: none;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 220px;
      z-index: 40;
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px 7px 8px;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(28,21,43,.96), rgba(14,10,24,.96));
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 20px rgba(140,35,255,.16);
      color: #fff;
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 10px) scale(.98);
      transition: opacity .20s ease, transform .20s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .toast-icon {
      width: 24px;
      height: 24px;
      min-width: 24px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: #fff;
    }

    .toast-icon svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .toast.win {
      border-color: rgba(38,255,120,.34);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 22px rgba(38,255,120,.22);
    }

    .toast.win .toast-icon {
      background: linear-gradient(180deg, #31ff86, #089e45);
      box-shadow: 0 0 14px rgba(38,255,120,.40);
    }

    .toast.lose {
      border-color: rgba(255,59,59,.34);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04), 0 12px 32px rgba(0,0,0,.42), 0 0 22px rgba(255,59,59,.22);
    }

    .toast.lose .toast-icon {
      background: linear-gradient(180deg, #ff5a5a, #b80f23);
      box-shadow: 0 0 14px rgba(255,59,59,.40);
    }

    .toast.error .toast-icon,
    .toast.info .toast-icon {
      background: linear-gradient(180deg, #b35cff, #6a1fd0);
      box-shadow: 0 0 14px rgba(179,92,255,.34);
    }

    @keyframes coinflipLogoJump {
      0%, 100% { transform: translateY(0) scale(1); }
      42% { transform: translateY(-8px) scale(1.025); }
      64% { transform: translateY(0) scale(.995); }
    }

    @keyframes coinflipCleanLine {
      0% { transform: scaleX(0); }
      72% { transform: scaleX(.84); }
      100% { transform: scaleX(1); }
    }

    @keyframes coinflipPreloaderIn {
      from { opacity: 0; transform: translateY(8px) scale(.985); }
      to { opacity: 1; transform: translateY(-4px) scale(1); }
    }

  <script>
    const COINFLIP_API_URL = 'https://xcsjedwhqcrwdzmuahjl.supabase.co/functions/v1/coinflip';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhjc2plZHdocWNyd2R6bXVhaGpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyNzk0ODYsImV4cCI6MjA5Mzg1NTQ4Nn0.M2ksKeWwDt0BQxgjxpGhLKLMNP_ve1dcZvQ0Ix88Ock';

        const amountInput = document.getElementById('amount');

        const toastText = document.getElementById('toastText');
        const controls = document.querySelector('.controls');
        const historyPanel = document.getElementById('historyPanel');
        const historyList = document.getElementById('historyList');
        const choiceButtons = [...document.querySelectorAll('.choice')];

        const tg = window.Telegram?.WebApp || null;
        const initData = tg?.initData || '';
        const PRELOADER_STARTED_AT = Date.now();
        const PRELOADER_MIN_MS = 2400;

        let balance = 0;
        let isSpinning = false;
        let currentRotation = 0;
        let historyResults = [];
        let winMultiplier = 1.88;
        let profitCoef = winMultiplier - 1;
        let minBet = 8;
        let maxBet = 10000;

        if (tg) {
          tg.ready();
          tg.expand();
          tg.BackButton.show();
          tg.BackButton.onClick(() => {
            window.location.href = 'index.html';
          });
        }


        function hidePreloader() {
          const preloader = document.getElementById('preloader');
          if (!preloader) return;

          const elapsed = Date.now() - PRELOADER_STARTED_AT;
          const wait = Math.max(0, PRELOADER_MIN_MS - elapsed);

          setTimeout(() => {
            preloader.classList.add('hidden');
            setTimeout(() => {
              if (preloader?.parentNode) preloader.remove();
            }, 360);
          }, wait);
        }

        function setPreloaderText(text) {
          const el = document.getElementById('preloaderText');
          if (el) el.textContent = text;
        }

        function formatRub(value) {
          const number = Math.floor(Number(value || 0));
          return new Intl.NumberFormat('ru-RU', {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
          }).format(number) + ' ₽';
        }

        function updateBalance(value = balance) {
          balance = Number(value || 0);
          balanceEl.textContent = formatRub(balance);
        }

        function getAmount() {
          const raw = amountInput.value.replace(/[^0-9]/g, '');
          const num = parseInt(raw, 10);
          return Number.isFinite(num) ? Math.floor(num) : 0;
        }

        function updatePossibleWin() {
          const bet = getAmount();
          const possibleTotalWin = Math.max(0, bet * winMultiplier);
          profitCoefEl.textContent = 'x' + winMultiplier.toFixed(2);
          possibleWinEl.textContent = formatRub(possibleTotalWin);
        }

        function setAmount(value) {
          const normalized = Math.floor(Math.min(maxBet, Math.max(minBet, Number(value || 0))));
          amountInput.value = normalized + ' ₽';
          updatePossibleWin();
        }

        function setBusy(isBusy) {
          isSpinning = isBusy;
          choiceButtons.forEach((button) => {
            button.disabled = isBusy;
            button.style.opacity = isBusy ? '0.72' : '';
            button.style.pointerEvents = isBusy ? 'none' : '';
          });
          amountInput.disabled = isBusy;
          document.getElementById('plusBtn').disabled = isBusy;
          document.getElementById('minusBtn').disabled = isBusy;
          document.getElementById('halfBtn').disabled = isBusy;
          document.getElementById('doubleBtn').disabled = isBusy;
        }

        async function callCoinflipApi(payload) {
          const res = await fetch(COINFLIP_API_URL, {
            method: 'POST',
            headers: new Headers({
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            }),
            body: JSON.stringify(payload),
          });

          let data = null;
          try {
            data = await res.json();
          } catch (_) {
            data = null;
          }

          if (!res.ok || !data?.ok) {
            throw new Error(data?.error || 'Ошибка игры');
          }

          return data;
        }

        function normalizeGameError(error) {
          const message = String(error?.message || error || '').trim();
          const lower = message.toLowerCase();

          if (!initData) return 'Откройте игру через Telegram';
          if (lower.includes('недостаточно')) return 'Недостаточно средств';
          if (lower.includes('минимальная ставка')) return message;
          if (lower.includes('максимальная ставка')) return message;
          if (lower.includes('временно недоступна')) return 'Игра временно недоступна';
          if (lower.includes('пользователь')) return 'Пользователь не найден';
          if (lower.includes('telegram')) return 'Ошибка авторизации Telegram';
          if (lower.includes('failed to fetch') || lower.includes('network')) return 'Ошибка соединения';

          return message || 'Ошибка игры';
        }

        async function loadGameState() {
          setPreloaderText('Подключаем баланс...');

          if (!initData) {
            updateBalance(0);
            updatePossibleWin();
            setPreloaderText('Откройте игру через Telegram');
            showToast('Откройте игру через Telegram', 'error');
            return;
          }

          try {
            const data = await callCoinflipApi({
              action: 'state',
              initData,
            });

            winMultiplier = Number(data.multiplier || 1.88);
            profitCoef = winMultiplier - 1;
            minBet = Number(data.min_bet || 8);
            maxBet = Number(data.max_bet || 10000);

            updateBalance(Number(data.balance || 0));
            setAmount(Math.max(minBet, getAmount() || minBet));
            updatePossibleWin();

            hidePreloader();

            if (!data.is_active) {
              showToast('Игра временно недоступна', 'error');
            }
          } catch (error) {
            const message = normalizeGameError(error);
            setPreloaderText(message);
            showToast(message, 'error');
          }
        }

        function getToastIcon(type) {
          if (type === 'win') {
            return `
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 12.6L9.3 16.8L19 7.2" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            `;
          }

          if (type === 'lose') {
            return `
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M7 7L17 17M17 7L7 17" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"/>
              </svg>
            `;
          }

          return `
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M12 8.2V12.6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
              <path d="M12 16.2H12.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
              <path d="M12 3.5C7.3 3.5 3.5 7.3 3.5 12S7.3 20.5 12 20.5 20.5 16.7 20.5 12 16.7 3.5 12 3.5Z" stroke="currentColor" stroke-width="2"/>
            </svg>
          `;
        }

        function updateHistoryPosition() {
          const historyHeight = historyPanel.offsetHeight;
          document.documentElement.style.setProperty('--history-height', historyHeight + 'px');
        }

        function placeToastAbovePanel() {
          const rect = controls.getBoundingClientRect();
          const bottom = window.innerHeight - rect.top + 10;
          toast.style.bottom = bottom + 'px';
        }

        function triggerWinBurst() {
          winBurst.innerHTML = '';
          const particles = 12;
          for (let i = 0; i < particles; i++) {
            const angle = (Math.PI * 2 * i) / particles;
            const distance = 52 + Math.random() * 28;
            const spark = document.createElement('span');
            spark.className = 'win-spark';
            spark.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
            spark.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
            spark.style.setProperty('--rot', `${(angle * 180 / Math.PI) + 90}deg`);
            spark.style.setProperty('--size', `${6 + Math.random() * 5}px`);
            winBurst.appendChild(spark);
          }

          winBurst.classList.remove('active');
          void winBurst.offsetWidth;
          winBurst.classList.add('active');
          clearTimeout(triggerWinBurst.timer);
          triggerWinBurst.timer = setTimeout(() => {
            winBurst.classList.remove('active');
            winBurst.innerHTML = '';
          }, 760);
        }

        function getHistoryCoinMarkup(result) {
          const sideClass = result === 'Орёл' ? 'front' : 'back';
          const iconMarkup = result === 'Орёл'
            ? '<img class="coin-custom-image" src="images/CoinGold.webp" alt="Орёл" decoding="async">'
            : '<img class="coin-custom-image" src="images/CoinSilver.webp" alt="Решка" decoding="async">';
          return `
            <div class="history-item" aria-label="${result}">
              <div class="history-coin-box">
                <div class="coin-face ${sideClass}">
                  <div class="coin-art">
                    <div class="coin-emblem" aria-hidden="true">${iconMarkup}</div>
                  </div>
                </div>
              </div>
              <span class="history-label">${result}</span>
            </div>
          `;
        }

        function renderHistory() {
          if (!historyResults.length) {
            historyList.innerHTML = '<div class="history-empty">Пока ещё не было выпадений</div>';
          } else {
            historyList.innerHTML = historyResults.map(getHistoryCoinMarkup).join('');
          }
          updateHistoryPosition();
          if (toast.classList.contains('show')) placeToastAbovePanel();
        }

        function addHistoryResult(result) {
          historyResults.unshift(result);
          historyResults = historyResults.slice(0, 8);
          renderHistory();
        }

        function showToast(text, type = 'info') {
          toastText.textContent = text;
          toastIcon.innerHTML = getToastIcon(type);
          toast.className = 'toast ' + type;
          placeToastAbovePanel();
          requestAnimationFrame(() => toast.classList.add('show'));
          clearTimeout(showToast.timer);
          showToast.timer = setTimeout(() => toast.classList.remove('show'), 1500);
        }

        function animateCoinToResult(result, callback) {
          const currentBaseRotation = Math.floor(currentRotation / 360) * 360;
          currentRotation = currentBaseRotation + 1800 + (result === 'Решка' ? 180 : 0);
          coin.style.transform = `rotateY(${currentRotation}deg)`;
          setTimeout(callback, 780);
        }

        window.addEventListener('resize', () => {
          updateHistoryPosition();
          if (toast.classList.contains('show')) placeToastAbovePanel();
        });

        document.getElementById('plusBtn').addEventListener('click', () => {
          setAmount(getAmount() + 1);
        });

        document.getElementById('minusBtn').addEventListener('click', () => {
          setAmount(getAmount() - 1);
        });

        document.getElementById('halfBtn').addEventListener('click', () => {
          setAmount(getAmount() / 2);
        });

        document.getElementById('doubleBtn').addEventListener('click', () => {
          setAmount(getAmount() * 2);
        });

        amountInput.addEventListener('focus', () => {
          amountInput.value = String(Math.floor(getAmount()));
        });

        amountInput.addEventListener('input', updatePossibleWin);

        amountInput.addEventListener('blur', () => {
          setAmount(getAmount());
        });

        choiceButtons.forEach((btn) => {
          btn.addEventListener('click', async () => {
            if (isSpinning) return;

            const choice = btn.dataset.choice;
            const bet = Math.floor(getAmount());

            if (!initData) {
              showToast('Откройте игру через Telegram', 'error');
              return;
            }

            if (bet < minBet) {
              showToast('Минимум ' + formatRub(minBet), 'error');
              return;
            }

            if (bet > maxBet) {
              showToast('Максимум ' + formatRub(maxBet), 'error');
              return;
            }

            if (bet > balance) {
              showToast('Недостаточно средств', 'error');
              return;
            }

            setBusy(true);
            coinWrap.classList.remove('flash-win', 'flash-lose');

            try {
              const data = await callCoinflipApi({
                action: 'play',
                initData,
                choice,
                bet,
              });

              const result = data.result;
              const isWin = Boolean(data.is_win);
              const betAmount = Math.floor(Number(data.bet_amount || bet));
              const payout = Math.floor(Number(data.payout_amount || 0));
              const profit = Math.floor(Number(data.profit_amount || 0));

              animateCoinToResult(result, () => {
                addHistoryResult(result);

                if (isWin) {
                  coinWrap.classList.add('flash-win');
                  triggerWinBurst();
                  showToast('Возврат ' + formatRub(betAmount) + ' + приз ' + formatRub(Math.max(0, profit)), 'win');
                } else {
                  coinWrap.classList.add('flash-lose');
                  showToast('Списано ' + formatRub(betAmount) + ' • Проигрыш', 'lose');
                }

                updateBalance(Math.floor(Number(data.balance_after || 0)));

                if (window.parent && window.parent !== window) {
                  window.parent.postMessage({ type: 'VEZUS_BALANCE_UPDATED', balance: Math.floor(Number(data.balance_after || 0)) }, '*');
                }

                setTimeout(() => {
                  coinWrap.classList.remove('flash-win', 'flash-lose');
                  setBusy(false);
                }, 1000);
              });
            } catch (error) {
              showToast(normalizeGameError(error), 'error');
              setBusy(false);
            }
          });
        });

        renderHistory();
        requestAnimationFrame(() => {
          updateHistoryPosition();
          placeToastAbovePanel();
          loadGameState();
        });
  </script>
</body>
</html>
