<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Профиль</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root{
      --text:#f7fbff;
      --muted:rgba(247,251,255,.66);
      --glass:rgba(10, 14, 26, .66);
      --accent:#8b5cf6;
      --accent-2:#38bdf8;
      --accent-3:#22d3ee;
      --accent-4:#c084fc;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
      --shadow-lg:0 28px 70px rgba(0,0,0,.52);
      --shadow-md:0 14px 32px rgba(0,0,0,.34);
    }

    *{
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      height:100%;
      margin:0;
      overflow:hidden;
      color:var(--text);
      background:#050816;
    }

    body{
      position:relative;
      background-image:url("https://i.postimg.cc/fbJT34yY/076E519D-F095-4957-88BF-5591DEB82533.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(900px 540px at 12% 0%, rgba(139,92,246,.22), transparent 58%),
        radial-gradient(760px 480px at 100% 18%, rgba(56,189,248,.18), transparent 60%),
        radial-gradient(700px 460px at 50% 100%, rgba(34,211,238,.10), transparent 56%),
        linear-gradient(180deg, rgba(5,8,22,.34), rgba(5,8,22,.82));
      z-index:0;
      pointer-events:none;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.035), transparent 25%, transparent 70%, rgba(255,255,255,.02)),
        linear-gradient(180deg, rgba(255,255,255,.025), transparent 34%);
      mix-blend-mode:screen;
      pointer-events:none;
      z-index:0;
    }

    .app{
      position:relative;
      z-index:1;
      height:100%;
      overflow:auto;
      padding:calc(18px + var(--safe-top)) 16px calc(30px + var(--safe-bottom));
    }

    .wrap{
      max-width:520px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        rgba(9,13,24,.54);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 14px 38px rgba(0,0,0,.28),
        0 0 24px rgba(56,189,248,.08);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      position:relative;
      overflow:hidden;
    }

    .topbar::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
      pointer-events:none;
      opacity:.55;
    }

    .icon-btn{
      width:46px;
      height:46px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      display:grid;
      place-items:center;
      color:#fff;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03)),
        rgba(11,15,28,.82);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        0 10px 24px rgba(0,0,0,.34),
        0 0 18px rgba(139,92,246,.10);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      flex-shrink:0;
    }

    .icon-btn svg{
      width:20px;
      height:20px;
      stroke:#fff;
      stroke-width:2.4;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .icon-btn:active{
      transform:scale(.97);
    }

    .top-title{
      flex:1;
      text-align:center;
      font-weight:900;
      font-size:18px;
      letter-spacing:.4px;
      color:#fff;
      text-shadow:0 8px 24px rgba(0,0,0,.35);
    }

    .ghost{
      visibility:hidden;
    }

    .profile-card{
      position:relative;
      overflow:hidden;
      border-radius:32px;
      padding:22px 18px 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        var(--glass);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:
        var(--shadow-lg),
        0 0 40px rgba(139,92,246,.10),
        0 0 0 1px rgba(255,255,255,.035) inset;
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      isolation:isolate;
    }

    .profile-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(280px 220px at 88% 0%, rgba(192,132,252,.16), transparent 62%),
        radial-gradient(240px 220px at 0% 100%, rgba(34,211,238,.10), transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    .profile-card::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      pointer-events:none;
      z-index:0;
    }

    .card-line{
      position:absolute;
      left:18px;
      right:18px;
      top:0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.24), transparent);
      opacity:.65;
      z-index:1;
    }

    .profile-top{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:18px;
    }

    .avatar-wrap{
      position:relative;
      width:126px;
      height:126px;
      margin:0 auto 14px;
      border-radius:50%;
      padding:4px;
      background:linear-gradient(135deg, rgba(192,132,252,1), rgba(139,92,246,.95), rgba(56,189,248,.92));
      box-shadow:
        0 18px 42px rgba(0,0,0,.42),
        0 0 28px rgba(139,92,246,.22),
        0 0 22px rgba(56,189,248,.16);
    }

    .avatar-wrap::before{
      content:"";
      position:absolute;
      inset:-10px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      opacity:.8;
      pointer-events:none;
    }

    .avatar-wrap::after{
      content:"";
      position:absolute;
      inset:-20px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(139,92,246,.18), transparent 62%);
      filter:blur(10px);
      z-index:-1;
      pointer-events:none;
    }

    .avatar{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
      background:#0f172a;
      border:2px solid rgba(9,13,24,.78);
    }

    .avatar-fallback{
      width:100%;
      height:100%;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      font-size:38px;
      color:#fff;
      border:2px solid rgba(9,13,24,.78);
      background:
        radial-gradient(circle at 30% 30%, rgba(56,189,248,.95), rgba(139,92,246,.84)),
        linear-gradient(180deg, #0f172a, #111827);
    }

    .name{
      margin:0 0 6px;
      text-align:center;
      font-size:22px;
      font-weight:900;
      letter-spacing:.2px;
      color:#fff;
      text-shadow:0 10px 26px rgba(0,0,0,.35);
    }

    .username{
      margin:0;
      font-size:14px;
      font-weight:800;
      color:#a5e6ff;
      padding:9px 14px;
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.025)),
        rgba(14,18,32,.50);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 24px rgba(0,0,0,.18);
      text-align:center;
    }

    .balance-box{
      position:relative;
      z-index:1;
      border-radius:28px;
      padding:18px 18px 16px;
      margin-bottom:16px;
      background:
        linear-gradient(135deg, rgba(139,92,246,.22), rgba(56,189,248,.14)),
        rgba(14,18,30,.78);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 18px 40px rgba(0,0,0,.30),
        0 0 28px rgba(139,92,246,.12),
        inset 0 1px 0 rgba(255,255,255,.06);
      overflow:hidden;
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
    }

    .balance-box::before{
      content:"";
      position:absolute;
      top:-50px;
      right:-30px;
      width:170px;
      height:170px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,255,255,.16), transparent 68%);
      pointer-events:none;
    }

    .balance-box::after{
      content:"";
      position:absolute;
      left:18px;
      right:18px;
      top:0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.28), transparent);
      opacity:.75;
      pointer-events:none;
    }

    .balance-head{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .balance-icon{
      width:46px;
      height:46px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:
        linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.04)),
        rgba(12,16,28,.78);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 10px 22px rgba(0,0,0,.22),
        0 0 18px rgba(56,189,248,.10);
      flex-shrink:0;
    }

    .balance-icon svg{
      width:21px;
      height:21px;
      stroke:#fff;
      stroke-width:2.1;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .balance-label{
      font-size:13px;
      font-weight:900;
      color:rgba(247,251,255,.72);
      letter-spacing:.3px;
      text-transform:uppercase;
    }

    .balance-value{
      font-size:34px;
      line-height:1;
      font-weight:900;
      color:#fff;
      letter-spacing:.3px;
      text-shadow:
        0 14px 28px rgba(0,0,0,.34),
        0 0 18px rgba(139,92,246,.12);
      word-break:break-word;
    }

    .info-list{
      position:relative;
      z-index:1;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .info-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px;
      border-radius:22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.025)),
        rgba(11,15,27,.52);
      border:1px solid rgba(255,255,255,.07);
      box-shadow:var(--shadow-md);
      position:relative;
      overflow:hidden;
    }

    .info-item::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(255,255,255,.035), transparent 30%, transparent 70%, rgba(255,255,255,.02));
      pointer-events:none;
    }

    .info-left{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
      position:relative;
      z-index:1;
    }

    .info-icon{
      width:44px;
      height:44px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:
        linear-gradient(135deg, rgba(192,132,252,.18), rgba(56,189,248,.12)),
        rgba(15,20,34,.78);
      border:1px solid rgba(255,255,255,.10);
      box-shadow:
        0 10px 22px rgba(0,0,0,.18),
        0 0 18px rgba(139,92,246,.08);
      flex-shrink:0;
    }

    .info-icon svg{
      width:20px;
      height:20px;
      stroke:#ffffff;
      stroke-width:2.1;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
      opacity:.96;
    }

    .info-meta{
      min-width:0;
    }

    .info-label{
      font-size:12px;
      font-weight:800;
      color:var(--muted);
      margin-bottom:4px;
      letter-spacing:.2px;
    }

    .info-desc{
      font-size:11px;
      font-weight:700;
      color:rgba(247,251,255,.42);
    }

    .info-value{
      position:relative;
      z-index:1;
      font-size:14px;
      font-weight:900;
      color:#fff;
      text-align:right;
      word-break:break-word;
      max-width:170px;
    }

    .status{
      margin-top:14px;
      text-align:center;
      font-size:12px;
      font-weight:700;
      color:rgba(247,251,255,.56);
      min-height:16px;
      position:relative;
      z-index:1;
    }

    @media (max-width:390px){
      .avatar-wrap{ width:114px; height:114px; }
      .balance-value{ font-size:29px; }
      .name{ font-size:20px; }
      .info-value{ max-width:132px; font-size:13px; }
    }

    @media (max-width:360px){
      .top-title{ font-size:17px; }
      .icon-btn{ width:44px; height:44px; }
      .profile-card{ padding:20px 14px 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="wrap">

      <div class="topbar">
        <button class="icon-btn" id="backBtn" aria-label="Назад">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>

        <div class="top-title">Профиль</div>

        <div class="icon-btn ghost" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </div>
      </div>

      <div class="profile-card">
        <div class="card-line"></div>

        <div class="profile-top">
          <div class="avatar-wrap" id="avatarWrap">
            <div class="avatar-fallback">?</div>
          </div>

          <h1 class="name" id="displayName">Загрузка...</h1>
          <p class="username" id="usernameValue">@username</p>
        </div>

        <div class="balance-box">
          <div class="balance-head">
            <div class="balance-icon">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 7.5A2.5 2.5 0 0 1 6.5 5H17a3 3 0 0 1 0 6H6.5A2.5 2.5 0 0 0 4 13.5"></path>
                <path d="M4 13.5A2.5 2.5 0 0 0 6.5 16H18"></path>
                <path d="M18 16h1.5A1.5 1.5 0 0 1 21 17.5A1.5 1.5 0 0 1 19.5 19H7"></path>
                <circle cx="16.5" cy="8" r="1"></circle>
              </svg>
            </div>
            <div class="balance-label">Баланс пользователя</div>
          </div>

          <div class="balance-value" id="balanceValue">0 ₽</div>
        </div>

        <div class="info-list">
          <div class="info-item">
            <div class="info-left">
              <div class="info-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <rect x="4" y="5" width="16" height="14" rx="4"></rect>
                  <path d="M9 9h6"></path>
                  <path d="M8 13h3"></path>
                  <path d="M14 13h2"></path>
                </svg>
              </div>

              <div class="info-meta">
                <div class="info-label">Telegram ID</div>
                <div class="info-desc">Уникальный идентификатор</div>
              </div>
            </div>

            <div class="info-value" id="tgIdValue">—</div>
          </div>

          <div class="info-item">
            <div class="info-left">
              <div class="info-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21 5L3 11l6 2 2 6 10-14z"></path>
                  <path d="M9 13l3 3"></path>
                </svg>
              </div>

              <div class="info-meta">
                <div class="info-label">Ник Telegram</div>
                <div class="info-desc">Имя пользователя</div>
              </div>
            </div>

            <div class="info-value" id="tgUsernameValue">—</div>
          </div>
        </div>

        <div class="status" id="statusText"></div>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const VERIFY_URL = "https://lazrfierfbhwlduqlvws.functions.supabase.co/verify-telegram";

    const backBtn = document.getElementById('backBtn');
    const avatarWrap = document.getElementById('avatarWrap');
    const displayNameEl = document.getElementById('displayName');
    const usernameEl = document.getElementById('usernameValue');
    const tgIdEl = document.getElementById('tgIdValue');
    const tgUsernameEl = document.getElementById('tgUsernameValue');
    const balanceEl = document.getElementById('balanceValue');
    const statusEl = document.getElementById('statusText');

    const rubFormatter = new Intl.NumberFormat('ru-RU', {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    });

    function formatRubles(value) {
      const num = Number(value ?? 0);
      if (!Number.isFinite(num)) return '0 ₽';
      return `${rubFormatter.format(num)} ₽`;
    }

    function getDisplayName(profile) {
      const full = [profile.first_name, profile.last_name].filter(Boolean).join(' ').trim();
      if (full) return full;
      if (profile.username) return '@' + profile.username;
      return 'Пользователь';
    }

    function getInitial(profile) {
      const source = (profile.first_name || profile.username || 'U').trim();
      return source.charAt(0).toUpperCase();
    }

    function setAvatar(profile) {
      avatarWrap.innerHTML = '';

      if (profile.photo_url) {
        const img = document.createElement('img');
        img.className = 'avatar';
        img.alt = 'Аватар';
        img.src = profile.photo_url;
        img.onerror = () => {
          avatarWrap.innerHTML = `<div class="avatar-fallback">${getInitial(profile)}</div>`;
        };
        avatarWrap.appendChild(img);
        return;
      }

      avatarWrap.innerHTML = `<div class="avatar-fallback">${getInitial(profile)}</div>`;
    }

    function renderProfile(profile) {
      if (!profile) return;

      localStorage.setItem('tg_profile', JSON.stringify(profile));

      setAvatar(profile);
      displayNameEl.textContent = getDisplayName(profile);
      usernameEl.textContent = profile.username ? `@${profile.username}` : 'Без ника';
      tgIdEl.textContent = profile.tg_id ?? '—';
      tgUsernameEl.textContent = profile.username ? `@${profile.username}` : '—';
      balanceEl.textContent = formatRubles(profile.balance);
    }

    function loadCachedProfile() {
      try {
        const raw = localStorage.getItem('tg_profile');
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return null;
        return parsed;
      } catch {
        return null;
      }
    }

    async function refreshProfileFromTelegram() {
      if (!window.Telegram || !window.Telegram.WebApp) {
        statusEl.textContent = '';
        return;
      }

      try {
        Telegram.WebApp.ready();
        if (typeof Telegram.WebApp.expand === 'function') Telegram.WebApp.expand();
        if (typeof Telegram.WebApp.setHeaderColor === 'function') Telegram.WebApp.setHeaderColor('#0b1020');
      } catch (e) {}

      const initData = Telegram.WebApp.initData;
      if (!initData) return;

      statusEl.textContent = 'Обновляем профиль...';

      try {
        const res = await fetch(VERIFY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData })
        });

        const json = await res.json().catch(() => ({}));

        if (!res.ok || !json.ok || !json.profile) {
          statusEl.textContent = '';
          return;
        }

        renderProfile(json.profile);
        statusEl.textContent = '';
      } catch (e) {
        statusEl.textContent = '';
      }
    }

    function initPage() {
      const cached = loadCachedProfile();

      if (cached) {
        renderProfile(cached);
      } else {
        displayNameEl.textContent = 'Профиль не найден';
        usernameEl.textContent = 'Сначала зайди через главную страницу';
        tgIdEl.textContent = '—';
        tgUsernameEl.textContent = '—';
        balanceEl.textContent = '0 ₽';
      }

      refreshProfileFromTelegram();
    }

    backBtn.addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    window.addEventListener('load', initPage);
  </script>
</body>
</html>
