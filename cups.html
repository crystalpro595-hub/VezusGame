<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vezus Cups — Демо</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07020e;
      --panel:#160c29;
      --panel-2:#21123d;
      --stroke:rgba(198,158,255,.15);
      --text:#fff;
      --muted:rgba(255,255,255,.52);
      --violet:#9d55ff;
      --violet-dark:#54249c;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      color:var(--text);
      font-family:"Montserrat",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(157,85,255,.24), transparent 34%),
        radial-gradient(circle at 92% 32%, rgba(128,35,210,.14), transparent 28%),
        linear-gradient(180deg,#080210 0%,#160321 54%,#08020d 100%);
      overflow-x:hidden;
    }

    button,
    input{
      font:inherit;
    }

    .game{
      position:relative;
      width:100%;
      min-height:100dvh;
      overflow:hidden;
      padding-bottom:calc(22px + env(safe-area-inset-bottom));
    }

    .game::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 24%, rgba(194,92,255,.10), transparent 24%),
        radial-gradient(circle at 80% 16%, rgba(255,255,255,.035), transparent 18%);
    }

    /* Такой же баланс, как в прошлых играх */
    .topbar{
      position:fixed;
      top:max(12px, env(safe-area-inset-top));
      left:16px;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      pointer-events:none;
    }

    .balance{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:40px;
      padding:0 12px;
      color:#fff;
      font-size:16px;
      line-height:1;
      font-weight:800;
      letter-spacing:-.03em;
      text-shadow:0 0 10px rgba(255,255,255,.08);
      pointer-events:auto;
    }

    .wallet{
      width:20px;
      height:20px;
      color:#fff;
    }

    .wallet path,
    .wallet circle{
      fill:currentColor !important;
    }

    .content{
      position:relative;
      z-index:1;
      width:min(100%,620px);
      margin:0 auto;
      padding:74px 14px 0;
    }

    .game-heading{
      text-align:center;
      padding-top:4px;
    }

    .game-title{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .game-subtitle{
      margin-top:7px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
    }

    .cups-stage{
      position:relative;
      width:min(100%,540px);
      height:310px;
      margin:18px auto 0;
      overflow:hidden;
      border-radius:28px;
      background:
        radial-gradient(ellipse at 50% 78%, rgba(161,81,255,.15), transparent 46%),
        linear-gradient(180deg, rgba(255,255,255,.022), rgba(255,255,255,.008));
      border:1px solid rgba(255,255,255,.055);
      box-shadow:0 20px 50px rgba(0,0,0,.22);
      touch-action:manipulation;
    }

    .cups-stage::after{
      content:"";
      position:absolute;
      left:7%;
      right:7%;
      bottom:51px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
      opacity:.58;
    }

    .cup{
      position:absolute;
      bottom:57px;
      width:clamp(100px,25vw,142px);
      height:170px;
      border:0;
      background:transparent;
      cursor:pointer;
      z-index:5;
      transition:
        left .34s cubic-bezier(.2,.78,.22,1),
        transform .30s cubic-bezier(.2,.78,.22,1),
        filter .20s ease;
      will-change:left,transform;
    }

    .cup:active{
      filter:brightness(.92);
    }

    .cup.lifted{
      transform:translateY(-78px);
    }

    .cup.disabled{
      pointer-events:none;
    }

    .cup-image{
      width:100%;
      height:100%;
      display:block;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
      filter:drop-shadow(0 14px 18px rgba(0,0,0,.34));
    }

    .cup-choice-glow{
      position:absolute;
      left:14%;
      right:14%;
      bottom:11px;
      height:18px;
      border-radius:50%;
      background:rgba(157,85,255,.24);
      filter:blur(10px);
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
    }

    .cup.can-pick:hover .cup-choice-glow,
    .cup.can-pick:active .cup-choice-glow{
      opacity:1;
    }

    .ball{
      position:absolute;
      bottom:57px;
      width:32px;
      height:32px;
      z-index:3;
      border-radius:50%;
      opacity:0;
      transform:translateX(-50%);
      transition:left .34s cubic-bezier(.2,.78,.22,1), opacity .18s ease;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,.95) 0 9%, transparent 20%),
        radial-gradient(circle at 38% 34%, #ff9b9b 0%, #ff4d5f 44%, #a90f27 100%);
      box-shadow:
        inset 0 3px 6px rgba(255,255,255,.34),
        inset 0 -6px 10px rgba(82,0,13,.26),
        0 9px 15px rgba(0,0,0,.28),
        0 0 16px rgba(255,69,91,.24);
    }

    .cups-stage.show-ball .ball{
      opacity:1;
    }

    .status{
      min-height:38px;
      margin:12px auto 0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.72);
      font-size:12px;
      font-weight:700;
      text-align:center;
    }

    .controls{
      width:min(100%,420px);
      margin:10px auto 0;
      padding:12px;
      border-radius:20px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(34,20,59,.94),rgba(21,11,40,.96));
      box-shadow:0 16px 36px rgba(0,0,0,.24);
    }

    .bet-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
    }

    .bet-box{
      position:relative;
      min-height:54px;
      display:flex;
      align-items:center;
      padding:0 88px 0 13px;
      border-radius:14px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.055);
    }

    .bet-label{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .bet-label span{
      color:var(--muted);
      font-size:9px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.10em;
    }

    .bet-input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:#fff;
      font-size:18px;
      font-weight:900;
    }

    .stepper{
      position:absolute;
      top:7px;
      right:7px;
      bottom:7px;
      display:grid;
      grid-template-columns:36px 36px;
      gap:5px;
    }

    .step-btn{
      border:1px solid rgba(255,255,255,.06);
      border-radius:10px;
      color:#fff;
      background:rgba(255,255,255,.055);
      cursor:pointer;
      font-size:18px;
      font-weight:800;
    }

    .play-btn{
      min-width:128px;
      border:0;
      border-radius:14px;
      color:#fff;
      cursor:pointer;
      font-size:13px;
      font-weight:900;
      background:linear-gradient(180deg,#8050df,#542a9f);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 8px 18px rgba(70,27,137,.24);
      transition:transform .14s ease,filter .16s ease;
    }

    .play-btn:active{
      transform:scale(.98);
    }

    .play-btn:disabled,
    .step-btn:disabled,
    .bet-input:disabled{
      opacity:.54;
      cursor:default;
    }

    .demo-note{
      margin-top:9px;
      color:rgba(255,255,255,.38);
      text-align:center;
      font-size:9px;
      font-weight:700;
    }

    .result-win{
      color:#8dffb1;
    }

    .result-lose{
      color:#ff929d;
    }

    @media (max-width:480px){
      .topbar{
        left:14px;
      }

      .balance{
        min-height:36px;
        gap:7px;
        font-size:15px;
      }

      .wallet{
        width:18px;
        height:18px;
      }

      .content{
        padding:66px 10px 0;
      }

      .game-title{
        font-size:19px;
      }

      .cups-stage{
        height:280px;
        margin-top:14px;
        border-radius:23px;
      }

      .cup{
        width:clamp(92px,28vw,120px);
        height:150px;
        bottom:51px;
      }

      .cup.lifted{
        transform:translateY(-66px);
      }

      .ball{
        width:28px;
        height:28px;
        bottom:51px;
      }

      .cups-stage::after{
        bottom:46px;
      }

      .controls{
        padding:10px;
        border-radius:18px;
      }

      .bet-row{
        gap:8px;
      }

      .play-btn{
        min-width:112px;
      }
    }

    @media (max-width:365px){
      .cups-stage{
        height:260px;
      }

      .cup{
        width:88px;
        height:138px;
      }

      .play-btn{
        min-width:102px;
        font-size:12px;
      }

      .bet-box{
        padding-left:10px;
      }
    }

    @media (prefers-reduced-motion:reduce){
      .cup,
      .ball{
        transition-duration:.01ms !important;
      }
    }
  

    /* CUPS FINAL PATCH v2: без заголовка, панель как в Mines, защита шарика */
    html,
    body,
    .game,
    .cups-stage,
    .cups-stage *,
    .cup,
    .cup-image,
    .ball{
      -webkit-user-select:none !important;
      user-select:none !important;
      -webkit-touch-callout:none !important;
    }

    .content{
      width:min(100%,560px) !important;
      padding:56px 10px 0 !important;
    }

    .game-heading{
      display:none !important;
    }

    .cups-stage{
      width:min(calc(100vw - 24px),430px) !important;
      height:310px !important;
      margin:0 auto !important;
      touch-action:manipulation !important;
      contain:layout paint !important;
    }

    .cup{
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }

    .cup-image{
      pointer-events:none !important;
      -webkit-user-drag:none !important;
    }

    .ball{
      pointer-events:none !important;
      display:none !important;
      visibility:hidden !important;
    }

    .cups-stage.show-ball .ball:not([hidden]){
      display:block !important;
      visibility:visible !important;
      opacity:1 !important;
    }

    .status{
      margin-top:8px !important;
      min-height:32px !important;
      font-size:11px !important;
    }

    .bet-wrap{
      width:min(calc(100vw - 38px),360px);
      margin:8px auto 0;
      padding:8px;
      border-radius:14px;
      border:1px solid rgba(153,95,255,.14);
      background:radial-gradient(circle at 0% 0%,rgba(152,89,255,.09),transparent 42%),linear-gradient(180deg,rgba(33,21,60,.96),rgba(22,13,43,.98));
      box-shadow:0 8px 18px rgba(0,0,0,.24);
    }

    .bet-layout{
      display:grid;
      grid-template-columns:1.12fr .88fr;
      gap:8px;
      align-items:stretch;
    }

    .amount-box,
    .play-box{min-width:0;}

    .amount-top{
      display:grid;
      grid-template-columns:1fr auto;
      gap:6px;
      align-items:stretch;
    }

    .amount-display{
      width:100%;
      min-width:0;
      min-height:46px;
      padding:0 10px;
      border:1px solid rgba(255,255,255,.055);
      border-radius:10px;
      outline:none;
      appearance:none;
      -webkit-appearance:none;
      color:#fff;
      background:linear-gradient(180deg,rgba(46,35,72,.96),rgba(36,27,61,.98));
      font-size:16px;
      font-weight:850;
      caret-color:#fff;
    }

    .amount-display:focus{box-shadow:0 0 0 1px rgba(190,135,255,.22),0 0 14px rgba(160,91,255,.14);}

    .stepper{
      position:static;
      display:grid;
      grid-template-columns:1fr;
      gap:5px;
    }

    .mini-btn,
    .quick-btn,
    .play-btn{
      border:0;
      color:#fff;
      cursor:pointer;
      font-family:inherit;
      transition:transform .14s ease,filter .16s ease,opacity .16s ease;
    }

    .mini-btn{
      width:30px;
      height:21px;
      border-radius:7px;
      background:rgba(255,255,255,.055);
      font-size:15px;
      font-weight:800;
    }

    .quick-row{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px;
      margin-top:6px;
    }

    .quick-btn{
      min-height:26px;
      border-radius:8px;
      background:rgba(255,255,255,.045);
      font-size:12px;
      font-weight:750;
    }

    .play-box{display:flex;}

    .play-btn{
      width:100%;
      min-height:78px;
      border-radius:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      background:linear-gradient(180deg,#5f37b2 0%,#3d1c7c 52%,#261047 100%);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 8px 18px rgba(38,16,71,.22);
    }

    .play-btn strong{font-size:17px;font-weight:900;}
    .play-btn span{font-size:9.5px;font-weight:700;opacity:.72;}

    .mini-btn:active,
    .quick-btn:active,
    .play-btn:active{transform:scale(.97);}

    .play-btn:disabled,
    .mini-btn:disabled,
    .quick-btn:disabled,
    .amount-display:disabled{opacity:.54;cursor:default;}

    .demo-note{
      margin-top:7px;
      color:rgba(255,255,255,.38);
      text-align:center;
      font-size:8.5px;
      font-weight:700;
    }

    @media (max-width:420px){
      .content{padding-top:54px !important;}
      .cups-stage{width:min(calc(100vw - 18px),400px) !important;height:286px !important;}
      .bet-wrap{width:min(calc(100vw - 28px),350px);padding:7px;}
      .amount-display{min-height:43px;font-size:15px;}
      .play-btn{min-height:74px;}
    }

  </style>

  <style id="cups-stage-lower-v3">
    /* Опускаем игровое поле со стаканчиками ниже */
    .cups-stage{
      margin-top:28px !important;
    }

    @media (max-width:420px){
      .cups-stage{
        margin-top:24px !important;
      }
    }

    @media (max-height:720px){
      .cups-stage{
        margin-top:18px !important;
      }
    }
  </style>


  <style id="cups-preloader-and-stage-v4">
    .preloader{
      position:fixed;
      inset:0;
      z-index:9999;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at 50% 38%, rgba(180,44,255,.18), transparent 32%),
        radial-gradient(circle at 50% 68%, rgba(255,179,42,.10), transparent 26%),
        linear-gradient(180deg,#08050f 0%,#160020 58%,#0b0811 100%);
      transition:opacity .28s ease, visibility .28s ease;
    }

    .preloader.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .cups-preloader-inner{
      display:grid;
      justify-items:center;
      gap:18px;
      animation:cupsPreloaderIn .34s ease both;
    }

    .cups-preloader-logo{
      width:92px;
      height:92px;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 12px 26px rgba(0,0,0,.36));
      animation:cupsLogoFloat 1.18s ease-in-out infinite;
    }

    .cups-loader-line{
      width:138px;
      height:4px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.10);
    }

    .cups-loader-line span{
      display:block;
      width:42%;
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg, transparent, #ffffff, transparent);
      animation:cupsLoaderLine 1.6s cubic-bezier(.16,.84,.24,1) infinite;
    }

    @keyframes cupsLogoFloat{
      0%,100%{ transform:translateY(0) scale(1); }
      50%{ transform:translateY(-5px) scale(1.035); }
    }

    @keyframes cupsLoaderLine{
      0%{ transform:translateX(-125%); }
      100%{ transform:translateX(245%); }
    }

    @keyframes cupsPreloaderIn{
      from{ opacity:0; transform:translateY(8px) scale(.98); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }

    .game-heading,
    .demo-note{
      display:none !important;
    }

    .cups-stage{
      margin-top:34px !important;
      height:322px !important;
      border-radius:32px !important;
      border:1px solid rgba(255,255,255,.08) !important;
      background:
        radial-gradient(ellipse at 50% 70%, rgba(157,85,255,.20), transparent 44%),
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.055), transparent 26%),
        radial-gradient(circle at 80% 8%, rgba(202,125,255,.10), transparent 30%),
        linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.010)) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.055),
        inset 0 -22px 40px rgba(0,0,0,.18),
        0 18px 44px rgba(0,0,0,.28) !important;
    }

    .cups-stage::before{
      content:"";
      position:absolute;
      left:8%;
      right:8%;
      bottom:42px;
      height:62px;
      border-radius:50%;
      background:
        radial-gradient(ellipse at center, rgba(0,0,0,.30), rgba(0,0,0,.10) 42%, transparent 70%);
      pointer-events:none;
      z-index:1;
    }

    .cups-stage::after{
      bottom:67px !important;
      height:2px !important;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.20), transparent) !important;
      opacity:.70 !important;
      z-index:2;
    }

    .stage-glow{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.045), transparent 32%),
        radial-gradient(circle at 50% 88%, rgba(157,85,255,.16), transparent 38%);
    }

    .cup{
      z-index:5 !important;
    }

    .cup-image{
      filter:
        drop-shadow(0 16px 18px rgba(0,0,0,.38))
        drop-shadow(0 0 16px rgba(157,85,255,.08)) !important;
    }

    .ball{
      user-select:none !important;
      -webkit-user-select:none !important;
      -webkit-touch-callout:none !important;
      pointer-events:none !important;
    }

    .controls{
      margin-top:12px !important;
    }

    @media (max-width:480px){
      .cups-preloader-logo{
        width:82px;
        height:82px;
      }

      .cups-loader-line{
        width:124px;
      }

      .cups-stage{
        margin-top:28px !important;
        height:292px !important;
        border-radius:26px !important;
      }

      .cups-stage::before{
        bottom:36px;
        height:54px;
      }

      .cups-stage::after{
        bottom:60px !important;
      }
    }

    @media (max-height:720px){
      .cups-stage{
        margin-top:22px !important;
        height:276px !important;
      }
    }

    @media (prefers-reduced-motion:reduce){
      .cups-preloader-logo,
      .cups-loader-line span,
      .cups-preloader-inner{
        animation:none !important;
      }
    }
  </style>


  <style id="cups-same-preloader-as-games-v5">
    /* Такой же прелоадер, как в CoinFlip/Mines */
    .preloader{
      position:fixed !important;
      inset:0 !important;
      z-index:999999 !important;
      display:grid !important;
      place-items:center !important;
      overflow:hidden !important;
      background:
        linear-gradient(180deg, #040404 0%, #111111 38%, #1b1b1b 62%, #070707 100%) !important;
      color:#fff !important;
      opacity:1;
      visibility:visible;
      pointer-events:auto;
      isolation:isolate !important;
      transition:opacity .42s ease, visibility .42s ease !important;
    }

    .preloader.hidden{
      opacity:0 !important;
      visibility:hidden !important;
      pointer-events:none !important;
    }

    .preloader::before,
    .preloader::after{
      content:"" !important;
      position:absolute !important;
      width:420px !important;
      height:420px !important;
      border-radius:46% 54% 58% 42% / 42% 46% 54% 58% !important;
      filter:blur(44px) !important;
      opacity:.34 !important;
      will-change:transform, border-radius !important;
      pointer-events:none !important;
      z-index:0 !important;
    }

    .preloader::before{
      left:-110px !important;
      top:-70px !important;
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.08), rgba(82,82,82,.28) 42%, rgba(22,22,22,.04) 76%) !important;
      animation:cupsLavaBlobOne 6.4s ease-in-out infinite alternate !important;
    }

    .preloader::after{
      right:-120px !important;
      bottom:-90px !important;
      width:470px !important;
      height:470px !important;
      background:radial-gradient(circle at 55% 45%, rgba(255,255,255,.06), rgba(96,96,96,.24) 40%, rgba(18,18,18,.03) 76%) !important;
      animation:cupsLavaBlobTwo 7.2s ease-in-out infinite alternate !important;
    }

    .cups-preloader-inner{
      position:relative !important;
      z-index:2 !important;
      width:min(74vw, 300px) !important;
      display:grid !important;
      justify-items:center !important;
      transform:translateY(-4px) !important;
      animation:cupsPreloaderInSame .36s ease both !important;
    }

    .cups-preloader-inner::before,
    .cups-preloader-inner::after{
      content:"" !important;
      position:absolute !important;
      border-radius:50% !important;
      filter:blur(34px) !important;
      opacity:.18 !important;
      pointer-events:none !important;
      z-index:-1 !important;
    }

    .cups-preloader-inner::before{
      width:220px !important;
      height:220px !important;
      left:-80px !important;
      top:-90px !important;
      background:rgba(88,88,88,.22) !important;
      animation:cupsLavaBlobThree 5.8s ease-in-out infinite alternate !important;
    }

    .cups-preloader-inner::after{
      width:180px !important;
      height:180px !important;
      right:-70px !important;
      bottom:-80px !important;
      background:rgba(60,60,60,.20) !important;
      animation:cupsLavaBlobFour 6.6s ease-in-out infinite alternate !important;
    }

    .cups-preloader-logo{
      width:154px !important;
      max-width:54vw !important;
      height:auto !important;
      display:block !important;
      object-fit:contain !important;
      transform-origin:center bottom !important;
      animation:cupsLogoJumpSame 1.18s ease-in-out infinite !important;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.48)) !important;
      user-select:none !important;
      -webkit-user-select:none !important;
      pointer-events:none !important;
    }

    .cups-loader-line{
      width:min(220px, 68vw) !important;
      height:4px !important;
      margin-top:22px !important;
      border-radius:999px !important;
      overflow:hidden !important;
      background:rgba(255,255,255,.10) !important;
      box-shadow:none !important;
    }

    .cups-loader-line span{
      display:block !important;
      width:100% !important;
      height:100% !important;
      border-radius:inherit !important;
      transform-origin:left center !important;
      transform:scaleX(0);
      background:linear-gradient(90deg, #5f2cff 0%, #9d4dff 45%, #d946ef 100%) !important;
      animation:cupsCleanLineSame 2.05s cubic-bezier(.16,.84,.24,1) forwards !important;
      box-shadow:0 0 14px rgba(157,77,255,.28) !important;
    }

    @keyframes cupsLogoJumpSame{
      0%,100%{ transform:translateY(0) scale(1); }
      42%{ transform:translateY(-8px) scale(1.025); }
      64%{ transform:translateY(0) scale(.995); }
    }

    @keyframes cupsCleanLineSame{
      0%{ transform:scaleX(0); }
      72%{ transform:scaleX(.84); }
      100%{ transform:scaleX(1); }
    }

    @keyframes cupsPreloaderInSame{
      from{ opacity:0; transform:translateY(8px) scale(.985); }
      to{ opacity:1; transform:translateY(-4px) scale(1); }
    }

    @keyframes cupsLavaBlobOne{
      0%{
        transform:translate3d(0,0,0) scale(1);
        border-radius:46% 54% 58% 42% / 42% 46% 54% 58%;
      }
      100%{
        transform:translate3d(90px,70px,0) scale(1.18);
        border-radius:58% 42% 47% 53% / 55% 40% 60% 45%;
      }
    }

    @keyframes cupsLavaBlobTwo{
      0%{
        transform:translate3d(0,0,0) scale(1);
        border-radius:52% 48% 44% 56% / 46% 58% 42% 54%;
      }
      100%{
        transform:translate3d(-95px,-85px,0) scale(1.16);
        border-radius:42% 58% 55% 45% / 60% 44% 56% 40%;
      }
    }

    @keyframes cupsLavaBlobThree{
      0%{
        transform:translate3d(0,0,0) scale(1);
        border-radius:50%;
      }
      100%{
        transform:translate3d(36px,18px,0) scale(1.14);
        border-radius:44% 56% 52% 48% / 58% 42% 54% 46%;
      }
    }

    @keyframes cupsLavaBlobFour{
      0%{
        transform:translate3d(0,0,0) scale(1);
        border-radius:50%;
      }
      100%{
        transform:translate3d(-28px,-24px,0) scale(1.12);
        border-radius:57% 43% 46% 54% / 41% 59% 49% 51%;
      }
    }

    @media (max-width:390px){
      .cups-preloader-logo{
        width:138px !important;
        max-width:56vw !important;
      }

      .cups-loader-line{
        width:200px !important;
      }

      .preloader::before,
      .preloader::after{
        filter:blur(38px) !important;
      }
    }

    @media (prefers-reduced-motion:reduce){
      .preloader,
      .preloader::before,
      .preloader::after,
      .cups-preloader-inner,
      .cups-preloader-inner::before,
      .cups-preloader-inner::after,
      .cups-preloader-logo,
      .cups-loader-line span{
        animation-duration:.18s !important;
        transition-duration:.18s !important;
      }
    }
  </style>

</head>
<body>
  <main class="game">
    <div id="preloader" class="preloader" aria-label="Загрузка игры">
      <div class="cups-preloader-inner">
        <img class="cups-preloader-logo" src="images/Logovezusgame.png" alt="Vezus Game" decoding="async">
        <div class="cups-loader-line" aria-hidden="true"><span></span></div>
      </div>
    </div>

    <header class="topbar">
      <div class="balance" aria-label="Демо-баланс">
        <svg class="wallet" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M12 17.6C12 13.96 14.96 11 18.6 11H42.5C47.05 11 50.75 14.7 50.75 19.25V20.8H43.6C36.86 20.8 31.4 26.26 31.4 33C31.4 39.74 36.86 45.2 43.6 45.2H50.75V46.75C50.75 51.3 47.05 55 42.5 55H18.6C14.96 55 12 52.04 12 48.4V17.6Z"/>
          <path d="M16.5 10.9H39.4C42.68 10.9 45.35 13.57 45.35 16.85V17.7H17.1C13.92 17.7 12 15.92 12 15.92C12.78 12.98 14.38 10.9 16.5 10.9Z"/>
          <path d="M39.8 24.65H52.5C55.12 24.65 57.25 26.78 57.25 29.4V36.6C57.25 39.22 55.12 41.35 52.5 41.35H39.8C35.2 41.35 31.5 37.62 31.5 33C31.5 28.38 35.2 24.65 39.8 24.65Z"/>
          <circle cx="43.2" cy="33" r="4.05"/>
        </svg>
        <span id="balance">10 000 ₽</span>
      </div>
    </header>

    <div class="content">

      <section class="cups-stage" id="stage" aria-label="Игровое поле">
        <div class="stage-glow" aria-hidden="true"></div>
        <div class="ball" id="ball" aria-hidden="true" hidden></div>

        <button class="cup disabled" type="button" data-cup="0" aria-label="Первый стаканчик">
          <span class="cup-choice-glow"></span>
          <img class="cup-image" src="images/Cups.webp" alt="" draggable="false" decoding="async">
        </button>

        <button class="cup disabled" type="button" data-cup="1" aria-label="Второй стаканчик">
          <span class="cup-choice-glow"></span>
          <img class="cup-image" src="images/Cups.webp" alt="" draggable="false" decoding="async">
        </button>

        <button class="cup disabled" type="button" data-cup="2" aria-label="Третий стаканчик">
          <span class="cup-choice-glow"></span>
          <img class="cup-image" src="images/Cups.webp" alt="" draggable="false" decoding="async">
        </button>
      </section>

      <div class="status" id="status">Нажми «Играть», чтобы начать</div>

      <section class="bet-wrap" aria-label="Панель ставки">
        <div class="bet-layout">
          <div class="amount-box">
            <div class="amount-top">
              <input class="amount-display" id="betInput" value="20 ₽" inputmode="numeric" autocomplete="off" aria-label="Ставка">
              <div class="stepper">
                <button class="mini-btn" id="plusBtn" type="button" aria-label="Увеличить ставку">+</button>
                <button class="mini-btn" id="minusBtn" type="button" aria-label="Уменьшить ставку">−</button>
              </div>
            </div>
            <div class="quick-row">
              <button class="quick-btn" id="halfBtn" type="button">/2</button>
              <button class="quick-btn" id="doubleBtn" type="button">x2</button>
            </div>
          </div>

          <div class="play-box">
            <button class="play-btn" id="playBtn" type="button">
              <strong>Играть</strong>
              <span id="playSubText">Демо-раунд</span>
            </button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const stage = document.getElementById('stage');
      const cups = [...document.querySelectorAll('.cup')];
      const ball = document.getElementById('ball');
      const balanceEl = document.getElementById('balance');
      const statusEl = document.getElementById('status');
      const betInput = document.getElementById('betInput');
      const playBtn = document.getElementById('playBtn');
      const minusBtn = document.getElementById('minusBtn');
      const plusBtn = document.getElementById('plusBtn');
      const halfBtn = document.getElementById('halfBtn');
      const doubleBtn = document.getElementById('doubleBtn');
      const playSubText = document.getElementById('playSubText');

      const state = {
        balance: 10000,
        ballCupId: 0,
        slots: [0, 1, 2],
        phase: 'idle',
        currentBet: 20
      };

      const MIN_BET = 8;
      const MAX_BET = 10000;
      const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      function formatRub(value){
        return `${Math.floor(value).toLocaleString('ru-RU')} ₽`;
      }

      function normalizeBet(){
        const raw = Number(String(betInput.value).replace(/[^\d]/g, ''));
        const safe = Number.isFinite(raw) ? Math.floor(raw) : MIN_BET;
        const value = Math.max(MIN_BET, Math.min(MAX_BET, safe));
        betInput.value = `${value} ₽`;
        return value;
      }

      function slotCenter(slot){
        const width = stage.clientWidth;
        return width * ([0.18, 0.50, 0.82][slot]);
      }

      function positionElements(animate = true){
        cups.forEach((cup, cupId) => {
          if(!animate) cup.style.transition = 'none';
          const slot = state.slots[cupId];
          const left = slotCenter(slot) - cup.offsetWidth / 2;
          cup.style.left = `${left}px`;
        });

        const ballSlot = state.slots[state.ballCupId];
        ball.style.left = `${slotCenter(ballSlot)}px`;

        if(!animate){
          requestAnimationFrame(() => {
            cups.forEach(cup => cup.style.transition = '');
          });
        }
      }

      function setControlsDisabled(disabled){
        betInput.disabled = disabled;
        minusBtn.disabled = disabled;
        plusBtn.disabled = disabled;
        halfBtn.disabled = disabled;
        doubleBtn.disabled = disabled;
        playBtn.disabled = disabled;
      }

      function setCupsPickable(enabled){
        cups.forEach(cup => {
          cup.classList.toggle('disabled', !enabled);
          cup.classList.toggle('can-pick', enabled);
        });
      }

      function lowerAll(){
        cups.forEach(cup => cup.classList.remove('lifted'));
        stage.classList.remove('show-ball');
        ball.hidden = true;
      }

      function revealCup(cupId, showBall = true){
        cups[cupId].classList.add('lifted');
        if(showBall){
          ball.hidden = false;
          stage.classList.add('show-ball');
        }
      }

      async function swapCups(cupA, cupB){
        const temp = state.slots[cupA];
        state.slots[cupA] = state.slots[cupB];
        state.slots[cupB] = temp;
        positionElements(true);
        await wait(360);
      }

      async function shuffle(){
        let previousPair = '';
        for(let i = 0; i < 8; i++){
          let a;
          let b;
          let key;

          do{
            a = Math.floor(Math.random() * 3);
            do b = Math.floor(Math.random() * 3); while(b === a);
            key = [a, b].sort().join('-');
          }while(key === previousPair);

          previousPair = key;
          await swapCups(a, b);
          await wait(55);
        }
      }

      async function startRound(){
        if(state.phase !== 'idle' && state.phase !== 'result') return;

        const bet = normalizeBet();
        if(bet > state.balance || state.balance < MIN_BET){
          statusEl.textContent = 'Недостаточно демо-баланса';
          statusEl.className = 'status result-lose';
          return;
        }

        state.currentBet = bet;
        state.balance -= bet;
        balanceEl.textContent = formatRub(state.balance);
        state.phase = 'showing';
        setControlsDisabled(true);
        setCupsPickable(false);
        lowerAll();
        statusEl.className = 'status';
        statusEl.textContent = 'Запоминай, где шарик';
        playSubText.textContent = 'Раунд идёт';

        state.slots = [0, 1, 2];
        state.ballCupId = Math.floor(Math.random() * 3);
        positionElements(true);

        await wait(250);
        revealCup(state.ballCupId, true);
        await wait(1050);
        lowerAll();
        await wait(300);

        state.phase = 'shuffling';
        statusEl.textContent = 'Стаканчики перемешиваются…';
        await shuffle();

        state.phase = 'guessing';
        statusEl.textContent = 'Выбери стаканчик';
        setCupsPickable(true);
      }

      async function chooseCup(selectedCupId){
        if(state.phase !== 'guessing') return;

        state.phase = 'result';
        setCupsPickable(false);
        revealCup(selectedCupId, selectedCupId === state.ballCupId);

        const win = selectedCupId === state.ballCupId;
        if(!win){
          await wait(360);
          revealCup(state.ballCupId, true);
        }

        if(win){
          state.balance += state.currentBet * 2;
          statusEl.textContent = `Верно! Выигрыш ${formatRub(state.currentBet * 2)}`;
          statusEl.className = 'status result-win';
        }else{
          statusEl.textContent = 'Не угадал. Шарик был под другим стаканчиком';
          statusEl.className = 'status result-lose';
        }

        balanceEl.textContent = formatRub(state.balance);
        playBtn.querySelector('strong').textContent = 'Ещё раз';
        playSubText.textContent = 'Демо-раунд';
        setControlsDisabled(false);
      }

      cups.forEach((cup, cupId) => {
        cup.addEventListener('click', () => chooseCup(cupId));
      });

      playBtn.addEventListener('click', startRound);

      minusBtn.addEventListener('click', () => {
        const value = Math.max(MIN_BET, normalizeBet() - 1);
        betInput.value = `${value} ₽`;
      });

      plusBtn.addEventListener('click', () => {
        const value = Math.min(MAX_BET, normalizeBet() + 1);
        betInput.value = `${value} ₽`;
      });

      halfBtn.addEventListener('click', () => {
        const value = Math.max(MIN_BET, Math.floor(normalizeBet() / 2));
        betInput.value = `${value} ₽`;
      });

      doubleBtn.addEventListener('click', () => {
        const value = Math.min(MAX_BET, normalizeBet() * 2);
        betInput.value = `${value} ₽`;
      });

      betInput.addEventListener('focus', () => {
        betInput.value = String(normalizeBet()).replace(/[^\d]/g, '');
        betInput.select();
      });

      betInput.addEventListener('input', () => {
        betInput.value = betInput.value.replace(/[^\d]/g, '').slice(0, 5);
      });

      betInput.addEventListener('blur', normalizeBet);
      ball.hidden = true;

      ['contextmenu', 'selectstart', 'dragstart'].forEach(type => {
        stage.addEventListener(type, event => event.preventDefault());
      });

      window.addEventListener('resize', () => positionElements(false), { passive: true });

      requestAnimationFrame(() => positionElements(false));
    })();
  </script>
<script id="cups-preloader-script">
    window.addEventListener('load', function(){
      var preloader = document.getElementById('preloader');
      if(!preloader) return;
      setTimeout(function(){
        preloader.classList.add('hidden');
      }, 2150);
      setTimeout(function(){
        if(preloader && preloader.parentNode){
          preloader.parentNode.removeChild(preloader);
        }
      }, 2650);
    });
  </script>


</body>
</html>
