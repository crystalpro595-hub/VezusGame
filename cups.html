<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Vezus Cups — Демо</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07020e;
      --panel:#160c29;
      --panel-2:#21123d;
      --stroke:rgba(198,158,255,.15);
      --text:#fff;
      --muted:rgba(255,255,255,.52);
      --violet:#9d55ff;
      --violet-dark:#54249c;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      min-height:100%;
      color:var(--text);
      font-family:"Montserrat",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(157,85,255,.24), transparent 34%),
        radial-gradient(circle at 92% 32%, rgba(128,35,210,.14), transparent 28%),
        linear-gradient(180deg,#080210 0%,#160321 54%,#08020d 100%);
      overflow-x:hidden;
    }

    button,
    input{
      font:inherit;
    }

    .game{
      position:relative;
      width:100%;
      min-height:100dvh;
      overflow:hidden;
      padding-bottom:calc(22px + env(safe-area-inset-bottom));
    }

    .game::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 20% 24%, rgba(194,92,255,.10), transparent 24%),
        radial-gradient(circle at 80% 16%, rgba(255,255,255,.035), transparent 18%);
    }

    /* Такой же баланс, как в прошлых играх */
    .topbar{
      position:fixed;
      top:max(12px, env(safe-area-inset-top));
      left:16px;
      z-index:30;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      pointer-events:none;
    }

    .balance{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:40px;
      padding:0 12px;
      color:#fff;
      font-size:16px;
      line-height:1;
      font-weight:800;
      letter-spacing:-.03em;
      text-shadow:0 0 10px rgba(255,255,255,.08);
      pointer-events:auto;
    }

    .wallet{
      width:20px;
      height:20px;
      color:#fff;
    }

    .wallet path,
    .wallet circle{
      fill:currentColor !important;
    }

    .content{
      position:relative;
      z-index:1;
      width:min(100%,620px);
      margin:0 auto;
      padding:74px 14px 0;
    }

    .game-heading{
      text-align:center;
      padding-top:4px;
    }

    .game-title{
      font-size:22px;
      font-weight:900;
      letter-spacing:-.04em;
    }

    .game-subtitle{
      margin-top:7px;
      color:var(--muted);
      font-size:11px;
      font-weight:700;
    }

    .cups-stage{
      position:relative;
      width:min(100%,540px);
      height:310px;
      margin:18px auto 0;
      overflow:hidden;
      border-radius:28px;
      background:
        radial-gradient(ellipse at 50% 78%, rgba(161,81,255,.15), transparent 46%),
        linear-gradient(180deg, rgba(255,255,255,.022), rgba(255,255,255,.008));
      border:1px solid rgba(255,255,255,.055);
      box-shadow:0 20px 50px rgba(0,0,0,.22);
      touch-action:manipulation;
    }

    .cups-stage::after{
      content:"";
      position:absolute;
      left:7%;
      right:7%;
      bottom:51px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.16),transparent);
      opacity:.58;
    }

    .cup{
      position:absolute;
      bottom:57px;
      width:clamp(100px,25vw,142px);
      height:170px;
      border:0;
      background:transparent;
      cursor:pointer;
      z-index:5;
      transition:
        left .34s cubic-bezier(.2,.78,.22,1),
        transform .30s cubic-bezier(.2,.78,.22,1),
        filter .20s ease;
      will-change:left,transform;
    }

    .cup:active{
      filter:brightness(.92);
    }

    .cup.lifted{
      transform:translateY(-78px);
    }

    .cup.disabled{
      pointer-events:none;
    }

    .cup-image{
      width:100%;
      height:100%;
      display:block;
      object-fit:contain;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
      filter:drop-shadow(0 14px 18px rgba(0,0,0,.34));
    }

    .cup-choice-glow{
      position:absolute;
      left:14%;
      right:14%;
      bottom:11px;
      height:18px;
      border-radius:50%;
      background:rgba(157,85,255,.24);
      filter:blur(10px);
      opacity:0;
      transition:opacity .18s ease;
      pointer-events:none;
    }

    .cup.can-pick:hover .cup-choice-glow,
    .cup.can-pick:active .cup-choice-glow{
      opacity:1;
    }

    .ball{
      position:absolute;
      bottom:57px;
      width:32px;
      height:32px;
      z-index:3;
      border-radius:50%;
      opacity:0;
      transform:translateX(-50%);
      transition:left .34s cubic-bezier(.2,.78,.22,1), opacity .18s ease;
      background:
        radial-gradient(circle at 32% 24%, rgba(255,255,255,.95) 0 9%, transparent 20%),
        radial-gradient(circle at 38% 34%, #ff9b9b 0%, #ff4d5f 44%, #a90f27 100%);
      box-shadow:
        inset 0 3px 6px rgba(255,255,255,.34),
        inset 0 -6px 10px rgba(82,0,13,.26),
        0 9px 15px rgba(0,0,0,.28),
        0 0 16px rgba(255,69,91,.24);
    }

    .cups-stage.show-ball .ball{
      opacity:1;
    }

    .status{
      min-height:38px;
      margin:12px auto 0;
      display:flex;
      align-items:center;
      justify-content:center;
      color:rgba(255,255,255,.72);
      font-size:12px;
      font-weight:700;
      text-align:center;
    }

    .controls{
      width:min(100%,420px);
      margin:10px auto 0;
      padding:12px;
      border-radius:20px;
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(34,20,59,.94),rgba(21,11,40,.96));
      box-shadow:0 16px 36px rgba(0,0,0,.24);
    }

    .bet-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
    }

    .bet-box{
      position:relative;
      min-height:54px;
      display:flex;
      align-items:center;
      padding:0 88px 0 13px;
      border-radius:14px;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.055);
    }

    .bet-label{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .bet-label span{
      color:var(--muted);
      font-size:9px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.10em;
    }

    .bet-input{
      width:100%;
      border:0;
      outline:0;
      background:transparent;
      color:#fff;
      font-size:18px;
      font-weight:900;
    }

    .stepper{
      position:absolute;
      top:7px;
      right:7px;
      bottom:7px;
      display:grid;
      grid-template-columns:36px 36px;
      gap:5px;
    }

    .step-btn{
      border:1px solid rgba(255,255,255,.06);
      border-radius:10px;
      color:#fff;
      background:rgba(255,255,255,.055);
      cursor:pointer;
      font-size:18px;
      font-weight:800;
    }

    .play-btn{
      min-width:128px;
      border:0;
      border-radius:14px;
      color:#fff;
      cursor:pointer;
      font-size:13px;
      font-weight:900;
      background:linear-gradient(180deg,#8050df,#542a9f);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.10),0 8px 18px rgba(70,27,137,.24);
      transition:transform .14s ease,filter .16s ease;
    }

    .play-btn:active{
      transform:scale(.98);
    }

    .play-btn:disabled,
    .step-btn:disabled,
    .bet-input:disabled{
      opacity:.54;
      cursor:default;
    }

    .demo-note{
      margin-top:9px;
      color:rgba(255,255,255,.38);
      text-align:center;
      font-size:9px;
      font-weight:700;
    }

    .result-win{
      color:#8dffb1;
    }

    .result-lose{
      color:#ff929d;
    }

    @media (max-width:480px){
      .topbar{
        left:14px;
      }

      .balance{
        min-height:36px;
        gap:7px;
        font-size:15px;
      }

      .wallet{
        width:18px;
        height:18px;
      }

      .content{
        padding:66px 10px 0;
      }

      .game-title{
        font-size:19px;
      }

      .cups-stage{
        height:280px;
        margin-top:14px;
        border-radius:23px;
      }

      .cup{
        width:clamp(92px,28vw,120px);
        height:150px;
        bottom:51px;
      }

      .cup.lifted{
        transform:translateY(-66px);
      }

      .ball{
        width:28px;
        height:28px;
        bottom:51px;
      }

      .cups-stage::after{
        bottom:46px;
      }

      .controls{
        padding:10px;
        border-radius:18px;
      }

      .bet-row{
        gap:8px;
      }

      .play-btn{
        min-width:112px;
      }
    }

    @media (max-width:365px){
      .cups-stage{
        height:260px;
      }

      .cup{
        width:88px;
        height:138px;
      }

      .play-btn{
        min-width:102px;
        font-size:12px;
      }

      .bet-box{
        padding-left:10px;
      }
    }

    @media (prefers-reduced-motion:reduce){
      .cup,
      .ball{
        transition-duration:.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="game">
    <header class="topbar">
      <div class="balance" aria-label="Демо-баланс">
        <svg class="wallet" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M12 17.6C12 13.96 14.96 11 18.6 11H42.5C47.05 11 50.75 14.7 50.75 19.25V20.8H43.6C36.86 20.8 31.4 26.26 31.4 33C31.4 39.74 36.86 45.2 43.6 45.2H50.75V46.75C50.75 51.3 47.05 55 42.5 55H18.6C14.96 55 12 52.04 12 48.4V17.6Z"/>
          <path d="M16.5 10.9H39.4C42.68 10.9 45.35 13.57 45.35 16.85V17.7H17.1C13.92 17.7 12 15.92 12 15.92C12.78 12.98 14.38 10.9 16.5 10.9Z"/>
          <path d="M39.8 24.65H52.5C55.12 24.65 57.25 26.78 57.25 29.4V36.6C57.25 39.22 55.12 41.35 52.5 41.35H39.8C35.2 41.35 31.5 37.62 31.5 33C31.5 28.38 35.2 24.65 39.8 24.65Z"/>
          <circle cx="43.2" cy="33" r="4.05"/>
        </svg>
        <span id="balance">1 000 ₽</span>
      </div>
    </header>

    <div class="content">
      <div class="game-heading">
        <h1 class="game-title">Стаканчики</h1>
        <p class="game-subtitle">Угадай, под каким стаканчиком спрятан шарик</p>
      </div>

      <section class="cups-stage" id="stage" aria-label="Игровое поле">
        <div class="ball" id="ball" aria-hidden="true"></div>

        <button class="cup disabled" type="button" data-cup="0" aria-label="Первый стаканчик">
          <span class="cup-choice-glow"></span>
          <img class="cup-image" src="images/Cups.webp" alt="" draggable="false" decoding="async">
        </button>

        <button class="cup disabled" type="button" data-cup="1" aria-label="Второй стаканчик">
          <span class="cup-choice-glow"></span>
          <img class="cup-image" src="images/Cups.webp" alt="" draggable="false" decoding="async">
        </button>

        <button class="cup disabled" type="button" data-cup="2" aria-label="Третий стаканчик">
          <span class="cup-choice-glow"></span>
          <img class="cup-image" src="images/Cups.webp" alt="" draggable="false" decoding="async">
        </button>
      </section>

      <div class="status" id="status">Нажми «Играть», чтобы начать</div>

      <section class="controls">
        <div class="bet-row">
          <div class="bet-box">
            <label class="bet-label">
              <span>Демо-ставка</span>
              <input class="bet-input" id="betInput" value="50" inputmode="numeric" aria-label="Размер ставки">
            </label>
            <div class="stepper">
              <button class="step-btn" id="minusBtn" type="button" aria-label="Уменьшить ставку">−</button>
              <button class="step-btn" id="plusBtn" type="button" aria-label="Увеличить ставку">+</button>
            </div>
          </div>

          <button class="play-btn" id="playBtn" type="button">Играть</button>
        </div>

        <p class="demo-note">Демо-режим · выигрыш x2 · данные не сохраняются</p>
      </section>
    </div>
  </main>

  <script>
    (() => {
      const stage = document.getElementById('stage');
      const cups = [...document.querySelectorAll('.cup')];
      const ball = document.getElementById('ball');
      const balanceEl = document.getElementById('balance');
      const statusEl = document.getElementById('status');
      const betInput = document.getElementById('betInput');
      const playBtn = document.getElementById('playBtn');
      const minusBtn = document.getElementById('minusBtn');
      const plusBtn = document.getElementById('plusBtn');

      const state = {
        balance: 1000,
        ballCupId: 0,
        slots: [0, 1, 2],
        phase: 'idle',
        currentBet: 50
      };

      const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      function formatRub(value){
        return `${Math.floor(value).toLocaleString('ru-RU')} ₽`;
      }

      function normalizeBet(){
        const raw = Number(String(betInput.value).replace(/[^\d]/g, ''));
        const value = Math.max(10, Math.min(state.balance, Number.isFinite(raw) ? raw : 10));
        betInput.value = Math.floor(value);
        return Math.floor(value);
      }

      function slotCenter(slot){
        const width = stage.clientWidth;
        return width * ([0.18, 0.50, 0.82][slot]);
      }

      function positionElements(animate = true){
        cups.forEach((cup, cupId) => {
          if(!animate) cup.style.transition = 'none';
          const slot = state.slots[cupId];
          const left = slotCenter(slot) - cup.offsetWidth / 2;
          cup.style.left = `${left}px`;
        });

        const ballSlot = state.slots[state.ballCupId];
        ball.style.left = `${slotCenter(ballSlot)}px`;

        if(!animate){
          requestAnimationFrame(() => {
            cups.forEach(cup => cup.style.transition = '');
          });
        }
      }

      function setControlsDisabled(disabled){
        betInput.disabled = disabled;
        minusBtn.disabled = disabled;
        plusBtn.disabled = disabled;
        playBtn.disabled = disabled;
      }

      function setCupsPickable(enabled){
        cups.forEach(cup => {
          cup.classList.toggle('disabled', !enabled);
          cup.classList.toggle('can-pick', enabled);
        });
      }

      function lowerAll(){
        cups.forEach(cup => cup.classList.remove('lifted'));
        stage.classList.remove('show-ball');
      }

      function revealCup(cupId, showBall = true){
        cups[cupId].classList.add('lifted');
        if(showBall) stage.classList.add('show-ball');
      }

      async function swapCups(cupA, cupB){
        const temp = state.slots[cupA];
        state.slots[cupA] = state.slots[cupB];
        state.slots[cupB] = temp;
        positionElements(true);
        await wait(360);
      }

      async function shuffle(){
        let previousPair = '';
        for(let i = 0; i < 8; i++){
          let a;
          let b;
          let key;

          do{
            a = Math.floor(Math.random() * 3);
            do b = Math.floor(Math.random() * 3); while(b === a);
            key = [a, b].sort().join('-');
          }while(key === previousPair);

          previousPair = key;
          await swapCups(a, b);
          await wait(55);
        }
      }

      async function startRound(){
        if(state.phase !== 'idle' && state.phase !== 'result') return;

        const bet = normalizeBet();
        if(bet > state.balance || state.balance < 10){
          statusEl.textContent = 'Недостаточно демо-баланса';
          statusEl.className = 'status result-lose';
          return;
        }

        state.currentBet = bet;
        state.balance -= bet;
        balanceEl.textContent = formatRub(state.balance);
        state.phase = 'showing';
        setControlsDisabled(true);
        setCupsPickable(false);
        lowerAll();
        statusEl.className = 'status';
        statusEl.textContent = 'Запоминай, где шарик';

        state.slots = [0, 1, 2];
        state.ballCupId = Math.floor(Math.random() * 3);
        positionElements(true);

        await wait(250);
        revealCup(state.ballCupId, true);
        await wait(1050);
        lowerAll();
        await wait(300);

        state.phase = 'shuffling';
        statusEl.textContent = 'Стаканчики перемешиваются…';
        await shuffle();

        state.phase = 'guessing';
        statusEl.textContent = 'Выбери стаканчик';
        setCupsPickable(true);
      }

      async function chooseCup(selectedCupId){
        if(state.phase !== 'guessing') return;

        state.phase = 'result';
        setCupsPickable(false);
        revealCup(selectedCupId, selectedCupId === state.ballCupId);

        const win = selectedCupId === state.ballCupId;
        if(!win){
          await wait(360);
          revealCup(state.ballCupId, true);
        }

        if(win){
          state.balance += state.currentBet * 2;
          statusEl.textContent = `Верно! Выигрыш ${formatRub(state.currentBet * 2)}`;
          statusEl.className = 'status result-win';
        }else{
          statusEl.textContent = 'Не угадал. Шарик был под другим стаканчиком';
          statusEl.className = 'status result-lose';
        }

        balanceEl.textContent = formatRub(state.balance);
        playBtn.textContent = 'Ещё раз';
        setControlsDisabled(false);
      }

      cups.forEach((cup, cupId) => {
        cup.addEventListener('click', () => chooseCup(cupId));
      });

      playBtn.addEventListener('click', startRound);

      minusBtn.addEventListener('click', () => {
        betInput.value = Math.max(10, normalizeBet() - 10);
      });

      plusBtn.addEventListener('click', () => {
        betInput.value = Math.min(state.balance, normalizeBet() + 10);
      });

      betInput.addEventListener('blur', normalizeBet);
      window.addEventListener('resize', () => positionElements(false), { passive: true });

      requestAnimationFrame(() => positionElements(false));
    })();
  </script>
</body>
</html>
