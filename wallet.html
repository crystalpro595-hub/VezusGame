      .side-btn,
      .side-btn.active[data-side="1"],
      .side-btn.active[data-side="2"]{
        border-radius:7px !important;
      }
    }

  </style>
</head>
<body>
  <main class="page">
    <div class="balance-chip" id="balanceChip" aria-label="Баланс">
      <span class="wallet-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 7.5h15a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5.5A2.5 2.5 0 0 1 3 17V7.5a3 3 0 0 1 3-3h11"/><path d="M4 8c.5-.7 1.2-1 2.2-1H19"/><path d="M17 13h.01"/></svg></span>
      <strong class="balance-value"><span id="balanceValue">1000</span><span class="balance-currency">₽</span></strong>
    </div>
    <section class="game">
      <div class="coin-wrap"><div class="coin final-side-1" id="coin"><div class="coin-face coin-front"><img src="images/CoinFlipMoney1.png" alt="Сторона 1" draggable="false"></div><div class="coin-face coin-back"><img src="images/CoinFlipMoney2.png" alt="Сторона 2" draggable="false"></div></div></div>
      <div class="controls">
        <div class="coinflip-control-grid">
          <div class="bet-row bet-row-final">
            <label class="bet-field">
              <span class="bet-label">Ставка</span>
              <input class="bet-input" id="betInput" type="text" inputmode="numeric" value="50" autocomplete="off">
            </label>
            <div class="bet-stepper" aria-label="Изменение ставки">
              <button class="bet-control" id="betPlus" type="button" aria-label="Увеличить ставку">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              </button>
              <button class="bet-control" id="betMinus" type="button" aria-label="Уменьшить ставку">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 12h12"/></svg>
              </button>
            </div>
          </div>

          <div class="side-row">
            <button class="side-btn active" type="button" data-side="1" aria-label="Орёл">
              <span>Орёл</span>
            </button>
            <button class="side-btn" type="button" data-side="2" aria-label="Решка">
              <span>Решка</span>
            </button>
          </div>
        </div>
        <button class="flip-btn" id="flipBtn" type="button">Играть</button><div class="mini-status" id="statusText"></div>
      </div>
    </section>
  </main>
  <div class="wallet-frame-overlay" id="walletFrameOverlay" aria-hidden="true"></div><section class="wallet-frame-box" id="walletFrameBox" aria-label="Кошелёк"><div class="wallet-frame-handle" aria-hidden="true"></div><iframe class="wallet-frame" id="walletFrame" title="Кошелёк" src="about:blank"></iframe></section>
  <script>
    (function(){const tg=window.Telegram&&window.Telegram.WebApp?window.Telegram.WebApp:null;try{tg&&tg.ready&&tg.ready();tg&&tg.expand&&tg.expand()}catch(error){}const BALANCE_KEY='coinflip_balance_v3';const balanceValue=document.getElementById('balanceValue');const balanceChip=document.getElementById('balanceChip');const coin=document.getElementById('coin');const coinWrap=document.querySelector('.coin-wrap');const statusText=document.getElementById('statusText');const betInput=document.getElementById('betInput');const flipBtn=document.getElementById('flipBtn');const sideButtons=document.querySelectorAll('.side-btn');const quickBetButtons=document.querySelectorAll('.quick-bet');const betMinus=document.getElementById('betMinus');const betPlus=document.getElementById('betPlus');const walletOverlay=document.getElementById('walletFrameOverlay');const walletBox=document.getElementById('walletFrameBox');const walletFrame=document.getElementById('walletFrame');let selectedSide=1;let isSpinning=false;function formatBalance(value){return new Intl.NumberFormat('ru-RU').format(Number(value)||0)}function getBalance(){const raw=localStorage.getItem(BALANCE_KEY);const saved=Number(raw);if(raw!==null&&Number.isFinite(saved)&&saved>0){return saved}localStorage.setItem(BALANCE_KEY,'1000');return 1000}function setBalance(value){const safeValue=Math.max(0,Math.floor(Number(value)||0));localStorage.setItem(BALANCE_KEY,String(safeValue));renderBalance()}function renderBalance(){if(balanceValue){balanceValue.textContent=formatBalance(getBalance())}}function setSelectedSide(side){selectedSide=Number(side)===2?2:1;sideButtons.forEach(function(button){button.classList.toggle('active',Number(button.dataset.side)===selectedSide)})}function cleanBetInput(){betInput.value=String(betInput.value).replace(/\D/g,'')}function getBet(){cleanBetInput();return Math.floor(Number(betInput.value)||0)}function setStatus(message){statusText.textContent=message||''}function addWalletCacheBust(src){const stamp=Date.now();return src+(src.indexOf('?')===-1?'?v=':'&v=')+stamp}function sendTelegramInitDataToWalletFrame(){if(!walletFrame||!walletFrame.contentWindow)return;const initData=tg&&typeof tg.initData==='string'?tg.initData:'';if(!initData)return;try{walletFrame.contentWindow.postMessage({type:'VEZUS_TG_INIT_DATA',initData:initData},'*')}catch(error){}}function openWalletOverlay(){if(!walletOverlay||!walletBox||!walletFrame){window.location.href='wallet.html';return}walletFrame.src=addWalletCacheBust('wallet.html');walletOverlay.classList.add('active');walletBox.classList.add('active');setTimeout(sendTelegramInitDataToWalletFrame,120);setTimeout(sendTelegramInitDataToWalletFrame,500);setTimeout(sendTelegramInitDataToWalletFrame,1100)}function closeWalletOverlay(){if(!walletOverlay||!walletBox||!walletFrame)return;walletOverlay.classList.remove('active');walletBox.classList.remove('active');setTimeout(function(){if(!walletBox.classList.contains('active')){walletFrame.src='about:blank'}},220)}function flipCoin(){if(isSpinning)return;const balance=getBalance();const bet=getBet();if(!bet){setStatus('Укажи ставку');return}if(bet<10){setStatus('Минимум 10');return}if(bet>balance){setStatus('Недостаточно средств');return}isSpinning=true;flipBtn.disabled=true;sideButtons.forEach(function(button){button.disabled=true});setBalance(balance-bet);setStatus('');const resultSide=Math.random()<.5?1:2;coin.classList.remove('spinning','spin-to-1','spin-to-2','final-side-1','final-side-2');if(coinWrap){coinWrap.classList.remove('win-flash','lose-flash')};requestAnimationFrame(function(){coin.classList.add('spinning', resultSide===1?'spin-to-1':'spin-to-2')});setTimeout(function(){coin.classList.remove('spinning','spin-to-1','spin-to-2');coin.classList.add(resultSide===1?'final-side-1':'final-side-2');const isWin=resultSide===selectedSide;const currentBalance=getBalance();if(coinWrap){coinWrap.classList.remove('win-flash','lose-flash');void coinWrap.offsetWidth;coinWrap.classList.add(isWin?'win-flash':'lose-flash');}if(isWin){setBalance(currentBalance+bet*2);setStatus('+ '+bet)}else{setStatus('- '+bet)}isSpinning=false;flipBtn.disabled=false;sideButtons.forEach(function(button){button.disabled=false})},960)}sideButtons.forEach(function(button){button.addEventListener('click',function(){if(isSpinning)return;setSelectedSide(button.dataset.side);flipCoin()})});function setBetValue(value){
  const safeValue=Math.max(1,Math.floor(Number(value)||1));
  betInput.value=String(safeValue);
  setStatus('');
}
if(betPlus){
  betPlus.addEventListener('click',function(){
    const current=getBet()||1;
    setBetValue(current*2);
  });
}
if(betMinus){
  betMinus.addEventListener('click',function(){
    const current=getBet()||1;
    setBetValue(Math.max(1,Math.floor(current/2)));
  });
}
quickBetButtons.forEach(function(button){button.addEventListener('click',function(){setBetValue(button.dataset.bet)})});betInput.addEventListener('input',function(){cleanBetInput();setStatus('')});flipBtn.addEventListener('click',flipCoin);if(balanceChip){balanceChip.addEventListener('click',function(event){event.preventDefault();})}if(walletOverlay){walletOverlay.addEventListener('click',closeWalletOverlay)}if(walletFrame){walletFrame.addEventListener('load',function(){sendTelegramInitDataToWalletFrame();setTimeout(sendTelegramInitDataToWalletFrame,150);setTimeout(sendTelegramInitDataToWalletFrame,500)})}window.addEventListener('message',function(event){const data=event.data||{};if(data&&data.type==='VEZUS_WALLET_READY'){sendTelegramInitDataToWalletFrame();setTimeout(sendTelegramInitDataToWalletFrame,150)}});renderBalance();setSelectedSide(1)})();
  </script>
</body>
</html>
