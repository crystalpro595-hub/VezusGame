<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fortune • Vezus Game</title>

  <link rel="preconnect" href="https://i.postimg.cc" crossorigin>
  <link rel="dns-prefetch" href="https://i.postimg.cc">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="image" href="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png">
  <link rel="preload" as="image" href="https://i.postimg.cc/fbJT34yY/076E519D-F095-4957-88BF-5591DEB82533.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#eaf1ff;
      --muted:rgba(234,241,255,.68);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
      --glass: rgba(12,14,20,.74);
      --stroke: rgba(255,255,255,.08);
      --shadow: 0 18px 42px rgba(0,0,0,.48);
      --shadow-soft: 0 12px 28px rgba(0,0,0,.34);
      --tg1:#2AABEE;
      --tg2:#229ED9;
      --green1:#39d98a;
      --green2:#12b76a;
    }

    *{
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,body{
      height:100%;
      margin:0;
      overflow:hidden;
      color:var(--text);
      background:#020617;
    }

    body{
      background-image:url("https://i.postimg.cc/fbJT34yY/076E519D-F095-4957-88BF-5591DEB82533.png");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:
        radial-gradient(900px 560px at 50% 0%, rgba(194,104,255,.20), transparent 58%),
        radial-gradient(620px 420px at 50% 36%, rgba(121,63,255,.14), transparent 58%),
        linear-gradient(180deg, rgba(0,0,0,.40), rgba(0,0,0,.70));
      pointer-events:none;
      z-index:0;
    }

    .app{
      position:relative;
      height:100%;
      overflow:auto;
      padding:calc(4px + var(--safe-top)) 16px calc(22px + var(--safe-bottom)) 16px;
      z-index:1;
      overscroll-behavior:contain;
    }

    .content{
      width:100%;
      max-width:520px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
      min-height:100%;
    }

    .top-row{
      position:sticky;
      top:calc(4px + var(--safe-top));
      z-index:10;
      width:100%;
      display:grid;
      grid-template-columns:38px 1fr 54px;
      align-items:center;
      gap:8px;
    }

    .icon-btn{
      width:38px;
      height:38px;
      border-radius:13px;
      border:1px solid var(--stroke);
      cursor:pointer;
      background:var(--glass);
      box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.04);
      display:grid;
      place-items:center;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      transition:transform .15s ease;
      padding:0;
      overflow:hidden;
      color:#fff;
    }

    .icon-btn:active{ transform:scale(.98); }
    .back-icon{ width:18px; height:18px; display:block; }

    .balance-mini{
      width:100%;
      min-width:0;
      height:42px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px 7px 6px 12px;
      position:relative;
      overflow:hidden;
      background:var(--glass);
      border:1px solid var(--stroke);
      box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .balance-mini::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(180px 60px at 0% 0%, rgba(255,255,255,.05), transparent 55%),
        radial-gradient(180px 60px at 100% 100%, rgba(255,255,255,.03), transparent 55%);
      pointer-events:none;
    }

    .bal-title{
      position:relative;
      z-index:1;
      font-size:12px;
      font-weight:900;
      letter-spacing:.2px;
      color:rgba(234,241,255,.92);
      white-space:nowrap;
    }

    .bal-amount{
      position:relative;
      z-index:1;
      height:28px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      padding:0 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.05);
      color:rgba(234,241,255,.98);
      font-weight:900;
      font-size:13px;
      white-space:nowrap;
      min-width:88px;
    }

    .bal-amount:active{ transform:scale(.99); }

    .hero-logo{
      width:54px;
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      box-shadow:none;
      padding:0;
      cursor:pointer;
    }

    .hero-logo:active{ transform:scale(.98); }

    .hero-logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .screen-card{
      width:100%;
      border-radius:30px;
      padding:18px 14px 16px;
      background:
        radial-gradient(320px 190px at 50% 0%, rgba(255,255,255,.08), transparent 66%),
        linear-gradient(180deg, rgba(34,18,58,.96), rgba(10,8,22,.98));
      border:1px solid rgba(206,188,255,.12);
      box-shadow:
        0 28px 58px rgba(0,0,0,.42),
        inset 0 1px 0 rgba(255,255,255,.08),
        0 0 34px rgba(130,96,255,.10);
      position:relative;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      isolation:isolate;
    }

    .screen-card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0) 30%),
        radial-gradient(400px 120px at 50% -10%, rgba(255,255,255,.06), transparent 70%);
      z-index:0;
    }

    .wheel-wrap{
      position:relative;
      z-index:1;
      width:min(100%, 352px);
      aspect-ratio:1/1;
      margin:4px auto 0;
      display:grid;
      place-items:center;
    }

    .wheel-glow{
      position:absolute;
      inset:7%;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(170,92,255,.35), rgba(170,92,255,.12) 44%, rgba(170,92,255,0) 66%);
      filter:blur(16px);
      pointer-events:none;
      z-index:0;
    }

    .wheel-shadow{
      position:absolute;
      inset:16% 10% 4%;
      border-radius:50%;
      background:radial-gradient(circle, rgba(0,0,0,.40), rgba(0,0,0,0) 68%);
      filter:blur(12px);
      pointer-events:none;
      z-index:0;
    }

    .wheel-pointer{
      position:absolute;
      top:2px;
      left:50%;
      width:34px;
      height:42px;
      transform:translateX(-50%);
      z-index:6;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,.42));
    }

    .wheel-pointer::before{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:0;
      height:0;
      border-left:17px solid transparent;
      border-right:17px solid transparent;
      border-top:30px solid rgba(255,255,255,.98);
    }

    .wheel-pointer::after{
      content:"";
      position:absolute;
      left:50%;
      top:4px;
      transform:translateX(-50%);
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(180deg, #ffffff, #d8c6ff);
      box-shadow:0 0 14px rgba(255,255,255,.42);
    }

    .wheel-shell{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      padding:12px;
      background:
        radial-gradient(circle at 30% 18%, rgba(255,255,255,.26), rgba(255,255,255,0) 28%),
        linear-gradient(145deg, rgba(205,133,255,.70), rgba(111,46,226,.96) 40%, rgba(52,18,114,.98));
      box-shadow:
        0 34px 54px rgba(0,0,0,.46),
        0 0 36px rgba(157,85,255,.24),
        inset 0 2px 0 rgba(255,255,255,.20),
        inset 0 -10px 20px rgba(25,10,50,.42);
      z-index:1;
    }

    .wheel-shell::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.18);
      pointer-events:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    }

    .rim-dots{
      position:absolute;
      inset:0;
      z-index:3;
      pointer-events:none;
    }

    .rim-dot{
      position:absolute;
      left:50%;
      top:50%;
      width:7px;
      height:7px;
      border-radius:50%;
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(233,216,255,.78));
      box-shadow:0 0 10px rgba(255,255,255,.34);
    }

    .wheel{
      position:relative;
      width:100%;
      height:100%;
      border-radius:50%;
      overflow:hidden;
      transform:rotate(0deg);
      transition:transform 5.3s cubic-bezier(.14,.86,.18,1);
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.22), rgba(255,255,255,0) 28%),
        repeating-conic-gradient(
          from 0deg,
          rgba(255,255,255,.20) 0deg 1deg,
          rgba(255,255,255,0) 1deg 45deg
        ),
        conic-gradient(
          from 0deg,
          #ff77f7 0deg 45deg,
          #bc67ff 45deg 90deg,
          #8c62ff 90deg 135deg,
          #7f44ff 135deg 180deg,
          #f16bff 180deg 225deg,
          #9b60ff 225deg 270deg,
          #6c39ff 270deg 315deg,
          #cf59ff 315deg 360deg
        );
      border:2px solid rgba(255,255,255,.14);
      box-shadow:
        inset 0 0 0 7px rgba(10,8,22,.16),
        inset 0 14px 28px rgba(255,255,255,.08),
        inset 0 -18px 28px rgba(25,8,58,.28);
      z-index:2;
    }

    .wheel::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 26%, rgba(255,255,255,.16), rgba(255,255,255,0) 38%),
        radial-gradient(circle at 50% 74%, rgba(0,0,0,.16), rgba(0,0,0,0) 42%);
      pointer-events:none;
    }

    .wheel::after{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.12);
      pointer-events:none;
    }

    .wheel-labels{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:2;
    }

    .wheel-label{
      position:absolute;
      left:50%;
      top:50%;
      width:72px;
      text-align:center;
      font-size:16px;
      font-weight:900;
      color:#fff;
      text-shadow:0 4px 12px rgba(0,0,0,.44);
      transform-origin:center center;
      user-select:none;
      letter-spacing:-.3px;
    }

    .wheel-center{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      width:102px;
      height:102px;
      border-radius:50%;
      z-index:5;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at 30% 22%, rgba(255,255,255,.18), rgba(255,255,255,0) 30%),
        linear-gradient(180deg, rgba(40,18,76,.98), rgba(20,10,40,.98));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        0 18px 26px rgba(0,0,0,.34),
        inset 0 1px 0 rgba(255,255,255,.10),
        0 0 24px rgba(168,85,247,.18);
    }

    .wheel-center::before{
      content:"";
      position:absolute;
      inset:8px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.08);
      pointer-events:none;
    }

    .wheel-center-logo{
      width:62px;
      height:62px;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.30));
      animation:logoPulse 2.2s ease-in-out infinite;
    }

    .check-row{
      position:relative;
      z-index:1;
      width:100%;
      min-height:48px;
      border-radius:18px;
      padding:0 14px;
      display:flex;
      align-items:center;
      gap:12px;
      background:rgba(32,51,40,.42);
      border:1px solid rgba(57,217,138,.24);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .check-icon{
      width:24px;
      height:24px;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, var(--green1), var(--green2));
      color:#fff;
      font-weight:900;
      font-size:14px;
      box-shadow:0 10px 18px rgba(18,183,106,.22);
      flex:0 0 auto;
    }

    .check-text{
      flex:1;
      min-width:0;
      font-size:14px;
      font-weight:800;
      color:#fff;
    }

    .check-status{
      flex:0 0 auto;
      font-size:11px;
      font-weight:900;
      color:rgba(169,255,213,.92);
      text-transform:uppercase;
      letter-spacing:.9px;
    }

    .spin-btn,
    .sheet-btn,
    .tg-btn{
      border:none;
      cursor:pointer;
      border-radius:20px;
      min-height:52px;
      padding:0 18px;
      color:#fff;
      font-size:16px;
      font-weight:900;
      letter-spacing:.2px;
      transition:transform .16s ease, filter .16s ease, opacity .16s ease;
    }

    .spin-btn:active,
    .sheet-btn:active,
    .tg-btn:active{ transform:scale(.985); }

    .spin-btn{
      width:100%;
      position:relative;
      z-index:1;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.04)),
        linear-gradient(135deg, #de62ff, #8a44ff 58%, #5c21db);
      box-shadow:
        0 20px 36px rgba(118,52,255,.34),
        inset 0 1px 0 rgba(255,255,255,.24),
        inset 0 -10px 16px rgba(64,18,140,.30);
    }

    .spin-btn[disabled]{
      opacity:.66;
      cursor:default;
      filter:saturate(.84);
    }

    .toast{
      position:fixed;
      left:50%;
      top:calc(10px + var(--safe-top));
      transform:translate(-50%, -14px);
      min-width:220px;
      max-width:min(92vw, 380px);
      padding:13px 16px;
      border-radius:18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.03)),
        rgba(15,18,28,.94);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 20px 44px rgba(0,0,0,.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color:#fff;
      font-size:13px;
      font-weight:800;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .28s ease, transform .28s ease;
      z-index:330;
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%, 0);
    }

    .channel-overlay{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.72);
      opacity:0;
      pointer-events:none;
      transition: opacity .22s ease;
      z-index:260;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .channel-overlay.show{
      opacity:1;
      pointer-events:auto;
    }

    .channel-card{
      width:min(440px, 100%);
      border-radius:28px;
      overflow:hidden;
      background: rgba(18,20,28,.96);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 34px 90px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transform: translateY(12px) scale(.98);
      opacity:.95;
      transition: transform .22s ease, opacity .22s ease;
    }

    .channel-overlay.show .channel-card{
      transform: translateY(0) scale(1);
      opacity:1;
    }

    .channel-head{
      padding:18px 18px 12px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,.03);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .channel-title{
      font-weight:900;
      font-size:15px;
      color: rgba(234,241,255,.96);
    }

    .channel-x{
      width:40px;
      height:40px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.06);
      color: rgba(234,241,255,.96);
      cursor:pointer;
      display:grid;
      place-items:center;
    }

    .channel-x:active{ transform: scale(.98); }

    .channel-body{ padding:16px 18px 18px; }

    .channel-text{
      margin:0 0 16px;
      color:rgba(234,241,255,.82);
      font-size:14px;
      line-height:1.55;
    }

    .tg-btn{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      background: linear-gradient(180deg, var(--tg1), var(--tg2));
      box-shadow: 0 18px 40px rgba(34,158,217,.4), inset 0 1px 0 rgba(255,255,255,.2);
    }

    .tg-ico{
      width:21px;
      height:21px;
      display:block;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.3));
    }

    @keyframes logoPulse{
      0%,100%{ transform:scale(1); }
      50%{ transform:scale(1.06); }
    }

    @media (max-width: 420px){
      .screen-card{ border-radius:26px; padding:14px 12px 14px; }
      .wheel-wrap{ width:min(100%, 320px); }
      .wheel-label{ width:66px; font-size:15px; }
      .wheel-center{ width:90px; height:90px; }
      .wheel-center-logo{ width:54px; height:54px; }
      .check-row{ min-height:44px; }
      .check-text{ font-size:13px; }
    }

    @media (max-width: 360px){
      .top-row{ grid-template-columns:36px 1fr 46px; gap:6px; }
      .icon-btn{ width:36px; height:36px; border-radius:12px; }
      .balance-mini{ height:38px; padding:5px 6px 5px 10px; }
      .bal-title{ font-size:11px; }
      .bal-amount{ height:24px; font-size:12px; min-width:70px; }
      .hero-logo{ width:46px; height:46px; }
      .wheel-wrap{ width:min(100%, 288px); }
      .wheel-label{ width:58px; font-size:13px; }
      .wheel-center{ width:78px; height:78px; }
      .wheel-center-logo{ width:46px; height:46px; }
      .channel-overlay{ padding:10px; }
      .channel-card{ border-radius:22px; }
      .channel-head{ padding:12px 12px 9px; }
      .channel-body{ padding:12px; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ transition:none !important; animation:none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="content">
      <div class="top-row">
        <button class="icon-btn" id="backBtn" aria-label="Назад">
          <svg class="back-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>

        <div class="balance-mini" aria-label="Баланс">
          <span class="bal-title">Баланс</span>
          <button class="bal-amount" id="balanceChip" aria-label="Открыть кошелёк">
            <span id="balanceValue">...</span>
          </button>
        </div>

        <button class="hero-logo" id="brandLogoBtn" aria-label="Открыть Telegram канал Vezus Game">
          <img src="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png" alt="Vezus Game" loading="eager" fetchpriority="high" decoding="async">
        </button>
      </div>

      <section class="screen-card">
        <div class="wheel-wrap">
          <div class="wheel-glow" aria-hidden="true"></div>
          <div class="wheel-shadow" aria-hidden="true"></div>
          <div class="wheel-pointer" aria-hidden="true"></div>

          <div class="wheel-shell">
            <div class="rim-dots" id="rimDots" aria-hidden="true"></div>
            <div class="wheel" id="fortuneWheel" aria-label="Колесо фортуны">
              <div class="wheel-labels" id="wheelLabels" aria-hidden="true"></div>
            </div>
          </div>

          <div class="wheel-center">
            <img class="wheel-center-logo" src="https://i.postimg.cc/qvL497mF/Picsart-26-02-27-02-02-37-502.png" alt="Vezus Game">
          </div>
        </div>

        <div class="check-row">
          <span class="check-icon" id="depositCheckIcon">!</span>
          <span class="check-text" id="depositCheckText">Сделайте депозит от 500₽, чтобы открыть 3 прокрута</span>
          <span class="check-status" id="depositCheckStatus">ожидание</span>
        </div>

        <button class="spin-btn" id="spinBtn">Крутить колесо</button>
      </section>
    </div>
  </div>

  <div class="channel-overlay" id="channelOverlay" aria-hidden="true">
    <div class="channel-card" role="dialog" aria-modal="true" aria-label="Telegram канал">
      <div class="channel-head">
        <div class="channel-title">Наш Telegram канал</div>
        <button class="channel-x" id="channelClose" aria-label="Закрыть">✕</button>
      </div>
      <div class="channel-body">
        <p class="channel-text">
          Нажми кнопку ниже — откроется наш Telegram канал:
          <b>@VezusGame</b>
        </p>
        <button class="tg-btn" id="goChannel" aria-label="Перейти в Telegram канал">
          <svg class="tg-ico" viewBox="0 0 240 240" aria-hidden="true">
            <path fill="#fff" d="M120 0C53.7 0 0 53.7 0 120s53.7 120 120 120 120-53.7 120-120S186.3 0 120 0zm58.7 82.3l-19.7 92.8c-1.5 6.6-5.4 8.2-10.9 5.1l-30.2-22.3-14.6 14c-1.6 1.6-3 3-6.1 3l2.2-31.6 57.5-52c2.5-2.2-.5-3.4-3.9-1.2l-71 44.7-30.6-9.6c-6.6-2.1-6.7-6.6 1.4-9.7l119.6-46.1c5.5-2 10.3 1.3 8.8 9.9z"/>
          </svg>
          Перейти в Telegram канал
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const VERIFY_URL = "https://lazrfierfbhwlduqlvws.functions.supabase.co/verify-telegram";
    const FILES = {
      home: 'index.html',
      wallet: 'wallet.html'
    };

    const PRIZES = [5, 10, 50, 80, 100, 250, 500, 1000];
    const WEIGHTS = [34, 29, 12, 9, 7, 5, 3, 1];

    const MIN_DEPOSIT_AMOUNT = 500;
    const SPINS_PER_DEPOSIT = 3;
    const SPIN_COOLDOWN_MS = 24 * 60 * 60 * 1000;
    const FORTUNE_STATE_KEY = 'fortune_spin_state_v2';
    const FORTUNE_PROJECT_KEY = 'fortune';

    const balanceValueEl = document.getElementById('balanceValue');
    const balanceChipEl = document.getElementById('balanceChip');
    const brandLogoBtn = document.getElementById('brandLogoBtn');
    const backBtn = document.getElementById('backBtn');
    const spinBtn = document.getElementById('spinBtn');
    const wheelEl = document.getElementById('fortuneWheel');
    const wheelLabelsEl = document.getElementById('wheelLabels');
    const rimDotsEl = document.getElementById('rimDots');
    const toastEl = document.getElementById('toast');
    const channelOverlay = document.getElementById('channelOverlay');
    const channelClose = document.getElementById('channelClose');
    const goChannel = document.getElementById('goChannel');
    const depositCheckIconEl = document.getElementById('depositCheckIcon');
    const depositCheckTextEl = document.getElementById('depositCheckText');
    const depositCheckStatusEl = document.getElementById('depositCheckStatus');

    let toastTimer = null;
    let currentRotation = 0;
    let isSpinning = false;
    let eligibilityResolved = false;
    let uiTicker = null;

    function formatBalance(value) {
      const num = Number(value ?? 0);
      if (!Number.isFinite(num)) return '0 ₽';
      const formatted = Number.isInteger(num) ? num : num.toFixed(2);
      return `${formatted} ₽`;
    }

    function loadCachedProfile() {
      try {
        const raw = localStorage.getItem('tg_profile');
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function applyProfile(profile) {
      if (!profile) return;
      localStorage.setItem('tg_profile', JSON.stringify(profile));
      balanceValueEl.textContent = formatBalance(profile.balance);
    }

    function createDefaultFortuneState() {
      return {
        version: 2,
        serverBalance: null,
        projects: {
          [FORTUNE_PROJECT_KEY]: {
            remainingSpins: 0,
            lastSpinAt: 0,
            activatedAt: 0,
            activatedByBalance: 0,
            activations: 0,
            usedSpins: 0
          }
        }
      };
    }

    function loadFortuneState() {
      try {
        const raw = localStorage.getItem(FORTUNE_STATE_KEY);
        if (!raw) return createDefaultFortuneState();
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== 'object') return createDefaultFortuneState();
        if (!parsed.projects || typeof parsed.projects !== 'object') parsed.projects = {};
        if (!parsed.projects[FORTUNE_PROJECT_KEY]) {
          parsed.projects[FORTUNE_PROJECT_KEY] = createDefaultFortuneState().projects[FORTUNE_PROJECT_KEY];
        }
        return parsed;
      } catch {
        return createDefaultFortuneState();
      }
    }

    function saveFortuneState(state) {
      try {
        localStorage.setItem(FORTUNE_STATE_KEY, JSON.stringify(state));
      } catch {}
    }

    function getProjectFortuneState(state) {
      if (!state.projects) state.projects = {};
      if (!state.projects[FORTUNE_PROJECT_KEY]) {
        state.projects[FORTUNE_PROJECT_KEY] = createDefaultFortuneState().projects[FORTUNE_PROJECT_KEY];
      }
      return state.projects[FORTUNE_PROJECT_KEY];
    }

    function normalizeMoney(value) {
      const amount = Number(value ?? 0);
      if (!Number.isFinite(amount)) return 0;
      return Math.round((amount + Number.EPSILON) * 100) / 100;
    }

    function activateDepositPackage(projectState, balanceAmount) {
      projectState.remainingSpins = SPINS_PER_DEPOSIT;
      projectState.activatedAt = Date.now();
      projectState.activatedByBalance = normalizeMoney(balanceAmount);
      projectState.activations = Number(projectState.activations || 0) + 1;
    }

    function syncFortuneAccessWithBalance(balanceAmount) {
      const state = loadFortuneState();
      const projectState = getProjectFortuneState(state);
      const currentBalance = normalizeMoney(balanceAmount);
      const previousBalance = Number.isFinite(Number(state.serverBalance)) ? normalizeMoney(state.serverBalance) : null;

      if (previousBalance === null) {
        state.serverBalance = currentBalance;
        if (!projectState.activatedAt && Number(projectState.remainingSpins || 0) <= 0 && currentBalance >= MIN_DEPOSIT_AMOUNT) {
          activateDepositPackage(projectState, currentBalance);
        }
        saveFortuneState(state);
        return;
      }

      const balanceDelta = normalizeMoney(currentBalance - previousBalance);
      if (balanceDelta >= MIN_DEPOSIT_AMOUNT) {
        activateDepositPackage(projectState, currentBalance);
      }

      state.serverBalance = currentBalance;
      saveFortuneState(state);
    }

    function getFortuneStatus() {
      const state = loadFortuneState();
      const projectState = getProjectFortuneState(state);
      const remainingSpins = Number(projectState.remainingSpins || 0);
      const lastSpinAt = Number(projectState.lastSpinAt || 0);
      const now = Date.now();
      const nextSpinAt = lastSpinAt ? lastSpinAt + SPIN_COOLDOWN_MS : 0;

      if (remainingSpins <= 0) {
        return {
          kind: projectState.activatedAt ? 'new_deposit_required' : 'deposit_required',
          state,
          projectState,
          remainingSpins: 0,
          nextSpinAt: 0,
          msLeft: 0
        };
      }

      if (nextSpinAt && now < nextSpinAt) {
        return {
          kind: 'cooldown',
          state,
          projectState,
          remainingSpins,
          nextSpinAt,
          msLeft: nextSpinAt - now
        };
      }

      return {
        kind: 'available',
        state,
        projectState,
        remainingSpins,
        nextSpinAt: 0,
        msLeft: 0
      };
    }

    function formatCountdown(ms) {
      const totalSeconds = Math.max(0, Math.ceil(ms / 1000));
      const hours = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
      const minutes = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
      const seconds = String(totalSeconds % 60).padStart(2, '0');
      return `${hours}:${minutes}:${seconds}`;
    }

    function setCheckRow(text, status, icon = '✓') {
      depositCheckTextEl.textContent = text;
      depositCheckStatusEl.textContent = status;
      depositCheckIconEl.textContent = icon;
    }

    function stopUiTicker() {
      if (!uiTicker) return;
      clearInterval(uiTicker);
      uiTicker = null;
    }

    function ensureUiTicker() {
      if (uiTicker) return;
      uiTicker = setInterval(() => {
        if (isSpinning) return;
        updateFortuneUi();
      }, 1000);
    }

    function updateFortuneUi() {
      if (isSpinning) {
        spinBtn.disabled = true;
        spinBtn.textContent = 'Крутим...';
        setCheckRow('Колесо сейчас крутится — дождитесь результата', 'в процессе', '⟳');
        stopUiTicker();
        return;
      }

      if (!eligibilityResolved) {
        spinBtn.disabled = true;
        spinBtn.textContent = 'Проверяем доступ...';
        setCheckRow(`Проверяем депозит от ${MIN_DEPOSIT_AMOUNT}₽`, 'проверка', '…');
        stopUiTicker();
        return;
      }

      const status = getFortuneStatus();

      if (status.kind === 'deposit_required') {
        spinBtn.disabled = true;
        spinBtn.textContent = `Нужен депозит ${MIN_DEPOSIT_AMOUNT}₽+`;
        setCheckRow(`Сделайте депозит от ${MIN_DEPOSIT_AMOUNT}₽, чтобы получить ${SPINS_PER_DEPOSIT} прокрута`, 'ожидание', '!');
        stopUiTicker();
        return;
      }

      if (status.kind === 'new_deposit_required') {
        spinBtn.disabled = true;
        spinBtn.textContent = `Нужен новый депозит ${MIN_DEPOSIT_AMOUNT}₽+`;
        setCheckRow(`${SPINS_PER_DEPOSIT} из ${SPINS_PER_DEPOSIT} прокрутов использованы — нужен новый депозит`, 'лимит', '!');
        stopUiTicker();
        return;
      }

      if (status.kind === 'cooldown') {
        spinBtn.disabled = true;
        spinBtn.textContent = `Следующий прокрут через ${formatCountdown(status.msLeft)}`;
        setCheckRow(`Осталось ${status.remainingSpins} из ${SPINS_PER_DEPOSIT} прокрутов • 1 прокрут раз в 24 часа`, 'таймер', '⏳');
        ensureUiTicker();
        return;
      }

      spinBtn.disabled = false;
      spinBtn.textContent = `Крутить колесо • ${status.remainingSpins}/${SPINS_PER_DEPOSIT}`;
      setCheckRow(`Доступ открыт • осталось ${status.remainingSpins} из ${SPINS_PER_DEPOSIT} прокрутов`, 'доступно', '✓');
      stopUiTicker();
    }

    function getStartParam() {
      try {
        const tgStart = (window.Telegram?.WebApp?.initDataUnsafe?.start_param || '').trim();
        if (tgStart) return tgStart.toUpperCase();
        const url = new URL(window.location.href);
        const q1 = (url.searchParams.get('tgWebAppStartParam') || '').trim();
        if (q1) return q1.toUpperCase();
        const q2 = (url.searchParams.get('startapp') || '').trim();
        if (q2) return q2.toUpperCase();
        const q3 = (url.searchParams.get('ref') || '').trim();
        if (q3) return q3.toUpperCase();
        return '';
      } catch {
        return '';
      }
    }

    function clearStartParamsFromUrl() {
      try {
        const url = new URL(window.location.href);
        url.searchParams.delete('tgWebAppStartParam');
        url.searchParams.delete('startapp');
        url.searchParams.delete('ref');
        history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
      } catch {}
    }

    async function autoAuthTelegram() {
      const cached = loadCachedProfile();
      if (cached) applyProfile(cached);
      else balanceValueEl.textContent = '0 ₽';

      updateFortuneUi();

      if (!window.Telegram || !window.Telegram.WebApp) {
        eligibilityResolved = true;
        updateFortuneUi();
        return;
      }

      try {
        Telegram.WebApp.ready();
        if (typeof Telegram.WebApp.expand === 'function') Telegram.WebApp.expand();
        if (typeof Telegram.WebApp.setHeaderColor === 'function') Telegram.WebApp.setHeaderColor('#020617');
      } catch {}

      const initData = Telegram.WebApp.initData;
      if (!initData) {
        eligibilityResolved = true;
        updateFortuneUi();
        return;
      }

      const refCode = getStartParam();
      balanceValueEl.textContent = '...';

      try {
        const res = await fetch(VERIFY_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData, refCode })
        });
        const json = await res.json().catch(() => ({}));
        if (!res.ok || !json.ok || !json.profile) {
          if (cached) applyProfile(cached);
          else balanceValueEl.textContent = '0 ₽';
          eligibilityResolved = true;
          updateFortuneUi();
          return;
        }
        applyProfile(json.profile);
        syncFortuneAccessWithBalance(json.profile.balance);
        eligibilityResolved = true;
        updateFortuneUi();
        if (refCode) clearStartParamsFromUrl();
      } catch {
        if (cached) applyProfile(cached);
        else balanceValueEl.textContent = '0 ₽';
        eligibilityResolved = true;
        updateFortuneUi();
      }
    }

    function goTo(file) {
      window.location.href = file;
    }

    function openTelegramLinkSafe(url) {
      if (window.Telegram?.WebApp?.openTelegramLink) window.Telegram.WebApp.openTelegramLink(url);
      else window.open(url, '_blank', 'noopener');
    }

    function showToast(text, ms = 2600) {
      toastEl.textContent = text;
      toastEl.classList.add('show');
      try {
        if (window.Telegram?.WebApp?.HapticFeedback?.impactOccurred) {
          Telegram.WebApp.HapticFeedback.impactOccurred('light');
        }
      } catch {}
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
    }

    function addPrizeToBalance(prize) {
      const cached = loadCachedProfile() || {};
      const nextBalance = (Number(cached.balance) || 0) + Number(prize || 0);
      cached.balance = Math.round((nextBalance + Number.EPSILON) * 100) / 100;
      applyProfile(cached);
    }

    function weightedIndex() {
      const total = WEIGHTS.reduce((sum, item) => sum + item, 0);
      let roll = Math.random() * total;
      for (let i = 0; i < WEIGHTS.length; i++) {
        roll -= WEIGHTS[i];
        if (roll <= 0) return i;
      }
      return 0;
    }

    function renderWheel() {
      const sector = 360 / PRIZES.length;
      wheelLabelsEl.innerHTML = '';
      PRIZES.forEach((prize, index) => {
        const label = document.createElement('div');
        label.className = 'wheel-label';
        const angle = index * sector + sector / 2;
        label.textContent = `${prize}₽`;
        label.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateY(-118px) rotate(${-angle}deg)`;
        wheelLabelsEl.appendChild(label);
      });
    }

    function renderRimDots() {
      rimDotsEl.innerHTML = '';
      const count = 24;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement('span');
        dot.className = 'rim-dot';
        const angle = i * (360 / count);
        dot.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateY(-165px)`;
        rimDotsEl.appendChild(dot);
      }
    }

    function spinWheel() {
      if (isSpinning) return;

      const status = getFortuneStatus();
      if (!eligibilityResolved) {
        showToast('Подождите, идёт проверка доступа', 2200);
        updateFortuneUi();
        return;
      }

      if (status.kind === 'deposit_required') {
        showToast(`Сначала сделайте депозит от ${MIN_DEPOSIT_AMOUNT}₽`, 2600);
        updateFortuneUi();
        return;
      }

      if (status.kind === 'new_deposit_required') {
        showToast(`Лимит ${SPINS_PER_DEPOSIT} прокрутов исчерпан — нужен новый депозит`, 2800);
        updateFortuneUi();
        return;
      }

      if (status.kind === 'cooldown') {
        showToast(`Следующий прокрут будет доступен через ${formatCountdown(status.msLeft)}`, 2600);
        updateFortuneUi();
        return;
      }

      const targetIndex = weightedIndex();
      const prize = PRIZES[targetIndex];
      const sector = 360 / PRIZES.length;
      const centerAngle = targetIndex * sector + sector / 2;
      const targetNormalized = (360 - centerAngle) % 360;
      const currentNormalized = ((currentRotation % 360) + 360) % 360;
      const extraTurns = (5 + Math.floor(Math.random() * 2)) * 360;
      const deltaToTarget = (targetNormalized - currentNormalized + 360) % 360;

      currentRotation += extraTurns + deltaToTarget;
      isSpinning = true;
      updateFortuneUi();
      wheelEl.style.transform = `rotate(${currentRotation}deg)`;

      try {
        if (window.Telegram?.WebApp?.HapticFeedback?.impactOccurred) {
          Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        }
      } catch {}

      window.clearTimeout(spinWheel._timer);
      spinWheel._timer = window.setTimeout(() => {
        addPrizeToBalance(prize);

        const state = loadFortuneState();
        const projectState = getProjectFortuneState(state);
        if (Number(projectState.remainingSpins || 0) > 0) {
          projectState.remainingSpins = Number(projectState.remainingSpins || 0) - 1;
        }
        projectState.usedSpins = Number(projectState.usedSpins || 0) + 1;
        projectState.lastSpinAt = Date.now();
        saveFortuneState(state);

        isSpinning = false;
        updateFortuneUi();

        try {
          if (window.Telegram?.WebApp?.HapticFeedback?.notificationOccurred) {
            Telegram.WebApp.HapticFeedback.notificationOccurred('success');
          }
        } catch {}

        showToast(`Выпало ${prize}₽ • выигрыш добавлен на баланс`, 2800);
      }, 5450);
    }

    function openChannel() {
      channelOverlay.classList.add('show');
      channelOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeChannel() {
      channelOverlay.classList.remove('show');
      channelOverlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    balanceChipEl.addEventListener('click', () => goTo(FILES.wallet));
    backBtn.addEventListener('click', () => goTo(FILES.home));
    brandLogoBtn.addEventListener('click', openChannel);
    spinBtn.addEventListener('click', spinWheel);

    channelClose.addEventListener('click', closeChannel);
    channelOverlay.addEventListener('click', (e) => {
      if (e.target === channelOverlay) closeChannel();
    });
    goChannel.addEventListener('click', () => openTelegramLinkSafe('https://t.me/VezusGame'));

    renderWheel();
    renderRimDots();
    updateFortuneUi();
    autoAuthTelegram();
  </script>
</body>
</html>
