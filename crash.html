<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Vezus Crash — Local</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#07050d;
      --stroke:rgba(166,77,255,.35);
      --panel-side:16px;
      --panel-width:410px;
      --safe-bottom:env(safe-area-inset-bottom);
      --violet:#9d55ff;
      --violet-2:#5f2cff;
      --green:#45ff9a;
      --red:#ff4d5f;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    html,
    body{
      width:100%;
      height:100%;
      min-height:100%;
      overflow:hidden;
      background:var(--bg);
      color:#fff;
      font-family:"Montserrat",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      -webkit-text-size-adjust:100%;
      user-select:none;
      -webkit-user-select:none;
    }

    button,
    input{font:inherit;}
    button{border:0;cursor:pointer;}

    .game{
      position:relative;
      width:100%;
      min-height:100dvh;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 30%, rgba(255,179,42,.10), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(141,42,255,.22), transparent 42%),
        linear-gradient(180deg,#08050f 0%,#160020 53%,#0b0811 100%);
      isolation:isolate;
    }

    .game::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 20%, rgba(160,44,255,.15), transparent 22%),
        radial-gradient(circle at 82% 16%, rgba(255,255,255,.05), transparent 18%);
      z-index:0;
    }

    .preloader{
      position:fixed;
      inset:0;
      z-index:999999;
      display:grid;
      place-items:center;
      overflow:hidden;
      isolation:isolate;
      background:linear-gradient(180deg,#040404 0%,#111111 38%,#1b1b1b 62%,#070707 100%);
      opacity:1;
      visibility:visible;
      pointer-events:auto;
      transition:opacity .42s ease,visibility .42s ease;
    }

    .preloader.hidden{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .preloader::before,
    .preloader::after{
      content:"";
      position:absolute;
      z-index:0;
      width:420px;
      height:420px;
      border-radius:46% 54% 58% 42% / 42% 46% 54% 58%;
      filter:blur(44px);
      opacity:.34;
      pointer-events:none;
      will-change:transform,border-radius;
    }

    .preloader::before{
      left:-110px;
      top:-70px;
      background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.08), rgba(82,82,82,.28) 42%, rgba(22,22,22,.04) 76%);
      animation:blobOne 6.4s ease-in-out infinite alternate;
    }

    .preloader::after{
      right:-120px;
      bottom:-90px;
      width:470px;
      height:470px;
      background:radial-gradient(circle at 55% 45%, rgba(255,255,255,.06), rgba(96,96,96,.24) 40%, rgba(18,18,18,.03) 76%);
      animation:blobTwo 7.2s ease-in-out infinite alternate;
    }

    .preloader-inner{
      position:relative;
      z-index:2;
      width:min(74vw,300px);
      display:grid;
      justify-items:center;
      transform:translateY(-4px);
      animation:preloaderIn .36s ease both;
    }

    .preloader-logo{
      width:154px;
      max-width:54vw;
      height:auto;
      display:block;
      object-fit:contain;
      transform-origin:center bottom;
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
      filter:drop-shadow(0 12px 24px rgba(0,0,0,.48));
      animation:logoJump 1.18s ease-in-out infinite;
    }

    .loader-line{
      width:min(220px,68vw);
      height:4px;
      margin-top:22px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.10);
    }

    .loader-line span{
      display:block;
      width:100%;
      height:100%;
      border-radius:inherit;
      transform-origin:left center;
      transform:scaleX(0);
      background:linear-gradient(90deg,#5f2cff 0%,#9d4dff 45%,#d946ef 100%);
      box-shadow:0 0 14px rgba(157,77,255,.28);
      animation:loaderLine 1.65s cubic-bezier(.16,.84,.24,1) forwards;
    }

    .topbar{
      position:fixed;
      top:max(12px,env(safe-area-inset-top));
      left:16px;
      z-index:45;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      pointer-events:none;
    }

    .balance{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      min-height:40px;
      padding:0 12px;
      color:#fff;
      font-size:16px;
      line-height:1;
      font-weight:800;
      letter-spacing:-.03em;
      text-shadow:0 0 10px rgba(255,255,255,.08);
      pointer-events:auto;
    }

    .wallet{
      width:20px;
      height:20px;
      color:#fff;
    }

    .wallet path,
    .wallet circle{fill:currentColor;}

    .playfield{
      position:relative;
      z-index:1;
      width:100%;
      height:calc(100dvh - 238px - max(8px,var(--safe-bottom)));
      min-height:330px;
      max-height:620px;
      padding:56px 14px 0;
      display:grid;
      place-items:center;
      overflow:hidden;
      contain:layout paint style;
    }

    .flight-card{
      position:relative;
      width:min(calc(100vw - 24px),520px);
      height:min(54dvh,430px);
      min-height:315px;
      border:1px solid rgba(255,255,255,.075);
      border-radius:30px;
      overflow:hidden;
      background:
        radial-gradient(circle at 50% 74%, rgba(157,85,255,.17), transparent 41%),
        radial-gradient(circle at 24% 22%, rgba(255,255,255,.06), transparent 22%),
        linear-gradient(180deg, rgba(24,9,52,.94), rgba(8,4,25,.97));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.045),
        inset 0 -24px 48px rgba(0,0,0,.22),
        0 18px 44px rgba(0,0,0,.30);
      isolation:isolate;
    }

    .space-layer{
      position:absolute;
      inset:-20%;
      pointer-events:none;
      opacity:.8;
      transform:translateZ(0);
    }

    .stars-one{
      background-image:
        radial-gradient(circle, rgba(255,255,255,.82) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(198,158,255,.56) 0 1px, transparent 1.8px);
      background-size:48px 48px,78px 78px;
      background-position:0 0,16px 22px;
      animation:starsDrift 20s linear infinite;
    }

    .stars-two{
      opacity:.48;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.70) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,193,95,.50) 0 1px, transparent 1.8px);
      background-size:92px 92px,136px 136px;
      background-position:18px 12px,44px 36px;
      animation:starsDrift 36s linear infinite reverse;
    }

    .speed-lines{
      position:absolute;
      inset:-10% 0;
      pointer-events:none;
      opacity:.15;
      background:
        repeating-linear-gradient(105deg, transparent 0 34px, rgba(255,255,255,.48) 35px 37px, transparent 38px 100px);
      filter:blur(.2px);
      transform:translateZ(0);
      animation:speedMove 1.05s linear infinite;
    }

    .flight-card.running .speed-lines{
      opacity:.30;
      animation-duration:.48s;
    }

    .grid-floor{
      position:absolute;
      left:-10%;
      right:-10%;
      bottom:-19%;
      height:45%;
      opacity:.34;
      pointer-events:none;
      background-image:
        linear-gradient(rgba(255,255,255,.10) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.10) 1px, transparent 1px);
      background-size:34px 34px;
      transform:perspective(260px) rotateX(62deg);
      transform-origin:center bottom;
      mask-image:linear-gradient(transparent 0%, #000 28%, #000 100%);
      -webkit-mask-image:linear-gradient(transparent 0%, #000 28%, #000 100%);
      animation:gridMove 1.1s linear infinite;
    }

    .flight-card.running .grid-floor{animation-duration:.46s;}

    .multiplier{
      position:absolute;
      top:24px;
      left:50%;
      z-index:6;
      transform:translateX(-50%);
      min-width:150px;
      padding:7px 16px 8px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg,rgba(22,15,34,.78),rgba(10,6,18,.62));
      box-shadow:0 16px 32px rgba(0,0,0,.30),0 0 24px rgba(140,35,255,.18);
      color:#fff;
      text-align:center;
      font-size:clamp(36px,10vw,58px);
      line-height:.96;
      font-weight:900;
      letter-spacing:-.07em;
      text-shadow:0 0 18px rgba(157,85,255,.34);
    }

    .multiplier.win{
      color:#78ffb0;
      text-shadow:0 0 22px rgba(69,255,154,.42);
    }

    .multiplier.crash{
      color:#ff6c79;
      text-shadow:0 0 24px rgba(255,77,95,.52);
      animation:crashPulse .34s ease both;
    }

    .rocket-wrap{
      position:absolute;
      left:50%;
      top:52%;
      z-index:4;
      width:clamp(170px,44vw,260px);
      transform:translate(-50%,-50%) translateZ(0);
      transform-origin:center center;
      animation:rocketIdle 2.4s ease-in-out infinite;
      will-change:transform;
      pointer-events:none;
    }

    .flight-card.running .rocket-wrap{
      animation:rocketFlight .86s ease-in-out infinite;
      filter:drop-shadow(0 18px 20px rgba(0,0,0,.34));
    }

    .flight-card.cashed .rocket-wrap{
      animation:rocketWin .8s ease both;
    }

    .flight-card.crashed .rocket-wrap{
      animation:rocketCrash .58s ease both;
    }

    .rocket-glow{
      position:absolute;
      left:50%;
      top:56%;
      z-index:-1;
      width:72%;
      height:62%;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle, rgba(157,85,255,.32), rgba(255,97,128,.11) 44%, transparent 72%);
      filter:blur(12px);
      opacity:.72;
      animation:glowBreath 2s ease-in-out infinite;
    }

    .flame{
      position:absolute;
      left:50%;
      bottom:2%;
      z-index:-1;
      width:28%;
      height:35%;
      transform:translateX(-50%) rotate(8deg);
      border-radius:50% 50% 55% 55%;
      background:radial-gradient(ellipse at top, #fff7aa 0 10%, #ffb42a 18%, #ff4d5f 46%, transparent 72%);
      filter:blur(2px);
      opacity:.82;
      transform-origin:center top;
      animation:flameFlicker .22s ease-in-out infinite alternate;
    }

    .rocket-img{
      position:relative;
      z-index:2;
      width:100%;
      height:auto;
      display:block;
      object-fit:contain;
      filter:drop-shadow(0 16px 18px rgba(0,0,0,.36));
      user-select:none;
      -webkit-user-drag:none;
    }

    .boom{
      position:absolute;
      left:50%;
      top:52%;
      z-index:8;
      width:36px;
      height:36px;
      border-radius:50%;
      transform:translate(-50%,-50%) scale(.3);
      opacity:0;
      pointer-events:none;
      background:
        radial-gradient(circle, rgba(255,255,255,.95) 0 13%, rgba(255,199,64,.88) 16% 28%, rgba(255,77,95,.68) 34% 52%, transparent 68%);
      box-shadow:0 0 34px rgba(255,77,95,.72),0 0 70px rgba(255,177,42,.36);
    }

    .flight-card.crashed .boom{
      animation:boom .72s ease-out both;
    }

    .flight-status{
      position:absolute;
      left:18px;
      right:18px;
      bottom:16px;
      z-index:7;
      min-height:36px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border:1px solid rgba(255,255,255,.075);
      border-radius:14px;
      background:linear-gradient(180deg,rgba(24,18,39,.70),rgba(12,8,21,.58));
      color:rgba(255,255,255,.76);
      font-size:12px;
      line-height:1.25;
      font-weight:700;
      text-align:center;
      backdrop-filter:blur(8px);
    }

    .history-panel{
      position:relative;
      z-index:2;
      width:min(calc(100% - (var(--panel-side) * 2)), var(--panel-width));
      margin:-2px auto 0;
      padding:6px 8px;
      border:1px solid rgba(166,77,255,.18);
      border-radius:14px;
      background:linear-gradient(180deg,rgba(27,21,41,.72),rgba(16,12,25,.82));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03),0 12px 28px rgba(0,0,0,.18),0 0 16px rgba(140,35,255,.08);
      contain:layout paint style;
    }

    .history-list{
      min-height:30px;
      display:flex;
      align-items:center;
      gap:6px;
      overflow-x:auto;
      overflow-y:hidden;
      scrollbar-width:none;
    }

    .history-list::-webkit-scrollbar{display:none;}

    .history-empty{
      color:rgba(255,255,255,.42);
      font-size:10px;
      font-weight:700;
      white-space:nowrap;
    }

    .history-chip{
      flex:0 0 auto;
      min-width:48px;
      padding:6px 8px;
      border-radius:9px;
      background:rgba(255,255,255,.055);
      color:rgba(255,255,255,.82);
      font-size:11px;
      line-height:1;
      font-weight:800;
    }

    .history-chip.win{
      color:#72ffad;
      background:rgba(69,255,154,.10);
      box-shadow:inset 0 0 0 1px rgba(69,255,154,.12);
    }

    .history-chip.lose{
      color:#ff8d98;
      background:rgba(255,77,95,.10);
      box-shadow:inset 0 0 0 1px rgba(255,77,95,.12);
    }

    .controls{
      position:relative;
      z-index:15;
      width:min(calc(100% - (var(--panel-side) * 2)), var(--panel-width));
      margin:8px auto max(12px,calc(var(--safe-bottom) + 8px));
      display:flex;
      flex-direction:column;
      gap:7px;
      contain:layout paint style;
    }

    .profit-panel,
    .bet-panel{
      border:1px solid var(--stroke);
      background:linear-gradient(180deg,rgba(34,27,52,.94),rgba(22,15,34,.94));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 18px 40px rgba(0,0,0,.36),
        0 0 22px rgba(140,35,255,.13);
    }

    .profit-panel{
      min-height:43px;
      padding:7px 10px;
      display:grid;
      grid-template-columns:.9fr 1.1fr;
      gap:8px;
      align-items:center;
      border-radius:14px;
    }

    .profit-item{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:3px;
    }

    .profit-item span{
      color:#fff;
      font-size:10px;
      line-height:1;
      font-weight:600;
      white-space:nowrap;
      opacity:.86;
    }

    .profit-item strong{
      color:#fff;
      font-size:clamp(13px,3.5vw,16px);
      line-height:1;
      font-weight:700;
      letter-spacing:-.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .bet-panel{
      min-height:126px;
      padding:10px;
      display:grid;
      grid-template-columns:1.12fr .88fr;
      gap:10px;
      border-radius:17px;
    }

    .stake-side{
      min-width:0;
      display:grid;
      grid-template-rows:1fr 36px;
      gap:8px;
    }

    .stake-box{
      position:relative;
      min-height:68px;
      display:flex;
      align-items:center;
      padding:10px 40px 10px 12px;
      border:1px solid rgba(255,255,255,.06);
      border-radius:8px;
      background:linear-gradient(180deg,rgba(50,47,83,.98),rgba(43,39,70,.98));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.035);
    }

    .amount{
      width:100%;
      border:0;
      outline:none;
      background:transparent;
      color:#fff;
      font-size:clamp(18px,5vw,24px);
      line-height:1;
      font-weight:700;
      letter-spacing:-.06em;
      appearance:none;
      -webkit-appearance:none;
    }

    .amount::placeholder{color:rgba(255,255,255,.45);}

    .pm{
      position:absolute;
      right:9px;
      width:28px;
      height:25px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.10);
      border-radius:6px;
      background:linear-gradient(180deg,rgba(61,51,91,.96),rgba(29,21,48,.96));
      color:#d3baff;
      font-size:18px;
      line-height:1;
      font-weight:700;
    }

    .pm.plus{top:7px;}
    .pm.minus{bottom:7px;}

    .quick-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
    }

    .quick{
      min-height:36px;
      border:1px solid rgba(255,255,255,.055);
      border-radius:7px;
      background:linear-gradient(180deg,rgba(42,34,67,.96),rgba(29,23,47,.96));
      color:rgba(226,204,255,.90);
      font-size:17px;
      line-height:1;
      font-weight:700;
    }

    .choice-side{
      min-width:0;
      display:grid;
      grid-template-rows:1fr;
      gap:8px;
    }

    .action-btn{
      width:100%;
      min-height:100%;
      border-radius:7px;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
      background:
        linear-gradient(90deg,rgba(255,255,255,.12),transparent 32%),
        linear-gradient(180deg,#6f45c9 0%,#4b238f 54%,#2d1354 100%);
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,.10),
        inset 0 -4px 8px rgba(23,8,45,.32),
        0 0 16px rgba(140,35,255,.34);
      border:1px solid rgba(211,186,255,.22);
      transform:translateZ(0);
      transition:transform .12s ease,filter .12s ease,opacity .12s ease;
    }

    .action-btn.cashout{
      background:
        linear-gradient(90deg,rgba(255,255,255,.18),transparent 30%),
        linear-gradient(180deg,#48ff9f 0%,#13a956 52%,#07672e 100%);
      box-shadow:
        inset 0 3px 5px rgba(255,255,255,.18),
        inset 0 -4px 8px rgba(0,64,30,.30),
        0 0 18px rgba(69,255,154,.32);
      border-color:rgba(132,255,185,.28);
    }

    .action-btn strong{
      font-size:clamp(16px,4vw,20px);
      line-height:1;
      font-weight:800;
      letter-spacing:-.03em;
    }

    .action-btn span{display:none;}

    .action-btn:active,
    .quick:active,
    .pm:active{
      transform:scale(.97);
      filter:brightness(.93);
    }

    .action-btn:disabled,
    .quick:disabled,
    .pm:disabled,
    .amount:disabled{
      cursor:default;
      opacity:.68;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:max(18px,calc(var(--safe-bottom) + 14px));
      z-index:90;
      transform:translate(-50%,10px) scale(.98);
      opacity:0;
      pointer-events:none;
      min-height:38px;
      max-width:calc(100vw - 28px);
      padding:7px 12px 7px 8px;
      border-radius:13px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(180deg,rgba(28,21,43,.96),rgba(14,10,24,.96));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 12px 32px rgba(0,0,0,.42),
        0 0 20px rgba(140,35,255,.16);
      display:flex;
      align-items:center;
      gap:8px;
      color:#fff;
      font-size:12px;
      line-height:1;
      font-weight:700;
      white-space:nowrap;
      transition:opacity .20s ease,transform .20s ease;
    }

    .toast.show{
      opacity:1;
      transform:translate(-50%,0) scale(1);
    }

    .toast.win{border-color:rgba(38,255,120,.34);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 12px 32px rgba(0,0,0,.42),0 0 22px rgba(38,255,120,.22);}
    .toast.lose{border-color:rgba(255,59,59,.34);box-shadow:inset 0 0 0 1px rgba(255,255,255,.04),0 12px 32px rgba(0,0,0,.42),0 0 22px rgba(255,59,59,.22);}

    @keyframes blobOne{
      0%{transform:translate3d(0,0,0) scale(1);border-radius:46% 54% 58% 42% / 42% 46% 54% 58%;}
      100%{transform:translate3d(90px,70px,0) scale(1.18);border-radius:58% 42% 47% 53% / 55% 40% 60% 45%;}
    }

    @keyframes blobTwo{
      0%{transform:translate3d(0,0,0) scale(1);border-radius:52% 48% 44% 56% / 46% 58% 42% 54%;}
      100%{transform:translate3d(-95px,-85px,0) scale(1.16);border-radius:42% 58% 55% 45% / 60% 44% 56% 40%;}
    }

    @keyframes preloaderIn{from{opacity:0;transform:translateY(8px) scale(.985);}to{opacity:1;transform:translateY(-4px) scale(1);}}
    @keyframes logoJump{0%,100%{transform:translateY(0) scale(1);}42%{transform:translateY(-8px) scale(1.025);}64%{transform:translateY(0) scale(.995);}}
    @keyframes loaderLine{0%{transform:scaleX(0);}72%{transform:scaleX(.84);}100%{transform:scaleX(1);}}
    @keyframes starsDrift{from{transform:translate3d(0,-12%,0);}to{transform:translate3d(0,12%,0);}}
    @keyframes speedMove{from{transform:translate3d(0,-12%,0);}to{transform:translate3d(0,12%,0);}}
    @keyframes gridMove{from{background-position:0 0,0 0;}to{background-position:0 34px,0 34px;}}

      padding:0 !important;
      margin:0 !important;
      border:0 !important;
      overflow:hidden !important;
      pointer-events:none !important;
    }

    .playfield{
      height:calc(100dvh - 150px - max(8px,var(--safe-bottom))) !important;
      min-height:306px !important;
      max-height:660px !important;
      padding:44px 12px 0 !important;
    }

    .flight-card{
      height:min(54dvh, 430px) !important;
      min-height:286px !important;
      background:
        linear-gradient(115deg,
          #ffb35f 0%,
          #ff884d 22%,
          #f06755 42%,
          #b04a68 62%,
          #6a2f73 81%,
          #25153f 100%
        ) !important;
      background-size:240% 100% !important;
      background-position:0% 50% !important;
      animation:crashGradientFlowV8 8s linear infinite !important;
      border-color:rgba(255,255,255,.08) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.07),
        inset 0 -20px 36px rgba(50,14,48,.18),
        0 14px 32px rgba(0,0,0,.24) !important;
      will-change:background-position !important;
      contain:layout paint style !important;
    }

    .flight-card.running{
      animation-duration:4.2s !important;
    }

    .flight-card::before{
      content:"" !important;
      position:absolute !important;
      inset:0 !important;
      z-index:0 !important;
      display:block !important;
      pointer-events:none !important;
      opacity:.22 !important;
      background:
        linear-gradient(115deg,
          rgba(255,244,210,.28) 0%,
          rgba(255,170,91,.08) 30%,
          transparent 52%,
          rgba(130,54,140,.16) 100%
        ) !important;
      background-size:190% 100% !important;
      animation:crashGradientLightV8 9.5s linear infinite !important;
      mix-blend-mode:normal !important;
      will-change:background-position !important;
    }

    .flight-card::after,
    .space-layer,
    .stars-one,
    .stars-two,
    .speed-lines,
    .grid-floor,
    .boom,
    .rocket-glow,
    .flame{
      display:none !important;
      opacity:0 !important;
      animation:none !important;
      visibility:hidden !important;
    }

    .rocket-wrap,
    .flight-card.countdown .rocket-wrap,
    .flight-card.running .rocket-wrap{
      top:54% !important;
      transform:translate3d(-50%, -50%, 0) rotate(0deg) scale(1) !important;
      animation:none !important;
      filter:none !important;
      will-change:transform, opacity !important;
    }

    .rocket-img{
      filter:drop-shadow(0 10px 12px rgba(0,0,0,.24)) !important;
      will-change:transform !important;
      animation:rocketReadyV8 4.2s ease-in-out infinite !important;
    }

    .flight-card.countdown .rocket-img{
      animation:rocketReadyV8 4.2s ease-in-out infinite !important;
    }

    .flight-card.running .rocket-img{
      animation:rocketFlightV8 2.9s ease-in-out infinite !important;
    }

    .flight-card.crashed .rocket-wrap{
      animation:rocketExitRightV8 .88s cubic-bezier(.18,.72,.16,1) both !important;
    }

    .flight-card.crashed .rocket-img{
      animation:none !important;
    }

    .multiplier{
      top:clamp(17px, 4vw, 29px) !important;
      font-size:clamp(18px, 4.8vw, 26px) !important;
      text-shadow:0 3px 8px rgba(0,0,0,.30) !important;
    }

    .history-panel{
      display:block !important;
      margin:-30px auto 0 !important;
      min-height:32px !important;
      padding:4px 7px !important;
      background:linear-gradient(180deg,rgba(42,24,52,.80),rgba(22,13,31,.86)) !important;
      border-color:rgba(255,255,255,.09) !important;
      box-shadow:none !important;
      backdrop-filter:none !important;
      -webkit-backdrop-filter:none !important;
    }

    .history-list{min-height:23px !important;}

    .controls{
      margin:2px auto max(8px,calc(var(--safe-bottom) + 5px)) !important;
      gap:0 !important;
    }

    .bet-panel{
      min-height:106px !important;
      padding:8px !important;
      gap:8px !important;
      box-shadow:none !important;
      background:linear-gradient(180deg,rgba(34,27,52,.94),rgba(22,15,34,.94)) !important;
      backdrop-filter:none !important;
      -webkit-backdrop-filter:none !important;
    }

    .stake-side{grid-template-rows:1fr 31px !important;gap:6px !important;}
    .stake-box{min-height:58px !important;padding:8px 36px 8px 10px !important;}
    .quick{min-height:31px !important;font-size:15px !important;}
    .pm{width:25px !important;height:22px !important;right:8px !important;}
    .pm.plus{top:6px !important;}
    .pm.minus{bottom:6px !important;}

    .toast,
    .action-btn,
    .quick,
    .pm,
    .stake-box,
    .bet-panel,
    .history-panel{
      backface-visibility:hidden !important;
      -webkit-backface-visibility:hidden !important;
    }

    @keyframes crashGradientFlowV8{
      0%{background-position:0% 50%;}
      100%{background-position:100% 50%;}
    }

    @keyframes crashGradientLightV8{
      0%{background-position:0% 50%;}
      100%{background-position:100% 50%;}
    }

    @keyframes rocketReadyV8{
      0%,100%{transform:translate3d(0,0,0) rotate(-.18deg) scale(1);}
      50%{transform:translate3d(1px,-1.5px,0) rotate(.18deg) scale(1.001);}
    }

    @keyframes rocketFlightV8{
      0%{transform:translate3d(-2px,1px,0) rotate(-1.2deg) scale(1);}
      38%{transform:translate3d(3px,-2.5px,0) rotate(1deg) scale(1.004);}
      72%{transform:translate3d(4px,-1px,0) rotate(1.4deg) scale(1.003);}
      100%{transform:translate3d(-2px,1px,0) rotate(-1.2deg) scale(1);}
    }

    @keyframes rocketExitRightV8{
      0%{opacity:1;transform:translate3d(-50%, -50%, 0) rotate(0deg) scale(1);}
      100%{opacity:0;transform:translate3d(calc(-50% + 118vw), -50%, 0) rotate(10deg) scale(.96);}
    }

    @media (max-width:380px), (max-height:690px){
      .playfield{
        height:calc(100dvh - 142px - max(8px,var(--safe-bottom))) !important;
        min-height:258px !important;
        padding-top:40px !important;
      }

      .flight-card{
        height:min(45dvh, 326px) !important;
        min-height:238px !important;
        --rocket-size:clamp(128px, 40vw, 166px) !important;
      }

      .rocket-wrap{top:55% !important;}
      .history-panel{margin:-34px auto 0 !important;min-height:30px !important;padding:3px 7px !important;}
      .controls{margin:1px auto max(6px,calc(var(--safe-bottom) + 4px)) !important;}
      .bet-panel{min-height:98px !important;padding:7px !important;}
      .stake-box{min-height:54px !important;}
      .quick{min-height:29px !important;}
      .amount{font-size:17px !important;}
      .action-btn strong{font-size:16px !important;}
    }

    @media (min-width:720px){
      .playfield{
        height:calc(100dvh - 174px - max(8px,var(--safe-bottom))) !important;
        padding-top:54px !important;
      }

      .flight-card{
        height:min(55dvh, 440px) !important;
        min-height:330px !important;
        --rocket-size:clamp(190px, 28vw, 270px) !important;
      }

      .history-panel{margin:-26px auto 0 !important;}
      .bet-panel{min-height:112px !important;}
    }
  </style>

</head>
<body>
  <main class="game">
    <div id="preloader" class="preloader" aria-label="Загрузка игры">
      <div class="preloader-inner">
        <img class="preloader-logo" src="images/Logovezusgame.png" alt="Vezus Game" decoding="async">
        <div class="loader-line" aria-hidden="true"><span></span></div>
      </div>
    </div>

    <header class="topbar">
      <div class="balance" aria-label="Баланс">
        <svg class="wallet" viewBox="0 0 64 64" fill="none" aria-hidden="true">
          <path d="M12 17.6C12 13.96 14.96 11 18.6 11H42.5C47.05 11 50.75 14.7 50.75 19.25V20.8H43.6C36.86 20.8 31.4 26.26 31.4 33C31.4 39.74 36.86 45.2 43.6 45.2H50.75V46.75C50.75 51.3 47.05 55 42.5 55H18.6C14.96 55 12 52.04 12 48.4V17.6Z"/>
          <path d="M16.5 10.9H39.4C42.68 10.9 45.35 13.57 45.35 16.85V17.7H17.1C13.92 17.7 12 15.92 12 15.92C12.78 12.98 14.38 10.9 16.5 10.9Z"/>
          <path d="M39.8 24.65H52.5C55.12 24.65 57.25 26.78 57.25 29.4V36.6C57.25 39.22 55.12 41.35 52.5 41.35H39.8C35.2 41.35 31.5 37.62 31.5 33C31.5 28.38 35.2 24.65 39.8 24.65Z"/>
          <circle cx="43.2" cy="33" r="4.05"/>
        </svg>
        <span id="balance">10 000 ₽</span>
      </div>
    </header>

    <section class="playfield" aria-label="Crash игра">
      <div class="flight-card" id="flightCard">
        <div class="space-layer stars-one"></div>
        <div class="space-layer stars-two"></div>
        <div class="speed-lines"></div>
        <div class="grid-floor"></div>

        <div class="multiplier" id="multiplier">x1.00</div>

        <div class="rocket-wrap" id="rocketWrap" aria-hidden="true">
          <img class="rocket-img" src="images/Crushgirl.webp" alt="" decoding="async" draggable="false">
        </div>

        <div class="boom" aria-hidden="true"></div>
        <div class="flight-status" id="statusText"></div>
      </div>
    </section>

    <section class="history-panel" aria-label="История раундов">
      <div class="history-list" id="historyList">
        <div class="history-empty">История появится после первого раунда</div>
      </div>
    </section>

    <section class="controls" aria-label="Панель ставки">
      <div class="profit-panel" aria-label="Множитель и возможный выигрыш">
        <div class="profit-item">
          <span>Коэффициент</span>
          <strong id="profitCoef">x1.00</strong>
        </div>
        <div class="profit-item">
          <span>Возможный выигрыш</span>
          <strong id="possibleWin">20 ₽</strong>
        </div>
      </div>

      <div class="bet-panel">
        <div class="stake-side">
          <div class="stake-box">
            <input class="amount" id="amount" value="20 ₽" inputmode="numeric" autocomplete="off" aria-label="Ставка">
            <button class="pm plus" id="plusBtn" type="button" aria-label="Увеличить ставку">+</button>
            <button class="pm minus" id="minusBtn" type="button" aria-label="Уменьшить ставку">−</button>
          </div>
          <div class="quick-row">
            <button class="quick" id="halfBtn" type="button">/2</button>
            <button class="quick" id="doubleBtn" type="button">x2</button>
          </div>
        </div>

        <div class="choice-side">
          <button class="action-btn" id="actionBtn" type="button">
            <strong id="actionMain">Играть</strong>
            <span id="actionSub"></span>
          </button>
        </div>
      </div>
    </section>

    <div class="toast info" id="toast" aria-live="polite">
      <span id="toastText">Уведомление</span>
    </div>
  </main>

  <script>
    (() => {
      const balanceEl = document.getElementById('balance');
      const amount = document.getElementById('amount');
      const minusBtn = document.getElementById('minusBtn');
      const plusBtn = document.getElementById('plusBtn');
      const halfBtn = document.getElementById('halfBtn');
      const doubleBtn = document.getElementById('doubleBtn');
      const actionBtn = document.getElementById('actionBtn');
      const actionMain = document.getElementById('actionMain');
      const actionSub = document.getElementById('actionSub');
      const multiplierEl = document.getElementById('multiplier');
      const profitCoef = document.getElementById('profitCoef');
      const possibleWin = document.getElementById('possibleWin');
      const flightCard = document.getElementById('flightCard');
      const statusText = document.getElementById('statusText');
      const historyList = document.getElementById('historyList');
      const toast = document.getElementById('toast');
      const toastText = document.getElementById('toastText');

      const MIN_BET = 8;
      const MAX_BET = 10000;

      const state = {
        balance: 10000,
        bet: 20,
        phase: 'idle',
        multiplier: 1,
        crashPoint: 1,
        raf: 0,
        startedAt: 0,
        hasCashedOut: false,
        cashoutMultiplier: 0,
        cashoutPayout: 0,
        history: []
      };

      const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));

      function formatRub(value){
        return `${Math.floor(Number(value) || 0).toLocaleString('ru-RU')} ₽`;
      }

      function formatX(value){
        return `x${Number(value || 1).toFixed(2)}`;
      }

      function setBalance(value){
        state.balance = Math.max(0, Math.floor(Number(value) || 0));
        balanceEl.textContent = formatRub(state.balance);
      }

      function readBet(){
        const raw = Number(String(amount.value).replace(/[^\d]/g, ''));
        const safe = Number.isFinite(raw) ? Math.floor(raw) : state.bet;
        return Math.max(MIN_BET, Math.min(MAX_BET, safe || MIN_BET));
      }

      function normalizeBet(){
        state.bet = readBet();
        amount.value = formatRub(state.bet);
        updatePreview();
        return state.bet;
      }

      function updatePreview(){
        const bet = state.phase === 'running' ? state.bet : readBet();
        const mult = state.phase === 'idle' ? 1 : state.multiplier;
        profitCoef.textContent = formatX(mult);
        possibleWin.textContent = formatRub(bet * mult);
      }

      function setControlsLocked(locked){
        amount.disabled = locked;
        minusBtn.disabled = locked;
        plusBtn.disabled = locked;
        halfBtn.disabled = locked;
        doubleBtn.disabled = locked;
      }

      function showToast(text, type = 'info'){
        toastText.textContent = text;
        toast.className = 'toast ' + type;
        requestAnimationFrame(() => toast.classList.add('show'));
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('show'), 1550);
      }

      function multiplierAt(ms){
        const t = ms / 1000;
        return 1 + t * 0.18 + Math.pow(t, 1.72) * 0.105;
      }

      function generateCrashPoint(){
        const r = Math.random();
        let point;

        if(r < 0.10){
          point = 1.01 + Math.random() * 0.12;
        }else if(r < 0.46){
          point = 1.13 + Math.random() * 0.68;
        }else if(r < 0.74){
          point = 1.80 + Math.random() * 1.25;
        }else if(r < 0.92){
          point = 3.05 + Math.random() * 2.70;
        }else{
          point = 5.75 + Math.random() * 8.25;
        }

        return Math.max(1.01, Math.min(18, Math.round(point * 100) / 100));
      }

      function resetVisuals(){
        flightCard.classList.remove('running', 'crashed', 'cashed', 'countdown');
        multiplierEl.classList.remove('win', 'crash');
        state.multiplier = 1;
        state.hasCashedOut = false;
        state.cashoutMultiplier = 0;
        state.cashoutPayout = 0;
        multiplierEl.textContent = formatX(1);
        profitCoef.textContent = formatX(1);
        possibleWin.textContent = formatRub(readBet());
        actionBtn.disabled = false;
        updatePreview();
      }

      function addHistory(value, result){
        state.history.unshift({ value, result });
        state.history = state.history.slice(0, 12);

        historyList.innerHTML = '';
        state.history.forEach(item => {
          const chip = document.createElement('div');
          chip.className = 'history-chip ' + (item.result === 'win' ? 'win' : 'lose');
          chip.textContent = formatX(item.value);
          historyList.appendChild(chip);
        });
      }

      async function startRound(){
        if(state.phase !== 'idle') return;

        const bet = normalizeBet();
        if(bet > state.balance){
          showToast('Недостаточно средств', 'lose');
          return;
        }

        setBalance(state.balance - bet);
        state.bet = bet;
        state.phase = 'countdown';
        state.crashPoint = generateCrashPoint();
        state.multiplier = 1;

        resetVisuals();
        flightCard.classList.add('countdown');
        setControlsLocked(true);
        actionBtn.classList.remove('cashout');
        actionBtn.disabled = true;
        actionSub.textContent = '';
        statusText.textContent = '';

        for(const count of [3, 2, 1]){
          actionMain.textContent = String(count);
          multiplierEl.textContent = `x1.00`;
          await wait(620);
        }

        if(state.phase !== 'countdown') return;

        state.phase = 'running';
        state.startedAt = performance.now();
        flightCard.classList.remove('countdown');
        flightCard.classList.add('running');
        actionBtn.disabled = false;
        actionBtn.classList.add('cashout');
        actionMain.textContent = 'Забрать';
        actionSub.textContent = formatRub(state.bet);
        statusText.textContent = '';
        showToast('Раунд начался', 'info');

        state.raf = requestAnimationFrame(loop);
      }

      function loop(now = performance.now()){
        if(state.phase !== 'running') return;

        const elapsed = now - state.startedAt;
        const current = multiplierAt(elapsed);
        state.multiplier = Math.min(current, state.crashPoint);

        multiplierEl.textContent = formatX(state.multiplier);
        updatePreview();

        if(state.hasCashedOut){
          actionMain.textContent = 'Забрано';
          actionSub.textContent = formatRub(state.cashoutPayout);
        }else{
          actionSub.textContent = formatRub(state.bet * state.multiplier);
        }

        if(current >= state.crashPoint){
          crashRound();
          return;
        }

        state.raf = requestAnimationFrame(loop);
      }

      function cashout(){
        if(state.phase !== 'running' || state.hasCashedOut) return;

        const cashoutMultiplier = Math.max(1.01, state.multiplier);
        const payout = Math.floor(state.bet * cashoutMultiplier);

        state.hasCashedOut = true;
        state.cashoutMultiplier = cashoutMultiplier;
        state.cashoutPayout = payout;
        setBalance(state.balance + payout);

        multiplierEl.classList.add('win');
        actionBtn.classList.remove('cashout');
        actionBtn.disabled = true;
        actionMain.textContent = 'Забрано';
        actionSub.textContent = formatRub(payout);
        statusText.textContent = '';
        addHistory(cashoutMultiplier, 'win');
        showToast(`Забрал ${formatRub(payout)} на ${formatX(cashoutMultiplier)}`, 'win');
      }

      function crashRound(){
        cancelAnimationFrame(state.raf);
        state.phase = 'idle';
        state.multiplier = state.crashPoint;

        flightCard.classList.remove('running', 'countdown');
        flightCard.classList.add('crashed');
        multiplierEl.classList.remove('win');
        multiplierEl.classList.add('crash');
        multiplierEl.textContent = formatX(state.crashPoint);
        profitCoef.textContent = formatX(state.crashPoint);

        if(state.hasCashedOut){
          possibleWin.textContent = formatRub(state.cashoutPayout);
          showToast(`Краш был на ${formatX(state.crashPoint)}`, 'info');
        }else{
          possibleWin.textContent = '0 ₽';
          showToast(`Краш на ${formatX(state.crashPoint)}`, 'lose');
        }

        setControlsLocked(false);
        actionBtn.disabled = false;
        actionBtn.classList.remove('cashout');
        actionMain.textContent = 'Играть';
        actionSub.textContent = '';
        statusText.textContent = '';
        addHistory(state.crashPoint, 'lose');
      }

      actionBtn.addEventListener('click', () => {
        if(state.phase === 'running') cashout();
        else if(state.phase === 'idle') startRound();
      });

      minusBtn.addEventListener('click', () => {
        const current = normalizeBet();
        if(current <= MIN_BET){
          showToast('Минимум ' + formatRub(MIN_BET), 'lose');
          return;
        }
        state.bet = Math.max(MIN_BET, current - 1);
        amount.value = formatRub(state.bet);
        updatePreview();
      });

      plusBtn.addEventListener('click', () => {
        const current = normalizeBet();
        if(current >= MAX_BET){
          showToast('Максимум ' + formatRub(MAX_BET), 'lose');
          return;
        }
        state.bet = Math.min(MAX_BET, current + 1);
        amount.value = formatRub(state.bet);
        updatePreview();
      });

      halfBtn.addEventListener('click', () => {
        const current = normalizeBet();
        state.bet = Math.max(MIN_BET, Math.floor(current / 2));
        amount.value = formatRub(state.bet);
        updatePreview();
      });

      doubleBtn.addEventListener('click', () => {
        const current = normalizeBet();
        if(current >= MAX_BET){
          showToast('Максимум ' + formatRub(MAX_BET), 'lose');
          return;
        }
        state.bet = Math.min(MAX_BET, current * 2);
        amount.value = formatRub(state.bet);
        updatePreview();
      });

      amount.addEventListener('focus', () => {
        amount.value = String(readBet());
        amount.select();
      });

      amount.addEventListener('input', () => {
        amount.value = amount.value.replace(/[^\d]/g, '').slice(0, 5);
        updatePreview();
      });

      amount.addEventListener('blur', () => {
        const raw = Number(String(amount.value).replace(/[^\d]/g, ''));
        if(Number.isFinite(raw) && raw > MAX_BET) showToast('Максимум ' + formatRub(MAX_BET), 'lose');
        if(Number.isFinite(raw) && raw > 0 && raw < MIN_BET) showToast('Минимум ' + formatRub(MIN_BET), 'lose');
        normalizeBet();
      });

      ['contextmenu','selectstart','dragstart'].forEach(type => {
        document.addEventListener(type, event => event.preventDefault());
      });

      window.addEventListener('load', () => {
        const preloader = document.getElementById('preloader');
        setTimeout(() => preloader && preloader.classList.add('hidden'), 1700);
        setTimeout(() => preloader && preloader.remove(), 2200);
      });

      setBalance(state.balance);
      normalizeBet();
    })();
  </script>
</body>
</html>
