<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Dark Violet Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg-1:#03000b;
      --bg-2:#080018;
      --bg-3:#100033;
      --violet:#9d4dff;
      --pink:#d946ef;
      --cyan:#6ee7ff;
      --gold:#ffd66e;
      --text:#ffffff;
      --muted:rgba(255,255,255,.68);
      --glass:rgba(255,255,255,.08);
      --glass-strong:rgba(255,255,255,.13);
      --stroke:rgba(255,255,255,.16);
      --shadow:0 18px 50px rgba(0,0,0,.42);
      --radius:24px;
      --bottom-nav-height:78px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:"Montserrat",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 12% -6%, rgba(104,43,255,.32), transparent 34%),
        radial-gradient(circle at 95% 22%, rgba(116,26,180,.20), transparent 30%),
        radial-gradient(circle at 45% 105%, rgba(40,10,90,.42), transparent 42%),
        linear-gradient(165deg, #010006 0%, #060012 38%, #0b0220 66%, #020006 100%);
      padding-bottom:calc(var(--bottom-nav-height) + 28px + env(safe-area-inset-bottom));
    }

    body::before,
    body::after{
      content:"";
      position:fixed;
      inset:auto;
      pointer-events:none;
      z-index:-1;
      filter:blur(12px);
      opacity:.45;
      animation:floatGlow 9s ease-in-out infinite alternate;
    }

    body::before{
      width:260px;
      height:260px;
      top:90px;
      left:-120px;
      border-radius:50%;
      background:rgba(88,35,220,.20);
    }

    body::after{
      width:320px;
      height:320px;
      right:-150px;
      bottom:120px;
      border-radius:50%;
      background:rgba(95,20,160,.16);
      animation-duration:11s;
    }

    @keyframes floatGlow{
      from{ transform:translate3d(0,0,0) scale(1); }
      to{ transform:translate3d(22px,-18px,0) scale(1.12); }
    }

    .app{
      width:min(100%, 1040px);
      margin:0 auto;
      padding:16px 14px 0;
    }

    .top-sticky{
      position:relative;
      z-index:50;
      padding:10px 0 12px;
    }


    .top-row{
      position:relative;
      display:grid;
      grid-template-columns:minmax(96px, 1fr) auto minmax(58px, 1fr);
      align-items:center;
      gap:12px;
      min-height:58px;
    }

    .brand-pill{
      justify-self:start;
      width:118px;
      height:48px;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      padding:0;
      border:0;
      border-radius:0;
      background:none;
      box-shadow:none;
      overflow:visible;
    }

    .brand-pill img{
      display:block;
      width:auto;
      max-width:100%;
      height:100%;
      object-fit:contain;
      object-position:left center;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,.32));
    }

    .balance-pill{
      justify-self:center;
      height:44px;
      min-width:168px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:11px;
      padding:7px 9px 7px 15px;
      border:1px solid rgba(255,255,255,.15);
      border-radius:18px;
      background:
        linear-gradient(135deg, rgba(16,6,42,.82), rgba(8,2,26,.74)),
        radial-gradient(circle at 18% 0%, rgba(157,77,255,.22), transparent 42%);
      box-shadow:0 8px 22px rgba(0,0,0,.32), inset 0 0 0 1px rgba(255,255,255,.045);
    }

    .balance-info{
      display:flex;
      flex-direction:column;
      line-height:1.05;
    }

    .balance-label{
      font-size:9px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
    }

    .balance-value{
      margin-top:3px;
      font-size:14px;
      font-weight:800;
      letter-spacing:.02em;
    }

    .wallet-btn{
      width:32px;
      height:32px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      border:1px solid rgba(255,255,255,.15);
      border-radius:13px;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.055));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04), 0 0 18px rgba(157,77,255,.22);
    }

    .wallet-btn svg{
      width:19px;
      height:19px;
      fill:none;
      stroke:#fff;
      stroke-width:2;
      stroke-linecap:round;
      stroke-linejoin:round;
      filter:drop-shadow(0 0 6px rgba(255,255,255,.28));
    }

    .notify-pill{
      justify-self:end;
      width:44px;
      height:44px;
      display:grid;
      place-items:center;
      border:1px solid rgba(255,255,255,.17);
      border-radius:16px;
      background:linear-gradient(135deg, rgba(16,6,42,.76), rgba(8,2,26,.68));
      box-shadow:0 8px 24px rgba(157,77,255,.16), inset 0 0 0 1px rgba(255,255,255,.065);
      cursor:pointer;
    }

    .notify-pill svg{
      width:23px;
      height:23px;
      fill:none;
      stroke:#fff;
      stroke-width:2.1;
      filter:drop-shadow(0 0 8px rgba(157,77,255,.75));
    }


    .hero-slider{
      margin-top:10px;
      position:relative;
      overflow:hidden;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.15);
      box-shadow:var(--shadow);
      background:rgba(0,0,0,.18);
      touch-action:pan-y;
      user-select:none;
    }

    .banner-track{
      display:flex;
      will-change:transform;
      transition:transform .58s cubic-bezier(.22,.78,.25,1);
    }

    .banner{
      min-width:100%;
      height:190px;
      position:relative;
      overflow:hidden;
      padding:22px;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      isolation:isolate;
    }

    .banner::before{
      content:"";
      position:absolute;
      inset:-1px;
      z-index:-2;
      background:
        radial-gradient(circle at 76% 22%, rgba(255,255,255,.13), transparent 22%),
        radial-gradient(circle at 24% 12%, rgba(255,255,255,.09), transparent 20%),
        linear-gradient(135deg, var(--b1), var(--b2));
    }

    .banner::after{
      content:"";
      position:absolute;
      width:180px;
      height:180px;
      right:-50px;
      top:-42px;
      z-index:-1;
      border-radius:50%;
      background:rgba(255,255,255,.13);
      box-shadow:-60px 60px 90px rgba(0,0,0,.22);
    }

    .banner-kicker{
      width:max-content;
      max-width:100%;
      padding:7px 11px;
      border-radius:999px;
      font-size:10px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(255,255,255,.88);
      background:rgba(255,255,255,.13);
      border:1px solid rgba(255,255,255,.13);
    }

    .banner-title{
      margin:11px 0 5px;
      max-width:70%;
      font-size:24px;
      line-height:1.05;
      font-weight:900;
      text-shadow:0 4px 18px rgba(0,0,0,.3);
    }

    .banner-text{
      margin:0;
      max-width:70%;
      color:rgba(255,255,255,.75);
      font-size:13px;
      font-weight:600;
    }

    .banner-art{
      position:absolute;
      right:17px;
      bottom:15px;
      width:94px;
      height:94px;
      display:grid;
      place-items:center;
      border-radius:30px;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:inset 0 0 24px rgba(255,255,255,.08), 0 18px 36px rgba(0,0,0,.25);
      font-size:46px;
    }

    .slider-controls{
      position:absolute;
      left:0;
      right:0;
      bottom:12px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:7px;
      pointer-events:none;
    }

    .dot{
      width:7px;
      height:7px;
      border:0;
      border-radius:999px;
      padding:0;
      pointer-events:auto;
      cursor:pointer;
      background:rgba(255,255,255,.45);
      transition:width .25s ease, background .25s ease;
    }

    .dot.active{
      width:24px;
      background:#fff;
    }


    .section{
      margin-top:28px;
    }

    .section-head{
      display:flex;
      align-items:end;
      justify-content:flex-start;
      gap:12px;
      padding:0 2px 13px;
    }

    .section-title{
      margin:0;
      font-size:22px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .section-subtitle{
      margin:0;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    .cards-row{
      display:flex;
      gap:10px;
      overflow-x:auto;
      scroll-snap-type:x mandatory;
      scroll-behavior:smooth;
      padding:4px max(14px, calc((100vw - min(100vw, 1040px)) / 2 + 14px)) 16px;
      margin-left:calc(-1 * max(14px, calc((100vw - min(100vw, 1040px)) / 2 + 14px)));
      margin-right:calc(-1 * max(14px, calc((100vw - min(100vw, 1040px)) / 2 + 14px)));
      scrollbar-width:none;
      overscroll-behavior-x:contain;
    }

    .cards-row::-webkit-scrollbar{
      display:none;
    }

    .game-card{
      scroll-snap-align:start;
      flex:0 0 150px;
      height:214px;
      position:relative;
      overflow:hidden;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.16);
      background:
        radial-gradient(circle at 50% -10%, var(--card-glow), transparent 44%),
        linear-gradient(160deg, rgba(42,14,95,.86), rgba(12,4,33,.96) 55%, rgba(3,0,13,.98));
      box-shadow:0 18px 42px rgba(0,0,0,.48), inset 0 0 0 1px rgba(255,255,255,.055);
      transform:translateZ(0);
    }

    .game-card::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.18), transparent 28%),
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.12), transparent 35%),
        linear-gradient(180deg, transparent 42%, rgba(0,0,0,.48));
      opacity:.9;
      pointer-events:none;
    }

    .game-card::after{
      content:"";
      position:absolute;
      left:14px;
      right:14px;
      top:13px;
      height:3px;
      border-radius:999px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.55), transparent);
      opacity:.55;
    }

    .card-top{
      position:relative;
      height:128px;
      display:grid;
      place-items:center;
      isolation:isolate;
    }

    .card-symbol{
      width:84px;
      height:84px;
      display:grid;
      place-items:center;
      border-radius:28px;
      font-size:46px;
      background:
        radial-gradient(circle at 30% 22%, rgba(255,255,255,.34), transparent 28%),
        linear-gradient(145deg, rgba(255,255,255,.18), rgba(255,255,255,.055));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:inset 0 0 26px rgba(255,255,255,.08), 0 18px 34px rgba(0,0,0,.34), 0 0 28px var(--card-glow);
      transform:rotate(-2deg);
    }

    .card-status{
      position:absolute;
      top:12px;
      right:12px;
      z-index:2;
      padding:5px 8px;
      border-radius:999px;
      color:rgba(255,255,255,.88);
      font-size:9px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(0,0,0,.26);
      border:1px solid rgba(255,255,255,.13);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    .card-body{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:0 13px 15px;
      z-index:2;
    }

    .card-name{
      margin:0;
      font-size:16px;
      font-weight:900;
      line-height:1.05;
      letter-spacing:-.02em;
      text-shadow:0 3px 12px rgba(0,0,0,.42);
    }

    .card-meta{
      margin:8px 0 0;
      color:rgba(255,255,255,.68);
      font-size:11px;
      font-weight:800;
    }

    .card-line{
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      color:rgba(255,255,255,.75);
      font-size:10px;
      font-weight:900;
    }

    .card-line span{
      display:inline-flex;
      align-items:center;
      gap:4px;
      min-width:0;
      padding:6px 8px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
    }

    .play-chip{
      display:none;
    }

    .bottom-nav{
      position:fixed;
      left:50%;
      bottom:calc(12px + env(safe-area-inset-bottom));
      transform:translateX(-50%);
      z-index:60;
      width:min(calc(100% - 24px), 520px);
      min-height:var(--bottom-nav-height);
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      padding:9px;
      border-radius:28px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(135deg, rgba(20,7,55,.83), rgba(8,2,25,.83));
      box-shadow:0 18px 50px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.05);
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
    }

    .nav-item{
      min-width:0;
      border:0;
      border-radius:21px;
      color:rgba(255,255,255,.72);
      background:transparent;
      font-family:inherit;
      font-weight:800;
      font-size:10px;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:5px;
    }

    .nav-item.active{
      color:#fff;
      background:linear-gradient(135deg, rgba(157,77,255,.34), rgba(217,70,239,.18));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .nav-icon{
      width:22px;
      height:22px;
      fill:none;
      stroke:currentColor;
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }


    .side-panel-overlay{
      position:fixed;
      inset:0;
      z-index:90;
      pointer-events:none;
      opacity:0;
      background:rgba(0,0,0,.34);
      backdrop-filter:blur(0px);
      -webkit-backdrop-filter:blur(0px);
      transition:opacity .32s ease, backdrop-filter .32s ease, -webkit-backdrop-filter .32s ease;
    }

    .side-panel-overlay.active{
      pointer-events:auto;
      opacity:1;
      backdrop-filter:blur(7px);
      -webkit-backdrop-filter:blur(7px);
    }

    .side-menu{
      position:fixed;
      top:0;
      left:0;
      z-index:100;
      width:min(86vw, 360px);
      height:100vh;
      padding:calc(18px + env(safe-area-inset-top)) 16px calc(20px + env(safe-area-inset-bottom));
      color:#fff;
      transform:translateX(-108%);
      transition:transform .42s cubic-bezier(.2,.78,.22,1);
      border-right:1px solid rgba(255,255,255,.15);
      background:
        radial-gradient(circle at 18% 0%, rgba(157,77,255,.28), transparent 34%),
        radial-gradient(circle at 100% 35%, rgba(217,70,239,.16), transparent 34%),
        linear-gradient(160deg, rgba(16,5,47,.96), rgba(5,1,18,.98));
      box-shadow:24px 0 70px rgba(0,0,0,.62), inset -1px 0 0 rgba(255,255,255,.045);
      overflow-y:auto;
      display:flex;
      flex-direction:column;
    }

    .side-menu.active{
      transform:translateX(0);
    }

    body.menu-open{
      overflow:hidden;
    }

    .side-menu-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:18px;
    }

    .side-menu-title{
      margin:0;
      font-size:23px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .side-menu-subtitle{
      margin:5px 0 0;
      color:rgba(255,255,255,.58);
      font-size:12px;
      font-weight:700;
    }

    .side-close{
      width:42px;
      height:42px;
      border:1px solid rgba(255,255,255,.14);
      border-radius:16px;
      color:#fff;
      display:grid;
      place-items:center;
      cursor:pointer;
      background:rgba(255,255,255,.075);
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
    }

    .side-close svg{
      width:22px;
      height:22px;
      fill:none;
      stroke:currentColor;
      stroke-width:2.4;
      stroke-linecap:round;
    }






    .menu-list{
      display:grid;
      gap:10px;
    }


    .menu-link{
      width:100%;
      min-height:58px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:21px;
      color:#fff;
      text-align:left;
      font-family:inherit;
      cursor:pointer;
      background:linear-gradient(135deg, rgba(255,255,255,.095), rgba(255,255,255,.035));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .menu-link:active{
      transform:scale(.985);
    }

    .menu-link:hover{
      background:linear-gradient(135deg, rgba(157,77,255,.22), rgba(217,70,239,.11));
      border-color:rgba(255,255,255,.18);
    }

    .menu-link-icon{
      width:38px;
      height:38px;
      flex:0 0 auto;
      display:grid;
      place-items:center;
      border-radius:15px;
      background:linear-gradient(135deg, rgba(157,77,255,.34), rgba(217,70,239,.18));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .menu-link-icon svg{
      width:21px;
      height:21px;
      fill:none;
      stroke:#fff;
      stroke-width:2.1;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .menu-link-text{
      min-width:0;
      flex:1;
    }

    .menu-link-title{
      display:block;
      font-size:14px;
      font-weight:900;
    }

    .menu-link-desc{
      display:block;
      margin-top:3px;
      color:rgba(255,255,255,.55);
      font-size:11px;
      font-weight:700;
    }

    .menu-arrow{
      width:18px;
      height:18px;
      fill:none;
      stroke:rgba(255,255,255,.55);
      stroke-width:2.2;
      stroke-linecap:round;
      stroke-linejoin:round;
    }

    .side-menu-footer{
      margin-top:16px;
      padding:13px;
      border-radius:20px;
      border:1px solid rgba(255,255,255,.1);
      color:rgba(255,255,255,.58);
      font-size:11px;
      font-weight:700;
      line-height:1.45;
      background:rgba(255,255,255,.045);
    }


    .page-footer{
      margin:34px 2px 6px;
      padding:16px 14px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.10);
      background:linear-gradient(135deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      color:rgba(255,255,255,.58);
      font-size:11px;
      font-weight:700;
      line-height:1.45;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.025);
    }

    .footer-brand{
      display:block;
      margin-bottom:8px;
      color:rgba(255,255,255,.82);
      font-size:12px;
      font-weight:900;
      letter-spacing:.02em;
    }

    .footer-links{
      display:flex;
      flex-wrap:wrap;
      gap:8px 12px;
      margin-top:10px;
    }

    .footer-links a{
      color:rgba(255,255,255,.68);
      text-decoration:none;
    }

    .footer-links a:active{
      color:#fff;
    }


    @media (min-width:720px){
      .app{
        padding-left:24px;
        padding-right:24px;
      }

      .banner{
        height:238px;
        padding:32px;
      }

      .banner-title{
        font-size:34px;
      }

      .banner-art{
        right:36px;
        bottom:28px;
        width:124px;
        height:124px;
        font-size:60px;
      }

      .game-card{
        flex-basis:178px;
        height:246px;
      }

      .card-top{
        height:150px;
      }
    }

    @media (max-width:390px){
      .top-row{
        grid-template-columns:minmax(76px, .9fr) auto minmax(54px, .9fr);
        gap:9px;
      }

      .balance-pill{
        min-width:150px;
      }

      .brand-pill{
        width:76px;
        padding:0 8px;
        font-size:9px;
      }

      .banner-title,
      .banner-text{
        max-width:66%;
      }

      .banner-art{
        width:82px;
        height:82px;
        font-size:40px;
      }

      .game-card{
        flex-basis:136px;
      }
    }

    @media (max-width:390px){
      .side-menu{
        width:min(90vw, 340px);
        padding-left:13px;
        padding-right:13px;
      }

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      /* Пароль входа */
      const passwordGate = document.getElementById('passwordGate');
      const passwordInput = document.getElementById('passwordInput');
      const passwordButton = document.getElementById('passwordButton');
      const passwordError = document.getElementById('passwordError');

      function unlockSite(){
        if(!passwordGate) return;

        if(passwordInput.value === '0009'){
          passwordGate.classList.add('hidden');
          document.body.classList.add('site-unlocked');
          passwordError.textContent = '';
        }else{
          passwordError.textContent = 'Неверный пароль';
          passwordInput.value = '';
          passwordInput.focus();
        }
      }

      if(passwordButton) passwordButton.addEventListener('click', unlockSite);
      if(passwordInput){
        passwordInput.addEventListener('keydown', (event) => {
          if(event.key === 'Enter') unlockSite();
        });
      }


      /* Баннеры */
      const slider = document.getElementById('heroSlider');
      const track = document.getElementById('bannerTrack');
      const dots = Array.from(document.querySelectorAll('[data-dot]'));

      if(slider && track && dots.length){
        const originalSlides = Array.from(track.children).filter((slide) => !slide.dataset.clone);
        const total = originalSlides.length;

        if(total > 0 && !track.dataset.ready){
          const firstClone = originalSlides[0].cloneNode(true);
          const lastClone = originalSlides[total - 1].cloneNode(true);
          firstClone.dataset.clone = 'true';
          lastClone.dataset.clone = 'true';
          track.appendChild(firstClone);
          track.insertBefore(lastClone, originalSlides[0]);
          track.dataset.ready = 'true';
        }

        let index = 1;
        let isMoving = false;
        let autoTimer = null;
        let startX = 0;
        let deltaX = 0;

        function setPosition(animate = true){
          track.style.transition = animate ? 'transform .58s cubic-bezier(.22,.78,.25,1)' : 'none';
          track.style.transform = `translate3d(${-index * 100}%,0,0)`;

          const realIndex = ((index - 1 + total) % total);
          dots.forEach((dot, i) => dot.classList.toggle('active', i === realIndex));
        }

        function moveTo(nextIndex){
          if(isMoving) return;
          isMoving = true;
          index = nextIndex;
          setPosition(true);
        }

        function nextSlide(){ moveTo(index + 1); }
        function prevSlide(){ moveTo(index - 1); }

        function restartAuto(){
          clearInterval(autoTimer);
          autoTimer = setInterval(nextSlide, 3600);
        }

        track.addEventListener('transitionend', () => {
          if(index === total + 1){
            index = 1;
            setPosition(false);
          }

          if(index === 0){
            index = total;
            setPosition(false);
          }

          requestAnimationFrame(() => { isMoving = false; });
        });

        dots.forEach(dot => {
          dot.addEventListener('click', () => {
            if(isMoving) return;
            index = Number(dot.dataset.dot) + 1;
            setPosition(true);
            restartAuto();
          });
        });

        slider.addEventListener('pointerdown', (event) => {
          startX = event.clientX;
          deltaX = 0;
          try{ slider.setPointerCapture(event.pointerId); }catch(e){}
          clearInterval(autoTimer);
        });

        slider.addEventListener('pointermove', (event) => {
          if(!startX) return;
          deltaX = event.clientX - startX;
        });

        slider.addEventListener('pointerup', () => {
          if(Math.abs(deltaX) > 45){
            deltaX < 0 ? nextSlide() : prevSlide();
          }
          startX = 0;
          deltaX = 0;
          restartAuto();
        });

        slider.addEventListener('pointercancel', () => {
          startX = 0;
          deltaX = 0;
          restartAuto();
        });

        setPosition(false);
        restartAuto();
      }

      /* Нижняя панель */
      const navItems = Array.from(document.querySelectorAll('.bottom-nav .nav-item'));
      const homeNavItem = document.getElementById('homeNavItem');

      function setHomeActive(){
        navItems.forEach((btn) => btn.classList.remove('active'));
        if(homeNavItem) homeNavItem.classList.add('active');
      }

      navItems.forEach((item) => {
        item.addEventListener('click', () => {
          navItems.forEach((btn) => btn.classList.remove('active'));
          item.classList.add('active');
        });
      });

      /* Боковое меню */
      const openSideMenuBtn = document.getElementById('openSideMenu');
      const closeSideMenuBtn = document.getElementById('closeSideMenu');
      const sideMenu = document.getElementById('sideMenu');
      const sideOverlay = document.getElementById('sideOverlay');
      const supportToggle = document.getElementById('supportToggle');
      const supportSubmenu = document.getElementById('supportSubmenu');

      function resetSupportSubmenu(){
        if(supportToggle && supportSubmenu){
          supportToggle.classList.remove('open');
          supportToggle.setAttribute('aria-expanded', 'false');
          supportSubmenu.classList.remove('open');
        }
      }

      function openSideMenu(){
        if(!sideMenu || !sideOverlay) return;
        sideMenu.classList.add('active');
        sideOverlay.classList.add('active');
        document.body.classList.add('menu-open');
      }

      function closeSideMenu(){
        if(!sideMenu || !sideOverlay) return;
        sideMenu.classList.remove('active');
        sideOverlay.classList.remove('active');
        document.body.classList.remove('menu-open');
        resetSupportSubmenu();
        setHomeActive();
      }

      if(openSideMenuBtn) openSideMenuBtn.addEventListener('click', openSideMenu);
      if(closeSideMenuBtn) closeSideMenuBtn.addEventListener('click', closeSideMenu);
      if(sideOverlay) sideOverlay.addEventListener('click', closeSideMenu);

      if(supportToggle && supportSubmenu){
        supportToggle.addEventListener('click', () => {
          const isOpen = supportSubmenu.classList.toggle('open');
          supportToggle.classList.toggle('open', isOpen);
          supportToggle.setAttribute('aria-expanded', String(isOpen));
        });
      }

      /* Уведомления */
      const notifyButton = document.querySelector('.notify-pill');
      const notificationOverlay = document.getElementById('notificationOverlay');
      const notificationSheet = document.getElementById('notificationSheet');
      const notificationClose = document.getElementById('notificationClose');

      function openNotifications(){
        if(!notificationOverlay || !notificationSheet) return;
        notificationOverlay.classList.add('active');
        notificationSheet.classList.add('active');
        document.body.classList.add('notifications-open');
      }

      function closeNotifications(){
        if(!notificationOverlay || !notificationSheet) return;
        notificationOverlay.classList.remove('active');
        notificationSheet.classList.remove('active');
        document.body.classList.remove('notifications-open');
      }

      if(notifyButton) notifyButton.addEventListener('click', openNotifications);
      if(notificationOverlay) notificationOverlay.addEventListener('click', closeNotifications);
      if(notificationClose) notificationClose.addEventListener('click', closeNotifications);

      /* Telegram user для меню и профиля */
      function getTelegramUser(){
        return window.Telegram?.WebApp?.initDataUnsafe?.user || null;
      }

      function formatUserName(user){
        if(!user) return 'Игрок';
        return user.username ? '@' + user.username : [user.first_name, user.last_name].filter(Boolean).join(' ') || 'Игрок';
      }

      function setAvatar(container, user){
        if(!container) return;
        if(user?.photo_url){
          container.innerHTML = `<img src="${user.photo_url}" alt="Аватар">`;
        }else{
          const letter = user ? (user.first_name || user.username || 'И').slice(0, 1).toUpperCase() : '?';
          container.textContent = letter;
        }
      }

      const menuUserAvatar = document.getElementById('menuUserAvatar');
      const menuUserName = document.getElementById('menuUserName');
      const menuUserId = document.getElementById('menuUserId');

      function setTelegramMenuUser(){
        const user = getTelegramUser();
        if(menuUserName) menuUserName.textContent = formatUserName(user);
        if(menuUserId) menuUserId.textContent = user?.id ? 'ID: ' + user.id : 'ID: —';
        setAvatar(menuUserAvatar, user);
      }

      setTelegramMenuUser();

      /* Профиль */
      const profileOverlay = document.getElementById('profileOverlay');
      const profileSheet = document.getElementById('profileSheet');
      const profileClose = document.getElementById('profileClose');
      const profileAvatar = document.getElementById('profileAvatar');
      const profileName = document.getElementById('profileName');
      const profileTelegramId = document.getElementById('profileTelegramId');
      const copyTelegramId = document.getElementById('copyTelegramId');

      let currentTelegramId = '';

      function setProfileUser(){
        const user = getTelegramUser();
        currentTelegramId = user?.id ? String(user.id) : '';
        if(profileName) profileName.textContent = formatUserName(user);
        if(profileTelegramId) profileTelegramId.textContent = currentTelegramId ? 'ID: ' + currentTelegramId : 'ID: —';
        setAvatar(profileAvatar, user);
      }

      function openProfileSheet(){
        setProfileUser();
        if(!profileOverlay || !profileSheet) return;
        profileOverlay.classList.add('active');
        profileSheet.classList.add('active');
        document.body.classList.add('profile-open');
      }

      function closeProfileSheet(){
        if(!profileOverlay || !profileSheet) return;
        profileOverlay.classList.remove('active');
        profileSheet.classList.remove('active');
        document.body.classList.remove('profile-open');
        setHomeActive();
      }

      if(profileClose) profileClose.addEventListener('click', closeProfileSheet);
      if(profileOverlay) profileOverlay.addEventListener('click', closeProfileSheet);

      if(copyTelegramId){
        copyTelegramId.addEventListener('click', async () => {
          if(!currentTelegramId) return;
          try{
            await navigator.clipboard.writeText(currentTelegramId);
          }catch(e){
            const tempInput = document.createElement('input');
            tempInput.value = currentTelegramId;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            tempInput.remove();
          }

          const label = copyTelegramId.querySelector('span');
          if(label){
            label.textContent = 'Скопировано';
            setTimeout(() => { label.textContent = 'Копировать'; }, 1300);
          }
        });
      }

      navItems.forEach((button) => {
        if(button.textContent.trim() === 'Профиль'){
          button.addEventListener('click', openProfileSheet);
        }
      });

      document.querySelectorAll('.menu-link').forEach((button) => {
        if(button.textContent.includes('Профиль')){
          button.addEventListener('click', () => {
            closeSideMenu();
            setTimeout(openProfileSheet, 240);
          });
        }
      });

      setProfileUser();

      /* FAQ поддержки */
      const askHereBtn = document.getElementById('askHereBtn');
      const askSheetOverlay = document.getElementById('askSheetOverlay');
      const askSheet = document.getElementById('askSheet');
      const askClose = document.getElementById('askClose');

      function openAskSheet(){
        closeSideMenu();
        setTimeout(() => {
          if(!askSheetOverlay || !askSheet) return;
          askSheetOverlay.classList.add('active');
          askSheet.classList.add('active');
          document.body.classList.add('profile-open');
        }, 240);
      }

      function closeAskSheet(){
        if(!askSheetOverlay || !askSheet) return;
        askSheetOverlay.classList.remove('active');
        askSheet.classList.remove('active');
        document.body.classList.remove('profile-open');

        document.querySelectorAll('.support-faq-item').forEach((faqButton) => {
          faqButton.classList.remove('active');
        });

        setHomeActive();
      }

      document.querySelectorAll('.support-faq-item').forEach((faqButton) => {
        faqButton.addEventListener('click', () => {
          faqButton.classList.toggle('active');
        });
      });

      if(askHereBtn) askHereBtn.addEventListener('click', openAskSheet);
      if(askSheetOverlay) askSheetOverlay.addEventListener('click', closeAskSheet);
      if(askClose) askClose.addEventListener('click', closeAskSheet);

      document.addEventListener('keydown', (event) => {
        if(event.key === 'Escape'){
          closeSideMenu();
          closeNotifications();
          closeProfileSheet();
          closeAskSheet();
        }
      });
    });
  </script>
</body>
</html>
